<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>:root {
        color-scheme: light;
        --bg-canvas: #ffffff;
        --bg-surface: #f7f8fa;
        --bg-surface-2: #f2f3f5;
        --text-primary: #111827;
        --text-secondary: #6b7280;
        --text-muted: #9ca3af;
        --border-soft: #e5e7eb;
        --border-strong: #d1d5db;
        --accent: #5865f2;
        --accent-soft: rgba(88, 101, 242, 0.12);
        --hover-bg: rgba(17, 24, 39, 0.03);
        --code-bg: #111827;
        --code-text: #e5e7eb;
        --shadow-soft: 0 8px 24px rgba(17, 24, 39, 0.06);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg-canvas: #313338;
          --bg-surface: #2b2d31;
          --bg-surface-2: #1f2125;
          --text-primary: #e5e7eb;
          --text-secondary: #b5bac1;
          --text-muted: #8a9099;
          --border-soft: #3a3d43;
          --border-strong: #4b5563;
          --accent: #7c87ff;
          --accent-soft: rgba(124, 135, 255, 0.2);
          --hover-bg: rgba(255, 255, 255, 0.04);
          --code-bg: #111827;
          --code-text: #e5e7eb;
          --shadow-soft: 0 12px 30px rgba(0, 0, 0, 0.35);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Inter', 'Geist', system-ui, -apple-system, sans-serif;
        font-size: 15px;
        line-height: 1.45;
        background: var(--bg-canvas);
        color: var(--text-primary);
      }

      .container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: none;
        height: 100vh;
        margin: 0;
        padding: 0;
      }

      .top-bar {
        position: relative;
        flex-shrink: 0;
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        padding: 16px;
        margin: 10px;
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        background: color-mix(in srgb, var(--bg-surface) 88%, transparent);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow-soft);
      }

      .server-info {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 280px;
      }


      .chatlog-manifest {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .chatlog-manifest h4 {
        margin: 0;
        font-size: clamp(16px, 2.2vw, 20px);
        letter-spacing: 0.01em;
      }

      #message_count,
      #date_range {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--text-secondary);
        border: 1px solid var(--border-soft);
        background: var(--bg-surface-2);
      }

      .top-bar-right {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }

      .search-input {
        width: clamp(170px, 22vw, 260px);
        height: 34px;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 0 10px;
        outline: none;
        font-size: 13px;
        color: var(--text-primary);
        background: var(--bg-canvas);
      }

      .search-input:focus {
        border-color: color-mix(in srgb, var(--accent) 65%, var(--border-soft));
      }

      .sort-options {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--text-secondary);
      }

      .sort-radio {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        user-select: none;
      }

      .copy-json-btn {
        height: 34px;
        border: 1px solid color-mix(in srgb, var(--accent) 45%, var(--border-soft));
        border-radius: 10px;
        padding: 0 12px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: white;
        background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 80%, #111827));
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }

      .copy-json-btn:hover {
        opacity: 0.95;
        transform: translateY(-1px);
      }

      .messages-list-container {
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        background: var(--bg-surface);
        overflow: hidden;
      }

      .chat-main {
        display: flex;
        align-items: stretch;
        flex: 1;
        gap: 0;
        overflow: hidden;
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        margin: 0 10px 10px;
        background: var(--bg-canvas);
      }

      .chat-main .messages-list-container {
        flex: 1;
        height: 100%;
        overflow-y: auto;
        border: 0;
        border-radius: 0;
      }

      .search-sidebar {
        display: flex;
        flex-direction: column;
        width: 0;
        height: 100%;
        opacity: 0;
        overflow: hidden;
        background: #f9fafb;
        border-right: 0 solid #e3e5e8;
        transition: width 0.2s ease, opacity 0.2s ease, border-width 0.2s ease;
      }

      .search-sidebar.open {
        width: 320px;
        opacity: 1;
        border-right-width: 1px;
      }

      .search-sidebar-head {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        padding: 10px;
        border-bottom: 1px solid var(--border-soft);
        background: #f9fafb;
      }

      .search-head-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .search-sidebar-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .search-results-count {
        font-size: 11px;
        color: var(--text-muted);
      }

      .search-input-wrap {
        position: relative;
      }

      .search-input {
        width: 100%;
        height: 34px;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 0 28px 0 10px;
        outline: none;
        font-size: 13px;
        color: var(--text-primary);
        background: var(--bg-canvas);
      }

      .search-clear-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        border: 0;
        background: transparent;
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
      }

      .search-open-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 34px;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 0 10px;
        background: var(--bg-canvas);
        color: var(--text-secondary);
        font-size: 12px;
        cursor: pointer;
      }

      .search-close-btn {
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        background: var(--bg-canvas);
        color: var(--text-secondary);
        font-size: 11px;
        padding: 3px 8px;
        cursor: pointer;
      }

      .search-results {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .search-result-item {
        display: grid;
        grid-template-columns: 22px 1fr auto;
        gap: 8px;
        align-items: start;
        width: 100%;
        padding: 9px;
        border: 1px solid transparent;
        border-radius: 10px;
        text-align: left;
        background: rgba(255, 255, 255, 0.45);
        cursor: pointer;
      }

      .search-result-item:hover {
        border-color: var(--border-soft);
        background: var(--bg-canvas);
      }

      .search-result-avatar {
        width: 18px;
        height: 18px;
        border-radius: 50%;
      }

      .search-result-name {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .search-result-snippet {
        margin-top: 2px;
        font-size: 12px;
        color: var(--text-secondary);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .search-result-snippet mark {
        background: color-mix(in srgb, var(--accent) 25%, transparent);
        color: var(--text-primary);
        border-radius: 3px;
        padding: 0 2px;
      }

      .jump-flash {
        animation: jumpFlash 2s ease;
      }

      @keyframes jumpFlash {
        0% {
          background: color-mix(in srgb, var(--accent) 25%, transparent);
          box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent) 70%, transparent);
        }
        100% {
          background: transparent;
          box-shadow: inset 0 0 0 0 transparent;
        }
      }

      .search-result-time {
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 1px;
      }

      .search-sidebar::-webkit-scrollbar,
      .search-results::-webkit-scrollbar,
      .messages-list-container::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      .search-sidebar::-webkit-scrollbar-thumb,
      .search-results::-webkit-scrollbar-thumb,
      .messages-list-container::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--text-muted) 45%, transparent);
        border-radius: 999px;
      }

      .search-sidebar::-webkit-scrollbar-track,
      .search-results::-webkit-scrollbar-track,
      .messages-list-container::-webkit-scrollbar-track {
        background: transparent;
      }

      .search-empty {
        padding: 16px 10px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .search-overlay {
        display: none;
      }

      .messages-list-container.reverse {
        flex-direction: column-reverse;
      }

      .message-box {
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 10px;
        padding: 10px 14px;
        border-top: 1px solid color-mix(in srgb, var(--border-soft) 70%, transparent);
        transition: background-color 0.15s ease;
      }

      .message-box:first-child {
        border-top: 0;
      }

      .message-box:hover {
        background: var(--hover-bg);
      }

      .message-box.compact {
        grid-template-columns: 56px 1fr;
        padding-top: 4px;
      }

      .avatar-slot {
        display: flex;
        justify-content: center;
      }

      .message-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-soft);
        object-fit: cover;
      }

      .message-box.compact .message-avatar {
        visibility: hidden;
      }

      .message-body {
        min-width: 0;
      }

      .message-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 2px;
      }

      .message-box.compact .message-header {
        display: none;
      }

      .message-author {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .message-date {
        font-size: 11px;
        color: var(--text-muted);
      }

      .message-content {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        color: var(--text-primary);
      }

      .mention-inline {
        display: inline-block;
        border-radius: 5px;
        padding: 0 4px;
        margin: 0 1px;
        color: var(--accent);
        background: var(--accent-soft);
        font-weight: 600;
      }

      .message-reference {
        margin: 6px 0 8px;
        padding: 8px 10px;
        border-left: 3px solid color-mix(in srgb, var(--accent) 65%, var(--border-soft));
        border-radius: 8px;
        background: var(--bg-surface-2);
        color: var(--text-secondary);
        font-size: 12px;
      }

      .message-reference-author {
        font-weight: 700;
        color: var(--text-primary);
      }

      .message-reference-timestamp {
        margin-left: 8px;
        color: var(--text-muted);
      }

      .message-embeded {
        margin-top: 8px;
        border-left: 4px solid var(--accent);
        border-radius: 10px;
        background: var(--bg-surface-2);
        padding: 10px;
      }

      .embed-container {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .embed-text {
        font-weight: 700;
      }

      .embed-description {
        color: var(--text-secondary);
      }

      .attach-container,
      .embed-image-box {
        margin-top: 8px;
      }

      img,
      video {
        max-width: min(680px, 100%);
        max-height: 420px;
        border-radius: 10px;
      }

      audio {
        width: min(440px, 100%);
      }

      .zoomable {
        cursor: zoom-in;
        transition: transform 0.15s ease;
      }

      .zoomable:hover {
        transform: scale(1.01);
      }

      pre.code-wrap {
        position: relative;
        margin: 8px 0 0;
        padding: 12px;
        border-radius: 10px;
        overflow: auto;
        background: var(--code-bg);
        color: var(--code-text);
        border: 1px solid color-mix(in srgb, var(--code-bg) 75%, white);
      }

      pre.code-wrap code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      .code-copy-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 7px;
        padding: 3px 8px;
        font-size: 11px;
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.78);
        backdrop-filter: blur(3px);
      }

      .lightbox.open {
        display: flex;
      }

      .lightbox img {
        max-width: min(92vw, 1400px);
        max-height: 88vh;
        border-radius: 12px;
        box-shadow: 0 14px 50px rgba(0, 0, 0, 0.6);
      }

      @media (max-width: 768px) {
        html, body {
          overflow: auto;
          height: auto;
        }

        .container {
          height: auto;
          min-height: 100vh;
        }

        .chat-main {
          height: auto;
          min-height: 60vh;
          overflow: visible;
        }

        .chat-main .messages-list-container {
          overflow: visible;
          height: auto;
        }

        .top-bar {
          border-radius: 10px;
          position: static;
        }

        .server-info {
          min-width: 100%;
        }

        #server-icon {
          width: 44px;
          height: 44px;
          border-radius: 10px;
        }

        .message-box {
          grid-template-columns: 44px 1fr;
          padding: 8px 10px;
        }

        .message-avatar {
          width: 32px;
          height: 32px;
        }

        .search-open-btn {
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        .chat-main {
          position: relative;
          margin: 0;
          border-radius: 0;
          border-left: 0;
          border-right: 0;
          border-bottom: 0;
        }

        .search-sidebar {
          position: fixed;
          left: 0;
          top: 0;
          z-index: 40;
          width: min(320px, 90vw);
          max-width: 90vw;
          height: 100vh;
          opacity: 1;
          border-right: 1px solid #e3e5e8;
          transform: translateX(-100%);
          transition: transform 0.2s ease;
        }

        .search-sidebar.open {
          width: min(320px, 90vw);
          transform: translateX(0);
        }

        .search-overlay {
          position: fixed;
          inset: 0;
          z-index: 30;
          background: rgba(0, 0, 0, 0.35);
          display: none;
        }

        .search-overlay.open {
          display: block;
        }
      }</style></head><body><div class="container"><div><div id="chatlogs-title" class="top-bar"><div class="server-info"><div class="chatlog-manifest"><h4>美股会员网

投机操作。目前股价位置：\n- 最近的价格走到过去几个月的支撑位置，50附近，来回摩擦，在这里迟早会做出一个方向的选择。\n- 再往下，42是一个筹码峰，这里可以看做40以下的强支撑。\n- 我认为等待周五的非农数据发布之后，可能出现比现在更好的投机机会。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-09T01:54:52.548000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1459002456347246652","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1459017985565003890","filename":"image.png","size":568394,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1459017985565003890/image.png?ex=69faade3&is=69f95c63&hm=965f1d3c686223ef840e74ce26bf4e9845aac69b3dc8d5ecb3d2ce7a5a0f32ce&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1459017985565003890/image.png?ex=69faade3&is=69f95c63&hm=965f1d3c686223ef840e74ce26bf4e9845aac69b3dc8d5ecb3d2ce7a5a0f32ce&","width":3450,"height":1784,"content_type":"image/png","content_scan_version":4,"placeholder":"+AcGDIC6qIunhYjMVWD0nO0SBw==","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-09T02:56:35.060000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1459017985808269445","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts": 是公司有军方业务，也就是所谓的星盾。星盾不仅仅是军用版本星链，而且具备电磁干扰防御能力以及主动电磁干扰能力。这让SpaceX成为一个美国政府高度依赖的军工企业。\n\n第二关于他的星链业务，我通过视频和文字都进行过详细的阐述，这里需要着重提到的是，很多朋友都以为星链现在在烧钱，其实它已经拥有接近千万的用户，是全球目前超大型的电讯公司，从该业务获得的收入以后会源源不断。\n\n第三点是关于下一代手机直连卫星通讯卫星，以及初代分布式算力卫星。虽然仍具有不确定性，但如果这两个方面取得成功，可以非常轻松让公司的市值到20000亿以上。\n\n第四点是整个公司的工业化生产能力。大家有没有发现，不管是火箭的批量制造还是卫星的批量制造，整个公司似乎看起来都很轻松完成，这种看起来的写意，其实竞争对手现在连尾巴都看不到，包括火箭实验室。\n\n投资有风险，以上仅供参考。[呲牙]","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-09T07:58:07.858000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1459093872503296199","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"Ace：\n    大家早上好，今天上午按惯例没有具体文字更新。只是简单说一下HIMS，我自己的HIMS仓位是绝不可能现在止损的，大家知道我在做卖出看涨期权，以获取权利金降低持仓成本。不管是NVO口服药的推出，还是亚马逊药房开始销售口服药，都没有改变我的计划。HIMS或许是比RKLB更加难以长期持有的股票，因为波动更大。总体上，不太建议现在全仓止损。\n\n下午两点，会员专享直播见！在那里我们也可以聊聊HIMS的期权问题。 @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-10T01:43:35.900000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1459362006145695870","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"Ace：\n    我想提示下RKLB的风险\n\n- 阿基米德引擎仍未宣布测试完毕，现在我这里亮起了黄灯，二月初（一个月左右之后）要是还没有好消息，就是亮红灯。\n- 二级火箭虽然到了发射场，但是静态测试还没开始；整流罩达到发射场地的时间最早是一月底。\n- 结轮：一月绝不可能火箭组装好上发射台了，最早是二月，更大概率最早是三月，有越来越大概率一季度没办法顺利上发射台（不好预估概率多大，还是看阿基米德引擎啥时候QC亮绿灯）","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-10T14:14:10.479000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1459550894860402891","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1459551276269305928","filename":"image.png","size":191981,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1459551276269305928/image.png?ex=69faa44d&is=69f952cd&hm=c1ebea2d13c3a0d1d66826b9367b70866141a0b8929ff1e1a505229fa40df49e&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1459551276269305928/image.png?ex=69faa44d&is=69f952cd&hm=c1ebea2d13c3a0d1d66826b9367b70866141a0b8929ff1e1a505229fa40df49e&","width":1290,"height":818,"content_type":"image/png","content_scan_version":4,"placeholder":"BvgBBIBjCIeJaHtnh41ndqAKCg==","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-10T14:15:41.444000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1459551276395397384","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \nSATS逻辑很简单，就是赌SPACEX上市，然后市值有至少1万亿起跳。\n趁很多人不知道，现在我认为仍然值得拥有。\n但是我说过，不要期待翻倍的收益就行，期待翻倍去其它更热门的股票。\n还有，请不要夜盘交易，交易量很小，大概率等下盘前股价要下来的","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-12T03:26:54.837000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460112782103019703","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n上周我的信息\n\n“投资EchoStar SATS\n\n我在之前说过几次对于SATS的观点，我想再重申一下，我觉得对于会员朋友们是比较重要的。\n\nSATS在2026能够带来投资回报的确定性我认为是挺高的，但是并不能期望翻倍这种极高收益率。当然风险还是SpaceX他最终不上市了，这个情况是可能出现。\n\n追求部分仓位收益确定性的朋友，我认为在2026太空大年是可以考虑。投资有风险，仅供参考。”","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-12T03:29:47.327000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460113505578651912","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \nRDW清仓计划\n\nRDW我的成本价11.4，我随时会在成本价上方清仓1500股。\n\n清仓原因：本意就不是要买入正股，当初通过Sell Put被迫接的，所以回本了我不会眷念，资金会转移到其它太空股去，比如SATS。RDW或许还会涨，但是我不会继续等待。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-12T05:15:35.577000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460140132068753607","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n执行卖出小仓位的RDW，从SP到持仓到现在，应该半年左右，不赚不亏。\n\n同时继续买入50股SATS，目前1.5%仓位正股+1%期权，正股成本116，期权小幅度浮盈中。\n\n整体下来还是降仓位降beta。","mentions":[],"mention_roles":[],"attachments":[{"id":"1460262948986425522","filename":"5a0320577b970f25ff8586df0fc22b6a.png","size":172448,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1460262948986425522/5a0320577b970f25ff8586df0fc22b6a.png?ex=69fa9819&is=69f94699&hm=e30663441ad46c96b5a711b669f9f2a75109ac6ff26d25d9f70589ff34b971f3&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1460262948986425522/5a0320577b970f25ff8586df0fc22b6a.png?ex=69fa9819&is=69f94699&hm=e30663441ad46c96b5a711b669f9f2a75109ac6ff26d25d9f70589ff34b971f3&","width":1179,"height":442,"content_type":"image/png","content_scan_version":4,"placeholder":"yfcFA4CfZlV7l5l3Y9+oHQs=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-12T13:23:37.457000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460262949175296091","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-13 HIMS和CRWV的图形告诉我们什么、平仓RDW继续加仓SATS，以及苹果谷歌官宣AI合作！ @everyone \n\n这篇帖子包括：\n- 我对HIMS 和 CRWV图形的看法，包括CRWV的投机/投资想法。\n- 昨天RDW 和 SATS的操作。\n- 我对苹果和谷歌官宣Genimi合作的想法。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-13T01:59:07.745000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460453078183706634","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \nHIMS图形依然糟糕 & CRWV出现机会\n\n首先如果你没有HIMS的股票，昨天这一根阳线的出现，不代表就是反转。HIMS的图形目前看来还是相当糟糕，想要稳健右侧上车的朋友，最好至少先等待股价站上前面两个低点：32.5 和 33.5。请注意，这是仅从图形上去看买入点，我自己短期内没有任何操作，因为我已经持有HIMS，已经做好了计划。\n\nCRWV昨天收出一根大阳线，我自己的判断：只要1-2个交易日内站稳现在90的价格，且很快站上60日均线，是有短期投机/中长期投资建仓的机会。我自己会在设置止损的前提下参与投机（目前定义为投机，但是确实有持续持有的想法），止损位置就会设置在昨天的开盘价78.75。\n..........","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-13T01:59:29.536000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460453169581658172","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n昨天的操作\n\n昨天下午我看到RDW股价接近11.4这个我的实际成本价格，所以通过以下文字通知了大家我的平仓计划，这个计划在晚间被执行，我卖出了全部1500股RDW，并同时买入50股SATS。具体交易截图也放在下方。目前我持有1.5%+的SATS正股 和 1.0%+SATS今年九月的看涨期权。\n\n“RDW清仓计划：RDW我的成本价11.4，我随时会在成本价上方清仓1500股。清仓原因：本意就不是要买入正股，当初通过Sell Put被迫接的，所以回本了我不会眷念，资金会转移到其它太空股去，比如SATS。RDW或许还会涨，但是我不会继续等待。”\n..........","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-13T02:00:47.277000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460453495651045446","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n苹果、谷歌官宣Gemini合作\n\n就在几小时钱，苹果与谷歌官宣了一项多年合作协议。根据该协议，下一代苹果基础模型将基于谷歌的 Gemini 模型和云技术构建。这些模型将为未来的 Apple Intelligence 功能提供核心动力力，包括将于今年推出的、更具个性化的 Siri。经过严谨的评估，苹果认定谷歌的 AI 技术为苹果基础模型提供了最强大的底层支持，并对这一合作将为苹果用户解锁的创新体验充满期待。\n\n这是大家都在期待的合作：苹果手机用户终于可以有更加聪明的Siri了（我对Siri很非常糟糕的使用历史，主要是因为homepod上当了），而谷歌则可以通过授权获取苹果付出的Gemini使用费，在我看来这是双赢的局面。现在更多人都意识到，模型已经不再是最重要的、必须自己做的东西，谁能应用好具体的模型更重要。\n\n现在我对苹果的看法比较矛盾：首先苹果的估值在七巨头是比较贵的，但是今年苹果折叠屏手机的发布以及下半年新版Siri的发布将是重大的外部利好。而谷歌，错过了现在要去下重仓追不容易，现在股价也处于一个高位，所以心理上过不去。对我个人而言，我暂时没有明确的投资思路，以上仅供大家参考。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-13T02:01:54.242000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460453776522612767","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n今天收盘如果CRWV收涨，在90上方，我会考虑明天盘后买入。\n一次性买入3%左右仓位。会设置止损位。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-13T14:58:50.320000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460649298525163597","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-14 市场健康，聊聊预测市场和Robinhood！ @everyone \n这篇帖子包括：\n- 我的CRWV买入计划；\n- Robinhood 2025年每季度的交易量数据，以及我对预测市场的看法。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-14T01:50:09.351000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460813207861067796","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n......\n\nCRWV的买入计划\n\n依据昨天的计划，因为今天收盘收跌，没有上90，所以继续等待。如果站上90和60MA，我会一次性买入3%仓位的CRWV，止损价格设置为前一个大涨交易日的开盘价78.75。\n\n“CRWV昨天收出一根大阳线，我自己的判断：只要1-2个交易日内站稳现在90的价格，且很快站上60日均线，是有短期投机/中长期投资建仓的机会。我自己会在设置止损的前提下参与投机（目前定义为投机，但是确实有持续持有的想法），止损位置就会设置在昨天的开盘价78.75。”","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-14T01:50:38.555000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460813330351525953","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n......\n\n2026是否是市场预测的爆发年份？\n\n2025年是预测市场爆发式增长的一年，全球预测市场已形成明显的“两强”格局。\n\nKalshi 年度交易量约 240 亿美元。作为美国首个受CFTC 美国商品期货交易委员会监管的预测市场，Kalshi 在2025年凭借合规优势和对体育博彩、经济指标合约的深度整合，实现了爆发式增长。它支持美元和加密货币存取款。\n\nPolymarket 年度交易量约 200 亿美元，尽管在部分地区受到合规性限制，但它在政治竞选、加密货币趋势和文化事件上的流动性领先竞争者。它基于 Polygon 链运行。\n\nRobinhood在这个市场属于新入局者，目前在交易量上远远落后上面两家领导者。每份事件合约的价值在 $0.01 到 $1.00 之间，比较乐观取1/3的位置为平均值，那么2025年四季度的预测市场交易量约为27亿美金，2025全年不会超过40亿美金的全年交易量。\n\n我对2026的预测市场感兴趣，也对Robinhood感兴趣，会继续为大家分享我的发现，也会制作视频进行分析，为进一步投资做准备。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-14T01:51:00.183000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460813421065801768","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1460813478309662845","filename":"2026-01-14_9.png","size":186693,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1460813478309662845/2026-01-14_9.png?ex=69fa9e91&is=69f94d11&hm=89aed531d8317d34eaf6115644e2ef7d7d9a559065e27428cac3d95785d19e5f&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1460813478309662845/2026-01-14_9.png?ex=69fa9e91&is=69f94d11&hm=89aed531d8317d34eaf6115644e2ef7d7d9a559065e27428cac3d95785d19e5f&","width":1888,"height":894,"content_type":"image/png","content_scan_version":4,"placeholder":"BPgBC4BMAndrxEiImf6YBkY=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-14T01:51:13.930000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1460813478725025964","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-15 涨起来，不需要理由! @everyone \n\n昨天标普和纳斯达克都出现了下跌，分别是 -0.5%和-1.0%，只有罗素上涨。\n\n然而我们关注的太空板块昨天持续强势：\n- LUNR VOYG都是10%左右的涨幅；\n- RKLB SATS PL BKSY RDW涨幅超过5%。\n\nSATS\n\n目前我的SATS期权盈利80%+，SATS价格即将达到135的期权实值，我在会员期权视频说明过，如果看涨期权的行权价被实际股价超过，那么这张期权的Delta就会越来越趋近于1（刚超过一般Delta 是0.6-0.7，超过很多变成深度实值 Delta会趋近 1），也就是我持有7张期权合约的收益将越来越趋近于持有700股正股的收益。我会按计划拿住这些期权合约，并找机会持续买入正股。\n\nRKLB\n\n而关于RKLB，我的观点和之前一致：部分止盈我认为是完全没问题，问题是每个人的心态问题。现在90卖了，如果涨到100-110-120，你是否会很心痛？觉得会，就少卖点，觉得不会因为这已经满足了，就多卖点。具体最多卖多少，还要看长远的持仓计划。当然，你也可以按照我期权视频中说的sell call备兑看涨期权进行“未来可能的更高价格的止盈”，具体如何操作可以参考视频。\n\n今天大型科技股很弱势，美股七姐妹全部收跌。\n\n- NFLX在84-85左右的支撑很关键；\n- NVDA现在来到183的价格，我继续等待更好的买入机会；\n- 微软前天出了一个基本面的负面消息，公司宣布对于美国所有数据中心对于电网造成的成本上升以及水资源的影响，将进行合理补偿，也就是说自己将为数据中心的成本进一步买单，想要抄底微软的朋友最好等等。\n\n今天将制作特斯拉 Semi 卡车视频，帖子就短一点，感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-15T01:45:22.198000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1461174391319822517","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \nCRWV大涨，我会按照计划，今天收盘在90以上的话，在明早盘后一次性买入3%仓位正股。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-15T15:05:46.420000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1461375819506126870","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n大家好，本周大部分时间都在做视频，五天三个视频，所以本周基本没看盘，然后对大家的提问回复也有疏忽。今天特斯拉视频在上午发布之后，我会看看漏电的问题。然后今天的文字更新也只会是我的昨天的交易更新，一些新闻上的东西会在周末补上。","mentions":[],"mention_roles":[],"attachments":[{"id":"1461535801576915051","filename":"562c668a97509462d613c2d47d7c3148.png","size":337681,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1461535801576915051/562c668a97509462d613c2d47d7c3148.png?ex=69fa9c49&is=69f94ac9&hm=7b0a83cc03595e0dae50e52841c9154683c3cdb356cca7df0f919a07916e878d&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1461535801576915051/562c668a97509462d613c2d47d7c3148.png?ex=69fa9c49&is=69f94ac9&hm=7b0a83cc03595e0dae50e52841c9154683c3cdb356cca7df0f919a07916e878d&","width":1422,"height":1184,"content_type":"image/png","content_scan_version":4,"placeholder":"ygcCDoBsV2blVmZfeGd3KIYHfi+Gn00=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-16T01:41:29.152000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1461535801719652415","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-16 CRWV的交易，以及AI基础设施的建仓更新\n @everyone \n\n买入CRWV\n\n昨天CRWV大涨，收盘在95.01，按照计划，只要收盘价站上90 且 高于60MA，那么会触发我的再次建仓。昨晚上开盘大涨，有一点打乱了计划，我没有选择立即买入，而是等待收盘，以防有什么意外。收盘虽然回落，但是站上90没有问题，于是早上起床后按计划买入300股CRWV，占我仓位的3%不到。\n\n止损：第一止损位90（突破W形态之后的支撑线），第二止损位78.75（周一大涨那天的开盘价）。具体选择哪一个位置止损，我会根据市场情况和账户情况再决定，会通知大家。\n\n英伟达不建仓吗？\n\n受到台积电的利好，昨天整个AI基础设施板块涨势都很好，包括上面的CRWV和英伟达。英伟达我是想等一个180左右的价格，现在没等到，我选择不追了。原因有二：首先我已经选择建仓CRWV，其次我本来就有3张英伟达 2027年6月，行权价200的看涨期权。基于此，不再选择建仓英伟达正股，继续等待。","mentions":[],"mention_roles":[],"attachments":[{"id":"1461538828358651904","filename":"IMG_8825.jpg","size":65662,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1461538828358651904/IMG_8825.jpg?ex=69fa9f1a&is=69f94d9a&hm=72fb3322f61d0bfdef6364bba968b84d39ca64a857ac1dc7a3464ebb8d0bb6f2&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1461538828358651904/IMG_8825.jpg?ex=69fa9f1a&is=69f94d9a&hm=72fb3322f61d0bfdef6364bba968b84d39ca64a857ac1dc7a3464ebb8d0bb6f2&","width":1179,"height":538,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"/fcBA4CAqry4emWawNcDjD4=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-16T01:53:30.808000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1461538828564041910","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n大家好，亚洲时区现在已经周六了，按照惯例我在健身房😁 @everyone \n\n昨天年度期权结算日，太空板块再次爆发，我自己真的也有一点被吓到！昨天其实没有睡好觉，在思考如何处理太空板块的仓位问题。一早醒来我决定，既然之前已经减仓，现在开始不管RKLB股价是突破100继续疯狂，还是拐头向下，我都保持不变稳定拿住。\n\n之后可能做出的改变是，如果RKLB下跌跌破80，我会根据公司的实际情况，看会不会需要用期权做保护。\n\n感谢大家，希望大家有一个愉快的周末！","mentions":[],"mention_roles":[],"attachments":[{"id":"1461894708082245704","filename":"IMG_8840.jpg","size":35797,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1461894708082245704/IMG_8840.jpg?ex=69fa990b&is=69f9478b&hm=ecff9ad041e4f3194f93673914eb1a83b3ba253d4c3af6602442d53532269435&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1461894708082245704/IMG_8840.jpg?ex=69fa990b&is=69f9478b&hm=ecff9ad041e4f3194f93673914eb1a83b3ba253d4c3af6602442d53532269435&","width":504,"height":736,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"+AcGBQCWr3aGSodpiIpHKHd2rwOG","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-17T01:27:39.143000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1461894708275187712","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n请注意，下周一美股休市","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-17T02:17:42.218000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1461907304084537581","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \nhttps://www.patreon.com/posts/2026-01-18-beng-148450428?utm_medium=clipboard_copy&utm_source=copyLink&utm_campaign=postshare_creator&utm_content=join_link","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-18T08:20:38.457000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1462361028116611239","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n我在Patreon发布了一篇文章，关于美工医疗保险。\n没有Patreon链接的也别急，我会出一期视频讲解大部分内容。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-18T08:21:02.807000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1462361130247786708","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n明天夜盘开盘不用慌，格陵兰岛的事情和去年四月比是小事，今天开始为期四天的达沃斯论坛，或许川普会有一些利好消息释放。不管接下来行情如何，记住几个原则：\n- 原本你就想好了止损位的，一定要设置止损单，比如我的CRWV，到了止损位我就走人。\n- 现金仓位太少的，计划好卖出止盈的股票和卖出比例。\n\n我最关注的事情是是否做RKLB的对冲，这个会提前通知大家。持续下跌中我最可能加仓的股票是SATS和HOOD。 @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-19T13:30:25.735000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1462801376676548717","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n各位好，我看到了APP的做空报告，中文背景的公司写的。我不会对这个报告做任何的评价，因为报告里面涉及到诈骗和赌博。尽管我非常反感类似的夸张的、间接引人联想的报告，但是万一万一最后是真的，我也不想摊浑水。\n\nAPP的背后的股东是否可能是东大的通缉犯，是可能的。不过我们要明白，东大的通缉犯不等同于国际通缉犯。大家感兴趣再去深入研究。\n\nAPP我唯一担心的其实是财务造假，不过目前也没有明确的信息证明，美国各大著名做空机构都做空了，但是股价还是坚挺。\n\n一些想法，仅供参考。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-20T01:55:48.416000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1462988957196226660","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1462989514036351231","filename":"AppLovin.pdf.pdf","size":1328356,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1462989514036351231/AppLovin.pdf.pdf?ex=69faa029&is=69f94ea9&hm=7370826cc4f7230313e7492176a6c083b72a986af57a12da7ca4a4b0c84d5685&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1462989514036351231/AppLovin.pdf.pdf?ex=69faa029&is=69f94ea9&hm=7370826cc4f7230313e7492176a6c083b72a986af57a12da7ca4a4b0c84d5685&","content_type":"application/pdf","content_scan_version":4}],"embeds":[],"timestamp":"2026-01-20T01:58:01.232000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1462989514266906811","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n昨天我发布了美国医疗体系的分享，美国的朋友看了觉得中肯，包括美国生活的保险精算师也认可视频分享的事实。如果你持有医疗相关股票，这是一期必看视频。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-20T02:03:19.608000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1462990849632636969","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-20 HOOD CRWV SATS交易计划分享，以及为什么必须警惕Open AI和SpaceX的上市！ @everyone \n\n这篇帖子包括：\n- HOOD CRWV SATS三只股票的交易计划\n- Open AI 和 SpaceX上市，必须警惕！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-20T05:45:04.981000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463046656411832330","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1463046821969531073","filename":"IMG_8913.jpg","size":148462,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1463046821969531073/IMG_8913.jpg?ex=69fad588&is=69f98408&hm=c8e7619f2628710bd361ff311fae5302d0fb047794ce0a642a656f6f91b58de0&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1463046821969531073/IMG_8913.jpg?ex=69fad588&is=69f98408&hm=c8e7619f2628710bd361ff311fae5302d0fb047794ce0a642a656f6f91b58de0&","width":1179,"height":978,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"/PcBBoCwzrqZaIaaZ2WJV6iGkLOyPgg=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-20T05:45:44.507000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463046822195888295","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n上面图片里面我下了三个订单，我会一一说明。\n\nCRWV止损订单\n根据上周分享的CRWV止损计划，我选择保守地在第一止损位离场，如果盘中（不包括夜盘盘前盘后）股价到90就会触发我89.9的卖出限价单。如果没有最好，继续持有。\n\n“止损：第一止损位90（突破W形态之后的支撑线），第二止损位78.75（周一大涨那天的开盘价）。具体选择哪一个位置止损，我会根据市场情况和账户情况再决定，会通知大家。”\n\nHOOD分两次通过Sell Put建仓\n现在HOOD的IV，特别是目前IV/历史IV这个数值比较高，适合做期权卖方。我决定通过两次建仓：\n\n如果开盘保持现在的下跌幅度甚至跌更多，使得股价在104附近的位置，我会通过卖出2026年12月的看跌期权，五张合约，第一次建仓。请注意，以上图片我下了一个不太可能的限价单，因为具体开盘会怎么样我不知道，所以这个价格我会在开盘后再调整才可能得以成交。（千万不要用目前价格下单，因为股价跌了，等下开盘卖出期权价格会涨。）\n\n我还有五张合约的后手，目前暂时计划是股价进一步下跌到90左右再考虑追加sell put，总共预计的同一时间的sell put有10张。因为我的极限是买入1000股HOOD股票，如果两个计划都买入，实际买入价格应该是70上下。\n\n加仓SATS\n这个就很简单，116是我目前的持仓成本，跌到116，我再买入50股。再往下100-110会继续加仓，到时候跌破了我的均价，我会加重加仓力度。这支股票的买卖决定我不会因为大盘调整而改变。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-20T05:45:47.708000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463046835621859359","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n.................\n\n警惕Open AI和SpaceX的上市！\n首先，这两家公司都可能在今年上市，其中SpaceX的概率很大，OpenAI方面Sam并没有亲口承认，所以我认为概率五五开。按照这一点判断，我认为上市时间上，SpaceX会早于OpenAI。而如果我是马斯克，在已经几乎确定要上市的情况下，我会尽可能让公司早点上市，早于OpenAI上市而不是晚于，这一点非常重要，为什么？\n\n因为OpenAI上市确实有不小的市场爆雷的风险。\n\n下面两段话的观点来自AI领域的Gary Marcus，我最近越来越倾向于相信这种观点。\n\nOpenAI的Sam早年多次宣称，GPT-5有可能让我们达到AGI，但是GPT-5已经发布，并没有带来AGI的效果，我目前趋向于认为，LLM不可能带领我们走向AGI，因为LLM更多的是一个几乎无限容量的记忆体，它可以记住所有东西，并且在毫秒之间帮你总结归纳问题，它的核心机制是预测序列中的下一个内容，但是它并不能真真意义创造东西。它给我们的输出看起来都很赞，但是仔细阅读的朋友，会时不时发现它存在幻觉，或者存在错误。盲目扩大大型语言模型规模 Scaling 的策略已经失败，无法通向通用人工智能。\n\n科技巨头现在每年投入数千亿美元购买GPU，但这建立在一种投机之上，即认为会有无限的需求。然而，研究显示目前的AI系统只能胜任少于10%人类的工作，这无法支撑万亿美元级别的估值。如果资金链断裂，OpenAI可能会陷入困境，甚至可能成为为AI领域的WeWork。\n\n如果华尔街让OpenAI顺利上市，我不知道会发生什么，我计划对于自己的持仓特别特别小心，要么大量减仓，要么大量对冲风险。如果你不打算这么做，至少为你的AI基础设施和相关概念股做好一个止损订单！\n\n而对于SpaceX的上市，我的态度是截然相反，这是一件很好的事情，这是美股IPO历史上最大规模的上市，将是一个里程碑。我希望特斯拉股东有优先权购买SpaceX的股票，我也在通过SATS提前布局，也很期待看看二级市场到底会给SpaceX什么样的溢价，这个溢价也会决定RKLB的合理溢价水平。如果RKLB的溢价水平高于SpaceX，这会触发我卖出一些RKLB，进行波段操作。当然，上市之前，RKLB也会有很多事情发生，特别是中子的进展，我会根据具体情况再决定是否在SpaceX上市之前止盈部分RKLB。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-20T05:46:06.717000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463046915351380114","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n下午我在大群发的计划，不管今天大盘是V还是跌，都会执行。HOOD除非反弹回去过多，比如说离104向上太远了，可能我就先不交易。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-20T10:34:51.519000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463119580837711872","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \nHOOD还是104，我应该会开盘执行SP计划。CRWV应该安全，SATS也应该买不到。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-20T13:57:00.843000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463170454910144533","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1463180507377569997","filename":"IMG_8933.jpg","size":20280,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1463180507377569997/IMG_8933.jpg?ex=69faa949&is=69f957c9&hm=5c3f456ef789a2bc8c9a4f00e74286e76919b40a7139e610d17e5d4c7046467e&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1463180507377569997/IMG_8933.jpg?ex=69faa949&is=69f957c9&hm=5c3f456ef789a2bc8c9a4f00e74286e76919b40a7139e610d17e5d4c7046467e&","width":1179,"height":369,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"yfcBCoDePWOPiHd4iHCSCSc=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-20T14:36:57.561000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463180507473907917","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n卖两张特斯拉call，晚安！","mentions":[],"mention_roles":[],"attachments":[{"id":"1463188516845654147","filename":"IMG_8934.jpg","size":17107,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1463188516845654147/IMG_8934.jpg?ex=69fab0bf&is=69f95f3f&hm=3ffa80d311de53dee19814fec050efcf73199df1ede4a77ded16d5871cc010a9&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1463188516845654147/IMG_8934.jpg?ex=69fab0bf&is=69f95f3f&hm=3ffa80d311de53dee19814fec050efcf73199df1ede4a77ded16d5871cc010a9&","width":1178,"height":220,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"ygcGAYCeRkd2mgqXz3bxXAU=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-20T15:08:47.195000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463188517059297353","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-21 Buy the dip的机会又来了吗？HOOD卖put TSLA卖call操作分享！ @everyone \n\n昨天的交易\n\n昨天HOOD的交易是计划中的，如下图，我完成了HOOD的首次Sell Put建仓，行权日期今年12月，行权价90，权利金15.4。接下来有机会会进行加仓。\n\n特斯拉的股价走势很不明确，所以我临时决定通过一些期权交易获得收益，增加一点持股的乐趣。昨天开盘我卖出了TSLA的看涨期权，行权日期今年6月，行权价500，权利金29.4。我现在有750股特斯拉正股，这里期权合约两张，最大的风险是必须以500的价格卖出200股，如果发生，实际卖出价格则为529.4。","mentions":[],"mention_roles":[],"attachments":[{"id":"1463357087005278208","filename":"IMG_8936.jpg","size":76714,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1463357087005278208/IMG_8936.jpg?ex=69faa4fd&is=69f9537d&hm=f20c470515eeb7796dc5ad48adbf9515de2b9ab8bca6730d9f5cc061b0e0b356&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1463357087005278208/IMG_8936.jpg?ex=69faa4fd&is=69f9537d&hm=f20c470515eeb7796dc5ad48adbf9515de2b9ab8bca6730d9f5cc061b0e0b356&","width":1179,"height":641,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"/fcBBIAQ0o1xh5h1d5eIcLEKJw==","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-21T02:18:37.448000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463357087198351472","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n又一轮下跌的开始？\n\n先分享一些数据\n- 经过昨天的大跌，YTD 标普和纳斯达克指数都是小幅下跌的，只有罗素是上涨的。\n- VIX指数突破20 = 波动率加剧但是尚未到30左右的常规buy the dip 区间。\n- CNN 恐慌贪婪指数48 = 中性。\n\n向下跳空缺口出现\n昨天标普和纳斯达克都形成了日K线的向下跳空缺口，非常明显，如果要完全回补缺口，标普需要上涨到6940点，纳斯达克要上涨到621点，以前我解释过为什么缺口大概率需要回补。如果短期比如说本周没办法回补，那么指数接下来继续向下的概率就会比较大，这是纯从技术图形角度的分析。\n\n我的观点\n- 我对已经到来的四季度财报依然比较乐观，而对川普带来的额不确定性保持中立态度。我认为川普能够带来的不确定性，在已经执政一段时间、且接下来面临中期选举的选票压力的情况下，这种不确定性对于股市的影响相较于以前大大减弱，这种减弱可以是单日指数的波动变小，也可以是波段的周期变短。\n- 基于此，不会过于担心系统性风险，而是更加专注在公司的基本面和一些重要的消息面上。接下来整体的操作思路将是通过持有的正股，卖出看涨期权，获得更多的权利金收益。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-21T02:19:22.415000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463357275803746336","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n“As the Company pushes Neutron to the limits and beyond to qualify its systems and structures for launch, qualification testing of the Stage 1 tank overnight resulted in a rupture during a hydrostatic pressure trial. Testing failures are not uncommon during qualification testing. We intentionally test structures to their limits to validate structural integrity and safety margins to ensure the robust requirements for a successful launch can be comfortably met.\n\nThere was no significant damage to the test structure or facilities, the next Stage 1 tank is already in production, and Neutron’s development campaign continues while the team assesses today’s test outcome.\n\nThe team is reviewing the Stage 1 test data, which will determine the extent of the impact to Neutron’s launch schedule. The Company intends to provide an update on the Neutron schedule during its 2025 Q4 earnings call in February.”","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-22T02:41:47.303000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463725304538333273","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-22 RKLB一级火箭测试出什么问题了，如何应对？CRWV小幅亏损出局。 @everyone \n\nRKLB中子出了什么问题？\n\n以上是RKLB刚才发出来的中子火箭研发进度特别申明，大家可以自己看英文原文，下面我进行我的解读。\n\n首先，这个申明明确告诉我们的信息包括：\n- 中子火箭一级QC过程中，具体是指压力测试过程中，河马嘴下方的结构件出现了破裂。\n- 针对同一个结构件，公司需要再次进行测试，而目前新的硬件正在生产中。\n- 团队会分析这次测试的数据，然后才能决定这次事件是否会造成中子延期以及延期多久。\n- 公司确认会在二月底的2025年4四季度财报上提供中子火箭发射时间的更新。\n\n其次，更重要的是我们能从字里行间读出来的信息：\n- 火箭部件测试失败在航天领域非常正常，包括BO和SpaceX在内的顶级公司都曾出现过多次测试失败甚至爆炸的情况。\n- 中子一级火箭测试暂时的结果是，失败！尽管文中提到，对于一级火箭的测试是极限的、超过测试通过标准的，但是这是所有火箭测试甚至是硬件测试的默认，也就是你需要测试的强度必须高过正常情况的强度，换句话说，通过是60分，但是你要按照80分来测试，根据不同公司的标准，对于优秀的公司，60分不能被认为通过。按照RKLB的标准以及文中透露的信息，我认为这次一级火箭QC失败了，原本一级火箭可以在一月也就是这几天就完成QC，现在不可能了。这意味着一定会对原有的首发计划造成一定的延迟。\n- 公司目前没有可以用于马上测试的新的部件，这个部件还在生产，但是公司暗示硬件的迭代会很快，最多几周甚至可能1-2周就可以再次进行测试。要再次进行测试有两个前提条件：第一，要通过数据分析这次失败的原因且马上对新的硬件进行改善，第二，要等待新的硬件生产号，二者缺一不可。\n- 四季度财报预计会在二月底进行，财报前两周一般都是管理层的静默期，现在距离静默期不远了。有很大概率，公司从今天开始到财报前的这一个月，不会发布任何关于中子火箭进度的官方消息了。然后，就在财报上，会给出最后的结论。\n\n最后，我的预计：\n\n二月份下旬财报上很可能会给出的结论：中子on pad从计划的一季度延期到二季度，中子首发确认最早只可能在2026年下半年。\n\n要怎么做？\n\n适合大部分朋友的，还是最傻最简单的buy and hold，然后在低点利用现金直接加仓正股，或者利用sell put找到在更低的位置加仓的机会。\n\n做对冲保护的需求更加强一些了：怎么做，这里我主要说期权方面的选择。\n- 第一，sell call，通过交易上行风险获得权利金，哪怕股价下跌，至少你可以获得一些“补偿”，但是这个补偿有限。\n- 第二，buy put，通过付出权利金对冲所有绝大部分下行风险，比如你买了2026-03的行权价60的put，付出的权利金是3块钱，如果你有1000股完全对冲，你需要付出3000块钱权利金，你锁定的最低实际卖出价格是60-3=57。如果一季度之前股价到了57以下，你就赚了；如果没到，你亏了3000块钱，或者说你的每股实际持仓成本增加了3块钱。\n- 第三，衣领策略，也就是前两者的结合，用sell call赚来的钱，买入put。\n\n具体要选buy and hold，还是利用期权做保护，大家要根据自己的实际情况决定。我暂时的选择是更简单的buy and hold然后低点加仓的方案，不过我会根据情况随时做出调整。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-22T02:42:08.213000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463725392241229968","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n............\n川普，你又赢了！我的CRWV输了 🙁\n\n格陵兰岛前几天这么大动静，其实川普就是想要一点地，可以修建自己的军事基地。事情解决了就好，昨天大盘指数较大幅度反弹，罗素强势创出新高，但是标普和纳斯达克指数都还没有补上前天的巨大向下的缺口。\n\n也很遗憾，我的CRWV设置在90的止损单在盘中被自动触发，亏损1500刀出局。对于CRWV，我继续谨慎保持观望。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-22T02:47:29.523000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463726739913052282","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n125买入50 SATS\n总共200股，2%仓位，均价118\n保留原有116限价买入单","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-22T04:04:50.268000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1463746204608233516","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-23 加仓HIMS到4000股，对于特斯拉我们要做的就是等待，Space is HARD! @everyone \n这篇帖子包括：\n- 为什么现在选择加仓HIMS正股\n- 特斯拉，乐观中保持谨慎\n- RKLB SpaceX火箭测试连续出问题，2026开年不利\n\n买入400股HIMS\n\n夜盘30.5的价格买入400股HIMS。原本和大家沟通的计划是如果股价能去到25左右，我会买入1-2%仓位的看涨期权，不过我后来想想，对于长期持有的一支股票，通过期权持有还是不如通过正股持有稳当，所以我选择现在30左右的位置加仓400股。加仓的另一个原因是我有16张年中到期的行权价40的备兑看涨期权，所以现在也有底气加仓，因为是有可能在接下来几个月我会被迫卖出1600股HIMS。我做了一些计算，觉得合理：\n\n现在30的股价，我HIMS仓位大约10%，我的实际持仓成本42。\n\n如果五个月内涨到了40以上，在被行权后，我将持有4000-1600=2400股，根据那时候的股价，我的仓位大约是8%，我的实际持仓成本40。\n\n以上两中情况的仓位，我认为都是可以接受的。现在低点加仓，拉高仓位，未来如果通过sell call出货，也算是做了波段。如果不能，那就持续hold。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-23T02:12:24.722000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1464080299603529760","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n来自特斯拉的好消息\n\n一早醒来特斯拉有一些好消息：\n- 无安全员的Robotaxi在德州奥斯汀正式亮相，公众可以开始使用该服务。\n- 一些金融机构的预估是，2026年能够有1000辆左右的无人出租车。（并非官方承诺）\n- 马斯克在达沃斯论坛透露，人形机器人将从2027年底左右向公众出售，在此之前仍只为工业服务，比如自家工厂。\n- SpaceX传出将在7月上市，一些未来重大催化剂的时间也浮现出来（和特斯拉间接相关）\n    - 手机直连卫星通讯的下一代卫星只能在2027年发布了，这比我预计的今年晚了一些。这意味着ASTS有更多时间部署卫星，商业化运营。\n    - 太空算力卫星：马斯克重启Dojo，并且透露AI7 / Dojo3 会用于太空算力卫星，现在AI5基本完成，每一代之间的设计周期9-12个月，所以到AI7从现在开始还有至少2年左右，也就是28年。所以合理推测，具备算力的卫星最早只会在2028年发射。这也比我想的晚一些。\n\n我的想法是，特斯拉是好公司，能够为我们投资者带来长期回报，这在我的眼里是毋庸置疑的。但是，2026年我的期待不会很高。2026年看起来Robotaxi的数量级并不能让特斯拉的基本面发生质的转变，如果大家还记得我的Robotaxi分析，1000辆车甚至是几千辆确实是毛毛雨。我希望2026年是继续沉淀积累的一年，CyberCab量产爬坡顺利，Semi量产爬坡顺利，4680电池生产加速，Robotaxi稳步增加数量（但不太可能爆发式增长），Optimus实现几千个的小规模量产。这一切将为2027年以后得爆发打好基础。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-23T02:24:30.426000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1464083343426588907","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026 Space行业开年不利\n\n昨天我仔细分析了RKLB一级火箭测试的失败，也明确表达了我对于中子火箭延迟的担忧。虽然股价没跌反涨，但是这不改变我的判断：很大概率RKLB会在二月底的财报上正式宣布中子on pad时间延期，最少从一季度延期到二季度。也请大家注意，其实中子测试的问题，以及中子延期，真不一定能够让股价跌下去。比如，有可能市场认为从一季度延期到二季度是可以理解的，所以市场不跌。我只能为大家提供公司基本面方面我的看法，没办法预测股市在特点时间的走势。\n\n除此之外，星舰的Booster 18.3在测试中也出问题了。下图就是X网友拍摄的图片，我们看到的蓝色的部分是一个整体，叫做can crusher，罐头粉碎机。这个工具是测试火箭结构能够承受多少压力。两天前，星舰的这一测试失败。我们不知道这是故意极限测试到失败还是真的失败，SpaceX 通常不会发布官方说明，请注意，他们还不是上市公司，没义务进行披露。但是，这确实让人对于第三代星舰的发射时间感到担忧。\n\n现在很多团队每天盯着各个火箭公司的工厂和发射场地拍摄，我们很幸运，因为这些网友帮我们打破了信息差。我也希望能够尽量帮助大家打破信息差。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-23T02:32:13.880000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1464085287293550592","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1464085326762086503","filename":"IMG_8946.JPG","size":231182,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1464085326762086503/IMG_8946.JPG?ex=69faa837&is=69f956b7&hm=86fd2237f09ec653b5c8f4176c317da09c990058a369af10dd17c6d3b8773245&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1464085326762086503/IMG_8946.JPG?ex=69faa837&is=69f956b7&hm=86fd2237f09ec653b5c8f4176c317da09c990058a369af10dd17c6d3b8773245&","width":1361,"height":909,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"5AcGDYDuAHluhnlWiKeIiPtT8x40","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-23T02:32:23.316000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1464085326871134291","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-23 AI医疗，谷歌Alphafold，Recursion RXRX @everyone \n\n我在Patreon完成了这篇文章，Patreon链接 https://www.patreon.com/posts/2026-01-23-aiyi-148842191?utm_medium=clipboard_copy&utm_source=copyLink&utm_campaign=postshare_creator&utm_content=join_link\n\n文章太长我不复制过来了，不过我会出一期视频，大家可以等待视频，感谢！\n\n..................\n\n我的投资观点\n- 未来3-5年，新药研发领域会出现爆发式增长，整个行业的确定性很高。\n- 预测某一家小型TechBio公司能否成功的难度没有变，依然很大，对普通投资者是地狱级别。\n- 投资传统大厂不符合我个人的投资喜好，也不符合现在的投资趋势。\n\n结合以上，我认为有两种投资策略：\n\n稳健型，投资生物科技ETF\n- 木头姐的 ARKG（全是成长型公司）\n- 权重ETF IBB（更多地反映大型公司的表现）\n- 等权重ETF XBI（更多地反映中小型生物科技公司的表现）\n- A股港股的创新药ETF（涨势在过去很好）\n\n小仓位搏一搏，单车变摩托。比如RXRX，现在在低点，一次性买入1%仓位。做好归零公司破产的打算，换取未来10倍的升值空间。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-23T04:06:35.244000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1464109032775221360","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n今晚我会做一个SATS sell put交易\n- 卖出SATS 7月17号到期的put，行权价125，权利金19左右，平衡价106，10张合约。\n- 未来如果不幸需要接货（比如说SpaceX上市发生了变故这种小概率事件），我会卖出部分RKLB股票转移到SATS，因为我现在现金仓位如果买入了1000股SATS，就很少了。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-23T08:56:13.012000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1464181920417054734","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1464182559276798065","filename":"2cd5a5ceca6e87c3b9d0428b12d05d90.jpg","size":72832,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1464182559276798065/2cd5a5ceca6e87c3b9d0428b12d05d90.jpg?ex=69fb02c5&is=69f9b145&hm=4e69bdcbbe0017dfe9329a3d5a32dd0d544ae57d353d9c0ca0c18695938b510a&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1464182559276798065/2cd5a5ceca6e87c3b9d0428b12d05d90.jpg?ex=69fb02c5&is=69f9b145&hm=4e69bdcbbe0017dfe9329a3d5a32dd0d544ae57d353d9c0ca0c18695938b510a&","width":1179,"height":441,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"/AcCA4CQzsmFdomHEHem9Z8=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-23T08:58:45.302000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1464182559167484012","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n上面SP的价格我乱挂的，等下会改的，现在不知道多少能成交。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-23T09:20:33.843000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1464188047586496534","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n上面SATS的Sell Put 18.9成交了。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-23T14:40:52.425000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1464268656161849579","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n大家早上好，本周的美股交易结束了，整体上还是不错的。昨天罗素2000指数出现了大幅度的回调，纳斯达克指数表现比较好，成功地在周四周五两个交易日补上了本周早期下跌的缺口。\n\n昨天火箭实验室股价最高涨7%，最低的时候跌了将近2%，上下的幅度9%。我想告诉大家对于我们投资的公司，它的股价有波动，不管是日内的波动还是某一段固定时间内的波动，是好事情。如果你可以合理的利用波动，不管是日内做T还是一段时间内做波段，还是通过期权获利，都有很多机会。当然反面就是你承受不了波动，或者是在做T做波段的时候被反噬。我个人在心态上早就习惯了也接受了像火箭实验室这样子类型的波动。\n\n祝大家有一个愉快的周末。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-24T01:20:35.743000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1464429647466070096","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n我这里分享目前我所有SATS的持仓细节，仅供参考。 @everyone \n\n第一张图片：所有类型仓位，从上到下为，看涨期权，卖出看跌期权，正股\n第二张图片：正股买入价格\n第三张图片：sell put细节（上周五执行的）\n第四张图片：call细节\n\n我还会持续通过以上手段，加仓SATS。","mentions":[],"mention_roles":[],"attachments":[{"id":"1465173187837820948","filename":"IMG_9014.jpg","size":50268,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1465173187837820948/IMG_9014.jpg?ex=69faa8dd&is=69f9575d&hm=da6ac2b8e40b2ed5f2cd350f549efa24c515a0f25db1a6276fc9b26864a48201&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1465173187837820948/IMG_9014.jpg?ex=69faa8dd&is=69f9575d&hm=da6ac2b8e40b2ed5f2cd350f549efa24c515a0f25db1a6276fc9b26864a48201&","width":886,"height":416,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"PQgCA4BwR+tpeRdpBZcyMHs=","placeholder_version":1},{"id":"1465173188077162649","filename":"IMG_9017.jpg","size":241946,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1465173188077162649/IMG_9017.jpg?ex=69faa8dd&is=69f9575d&hm=c02d74c3579ecb4a49625d48b37f6693c85ad737f047437a7b550e41a8a84af4&","proxy_url":"https:/ e_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \nSATS投资机会 & 风险 @everyone \n\n根据我的计算，如果你不认为目前SATS的价值包括任何本公司现有的资产，而是认为现在SATS的价值就仅仅等于它所拥有的SpaceX股份的价值，那么SATS不值得投资。我目前的观点还是传统的用SATS公司净资产作为估值参考。请注意，净资产也不等于估值，通常会有溢价，也会有折价的时候。\n\n按照目前SpaceX估值，假设SATS的净资产=市值，现在SATS合理估值=136；\n\n按照2026年SpaceX IPO时1.5万亿估值，假设SATS的净资产=市值，上市时SATS的合理估值=175，相较于现在有39%的上行空间。39%好像不是很多，但是，如果SpaceX半年后如传言的上市了，那么意味着半年投资SATS可能拿到的收益就有39%，按照年化就是接近80%。\n\n我个人认为这是一个确定性较高的机会，特别是我对SpaceX上市是非常乐观的。这里的乐观不是说上市了还要暴涨几倍，不太可能，而是我相信按照1.5万亿上市的难度不大，甚至有可能二级市场在上市后给出接近80-100倍的市销率，让市值达到2万亿以上。为此，我也附上了RKLB和SpaceX市销率的最新表格。\n\n风险，当然也有的！以下出现任何一个状况，那么这笔投资都很可能亏本。\n- SpaceX没办法上市！\n- SpaceX上市破发，市值根本打不到1.5万亿，或许1万亿都没有！\n- SATS胆子小，IPO之前提前卖出了SpaceX的股份！\n- SATS作妖，拿着手上频谱换来的现金开始开展一些市场不看好的业务！\n- SATS对于目前持有的债务存在和债主之间的纠纷导致潜在风险加大！","mentions":[],"mention_roles":[],"attachments":[{"id":"1465182302467395627","filename":"2026-01-26_11.09.04.png","size":427369,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1465182302467395627/2026-01-26_11.09.04.png?ex=69fab15a&is=69f95fda&hm=9dc1ad29d0d3abfec5142e374ff4d131d53471b582f36ff14b1dbfe6ccd4c988&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1465182302467395627/2026-01-26_11.09.04.png?ex=69fab15a&is=69f95fda&hm=9dc1ad29d0d3abfec5142e374ff4d131d53471b582f36ff14b1dbfe6ccd4c988&","width":3152,"height":1098,"content_type":"image/png","content_scan_version":4,"placeholder":"dAgKCobBJ9h3ZfebHmCiuwg=","placeholder_version":1},{"id":"1465182303004135596","filename":"2026-01-26_10.56.43.png","size":873752,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1465182303004135596/2026-01-26_10.56.43.png?ex=69fab15a&is=69f95fda&hm=32c155d80f5cd865d04df2f6a5d7ec53e60130bc08f786f0771485745b0e886d&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1465182303004135596/2026-01-26_10.56.43.png?ex=69fab15a&is=69f95fda&hm=32c155d80f5cd865d04
