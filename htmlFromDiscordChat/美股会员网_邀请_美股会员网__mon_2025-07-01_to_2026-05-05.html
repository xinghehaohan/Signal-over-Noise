lors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n夜盘下跌，我的计划：RKLB我只会在55左右加仓，SATS我只会在110左右加仓。现在看来还是较大概率继续向下到这两个位置的。\n\n从现在开始我会更加小心操作。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-30T00:23:35.149000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1487970511718846567","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n今晚我不会下单RKLB，明早看价格，在55附近的话我会考虑买，不过不会现在下限价单。我做好了跌下去48-50的心理准备。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-30T14:01:19.993000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1488176304590295125","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-03-31 RKLB CEO放弃所有薪水和未来激励：我只会在低点加仓而不会卖出 @everyone \n\nRKLB：一些新闻 & 我的操作计划\n\n根据最新的公开披露文件，Rocket Lab CEO Peter Beck主动对其薪酬结构进行了大幅度的削减：\n- 自愿放弃并彻底取消了其名下所有尚未归属的 RSU 392,155 股，按照50的价格，价值2000万，按照100的价格，价值4000万，也放弃了未来获取任何年度奖金或目标奖金的权利。\n- 自愿将其年度基本薪资削减至 1 美元。\n- 原本预留给他的这部分现金薪酬和股权额度，将全部重新定向用于 Rocket Lab 的公司优先事项和战略性研发计划。这样的改变，意味着 CEO 将自己个人的核心财富与公司的长期业务基本面进行了绝对深度的绑定。\n\n除此之外，去年就宣布收购的德国公司Mynaric，在等待了许久之后，终于获得了德国政府的批准。这意味着：\n- RKLB将拥有激光通讯的核心能力，这是卫星星座的必须技能。早前的担忧是如果收购不被批准，那么RKLB可能只能自己研发，那必将浪费时间，错过目前太空发展的黄金时段。\n- RKLB2026年将可以获得Mynaric的营收，这部分非内生营收可以增加公司营收年增速达到40%的可能性。目前我暂时不确定Mynaric的营收数字，之后管理层会透露更多信息。\n\n以上两个事情，在RKLB的长期投资者看来看，都是非常非常利好的。\n\n另外，最近还有一个传闻（没有落实的）：Equatys 星座计划是由 Space42（由阿联酋的 Bayanat 和 Yahsat 在近期合并而成的 AI 与太空科技巨头）与卫星通信公司 Viasat 成立的，这个合资公司计划部署一个由多达 2800 颗卫星 组成的星座，主要提供 D2D（Direct-to-Device，直连手机）通信服务。然后近期有很多猜测：Rocket Lab 或许正在成为这 2800 颗卫星 bus 的首选供应商，采用去年公司发布的Flatellite卫星平台。而部署 2800 颗卫星的资本支出很高，市场开始流传 Viasat 和 Space42 希望合作伙伴共担风险。而 Rocket Lab 前不久刚刚完成了 10 亿美元的融资，因此，市场猜测 RKLB 可能会动用这笔资金，对 Equatys 进行股权注入。简单来说：传闻认为 RKLB 打算“带资进组”，用真金白银参股该项目，以此作为筹码来彻底锁定这家公司历史上最大规模的卫星制造合同。目前我认为 RKLB 拿到合同是挺有可能，但是直接投资会不会发生，这个还是大大的问号。接下来，让我们一起期待，RKLB增发10亿美金到底要买什么公司！\n\n早上我已经在第一时间和大家分享了，在看到Mynaric 和 CEO 放弃薪酬这两个新闻的第一时间，我看股价56+也接近我的55加仓价格，所以我立即进行了300股的买入。我的下一个买入位置：当股价接近50的时候，我会直接买入1000股RKLB，同时我会卖出700股SATS，这样一进一出，我还能多得2万的现金，缓解融资压力。\n\n如果有一些会员朋友和我一样看好 RKLB 的长期发展，那千万不要在这个时候卖出RKLB的股票。\n- RKLB自高点已经回撤40%+\n- RKLB CEO 是真的好CEO，太空领域可能仅次于 Elon Musk\n- 中子的进展是比较慢，但是论综合实力，现在RKLB是仅次于SpaceX的公司，是目前上市公司里面确定性最大的\n- SpaceX上市在我看来是必然\n\n如果大家要加仓，我认为50-60的价格，结合目前公司的动向和未来的发展，未来这个价格翻倍的可能性在我看来是挺高的，也不会等很久。","mentions":[],"mention_roles":[],"attachments":[{"id":"1488362013116596389","filename":"53848766298_eb54a6c548_k.webp","size":58364,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1488362013116596389/53848766298_eb54a6c548_k.webp?ex=69faa524&is=69f953a4&hm=c7eaa615f8aaa827d43663829273414b7784ce7a3f9b4861ca9d95d3d27e4faf&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1488362013116596389/53848766298_eb54a6c548_k.webp?ex=69faa524&is=69f953a4&hm=c7eaa615f8aaa827d43663829273414b7784ce7a3f9b4861ca9d95d3d27e4faf&","width":1200,"height":800,"content_type":"image/webp","content_scan_version":4,"placeholder":"1wcGFYIP90WOm4fHh4ZVZ8l/ivum","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-31T02:19:16.387000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1488362013246881935","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n早上我漏掉了RKLB CEO卖股的事情，很重要，大家看看 @everyone \n\nPeter Beck又一次卖股计划！\n\n2026年3月27日，由 Peter Beck 控制的 Equatorial Trust 设立了一项 10b5-1 交易计划，该计划出售最多 500万股  RKLB 普通股，这大约是 Peter Beck 直接和间接实益拥有总股份的 10% ，抛售目的是为了“持续的资产多元化、遗产规划以及进一步支持慈善事业” 。该抛售计划最早可以在 6月底执行（3月27 + 三个月冷静期），并于 2026年7月8日 到期。为什么交易窗口如此短暂，有几种可能：高盛计划通过大宗交易的方式将这批股票打包转让给特定的机构投资者；Peter Beck对10b5-1 交易的价格触发条件有信心，如果没达成到期了，就废除计划，可能并不打算“不计成本地清仓”；结束日期赶在二季度财报前，避嫌。\n\nPeter Beck 2025年开始的10b5-1抛售历史\n2025-06-13，Equatorial Trust 计划通过高盛出售最多500万股公司普通股，最早可于2025年9月15日开始，于2025年12月17日到期。宣布当天股价 25.4。\n2025-09-15 卖出 106.35万股，单价 53.99\n2025-09-16 卖出 143.64万股，单价 48.75\n2025-12-15 卖出 250万股，单价 55.41\n据此推测：2025-06-13 设定的触发价格为 45-48\n总共 500 万股，单价53.2 >> 相较于宣布当天溢价超过100%\nSEC Rule 144 的“1% 抛售限制”：当时 Peter Beck 在任何 90 天内的合法抛售上限大约只有 480 万到 490 万股，所以券商在设计 10b5-1 计划时，必须将其强行切分，并且硬性规定两批交易之间必须相隔至少 90 天。这就导致了 9 月卖完第一批后，必须干等到 12 月额度刷新，才能卖第二批。\n\n2026-03-27，Equatorial Trust 计划通过高盛出售最多500万股公司普通股，最早可于2026年6月底开始，于 2026年7月8日 到期。宣布当天股价 60.9。截至 2026年3月20日，Rocket Lab 的已发行普通股总数为 572,468,968 股，1% 的法定抛售上限大约是 572.4 万股。他在法律上就完全不需要将其拆分到下一个季度了，可以一次性卖完。\n让我们六月底再回来关注这个事情的进展，以及到时候的股价相较于现在60不到的股价能有多少溢价！\n\n科普：公司宣布利好导致股价大涨，CEO 可以趁机卖股吗？如果 CEO 在半年前（当时公司还没发生这些利好）设立了一个计划，规定“股价涨到 80 美元就自动按批次抛售”。等到公司真正发布了重大利好，股价飙升突破了 80 美元，券商的系统就会自动无脑执行卖出指令。\n\n另外，Peter Beck名下本来就有 4600 万股老股票。如果他继续拿 RSU，就要承受 50% 的重税不断被“放血”；现在他主动放弃 RSU，转而通过 10b5-1 计划去卖他手里现成的 500 万股老股票。他成功地将自己获取现金的方式，从“按50%交税的普通收入”切换成了“按20%+交税的资本利得”。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-31T06:25:00.999000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1488423856631713912","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n我在318.5加仓了10股MU，特别说明：这是特别设立的一个长期投资仓位，占我整体仓位很小。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-31T12:58:40.019000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1488522921982034133","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nRKLB 61 再次加仓300，这里我想做一波反弹，把股数加到了7k","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-31T13:49:36.791000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1488535743013064777","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-04-01 接近13% 单日账户最大涨幅, 我的全部仓位更新 & 接下来的计划，还有我对SpaceX的看法，以及人类时隔几十年再次接近月球！ @everyone \n\n美伊战争 & 昨日操作 & 最新持仓\n\n一些美伊战争重要言论：\n- 昨天晚上，特朗普再次发出震撼言论，说“所有那些因为霍尔木兹海峡而无法获得油气的国家：第一，向美国购买，我们有充足的供应；第二，鼓起一些勇气，前往海峡，直接夺取。”\n- 随后在夜间，伊朗总统表示，“愿在获得保障的情况下结束战争”。\n- 早晨起床看到卢比奥又说，“结束伊朗战争不是今天，也不是明天，但终将到来”。\n- 而紧接着白宫宣布，北京时间明天周四上午9点，特朗普总统将发表全国讲话，提供关于伊朗局势的重要更新。\n\n昨日操作：\n- 昨天夜盘56.9加仓 RKLB，昨天盘中61继续追加 RKLB 300股\n- 昨天为特别投资组合追加低点的 MU 10股\n- 今天早上执行四月MSTR定投 7000刀，买入56股\n- 稍微控制风险，早上夜盘在118.5 卖出200股 SATS\n\n这些操作后，融资额度约等于15%。接下来的计划：\n- RKLB 尽可能不在低于80卖出任何仓位\n- SATS股价稳定，但如果急需现金我会果断卖出\n- TSLA的股价昨天360其实很吸引我，但是我现在没办法再优先特斯拉。基本上我现在可以把RKLB SATS TSLA放在一个大的投资篮子里，这些股票都和马斯克有关，我做好了未来账户更大幅度波动的准备，我对于SpaceX对这一篮子公司股价的影响保持乐观态度。这部分资金后来部分会去到SpaceX，我会在SpaceX上市首日买入部分SpaceX底仓。\n- 特别组合NVDA+ASML+INTC+MU减仓完毕，再跌也不会为这部分仓位加仓了，这部分不会动了，除非收益达到了父母要求提前卖出。","mentions":[],"mention_roles":[],"attachments":[{"id":"1488728206868484167","filename":"IMG_0380.jpg","size":163041,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1488728206868484167/IMG_0380.jpg?ex=69faa8af&is=69f9572f&hm=6be0458d118a5f3485250edce570bf631aae7386ecede3c027e66f7bfbc59eed&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1488728206868484167/IMG_0380.jpg?ex=69faa8af&is=69f9572f&hm=6be0458d118a5f3485250edce570bf631aae7386ecede3c027e66f7bfbc59eed&","width":1179,"height":1263,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"/fcBBwAEwY2Dl4iGaId4V3eVVwdXW6AG","placeholder_version":1},{"id":"1488728207460143224","filename":"2026-04-01_9.48.28.png","size":333605,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1488728207460143224/2026-04-01_9.48.28.png?ex=69faa8af&is=69f9572f&hm=a6df9c4a83d2b956f28eb3cedf7f8aff9749b5709aa5f8b9020ee9a6a01f9acd&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1488728207460143224/2026-04-01_9.48.28.png?ex=69faa8af&is=69f9572f&hm=a6df9c4a83d2b956f28eb3cedf7f8aff9749b5709aa5f8b9020ee9a6a01f9acd&","width":2208,"height":1422,"content_type":"image/png","content_scan_version":4,"placeholder":"+gcCBICqqqp+eHdPiLarcNs69A==","placeholder_version":1}],"embeds":[],"timestamp":"2026-04-01T02:34:23.925000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1488728207602487418","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nSpaceX，我必须投资的公司\n\n下面我再次说明为什么我认为太空投资者果断投资SpaceX是最简单的选择，以前我详细解释了星链、星盾、手机通讯、太空数据中心 这些现在和未来SpaceX的核心业务板块，就不重复（这些内容都有对应视频），下面是业务本身之外的一些重点总结：\n\nSpaceX的火箭发射垄断能力2026年仍在扩大：公司本身发射频次不断提升，意味着火箭供应链和场地运转能力持续优化，再加上竞争对手持续拉胯，SpaceX 快车跑在前面，后面的对手看不到尾灯。\n\nNASA大耳朵局长上任，改革频频，资源严重向以SpaceX为首的新型太空公司倾斜：没有以前那么多官僚，没有以前考虑那些竞争平衡，中美太空竞赛火热，谁能真正帮我解决问题，合同就给谁。\n\n纳斯达克通过改革，五月一号起，允许为符合要求的公司开通快速通道，提前加入纳斯达克100指数。这里我简单说一下，我完全不认为美股的走势和美伊战争会延后SpaceX上市计划。目前在我看来时间线非常明确：SpaceX已经在三月底秘密提交了上市申请书，然后这个月四月会进行机构投资者接洽，最快五月下旬可能就会开始路演宣传，最快六月就会正式上市。\n\n一家优秀的公司上市，长期持有投资，不是短期投资，我不会太在乎是否可以便宜10% 20% 甚至是30% 40%价格去买入，我一定会在上市第一天买入部分仓位，如果有下跌，那更是越跌越买的机会。我还没想好具体的买入计划，不过大概率我会准备4-3-3-？的买入方法：首日买入计划仓位的40%，如果接下来有出现像样的回撤，择机买入30%仓位，再回撤，再买入30%仓位，再出现以外，根据仓位情况卖出其它股票进行额外加仓。我会有部分资金SpaceX上市前入金，补充整体投入。我希望的SpaceX稳定底仓是有25-30%。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-01T02:35:50.352000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1488728570103599227","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nArtemis 2号任务 进入24H倒计时！\n\n北京时间4月2号早上六点半开始，将进入Artemis 2号任务的发射窗口。具体发射时间请关注NASA的直播。这将是人类几十年来再一次无限接近月球的任务，非常值得期待。这次任务不会着陆月球，而是环绕月球，届时我们会看到很多月球表面的照片。希望任务成功！\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[{"id":"1488728876153573496","filename":"2026-04-01_9.53.48.png","size":2956503,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1488728876153573496/2026-04-01_9.53.48.png?ex=69faa94f&is=69f957cf&hm=7b3f1b4dfa18c7273bebef15987a66ebfe42ffa40a76f239cb0d5d6b4b783795&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1488728876153573496/2026-04-01_9.53.48.png?ex=69faa94f&is=69f957cf&hm=7b3f1b4dfa18c7273bebef15987a66ebfe42ffa40a76f239cb0d5d6b4b783795&","width":1648,"height":2204,"content_type":"image/png","content_scan_version":4,"placeholder":"TBgKFQIth1CJWJanWIiZeBSgVQFp","placeholder_version":1}],"embeds":[],"timestamp":"2026-04-01T02:37:03.449000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1488728876694634667","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月1日-2026-04-01T01-16-50-07-00- 三月美股投资总结：太空板块爆发前的低谷买入机会！# 核心观点\n\n1. **美股投资表现整体回落，但个别月份出现正收益**  \n   - 截止2026年3月，标普500指数受到美伊战争影响，年初至今（YTD）收益率由2月的+0.9%下降至3月的-4.6%。  \n   - 个人投资账户在2月亏损约9%，3月有所回升至-5.5%，单月实现正收益，显示短期波动性较大但有恢复趋势。\n\n2. **仓位配置以太空和AI板块为核心，利用杠杆提高投资效率**  \n   - 总仓位中现金负15%（融资15%），期权负8%，股票仓位达123%，整体杠杆率较高。  \n   - 核心持仓集中于太空板块（71%），其中RKLB占43%，SATS占28%；AI应用板块占35%，主要持仓为TSLA（25%）、PLTR（6%）、NVDA（4%）。  \n   - 其他持仓包括HIMS（9%）和MSTR（6%），并为父母退休金投资了AI基建组合（NVDA+ASML+MU+INTC），占比2.7%，定位长期持有。\n\n3. **投资心态强调长期视角与理性分析，避免极端情绪影响决策**  \n   - 投资者年龄在30-40岁，应注重长期投资生涯规划，战争等短期事件的影响将随时间淡化。  \n   - 警惕极端言论，比如“美国必败”，保持客观理性判断市场。  \n   - 不过度关注战争新闻，重点关注公司基本面研究，坚信美伊战争不会持久，美国在AI领域的优势仍将持续扩大。\n\n4. **SpaceX和RKLB为太空板块投资重点，上市与管理层动向值得关注**  \n   - SpaceX计划于2026年6月上市，采用分批建仓策略，目标仓位25-30%。  \n   - RKLB CEO薪酬大幅调整，年薪降至1美元，放弃所有奖金权利，将资金用于公司战略研发，显示管理层与公司发展高度绑定。  \n   - CEO计划通过10b5-1计划出售部分股票，可能涉及资产多元化或慈善，出售时间窗口为6月底至7月初。\n\n5. **分享透明度高，注重基本面与效率提升**  \n   - 持仓细节完全公开，避免市场对买卖行为的片面解读。  \n   - 通过分享投资经验和技能（如Web Coding），推动自我提升和社区互动，营造理性讨论氛围。\n\n# 关键结论\n\n1. **美股市场短期受到地缘政治影响，但长远依然看好AI和太空行业发展潜力**  \n   - 美伊战争带来市场震荡，但历史经验显示战争对股市影响多为暂时，不宜过度悲观。  \n   - 美国在人工智能领域的技术领先优势将进一步扩大，构成长期投资的核心动力。\n\n2. **高杠杆配置需谨慎管理风险，但可通过精选高护城河公司实现收益最大化**  \n   - 杠杆融资比例控制在合理范围（15%融资），配合期权策略，有效放大投资收益。  \n   - 重点加仓太空和AI领域龙头企业，利用价格调整窗口逢低布局，有望在未来回报中获益显著。\n\n3. **SpaceX上市及RKLB管理层变动是太空板块的重要催化剂**  \n   - SpaceX借助纳斯达克100指数改革快速上市，吸引机构资金关注，未来表现值得期待。  \n   - RKLB CEO薪酬大幅缩水且卖股计划透明，体现对公司长期价值的信心及治理结构的成熟，有利于稳定股价和提升投资者信任。\n\n4. **避免情绪化交易，强化基本面研究，长期持有优质资产是核心策略**  \n   - 通过理性分析和信息筛选，避免因战争或短期市场波动频繁调整仓位。  \n   - 父母退休金的AI基建组合体现稳健配置理念，强调长期持有和资产保值增值。\n\n5. **投资者教育和社区互动是提升投资能力的重要途径**  \n   - 通过透明分享和技能输出（如Web Coding经验），增强自身投资判断力和操作效率。  \n   - 建立理性讨论环境，杜绝极端观点，有助于形成健康的投资心态。\n\n# 重要细节\n\n1. **美股收益及市场波动情况**  \n   - 标普500指数2026年3月年初至今跌幅达-4.6%。  \n   - 个人账户2月亏损9%，3月收复部分失地至-5.5%。  \n   - 市场日内波动超过10%，体现较大不确定性。\n\n2. **仓位及持仓结构细节**  \n   - 总仓位123%股票，现金负15%（融资15%），期权负8%。  \n   - 太空板块重仓RKLB（43%）和SATS（28%）。  \n   - AI应用持仓主要为TSLA（25%）、PLTR（6%）、NVDA（4%）。  \n   - 其他持仓包括HIMS（9%）、MSTR（6%）。  \n   - AI基建组合（NVDA、ASML、MU、INTC）占比2.7%，为父母退休金投资。\n\n3. **SpaceX IPO细节及建仓策略**  \n   - 计划3月秘密提交上市申请，4月开始与机构接洽，5月进行路演，6月正式上市。  \n   - 采用4-3-3-？分批建仓法，目标仓位控制在25-30%。\n\n4. **RKLB管理层薪酬及股票出售计划**  \n   - CEO放弃392,155股未归属RSU，年薪降至1美元，放弃奖金权利。  \n   - 资金优先用于公司战略研发，体现管理层与公司利益高度一致。  \n   - 10b5-1计划出售最多500万股（约占持股10%），出售时间窗口为6月末至7月8日。  \n   - 卖股可能为资产多元化、慈善捐赠或机构大宗交易。\n\n5. **投资心态及信息筛选原则**  \n   - 注重长期投资视角，规避战争短期影响。  \n   - 警惕极端主义言论，保持理性判断。  \n   - 不频繁关注战争新闻，重点研究基本面。\n\n6. **分享方式及社区建设**  \n   - 完全公开持仓细节，避免误解和片面解读。  \n   - 通过输出经验（如Web Coding）促进自我成长。  \n   - 欢迎理性讨论，拒绝极端观点。  \n   - Patron会员社群人数已达5000人，体现较强社区影响力。\n\n7. **融资风险与加仓逻辑**  \n   - 融资比例控制在15%，保持风险可控。  \n   - 太空股RKLB从100美元跌至60美元，SATS从130美元跌至110美元，视为加仓良机。  \n   - SATS被视为类现金资产，增强组合流动性和安全边际。\n\n8. **市场判断与未来预期**  \n   - 美伊战争不会长期持续，影响逐渐减弱。  \n   - 美国AI技术和军事优势将持续扩大，带动相关股票长期上涨。  \n   - 太空和AI板块具备高护城河，具备显著的增长潜力。\n\n总结来看，本次美股投资策略在复杂地缘政治背景下，坚定看好未来科技尤其是太空和AI领域的发展，采取高杠杆配置但风险控制明确，注重长期视角与理性分析，结合透明的持仓分享和社区互动，力求实现资本的持续增值与投资者能力的同步提升。","mentions":[],"mention_roles":[],"attachments":[{"id":"1489002362101305474","filename":"202641-2026-04-01T01-16-50-07-00-_.mp4","size":79893370,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1489002362101305474/202641-2026-04-01T01-16-50-07-00-_.mp4?ex=69faff43&is=69f9adc3&hm=c20c32ca94b0d20ea09403ccec40fa2cb167fd99a06bc206021d33e109fc61b6&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1489002362101305474/202641-2026-04-01T01-16-50-07-00-_.mp4?ex=69faff43&is=69f9adc3&hm=c20c32ca94b0d20ea09403ccec40fa2cb167fd99a06bc206021d33e109fc61b6&","width":1920,"height":1080,"content_type":"video/mp4","original_content_type":"video/mp4","content_scan_version":4,"placeholder":"6QcKLIiItpQ/mJWWd3cshYBTCA==","placeholder_version":1,"title":"2026年4月1日-2026-04-01T01-16-50-07-00- 三月美股投资总结：太空板块爆发前的低谷买入机会！"},{"id":"1489002366236884992","filename":"202641-2026-04-01T01-16-50-07-00-__.pdf","size":699078,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1489002366236884992/202641-2026-04-01T01-16-50-07-00-__.pdf?ex=69faff44&is=69f9adc4&hm=ea74678899339d7cfc8750d44fdd9d725b4282b861f39411fc6c7d9724321289&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1489002366236884992/202641-2026-04-01T01-16-50-07-00-__.pdf?ex=69faff44&is=69f9adc4&hm=ea74678899339d7cfc8750d44fdd9d725b4282b861f39411fc6c7d9724321289&","content_type":"application/pdf","original_content_type":"application/pdf","content_scan_version":4,"title":"2026年4月1日-2026-04-01T01-16-50-07-00- 三月美_笔记"}],"embeds":[],"timestamp":"2026-04-01T20:43:48.531000+00:00","edited_timestamp":"2026-04-28T20:15:19.807000+00:00","flags":0,"components":[],"id":"1489002366631018677","channel_id":"1457988703363399781","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-04-02 GSAT被Amazon收购意味着什么？千万别乱买ETF，比如VCX NASA！ @everyone \n\n先说夜盘两个操作\n- 63.5加仓300股RKLB\n- 29.5建仓100股IRDM\n\n人类再次前往月球 & 川普讲话\n\n早上NASA Artemis 2火箭成功上天，然后特朗普发言，都没太多惊吓。特朗普发言后，股市跌了，大家怨声载道。为什么跌？首先部分预期是特朗普宣布停战，这个预期落空；其次，特朗普提到了“我本可以轰炸伊朗油田但是我没有”，市场担心油价继续上升。但是我们也要想想，市场过去两天为什么涨，是不是也有部分price in 特朗普可能在今天早上宣布一些好消息的可能？大家可以思考下这个逻辑，不需要一惊一乍吓自己。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-02T02:59:02.531000+00:00","edited_timestamp":"2026-04-02T03:02:23.942000+00:00","flags":4,"components":[],"id":"1489096797191278804","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\nAmazon传言收购Globalstar GSAT\n\n其实GSAT被收购的传闻已经很久很久了，但是不知道谁会是收购方，收购方从苹果到SpaceX都有流传过，现在似乎要揭晓答案了，很可能是贝索斯的Amazon。GSAT从关注开始20多的股价涨到现在接近80，回撤不多，走势坚挺，这和VSAT的走势有点像。其实这正说明了整个卫星产业特别是具备频谱资源的通讯公司的估值已经被重塑。\n\n为什么Amazon要收购GSAT：最重要是为了GSAT手上的频谱，其次GSAT本身业务就是卫星通讯，这和贝索斯想要扩张自己的卫星通讯、创造和Starlink竞争的可能的目标相符。请注意，我说的是创造竞争可能性，因为现在的Amazon Leo项目完全和Starlink不在一个档次。还有就是GSAT的市值是100亿以内，这种规模还是比较容易实现收购。\n\n而为什么SpaceX之前不收购EchoStar SATS而要去单独购买频频呢？主要原因是SATS本身在去年债务情况复杂，或者叫资产负债表混乱，而且SATS是地面运营商，受到的监管约束远大于GSAT。\n\n上市公司中还有一家公司有频谱，那就是IRDM，这家公司我在今年早些时候提过，认为有机会实现股价的反转。现在股价其实已经从最低点15上来翻倍到30了，不过我认为接下来股价还是会比较稳健的上升。这家公司以前提到过多次，有一定了解，我还会再进一步研究公司一些细节，通过文字或者视频和大家分享。","mentions":[],"mention_roles":[],"attachments":[{"id":"1489097012023398561","filename":"2026-04-02_10.24.40.png","size":259935,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1489097012023398561/2026-04-02_10.24.40.png?ex=69faaea9&is=69f95d29&hm=55f9e71610da4ffb8ce7323e2f6664d45ab6b64cc35b0aabdcdd3c1d14ecd3bd&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1489097012023398561/2026-04-02_10.24.40.png?ex=69faaea9&is=69f95d29&hm=55f9e71610da4ffb8ce7323e2f6664d45ab6b64cc35b0aabdcdd3c1d14ecd3bd&","width":1210,"height":650,"content_type":"image/png","content_scan_version":4,"placeholder":"GHoOVJKAOIOHd3dUl3eAdwh4hw==","placeholder_version":1}],"embeds":[],"timestamp":"2026-04-02T02:59:53.753000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1489097012031914045","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n不建议追高买VCX NASA之类的ETF\n\n之前的帖子已经提过VCX，当时股价420，我天真去卖股做空然后才知道新股没办法借股做空，当时股价是十倍公司净值，现在股价跌到了115。\n\n而NASA这支ETF，它唯一的卖点就是自己拥有一点点SpaceX的股权，这是完全不值得去支付溢价的，而且对于投资者有信息不对称，因为你很难去计算每时每刻 股价 vs. 净值 的比例，也就是计算溢价。\n\n想去购买这些ETF的朋友，需要明确知道，去购买可以，就是想赚炒作投机的钱，而不要幻想我买了这个就是长期拿着投资SpaceX了。如果真要长期投资SpaceX，SATS在我看来是好得多的选择，这时候可能有朋友说了，但是SATS没怎么涨。对的，SATS目前完全没有投机炒作，这也是在我看来好的地方，所以我才认为110以下持续买入是风险很小的。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-02T03:16:03.845000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1489101080892805131","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n117.3卖出SATS 300股，释放一点融资压力，同时为继续加仓RKLB做准备。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-02T07:33:43.802000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1489165924652154880","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nINTC要去50了，对英特尔我早早些时候改变看法了，大家也可以考虑。\n英特尔虽然技术不行，但是美国需要美国制造的芯片，然后现在英特尔市值不算高，向上我觉得长期看挺大空间。昨天刚把一座工厂重新买回来了。\n\nNVDA ASML MU INTL，目前我觉得可以是AI领域的选择。台积电当然也很强，看个人了，看我们对地缘政治的看法。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-02T14:08:39.506000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1489265311638360105","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月2日-2026-04-02T00-46-21-07-00- SpaceX提交上市申请：投资者现在要做什么？不能做什么？核心要点  \n1. 一级市场风险及骗局警示  \n   1.1 当前市场存在大量以SpaceX Pre-IPO为名的SPV（特殊目的载体）骗局，声称能以8500亿美元估值购买股票，实际估值约为1.25万亿美元。  \n   1.2 距离SpaceX IPO仅剩约3个月，一般一级市场折价机会基本消失，投资者需警惕虚假投资机会，尤其是通过微信等非正规渠道。  \n2. ETF投机风险  \n   2.1 市场存在包含SpaceX等未上市公司股权的ETF，如VCX ETF，因信息不对称，价格曾被炒至净值10倍以上（400+），后暴跌至约100。  \n   2.2 混合型ETF（例如NASA ETF）因同时包含上市和非上市公司股权，公允价值难以准确估算，增加投资不确定性。  \n   2.3 这些ETF本质上是投机工具，与长期持有SpaceX股份存在根本差异，投资者应谨慎对待。  \n3. 市场流动性及资金影响  \n   3.1 SpaceX上市预计不会大幅抽走美股流动性，纳斯达克已为其开通快速通道，最快15天纳入纳斯达克100指数。  \n   3.2 若SpaceX以1.75万亿美元市值上市并纳入标普500指数，预计将带来约400-500亿美元的被动资金流入。  \n4. 收益预期管理  \n   4.1 SpaceX上市估值（约1.75万亿至3万亿美元）远超特斯拉当年数百亿美元估值，爆发式增长空间有限。  \n   4.2 合理预期应偏向长期持有，短期翻倍即为优异表现，避免重复特斯拉投资者的过度乐观。  \n5. 积极投资策略及产业认知升级  \n   5.1 新型火箭技术极大降低了太空运输成本，催生了卫星通信（如Globalstar）和遥感（如AST SpaceMobile）等细分领域的投资机会。  \n   5.2 SpaceX的竞争对手如Rocket Lab股价已显著回升，反映整个航天行业的繁荣态势。  \n6. 龙头企业优势分析  \n   6.1 SpaceX享有“马太效应”，领先优势通过技术差距和规模效应不断扩展，类似于英伟达在半导体行业的地位。  \n   6.2 垂直整合能力成为核心竞争力，SpaceX通过全链条自主控制火箭研发和发射，避免依赖第三方。  \n   6.3 对比案例：AST SpaceMobile因依赖第三方发射导致项目进度滞后；Blue Origin虽研发自家火箭但发射频次不足，被迫依赖SpaceX服务。  \n7. 核心投资标的及仓位建议  \n   7.1 直接替代投资标的包括EchoStar（持有SpaceX约2.7%股权，当前股价低于110美元，存在投资价值）和Rocket Lab（唯一实现垂直整合的上市公司，持续推进收购战略）。  \n   7.2 建议分阶段建仓，初始仓位40%，后续分别追加30%和30%，目标配置占组合25%，并预留资金应对市场波动。  \n8. 关键数据指标备忘  \n   8.1 SpaceX预估上市市值约1.75万亿美元。  \n   8.2 纳入纳斯达克100和标普500指数后，潜在被动资金流入规模约400-500亿美元。  \n   8.3 EchoStar买入阈值定于股价低于110美元，折价约20%，安全持仓比例建议不超过25%。  \n9. IPO时间线及市场动态  \n   9.1 SpaceX IPO相关时间节点：4月与机构投资者会面、5月底进行路演、6月正式上市。  \n   9.2 投资者需持续关注市场动态，避免盲目追高。  \n\n关键结论  \n1. 投资SpaceX一级市场存在较大风险，尤其是骗局层出不穷，投资者应保持高度警惕，避免非正规渠道的诱惑。  \n2. 目前距离SpaceX正式上市时间较近，一级市场的折价机会几乎消失，预期收益应合理设定，注重长期价值而非短期暴利。  \n3. 包含未上市公司股权的ETF存在严重信息不对称和估值困境，其投机风险较大，不宜作为核心投资标的。  \n4. SpaceX上市后预计会带来大量被动资金流入，市场流动性有所改善，但不会对整体美股流动性造成显著挤出效应。  \n5. SpaceX作为行业龙头，依托技术领先和垂直整合优势，具备长期稳健的成长潜力，类似于英伟达的市场地位。  \n6. 垂直整合能力成为太空产业竞争的关键，依赖外部发射资源的公司面临较高的运营风险和项目延误。  \n7. 投资者可以通过持有EchoStar和Rocket Lab间接参与SpaceX成长，同时分散投资风险。  \n8. 投资组合建议保持较高的Beta风险，控制在25%左右，避免过度集中于单一资产。  \n9. 市场对SpaceX的估值预期应保持理性，短期内不宜期待巨额回报，长期持有更为稳健。  \n\n重要细节  \n1. SPV骗局具体表现为通过微信等社交渠道传播，虚构低价认购机会，投资者应增强识别能力。  \n2. VCX ETF曾一度价格被炒高至净值10倍以上，后价格大幅崩盘，表明市场对相关ETF投机性极强。  \n3. 纳斯达克已为SpaceX开通快速纳入100指数的通道，最快15天完成，显示市场对其上市的高度期待。  \n4. 标普500指数尚未调整纳入规则，但预期SpaceX上市后将带来400-500亿美元的被动资金流入，提升股票流动性和价值。  \n5. SpaceX的估值区间较宽，从1.75万亿美元到3万亿美元不等，反映市场对其成长预期的分歧。  \n6. SpaceX上市时市值远高于特斯拉IPO时的规模，特斯拉早期的爆发式增长难以复制。  \n7. 太空产业的技术革命主要来源于新型火箭的成本下降，推动卫星通信和遥感等细分领域快速发展。  \n8. Rocket Lab作为唯一实现垂直整合的上市空间技术公司，正通过收购和技术积累巩固行业地位。  \n9. EchoStar持有SpaceX约2.7%股权，当前股价低于110美元时具备较好的投资价值，提供折价安全边际。  \n10. 投资策略建议分三阶段建仓，初始投入40%，后续两次分别追加30%，以平滑市场波动风险。  \n11. 投资组合Beta值较高，风险与SpaceX及其相关产业紧密相关，投资者需具备相应风险承受能力。  \n12. AST SpaceMobile因依赖第三方发射，项目进度明显滞后，凸显垂直整合的重要性。  \n13. Blue Origin虽然自主研发火箭，但发射频率不足，反映技术与运营能力的双重挑战。  \n14. SpaceX的马太效应不仅体现在技术领先，还包括规模效应带来的成本优势和市场壁垒。  \n15. IPO时间线中，4月机构会面、5月路演、6月上市，为投资者提供了明确的时间节点和决策参考。  \n16. 投资者需警惕过度乐观的收益预期，合理规划投资期限和目标，避免追逐短期市场波动。","mentions":[],"mention_roles":[],"attachments":[{"id":"1489323704063365160","filename":"202642-2026-04-02T00-46-21-07-00-_SpaceX.mp4","size":153180455,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1489323704063365160/202642-2026-04-02T00-46-21-07-00-_SpaceX.mp4?ex=69fad909&is=69f98789&hm=501eedd21983ffa958c26b2805fa53aa6d287c11934326a85ef55577e3571c28&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1489323704063365160/202642-2026-04-02T00-46-21-07-00-_SpaceX.mp4?ex=69fad909&is=69f98789&hm=501eedd21983ffa958c26b2805fa53aa6d287c11934326a85ef55577e3571c28&","width":1920,"height":1080,"content_type":"video/mp4","original_content_type":"video/mp4","content_scan_version":4,"placeholder":"MhgGDILHh5eSZJu0ab87gPLILA==","placeholder_version":1,"title":"2026年4月2日-2026-04-02T00-46-21-07-00- SpaceX提交上市申请：投资者现在要做什么？不能做什么？"},{"id":"1489323709398520101","filename":"202642-2026-04-02T00-46-21-07-00-_Spa_.pdf","size":409293,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1489323709398520101/202642-2026-04-02T00-46-21-07-00-_Spa_.pdf?ex=69fad90a&is=69f9878a&hm=cf56101a25ac6355e36d8f25a9a21b4c8df7e5a03ec1e1169b14ac8e368f0328&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1489323709398520101/202642-2026-04-02T00-46-21-07-00-_Spa_.pdf?ex=69fad90a&is=69f9878a&hm=cf56101a25ac6355e36d8f25a9a21b4c8df7e5a03ec1e1169b14ac8e368f0328&","content_type":"application/pdf","original_content_type":"application/pdf","content_scan_version":4,"title":"2026年4月2日-2026-04-02T00-46-21-07-00- Spa_笔记"}],"embeds":[],"timestamp":"2026-04-02T18:00:42.766000+00:00","edited_timestamp":"2026-04-28T20:13:41.281000+00:00","flags":0,"components":[],"id":"1489323710023336096","channel_id":"1457988703363399781","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n美股反弹，太空板块发烫，Patreon里程碑！\n\n大家好，今天周五，美股休市，新加坡放假。今天我也算休息。昨天周三早上的帖子之后我没有任何交易。太空板块昨天涨幅远超大盘，特别是卫星相关的股票。我的持仓中，昨天早上夜盘买入的IRDM单日涨幅超15%，SATS 受到SpaceX 估值 两万亿消息的提振，尾盘拉升，盘后收盘价超过了130！涨幅超过15%的太空股票就很多，包括 SIDU SIPR VSAT YSS SALT LUNR IRDM。太空产业的泡沫是一定有的，我在分析PL的时候股价20都不太敢买入，现在股价来到35，类似这样的标的我依然不会参与，恭喜有这些相关股票的朋友们！RKLB表现非常弱，这只股票的市值相对大很多，要涨起来也相对更难，它需要一个外部利好，我们继续等待可能随时会宣布的大型收购或者大型合同。\n\n现在时4月初，此时我对太空的投资观点和1月初相比较没变：2026是太空确定性很高的年份，也是我们投资生涯中难得的投资太空的机会。昨天我发布了SpaceX的视频，大家也可以再听听我的看法。接下来坚定拿住我的SATS + RKLB两只核心太空股，IRDM继续等待合适时机再止盈。\n\n特斯拉的股东现在很难受，我完全理解，目前我认为能够短期拯救特斯拉股价的只能是FSD的铺开，当欧洲和更多国家开放FDS，特斯拉能够实现FSD订阅数量指数级增长，是我们希望尽快看到的。下周我会择机加仓特斯拉。\n\n今天我的Patreon会员人数首次超过了5000人！这5000人里面大部分是免费订阅的朋友，付费订阅的会员里面大部分是5 usd 每月的“交易更新”级别。我非常感谢愿意付费订阅的所有朋友，这是对我创作的最大支持！！也欢迎更多免费订阅的朋友加入付费级别！感谢大家！复活节快乐！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-03T02:33:06.756000+00:00","edited_timestamp":"2026-04-03T03:06:28.991000+00:00","flags":4,"components":[],"id":"1489452659663442001","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-04-04 静待RKLB股价爆发，年内必定再冲100+新高\n\n昨天RKLB Engineering VP采访说了什么\n\n最新RKLB 工程负责人采访 https://youtu.be/5c1ZIvPWFV4?si=nYHlUcYG4NwOjQxQ\n- 整流罩 fairing：进行了热防护涂层，以保护其免受发射和再入环境的影响，很快会被搬到室外。\n- 级间段 interstage：目前组装已经完全竣工，正在测试。\n- 一级储箱 stage 1 tank：上次失败后重建工作正在进行中，大约需要 2到3个月的时间。\n- 阿基米德发动机：建造一台发动机需要8-11天，并且暗示测试可能一直进行持续到下半年。\n- AFP碳纤维机器：可以适用于比目前中子火箭更大规模的结构件制造，可以解读为中子未来从拓展性看可以被改造得比现在的设计更大。\n\nMynaric收购成功意味着什么？- 卫星 BUS\n\nMynaric的激光通讯装置在去年宣布收购的时候可能大家还没意识到多重要，但是放到现在，我想市场已经认可了一家太空公司具备星间激光通讯能力，在太空数据中心以及手机直连卫星通讯的爆发前期，是多么珍贵。所以RKLB宣布德国政府批准这个收购，对于公司来说就是补齐了太空平台核心能力的最后一块短板！由此，RKLB具备了为大型卫星星座提供 卫星卫星平台也就是bus 的技术能力以及量产能力！换句话说，RKLB已经为未来获得太空数据中心相关的业务做好了基础准备工作，目前唯一欠缺的，就是中子火箭。\n\n关于载荷 - 卫星 Payload\n目前卫星载荷按照规模最大的四个发展方向：\n- SAR 合成孔径雷达，观测（商业化）\n- EO/IR 光电与红外，观测（商业化）\n- D2C 相控阵天线，通讯（等待商业化）\n- AIDC 太空数据中心，计算（等待商业化）\n\n除此之外，常用的载荷还有：\n- RF 射频监测，监听（商业化）\n- ISM 微重力制造，生产（等待商业化）\n\n目前RKLB拥有通过收购Goest获得的 EO/IR 光电与红外 载荷，而SpaceX则拥有 观测 + 监听 + 通讯 + 计算 多种能力。 上面提到，RKLB目前拥有了卫星BUS的全部核心能力，问题只是要搭载什么载荷，目前的猜测是：RKLB不会选择主动去参与已经竞争拥挤的 D2C 相控阵天线 也就是手机直连卫星通讯，而可能作为卫星BUS平台为客户提供卫星制造服务；其次，RKLB也可以为AIDC 太空数据星座提供所需的卫星BUS平台制造服务。\n\n综合以上，目前RKLB的最新状况：\n- 确认Mynaric收购：不仅补齐了急需的激光通讯能力，而且2026年可以录入Mynaric的营收！\n- 中子火箭进展：从采访中我的解读是，RKLB公司推迟首发到四季度是给自己留足了时间，他们必须必须做到首发成功入轨，不重点关注和时间赛跑，而是和质量较真。而不管是上面提到的 手机直连卫星通讯业务也好，还是太空数据星座业务也好，目前都不是2026年就必须要中子，所以从 火箭 + 卫星 配合的角度，公司还有时间。\n- 等待随时可能宣布的收购或者大合同：十亿美金增发之后，这笔钱可能要去收购，但更可能是用于某一个大合同扩产而准备。历史上，SDA第二批次合同拿到的时候，合同金额5亿美金，当时RKLB 发债筹资3亿美金。这次10亿美金发债，合同规模可能达到10-20亿美金，而如果是收购，收购公司规模可能更大，20-30亿美金也有可能。这一切还要等待官宣，但是官宣之时，我觉得有很大可能引起RKLB股价暴涨。\n\n不要在60-70这样的相对低位去做T，也不要卖出，死死拿住仓位，有条件的持续低点加仓，RKLB在今年极有可能再次创出新高。\n\n另外也说一下SATS：110的机会已经错过，市场给了我们两个月的时间买入。如果你曾经选择不买入，错过了110以下最好的机会，那下一个买入时机只能自己决定了，因为心理上每个投资者感受不同。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-04T07:29:37.918000+00:00","edited_timestamp":"2026-04-04T07:31:39.215000+00:00","flags":4,"components":[],"id":"1489889669071245402","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false,"reactions":[{"emoji":{"id":null,"name":"😭"},"count":2,"count_details":{"burst":0,"normal":2},"burst_colors":[],"me_burst":false,"burst_me":false,"me":false,"burst_count":0}]},{"type":0,"content":"@everyone \n美国预算两个事情和我们投资有关：\n\n1. NASA 2027预算可能削减 20%以上。但其实不用太担心：主要砍的都是一些ISS跟地球科学的啥的开支，包括国际空间站运营经费削减11亿美元，并精简\"分布于多个NASA中心的庞大官僚机构\"，以及空间技术任务部经费减少2.97亿美元，仅保留对未来月球任务早期研发及竞争性航天产业的支持，还有STEM参与项目经费削减1.43亿美元，再次提议完全取消该项目。（感谢 @Styxlethe 分享）\n\n2. 战争部 2027预算可能提升至1.5万亿，相较于2025-2026水平大幅度提高。这对军工企业和国防航天企业都是利好。\n\n请注意，这些预算都还早早期阶段，具体确认时间要到2026年下半年。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-04T07:44:50.281000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1489893495799021588","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n今天听all in podcast一个嘉宾的观点，我还是比较认同:\n- 现在SaaS软件的PE会从以前的科技股PE估值降级为普通非科技股的估值 >> 也就是说，想Adobe这样的公司，股价掉了，很正常，不一定能回去了，然后麦当劳PE比软件公司高，也可能是正常的。\n- SpaceX上市两万亿，接下来 Anthropic 和 OpenAI上市效果会打折，谁先上市谁就有先机，谁越晚上市资金的新引力越弱。>> 这也是为什么马斯克一定要抢上市时机，本来早前SpaceX从来没有上市计划的，现在短短几个月就全力开始冲刺了，因为马斯克SpaceX已经不是太空，而是和Anthropic以及Open AI直接竞争的公司了。\n\n同时，他认为特斯拉未来必定将和SpaceX合并，我认为也是很有可能，只是不是今年。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-04T14:37:59.607000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1489997469768093727","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n68.9再次加仓200股RKLB","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-06T08:10:12.262000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1490624655180959744","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月6日-2026-04-05T23-04-21-07-00- 马斯克是否能够让这家美国光伏公司股价暴涨！核心要点\n1. 太阳能产业技术格局  \n   1.1 地面光伏技术：  \n       - 中国在全球光伏产业中处于绝对领先地位，主流技术为晶硅电池。  \n       - 晶硅电池分为单晶硅和多晶硅，单晶硅效率高成本高，多晶硅成本低效率低。  \n       - 电学属性分为N型（掺磷，效率更高，衰减更低）和P型（掺硼，传统但逐渐被替代）。  \n       - 技术迭代路径为P型PERC→N型TOPCon→新一代HJT异质结电池。  \n\n   1.2 太空光伏技术：  \n       - 传统采用III-V族多结砷化镓电池，效率高且耐辐射，但成本极高。  \n       - 新兴技术方向为钙钛矿与异质结（HJT）叠层及钙钛矿与碲化镉（CdTe）叠层。  \n       - 钙钛矿技术特点包括薄膜柔性、抗高能粒子辐射和自我修复能力。  \n       - 关键指标为比功率（单位重量发电量），轻量化和柔性是太空光伏核心需求。  \n\n   1.3 First Solar技术布局：  \n       - 采用“两步走”战略：首先推动钙钛矿单结器件的研发和商业化，随后开发钙钛矿+碲化镉叠层器件以极大提升转换效率。  \n       - 2023年收购瑞典Evolar公司获得欧洲先进钙钛矿技术，2026年钙钛矿研发预算预计达1亿美元。  \n       - First Solar的碲化镉技术不依赖中国供应链，符合美国政策要求，拥有明显竞争优势。  \n\n2. 美国政策环境影响  \n   2.1 通胀削减法案（IRA）  \n       - 对在美国本土制造且销售给第三方的太阳能组件及部件直接补贴，电池片和组件补贴叠加可达每瓦11美分。  \n       - 补贴可以通过将税收抵免权利转卖给第三方（如VISA）变现，折价约4-5%。  \n       - 2023-2025年期间，First Solar大部分净利润来自政府补贴，2025年补贴占净利润105%。  \n       - 毛利率下降主要由于美国本土制造成本高、进口原材料关税增加及新工厂产能爬坡等因素。  \n\n   2.2 《大而美法案》及原材料溯源审查  \n       - 新增原材料来源审查，禁止来自中国的原材料进入补贴链条，影响光伏产业链布局。  \n       - First Solar因碲化镉技术不依赖中国原材料，成为唯一能够全额获得补贴的光伏制造商。  \n       - 对下游电站开发商影响较大，可能导致客户订单萎缩。  \n       - 其他相关条款包括Section 45Y（风电与大型地面光伏项目补贴规定）、Section 48E（分布式光伏开工时限要求）及对储能设备的持续补贴。  \n\n3. 投资视角与行业挑战  \n   3.1 基本面优势与估值  \n       - 美国本土光伏需求因数据中心等新兴应用持续增长，政策支持力度大。  \n       - First Solar当前市盈率约为13.75倍，处于相对低估区间。  \n       - 2025年其财报显示EPS表现波动，部分季度未达预期，行业面临持续竞争压力。  \n\n   3.2 行业挑战与风险  \n       - 政策退坡风险：补贴依赖较大，未来政策变化可能影响盈利稳定性。  \n       - 技术路线风险：钙钛矿叠层技术尚处于研发与验证阶段，商业化进程存在不确定性。  \n       - 供应链风险：虽然First Solar规避了中国原材料限制，但整体供应链环境复杂，仍需持续优化。  \n       - 市场竞争激烈，华尔街预期难以持续超越。  \n\n   3.3 未来发展机遇  \n       - 太空光伏市场潜力大，SpaceX等航天企业的技术路线选择将直接影响First Solar的市场机会。  \n       - First Solar积极布局钙钛矿+CdTe叠层，若技术突破，可同时占领地面与太空光伏市场。  \n       - 长远看，太空光伏的高比功率和轻量化需求为First Solar提供新的增长点。  \n       - 即使SpaceX自研相关技术，光伏行业整体的技术进步和市场扩张仍可能带动First Solar受益。  \n\n重要结论  \n1. 中国光伏产业依旧在地面晶硅电池领域占据主导地位，但美国政策加速推动碲化镉等非硅技术的发展，特别是在太空光伏领域。  \n2. First Solar凭借碲化镉技术和对钙钛矿材料的研发投入，在美国政策的支持下具备显著竞争优势，尤其是在避免中国原材料限制方面。  \n3. 美国通胀削减法案和《大而美法案》对产业链重新布局影响深远，补贴政策在短期内成为主要利润来源，但也存在补贴退坡及成本上升的压力。  \n4. 太空光伏作为新兴市场，技术要求高，叠层电池技术（钙钛矿+HJT或钙钛矿+CdTe）是未来发展趋势，First Solar在此领域的技术布局为其打开新的增长空间。  \n5. 投资者需关注First Solar的技术突破进展、政策环境变化及供应链稳定性，这些将直接影响其未来的盈利能力和估值表现。  \n\n重要细节  \n1. 晶硅电池技术细节：  \n   - 单晶硅晶体结构更规整，效率高但成本高；多晶硅结构无序，成本低但效率低。  \n   - N型掺磷电池效率优于传统P型掺硼电池，且衰减更慢。  \n\n2. 太空光伏技术两条主流路线：  \n   - 钙钛矿-HJT叠层技术：基于地面HJT晶硅技术，增加钙钛矿薄膜层，提升效率。  \n   - 钙钛矿-CdTe叠层技术：First Solar主导，无硅片，直接在玻璃上沉积薄膜，更适合轻量化和柔性要求。  \n\n3. First Solar的商业战略与研发投资：  \n   - 2023年5月收购Evolar，获取欧洲钙钛矿技术。  \n   - 预计2026年钙钛矿研发预算达到1亿美元。  \n   - 目前钙钛矿可靠性测试达到业界领先水平。  \n\n4. 政策细节与补贴机制：  \n   - IRA补贴基于美国制造且销售给第三方的组件，电池片与组件补贴叠加。  \n   - 补贴可通过税收抵免权利转卖变现，存在折价。  \n   - 《大而美法案》加强原材料溯源审查，限制中国材料进入供应链。  \n   - Section 45Y和48E严格限制项目开工与并网时间，影响下游开发商订单。  \n\n5. 财务与市场表现：  \n   - 2025年预计政府补贴占净利润比例超过100%，表明盈利高度依赖补贴。  \n   - 毛利率下降至约10%，反映制造成本和关税压力。  \n   - 订单总量（Backlog）从2024年的68.5GW降至2026年的50.6GW，显示订单压力。  \n\n6. SpaceX及太空光伏市场关联：  \n   - SpaceX早期使用地面PERC技术，未来对高功率密度光伏需求推动技术升级。  \n   - SpaceX可能采用钙钛矿+HJT（依赖中国供应链）或钙钛矿+CdTe（First Solar技术）路线。  \n   - SpaceX若自建产能，则可能压缩First Solar市场空间，反之则可能带来合作机会。  \n\n7. 行业趋势与风险提示：  \n   - 光伏行业整体热度上升，带动相关企业估值提升。  \n   - 技术路线选择和政策环境变化是影响企业长期价值的关键因素。  \n   - 投资需警惕技术研发失败、政策补贴退坡及供应链风险。  \n\n综上，太阳能特别是光伏产业正处于技术变革和政策驱动的关键时期，First Solar通过技术创新和政策适应，在地面及太空光伏市场均具备独特优势，但同时面临多重挑战和不确定性。投资者需全面评估其技术进展、政策环境和市场需求，审慎把握投资机会。","mentions":[],"mention_roles":[],"attachments":[{"id":"1490628206641025054","filename":"202646-2026-04-05T23-04-21-07-00-_.mp4","size":44760217,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1490628206641025054/202646-2026-04-05T23-04-21-07-00-_.mp4?ex=69fafab2&is=69f9a932&hm=0040567c3767a773e7c6a61fe77752a8b9eb88cadcece07802a409ee31cd3345&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1490628206641025054/ IMS继续持有 @everyone \n\n昨天的操作\n\nSATS\n- 平仓7月、9月各十张call，总共小小盈利3780\n- 建仓7月sell put，行权价110，获得权利金9200，还有早前已经持有且浮盈的同样行权时间但是行权价=125的sell put\n- 早上卖出200股SATS\n- 目前持有总共2000股正股，历史平摊均价106\n- 目前我对SATS的看法：还是会很稳，但是目前大盘这种情况下要冲破前高不容易，但是是迟早的事情。SATS依然等于我的现金仓位，要用了就提款，跌下去110就加仓。上面我选择放弃call而加码sell put的原因也是想降低风险：call时间损耗大，而SATS在六七月跌下去110我认为几乎不可能，所以做这个位置的sell put非常保险。如果股价接下来继续下跌一些，会员朋友可以考虑sell put拿少少权利金。\n\n其它\n- 早上350买入100股特斯拉：累计股数，不放弃。目前我持有股数其实也只是回到了去年的位置，因为我在400多减仓过200股。\n- 昨天104买入200股TMDX：上看150，跌下去80考虑止损。这只股票基本面我觉得完全没问题，也是盈利的公司，我认为100的价格很吸引人了，选择尝试做一个波段。\n- 昨天68.9买入200股RKLB：累计股数，不放弃。目前我的股数持续新高，这部分股票在高点回卖出一些，因为一些多出来的股数其实是使用融资买入的。\n\n接下来的计划\n- 如果对市场不放心，可能随时卖出降低杠杆的股票：IRDM TMDX SATS，极端情况也会考虑PLTR\n- 坚持持有绝大部分底仓的股票：RKLB TSLA\n- 基本不会管的股票：HIMS MSTR NVDA","mentions":[],"mention_roles":[],"attachments":[{"id":"1490906689539408032","filename":"2026-04-07_10.19.59.png","size":291237,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1490906689539408032/2026-04-07_10.19.59.png?ex=69faac8e&is=69f95b0e&hm=bbb6aae1563031e0ad662bf62d88dad8a37b2377127ba655572cd77e396206af&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1490906689539408032/2026-04-07_10.19.59.png?ex=69faac8e&is=69f95b0e&hm=bbb6aae1563031e0ad662bf62d88dad8a37b2377127ba655572cd77e396206af&","width":1720,"height":1384,"content_type":"image/png","content_scan_version":4,"placeholder":"+gcGBoCZqoh9d4ZviGh6l3mRm2D9M3U=","placeholder_version":1}],"embeds":[],"timestamp":"2026-04-07T02:50:54.560000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1490906689820692642","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nHIMS\n\n2025年二季度财报的10Q文件中显示，在2025年5月21日 HIMS CFO Yemi Okupe 提交了股票卖出申请，计划执行期限为 2025年9月15日 至 2026年8月30日，涉及的股票数量共计 115万股。请注意，10b5-1 计划的设立情况必须在发生该动作的当季财报中披露，但不是说必须设立了就马上披露。\n\n2025年11月3日，HIMS CFO Yemi Okupe表示股价在49美元时被低估了，因此“选择加大力度”进行股票回购。\n\n昨天，CFO宣布计划卖出上面销售计划里面的24万股。但是昨天SEC文件是144，要等4号文件出来才能确定具体哪一天卖的。\n\n我只能解读为，CFO在按计划卖出一些股票，他可能需要钱，但目前看他没有卖出所有计划中的115万股。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-07T02:51:22.980000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1490906809022812291","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月6日-2026-04-06T06-40-04-07-00- 为什么我认为RKLB可以在今年重回100！# 核心要点\n\n1. **股票价格走势与投资判断**  \n   - 火箭实验室（RKLB）股票价格从历史最高点100美元下跌至57美元，跌幅达43.84%，近期反弹至约70美元。  \n   - 预计2026年火箭实验室股价有较大可能重新冲击100美元高点，潜在涨幅约40%。  \n   - 建议采用分批建仓策略，在75、70、65、60及58美元区间逐步加仓，平均成本约64-65美元。  \n\n2. **火箭实验室技术进展**  \n   - 整流罩已完成热防护涂层（银色外观），即将移至室外进行测试。  \n   - 级间段组装完成，处于测试阶段。  \n   - 一级储箱因失败需重建，预计需2-3个月，可能延迟至第二季度完成。  \n   - 阿基米德发动机单台制造周期为8-11天，采取延长测试策略，确保首发可靠性，测试持续到下半年。  \n   - AFP碳纤维火箭结构具备扩展性，支持未来更大规模制造。  \n\n3. **Mynaric收购事件及战略意义**  \n   - Mynaric收购弥补了火箭实验室在星间激光通讯能力上的短板，为未来太空数据中心和卫星直连通讯提供保障。  \n   - 技术整合后，RKLB具备完整的卫星平台（BUS）制造能力。  \n   - 财务层面，预计2026年可合并Mynaric营收。  \n\n4. **卫星核心系统构成与收购历史**  \n   - 主要系统包括姿态控制系统（反作用轮、星敏感器）、电源系统（太空级太阳能电池）、通信系统（新增激光通讯能力）、分离系统（火箭与卫星连接部件）。  \n   - 相关收购历史：2020年收购Sinclair Interplanetary（姿态控制）、2021年Advanced Solutions（飞行软件）、2022年SolAero（太阳能电池）、2025年Geost（光电红外载荷）。  \n\n5. **卫星载荷现状及未来方向**  \n   - 商业化成熟领域包括合成孔径雷达（SAR）、光电红外（EO/IR）、射频监测（RF）。  \n   - 待商业化领域包含D2C相控阵天线（通讯）、AIDC太空数据中心（计算）、ISM微重力制造（生产）。  \n   - RKLB当前仅拥有EO/IR能力，未来可能专注于平台制造，避免直接进入D2C通讯市场竞争。  \n\n6. **公司最新运营状况**  \n   - 激光通讯能力已到位，2026年相关营收可期。  \n   - 中子火箭推迟发射，预留3-4季度缓冲期以确保首发成功率。  \n   - 公司计划通过10亿美元增发融资，资金用途包括10-20亿美元规模的大合同扩产及20-30亿美元的战略收购。  \n   - 操作建议为避免短线交易，逢低加仓。  \n\n7. **风险提示与投资者适配**  \n   - 过去18个月股价多次出现超过40%的大幅波动，波动性较大。  \n   - 投资者需有较高风险承受能力，并根据个人风险偏好调整仓位。  \n   - 投资决策应基于自身情况独立判断，避免盲目跟风。  \n\n8. **太空板块市场环境与相关案例对比**  \n   - 近期美伊战争不确定性带来了太空板块的投资窗口，上周四板块多股涨幅超过15%。  \n   - 卫星子板块回撤幅度有限，投资需谨慎。  \n   - 对比案例中，SATS在104美元以下提供了两个月的建仓窗口，错过最佳买点需重新评估入场策略。  \n\n9. **仓位管理与未来展望**  \n   - 建议在64-70美元区间分批建仓，仓位接近50%，需承受短期波动压力。  \n   - 70美元以下视为价值洼地，目标价为100美元以上。  \n   - 长期持有并逢低加仓，匹配个人风险承受能力。  \n\n# 关键结论\n\n1. **火箭实验室未来增长潜力显著**  \n   火箭实验室因技术进展及战略收购，尤其是激光通信技术的整合，具备完整的卫星平台制造能力，2026年有望实现收入增长和股价回升至100美元以上。  \n\n2. **技术与运营进展虽有延迟，但为确保首发成功为合理策略**  \n   尽管一级储箱重建及中子火箭发射推迟可能影响市场情绪，但公司采取谨慎策略以保障首发的成功率，这对长期价值提升至关重要。  \n\n3. **融资规模大，扩产及战略收购力度加大**  \n   计划通过10亿美元融资支持10亿至30亿美元规模的合同扩产和战略收购，显示公司对未来市场布局的积极态度，但也带来股权稀释风险。  \n\n4. **投资者需关注高波动风险，适合风险承受能力强者**  \n   由于过去股价波动剧烈，投资者应根据自身风险偏好调整仓位，避免盲目跟风操作。  \n\n5. **行业环境复杂但机遇明显**  \n   当前地缘政治不确定性为太空板块带来投资机会，尤其是卫星相关子板块表现较稳健，RKLB作为重要参与者具备较强竞争优势。  \n\n# 重要细节\n\n1. **股价具体数据与操作建议**  \n   - 股价从100美元高点跌至57美元，近期回升至70美元。  \n   - 分批加仓具体价格点位为75、70、65、60、58美元区间，平均建仓成本64-65美元。  \n   - 仓位建议控制在近50%，需承受较大短期波动。  \n\n2. **技术测试与制造周期**  \n   - 整流罩热防护涂层已完成，后续将开展室外测试。  \n   - 级间段装配完成并进入测试阶段。  \n   - 一级储箱重建周期为2-3个月，可能推迟至Q2完成。  \n   - 单台阿基米德发动机制造周期为8-11天，QC认证预计推迟至下半年。  \n\n3. **激光通讯与卫星能力整合**  \n   - 收购Mynaric补足星间激光通讯短板。  \n   - 2026年合并Mynaric营收，增强卫星平台制造竞争力。  \n   - 当前卫星载荷以EO/IR光电红外为主，尚缺乏通信和计算类载荷。  \n\n4. **卫星核心系统收购布局**  \n   - 2020年至2025年间，火箭实验室陆续收购多家核心技术公司，完善姿态控制、电源、飞行软件及光电载荷能力。  \n\n5. **资金用途与风险提示**  \n   - 10亿美元增发资金主要用于大规模合同执行与战略收购。  \n   - 股权稀释风险需投资者重点关注。  \n   - 历史波动大，投资者需谨慎，避免追涨杀跌。  \n\n6. **市场环境与投资窗口**  \n   - 美伊局势引发太空板块集体上涨，上周多股涨幅超15%。  \n   - 卫星子板块表现相对坚挺，回撤有限。  \n   - 投资者应结合行业动态调整投资策略。  \n\n7. **案例对比以辅助决策**  \n   - SATS股价低于104美元时提供较长建仓窗口，强调把握最佳买点的重要性。  \n   - 对比显示错 a","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月7日-2026-04-07T00-58-17-07-00- Ace退出YouTube？# 核心要点\n\n1. **频道定位与创作者身份**\n   - money life美股频道专注于美股投资及个股分析，提供深度市场信息和投资见解。\n   - 创作者ACE为全职视频创作者，致力于分享日常工作内容和会员体系的最新动态。\n\n2. **Patreon平台优势及运营现状**\n   - Patreon支持文字与视频内容整合，便于知识管理和粉丝互动。\n   - 付费会员享有专属聊天群和私信创作者的特权，社群管理功能优于YouTube会员。\n   - Patreon已成为创作者的主要收入来源，超过YouTube广告收入，保障了经济稳定和创作动力。\n\n3. **YouTube会员社群功能关闭与迁移方案**\n   - YouTube会员社群将于2024年4月15日正式关闭，系统会自动退款当月会员费。\n   - 建议现有会员通过视频下方的Patreon链接重新加入，迁移后价格提高5美元。\n   - 中国大陆用户的哔哩哔哩会员体系保持不变，继续支持本土用户。\n\n4. **全职博主的职业定位与创作内容**\n   - ACE定位为全职博主，主要任务是管理个人投资组合，实现财富增长。\n   - 内容完全透明公开个人仓位和操作记录，增加信任度和互动性。\n   - 每日学习新知识，深度追踪重点投资公司（如火箭实验室、SpaceX、特斯拉）动态，注重即时信息的分享。\n\n5. **日常工作安排与投资策略**\n   - 早上7点起床，形成固定生物钟，上午处理新闻和文字帖，午间进行视频创作。\n   - 工作日持续更新文字帖，会员可根据喜好调整消息提醒。\n   - 投资策略结合长期持仓和短期波段操作，特别关注企业家社交平台言论对股价的影响。\n\n6. **会员体系调整与价格变化**\n   - Patreon会员分层管理，设有不同等级的聊天群和私信服务。\n   - 新加入会员价格上调5美元，原YouTube会员需重新注册Patreon。\n   - Patreon高阶会员享有实时市场警报和深度研究报告等增值服务。\n\n7. **创作者收益结构与生活保障**\n   - Patreon订阅突破5000人，成为收入主力。\n   - 经济稳定支持在新加坡的生活开销，提升创作专注度和内容质量。\n   - 内容创作与投资研究同步进行，确保信息时效与专业性。\n\n# 关键结论\n\n1. **Patreon成为内容创作的核心平台**\n   - 相较于YouTube，Patreon提供更完善的社群管理和互动功能，满足全职创作者的需求。\n   - 通过分层会员制和多元化服务，增强用户粘性和付费意愿。\n\n2. **逐步关闭YouTube会员社群功能是必然选择**\n   - 运营成本与管理效率因素促使创作者关闭YouTube会员社群，转向更适合的Patreon平台。\n   - 这一变化对会员造成一定影响，但通过透明的迁移方案和价格调整，确保平稳过渡。\n\n3. **全职博主身份强化内容专业性与透明度**\n   - 公开个人投资组合和操作记录，树立诚信形象，吸引更多信任和支持。\n   - 依托丰富的市场跟踪和即时信息分享，提高内容的时效性和实用价值。\n\n4. **日常工作与创作节奏科学合理**\n   - 工作与生活时间管理得当，保证内容产出与家庭生活平衡。\n   - 结合新闻分析与视频制作，形成稳定且多样化的内容输出模式。\n\n5. **价格调整反映内容价值提升**\n   - 会员价格上调5美元 ATS换更多低位的RKLB，这个操作意味着我对于RKLB在未来短期能带来的涨幅会大于SATS，目前SATS增加到20%仓位，RKLB增加到50%仓位。坦白说RKLB表现相对于一些其他太空股票很弱势，但是我不会因为短期的弱势改变投资思路。\n\n美伊战争\n相信大家从二月底开展以来的新闻，哪怕是不看新闻就看我的偶尔的美伊战争更新，已经不难看出：\n- 川普管理下的战争就是不断的TACO，不要绝对相信任何他说的话，而是看看那些通常言行比较consistant比较一致的人，比如万斯或者卢比奥。\n- 美伊战争，逢低就买入，没钱买可以考虑择机换仓，换成价位更低而未来你更看好的公司。对我个人而言我是在这期间上了融资，但是这不适合大部分新手朋友，请大家理解，根据自己情况决策。感谢！\n- 最后一点最重要，我告诉一些非常看空美伊战争的朋友：现在要看到方向，谈不下来有可能，但是方向是确定性增加了，这是市场需要的，而且昨天盘前其实跌不下去太多，盘中跌幅也还好，不算很恐慌。\n- 在目前盘后夜盘短期上涨中，总体思路还是不要追高，当然具体个股的决策可能因为股价不同而有所不同。\n\n最近的一些投资决策\n最近做的一些短线或者是特别仓位投资决策目前看效果不错，虽然都是小仓位，不过对于下面股票的确定性我最近还是持续在强调：INTC在Terafab之后我说了几次认为未来可期，我也认为下一个Terafab需要合作的对象需要包括ASML；TMDX基本面很不错，100左右的价格且本身不太受战争影响，这样的股票小仓位买了没压力；IRDM，卫星股票这一波没吃到肉，喝点汤也行。\n按照夜盘的价格涨幅：\nIRDM买入几天收益 16.5%\nTMDX买入几天收益10%\n给父母的特别仓位建仓完成一周，总体收益超过了10%，其中：\n- INTC 25%\n- MU 15%\n- ASML 6%\n- NVDA 3.5%\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-08T02:32:46.798000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491264515281522749","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n361加仓特斯拉50股，股数来到新高","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-08T03:09:02.365000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491273640271020163","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n今天特斯拉的视频核心观点是：\n- 以后人形机器人的重点是大脑，要走订阅制，虽然还有一定时间，但是想象力非常大；\n- Terafab带来的投资价值没有被大家看到：利好美国制造的芯片上游企业包括刚宣布合作的英特尔，接下来会出现当初的OpenAI效应，Terafab和谁合作，谁就会涨，目前我已经买好了INTC ASML MU NVDA的仓位了。\n- Terafab将弱联系的特斯拉和SpaceX变为强联系，也大大加强了未来合并的可能性，关注特斯拉必须关注太空，以后是一家人。\n\n除此之外，还有一些芯片方面的额观察\n- Anthropic ARR暴涨到300亿美金，A链是可以埋伏的，主要玩家是谷歌和高通，其中谷歌是可以低点买入长期持有的，除此之外还是NVDA，因为英伟达除了自家GPU，还有收购的Groq推理芯片。\n- NeoCloud最近我不关注了，因为我认为未来不确定性和投资收益不成正比了：不确定性高和盈利能力不高，不匹配投资回报。NBIS的投资者特别注意，现在高点了，不应该再加仓，没买的不应该建仓，NBIS的大客户微软和Meta最近都吃瘪了，情况不容乐观。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-08T06:47:28.291000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491328610508865538","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n今晚比较稳妥的做法是看开盘后的表现，按道理仓位不重不需要减仓止盈。\n\n我自己有融资，选择稍微卸一点负担，刚才盘前再次卖出200股SATS。今晚大概率不会有任何其它操作，安心看开盘收盘表现就行了，向上涨向下跌点都有可能，无法预测。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-08T11:10:31.947000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491394811960496138","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone 2026年4月8日-2026-04-07T23-10-49-07-00- 特斯拉的未来在哪里，或许你还没看懂！# 核心观点\n\n1. **特斯拉持仓状况与操作策略**  \n   - 当前持仓比例为25%-30%，持股数量创历史新高。  \n   - 年初股价高于400美元时减持25%，随后在350-400美元区间持续加仓，最新加仓价位约为360美元。  \n   - 历史平均成本约280美元，持有期1.5至2年，当前整体收益率约30%。  \n   - 与其他太空板块相关个股相比，持仓收益率略低。\n\n2. **储能业务季度表现与行业特征**  \n   - 2026年第一季度储能交付量为8.8吉瓦，同比2025年第一季度略有下降，环比2025年第四季度大幅下降43%。  \n   - 储能行业存在激烈竞争和明显的季节性波动，大型项目交付时间影响季度分布。  \n   - 年度储能交付目标维持在至少45吉瓦。  \n   - 短期对储能业务持中性态度，重点关注4月下旬财报中相关解释。\n\n3. **特斯拉2025年第四季度财报核心指标**  \n   - FSD（全自动驾驶）活跃订阅用户数量首次纳入财报，达到110万，同比2024年增长38%（从80万增加至110万）。  \n   - 需监测季度环比增长率，期待出现爆发式增长而非渐进式增长。  \n   - 明确区分FSD订阅服务（现有车主月费99美元）与Robotaxi无人出租车服务，后者尚未商业化。\n\n4. **近期业务动向与战略调整**  \n   - 储能业务直接影响盈利能力，FSD订阅决定软件收入增长。  \n   - 汽车生产销售进入红海竞争，新兴方向包括FSD自动驾驶、Robotaxi服务及人形机器人Optimus。  \n   - 市场情绪普遍悲观，股价从510美元跌至330美元。  \n   - 建议小仓位波段操作，同时保持核心持仓。\n\n5. **特斯拉未来发展展望**  \n   - 人形机器人商业模式以硬件一次性销售（20k至30k美元）为基础，主要盈利依靠订阅制服务，类似于FSD。  \n   - 当前硬件V3版本发布延迟，预计2026年重点投入AI训练资源。  \n   - 技术依托SpaceX芯片和xAI算力资源，与汽车FSD技术协同发展。  \n   - 应用场景涵盖工业（工厂作业）及消费（家庭服务），持续学习与迭代能力是核心竞争力。\n\n6. **TerraFab与英特尔合作及太空生态链布局**  \n   - 战略目标是实现美国本土芯片制造，满足特斯拉、SpaceX、xAI的芯片需求。  \n   - 合作快速确定与英特尔的伙伴关系，潜在合作涵盖ASML等关键厂商。  \n   - 有望增强特斯拉与SpaceX合并预期，长期协同价值被市场低估。  \n   - 投资逻辑符合马斯克模式：初期不被认可，成功后被市场过度追捧。  \n   - 80%的计算算力将部署在太空领域，强化特斯拉与SpaceX的技术协同。  \n   - 建议投资者研究时间分配为50%特斯拉、50%太空领域，关注SpaceX上市后的配置机会。\n\n7. **市场表现与投资建议**  \n   - 特斯拉股价从高点510美元下跌至330美元，ACE持续加仓。  \n   - 储能业务存在季度交付波动，需关注未来财报和季节性因素。  \n   - FSD订阅用户基数达110万，期待爆发式增长带来软件收入提升。  \n   - 人形机器人硬件延迟，2026年将启动AI训练，未来以订阅服务盈利为主。  \n   - TerraFab芯片自主可控，生态链支撑度提升，市场尚未充分认可。  \n   - 建议逢低加仓，适合长期投资者，短线波动较大，技术和时间窗风险需谨慎。\n\n# 关键结论\n\n1. **特斯拉核心增长动力正从传统汽车业务向软件及新兴业务转型**  \n   储能业务和FSD订阅服务成为短期盈利和中长期增长的关键。传统汽车生产进入激烈竞争阶段，利润率下降，需依靠软件服务和新技术实现差异化。\n\n2. **FSD订阅用户数首次纳入财报，且增长显著，为软件收入增长打开空间**  \n   110万活跃订阅用户基数和38%的年增长率显示FSD服务商业模式逐渐成熟，但未来需观察是否能实现爆发式增长。\n\n3. **人形机器人Optimus虽有延迟，但长远来看是潜力巨大且创新的盈利引擎**  \n   以硬件一次性销售结合订阅制服务的新模式，有望颠覆传统机器人市场。2026年将加大AI训练投入，推动技术突破。\n\n4. **TerraFab芯片制造合作是特斯拉生态链自主可控的核心环节**  \n   通过与英特尔及ASML的合作，特斯拉和SpaceX能够降低对外部芯片供应的依赖，增强技术整合和长期竞争力。太空领域算力部署强化两家公司协同效应。\n\n5. **市场悲观情绪导致股价大幅回调，短期存在波动风险，但中长期投资价值显著**  \n   建议投资者保持核心持仓，逢低分批加仓，关注4月下旬财报及后续技术和业务进展。\n\n6. **太空领域的联动与SpaceX上市是未来投资重点**  \n   预计SpaceX上市后机构投资者将同步增持特斯拉与SpaceX，形成产业链协同效应，带来长期资本增值机会。\n\n# 重要细节\n\n1. **持仓与成本细节**  \n   - 当前特斯拉仓位占比25%-30%。  \n   - 平均持仓成本约280美元。  \n   - 持有时间为1.5-2年，累计收益约30%。  \n   - 最高加仓价位为360美元，较年初高点400美元有所调整。\n\n2. **储能业务季度数据与行业分析**  \n   - 2026Q1储能交付8.8GWh，同比略降，环比大幅下降43%。  \n   - 储能行业季节性强，项目交付时间点造成波动。  \n   - 预计2025年储能年交付量达45GWh以上。  \n   - 短期对储能业务持中性态度，关注后续财报说明。\n\n3. **FSD与Robotaxi的区分**  \n   - FSD订阅为现有车主提供增值服务，月费99美元。  \n   - Robotaxi为无人出租车服务，尚处于研发和试验阶段，未纳入当前收入。\n\n4. **FSD订阅用户增长目标与监测重点**  \n   - 2025年第四季度订阅用户110万。  \n   - 重点关注季度环比增速，期望爆发式增长。  \n   - 订阅服务收入是未来软件业务主要驱动力。\n\n5. **人形机器人Optimus发展状态**  \n   - V3硬件版本发布推迟。  \n   - 2026年将重点投入AI训练以提升机器人智能。  \n   - 商业模式以硬件售价20k-30k美元为起点，主要盈利依靠订阅制软件服务。  \n   - 应用涵盖工业和家庭场景，强调持续学习能力。\n\n6. **TerraFab合作细节**  \n   - 合作伙伴包括英特尔、ASML等。  \n   - 目标是实现美国本土芯片制造能力，支撑特斯拉、SpaceX、xAI等业务。  \n   - 80%算力部署在太空，支撑太空业务高性能计算需求。  \n   - 有助于强化特斯拉与SpaceX的长期协同和生态链整合。\n\n7. **股价表现与投资策略**  \n   - 特斯拉股价从510美元高点跌至330美元。  \n   - 市场情绪悲观，波动加剧。  \n   - 建议短线投资者谨慎择时，长期投资者可逢低加仓。  \n   - 关注2026年Q2太空前沿科技进展及SpaceX上市动向。\n\n8. **未来时间节点重点**  \n   - 2026年4月下旬发布财报，关注储能业务及FSD订阅数据。  \n   - 2026年启动人形机器人AI训练，关注技术突破。  \n   - SpaceX上市时间未定，上市后带来市场联动效应。  \n   - 持续关注芯片制造能力进展及生态链整合。\n\n9. **风险提示**  \n   - 储能业务存在季节性和项目交付不确定性。  \n   - FSD及Robotaxi商业化进度存在技术和监管风险。  \n   - 人形机器人商业模式尚处早期，硬件发布延迟可能影响市场预期。  \n   - 太空领域投资受技术和监管环境影响大，波动性高。  \n   - 股价波动剧烈，短线操作难度较大。\n\n总结来看，特斯拉正处于由传统汽车制造向软件服务及新兴技术驱动的转型关键期，储能和FSD订阅业务是短期盈利核心，人形机器人和TerraFab芯片制造则是中长期成长引擎。市场情绪虽悲观，但核心技术和业务布局具备较强竞争力，适合长期投资者逢低布局，关注未来财报和重要技术节点。","mentions":[],"mention_roles":[],"attachments":[{"id":"1491431152995537097","filename":"202648-2026-04-07T23-10-49-07-00-_.mp4","size":138483833,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1491431152995537097/202648-2026-04-07T23-10-49-07-00-_.mp4?ex=69f pe":0,"content":"@everyone \n我下午听了一些semi analysis的视频，总结给大家AI基础设施的一些重点。基本是 什么都缺，具体怎么找投资标的，下面这些要点可以给大家一些启发，顺腾摸瓜。储存和光相信大家不熟悉也熟悉了，涨太多了。一些可能暂时相对有一些人还不知道的投资方向：CPU、PCB/CCL、模块化建筑商、晶圆产能。我认为INTC非常明确，占据了CPU和晶圆现金制程这两项，再加上和Terafab的合作，未来的确定性相当高。而存储和光，极大概率一些热门股票会回到前高，比如MU LITE等等。\n\n算力瓶颈的转移：从 GPU 到 CPU 及周边硬件\n过去几年市场的焦点全在 GPU，但目前云端计算资源已经出现了严重的 CPU 短缺。其根本原因是 AI 正在从简单的“问答推理”转向“智能体 Agentic 工作流。智能体在自动写代码、调用数据库、进行物理模拟时，需要极其密集的 CPU 资源来持续验证模型生成的输出。\n\nAI 服务器的核心材料：高端 PCB 与 CCL 覆铜板\n传统的消费电子设备可能只需要 10 层以下的印制电路板 PCB，但高端 AI 服务器需要 30 到 40 层以上极其复杂的 PCB。这要求使用极其特殊的低介电常数 Low-DK 玻璃纤维和覆铜板CCL 材料。由于材料要求极高、制造工艺复杂且良率较低，全球仅有极少数供应商（如台湾的几家头部厂商）具备量产能力。这种极度的供需失衡赋予了这些处于供应链上游的材料和零组件厂商巨大的定价权。\n\n数据中心基础设施：模块化建设与“表后发电” (Behind-the-Meter Power)\n目前制约数据中心上线的最大阻力已经不仅仅是芯片，而是熟练建筑工人的严重短缺以及长达数年的电网并网等待期。为了让装满 GPU 的数据中心尽早运转产生收入，科技巨头正在改变基础设施的建设方式。模块化建设： 在异地工厂通过模块化标准化制造电气系统和建筑组件，然后运到现场组装，以此大幅降低对现场人力的依赖。\n\n光通信与网络传输瓶颈\n 随着计算集群规模的不断扩大，节点之间的数据传输网络成为了严重制约性能的瓶颈。今年的基础设施重点正在向网络设备和共封装光学 CPO 技术倾斜。光学收发器中必不可少的关键组件，特别是基于磷化铟 INP 的激光器和连续波 CW 激光器，目前正处于严重的产能短缺状态。\n\n晶圆代工产能的绝对垄断\nAI 芯片无与伦比的利润率使其能够不惜代价抢占最先进的半导体制造工艺。台积电的 3nm产能已经被 AI 芯片彻底买断至 2027 年。掌握先进制程的晶圆代工厂拥有绝对的分配权。这种产能挤压甚至迫使苹果、高通等传统移动端芯片巨头面临排产压力，整个先进制程产业链包括配套的无尘室建设、晶圆制造设备等都在享受长期的资本支出红利。\n\n存储芯片周期的强劲延续\n尽管市场由于担忧超大型科技公司签订的长期协议可能预示着周期见顶而出现过情绪波动，但底层的财务逻辑依然非常强劲。科技巨头为了锁定未来的 HBM 和高级内存产能，正在支付巨额的预付款，且锁定的合同价格远超市场原本的预期。这从根本上改变了存储巨头在这一轮周期中的财务确定性。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-08T13:37:33.785000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491431813430903029","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n我在70加仓了RKLB 300股，休息睡觉了。。。明天盘后看看什么情况。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-08T14:09:09.918000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491439766388867123","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-04-09 不惧波动，以及个股研究的瓶颈 @everyone \n\n昨天的操作\n- 70加仓300 RKLB，总仓位来到 52%，股价之后能够回升到80以上，我会逐步卖出。\n- 129减仓200 SATS, 总仓位 17%，股价之后回落到120以下，我会再次买入。\n\n美伊战争，不惧波动\n下面是美伊战争前一个交易日和昨天收盘大盘指数的变化:\n- 标普500 6880 > 6780\n- 纳斯达克 606 > 606\n- 罗素2000 261 > 260\n\n虽然昨天的美伊停战没有真正实现，但是我的观点始终不变：低点买入，五局波动，不过度关注战场新闻，不过度关注战争政治讨论，专注个股研究。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-09T02:42:17.318000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491629296081571871","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n......\n\n错失AI板块的思考\n最近重新布局AI板块，包括买入INTC+MU+ASML+NVDA的特别组合，然后随着Terafab的宣布，我对AI板块的兴趣又提高了一些。去年抓住了NeoCloud，今年错失光模块和存储板块，完全不后悔，因为确实没有去仔细研究。我个人又两个瓶颈：第一是时间瓶颈，第二是仓位瓶颈，其实二者如何分配都代表了我对哪一些板块相对更感兴趣。之后我对AI板块的研究会以账务大方向为主，个股分析是次要，因为这个板块的公司太多，要了解全面，特别是更上所有的消息面太难。\n\n我为大家总结了以下的一些投资热点\n- 算力瓶颈的转移：从 GPU 到 CPU 及周边硬件。过去几年市场的焦点全在 GPU，但目前云端计算资源已经出现了严重的 CPU 短缺。其根本原因是 AI 正在从简单的“问答推理”转向“智能体 Agentic 工作流。智能体在自动写代码、调用数据库、进行物理模拟时，需要极其密集的 CPU 资源来持续验证模型生成的输出。>> AMD INTC ARM\n- AI 服务器的核心材料：高端 PCB 与 CCL 覆铜板。传统的消费电子设备可能只需要 10 层以下的印制电路板 PCB，但高端 AI 服务器需要 30 到 40 层以上极其复杂的 PCB。这要求使用极其特殊的低介电常数 Low-DK 玻璃纤维和覆铜板CCL 材料。由于材料要求极高、制造工艺复杂且良率较低，全球仅有极少数供应商（如台湾的几家头部厂商）具备量产能力。这种极度的供需失衡赋予了这些处于供应链上游的材料和零组件厂商巨大的定价权。>> 高端 PCB 金像电 (2368.TW)，沪士电子 (002463.SZ)；CCL 覆铜板 台光电 (2383.TW) 和 台耀 (6274.TW)。\n- 数据中心基础设施：模块化建设与“表后发电” (Behind-the-Meter Power)。目前制约数据中心上线的最大阻力已经不仅仅是芯片，而是熟练建筑工人的严重短缺以及长达数年的电网并网等待期。为了让装满 GPU 的数据中心尽早运转产生收入，科技巨头正在改变基础设施的建设方式。模块化建设： 在异地工厂通过模块化标准化制造电气系统和建筑组件，然后运到现场组装，以此大幅降低对现场人力的依赖。>> FIX\n- 光通信与网络传输瓶颈。随着计算集群规模的不断扩大，节点之间的数据传输网络成为了严重制约性能的瓶颈。今年的基础设施重点正在向网络设备和共封装光学 CPO 技术倾斜。光学收发器中必不可少的关键组件，特别是基于磷化铟 INP 的激光器和连续波 CW 激光器，目前正处于严重的产能短缺状态。>> 很多公司，包括 LITE COHR FN AXTI\n- 晶圆代工产能的绝对垄断。AI 芯片无与伦比的利润率使其能够不惜代价抢占最先进的半导体制造工艺。台积电的 3nm产能已经被 AI 芯片彻底买断至 2027 年。掌握先进制程的晶圆代工厂拥有绝对的分配权。这种产能挤压甚至迫使苹果、高通等传统移动端芯片巨头面临排产压力，整个先进制程产业链包括配套的无尘室建设、晶圆制造设备等都在享受长期的资本支出红利。>> TSM INTC ASML AMAT LRCX，无尘室与厂务工程：Jacobs Solutions (J) 以及汉唐 (2404.TW) 和 帆宣 (6196.TW)。\n- 存储芯片周期的强劲延续。尽管市场由于担忧超大型科技公司签订的长期协议可能预示着周期见顶而出现过情绪波动，但底层的财务逻辑依然非常强劲。科技巨头为了锁定未来的 HBM 和高级内存产能，正在支付巨额的预付款，且锁定的合同价格远超市场原本的预期。这从根本上改变了存储巨头在这一轮周期中的财务确定性。>> MU SK Hynix Samsung","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-09T02:43:36.270000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491629627230392494","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n......\nGPU TPU LPU\nAnthropic ARR突破300以美金，让人再一次惊叹。背后直接受益的公司是提供TPU的谷歌和博通。但是英伟达收购Groq抢占推理市场，也是看到了强大的推理需求。\n\n英伟达斥资 200 亿美元，通过“IP 授权 + 团队雇佣”的巧妙形式实质性拿下了 Groq。Groq 的 LPU（语言处理单元）摒弃了通用核心，转而采用单一用途的“切片（Slices）”来处理特定任务（如向量运算、矩阵乘法等）。第一代（2020年）采用 14nm 工艺；第二代因组件（SerDes）故障而流产。当前主力 (LP30/35)：采用三星 SF4 工艺，其战略优势在于成功避开了台积电 N3 和 HBM（高带宽内存）的产能瓶颈。未来跨越 (LP40)：将全面接入英伟达的技术生态（整合 NVLink、英伟达 SerDes 以及混合键合 DRAM 等），并转向台积电 N3P 工艺，是一次重大的技术飞跃。英伟达引入 LPU 绝不是为了替代自家的 GPU，而是为了补齐短板。两者结合后，将实现“GPU 集群的大规模吞吐量 + LPU 专属芯片的极致低延迟”，打造出单一芯片无法企及的算力怪兽。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-09T02:43:42.254000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491629652328845314","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n行情很无聊。\n\n122加仓300股SATS，来回做波段。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-09T13:51:24.708000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491797686440038461","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n卖了RKLB 26年12月到期的60的期权，平衡价 47，10张，拿了13000权利金，","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-09T14:01:36.791000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491800253702344815","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n130买入了100股PLTR\n67.2买入了200股RKLB\n\n最近交易比较频繁，滚动仓位随时可能高点卖出控制融资。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-10T00:28:31.901000+00:00","edited_timestamp":"2026-04-10T00:29:17.907000+00:00","flags":4,"components":[],"id":"1491958022908678204","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-04-10 Michael Bury 大错特错之后加仓PLTR，EOSE投机抄底！？ @everyone \n\n昨天的操作\n大盘昨天表现很好，接着我昨天说的罗素、标普、纳斯达克相较于开战前一天的表现，现在我们可以更加放心，大盘并未出现前天大涨之后的迅速回落。板块分化严重，我在看好且股价持续低迷的持仓个股上继续加仓。\n- 昨晚 22加仓300股SATS\n- 今早130加仓100股PLTR\n- 今早67.2加仓200股RKLB","mentions":[],"mention_roles":[],"attachments":[{"id":"1491996055561179177","filename":"2026-04-10_9.47.08.png","size":582448,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1491996055561179177/2026-04-10_9.47.08.png?ex=69faae9b&is=69f95d1b&hm=822e93c4db616a15359755142371572ac40500f6b24a7c4efca69f350d88dfeb&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1491996055561179177/2026-04-10_9.47.08.png?ex=69faae9b&is=69f95d1b&hm=822e93c4db616a15359755142371572ac40500f6b24a7c4efca69f350d88dfeb&","width":2032,"height":2248,"content_type":"image/png","content_scan_version":4,"placeholder":"OfgFBgKCqfisaGZkh4iInRinvkBF1Qw=","placeholder_version":1}],"embeds":[],"timestamp":"2026-04-10T02:59:39.653000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491996055816900830","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n大空头Burry制造的恐慌，以及不要买IGV不要买任何软件个股\n\n昨天，Burry发帖声称 Anthropic 正在“抢走 Palantir 的饭碗”，我一一评价他的主要论点。\n\nBurry 认为，Palantir 长期以来作为企业复杂数据集成“唯一选择”的逻辑正在瓦解。他说Anthropic 的年度经常性收入在短短几个月内就从 90 亿美元飙升至 300 亿美元，相比之下，Palantir 花了 20 年才达到 50 亿美元的规模。>> 现在论ARR增速没有任何公司可以和A家比，但是PLTR最近今年的增速也是非常恐怖的，这个Burry一点不提。Anthropic提供的服务是通用性的，也就是说B端企业客户的应用面更广，PLTR提供的服务是半定制化的，单个客户共享的营收高于Anthropic的平均数值，也就是说，PLTR主要核心客户是高端的企业客户，而非所有普通企业。\n\n他指出，企业现在更倾向于选择像 Anthropic 这样“更简单、更便宜、更直观”的即插即用型 AI 解决方案，而不是 Palantir 昂贵且高度定制化、需要重度人工干预的集成模式。>> PLTR是最早认识到并且利用LLM和其相关能力，并且真正为客户创造价值的软件公司。Claude的能力会加强PLTR产品的能力。只有一种可能会造成真正的威胁，那就是Anthropic进入PLTR所在的半定制化深度企业数据整合和应用领域，这意味着Anthropic需要改变目前通用解决方案的路线。\n\nBurry 批评 Palantir 依然深陷于他口中“低利润率且规模较小”的政府合同中，真正具有爆发力的商业和企业级 AI 赛道上，Palantir 正在输给敏捷型的专业 AI 竞争对手。>> Burry完全不了解政府业务的利润率，低利润率的说法说错误的。而相反，Anthropic由于白左意识形态，已经失去了在政府软件领域和PLTR竞争的机会。\n\nBurry做空PLTR以来公司股价已经下跌了30%+，但是，他对英伟达毫无起色的看跌期权，以及对MOH毫无建树的做多仓位，也是事实。他经常刻意制造FUD，虚假的恐慌情绪，就是为了让他那 50 美元的 PLTR 看跌期权能变现赚钱。\n\n不要买任何SaaS软件，当然更不要买软件ETF IGV，也不要买网络安全的股票。曾经一些老股民在软件板块赚够了，不过如果你和我一样美股投资年限短并未在这个领域赚到过打钱，现在完全不必关注这个领域了，最简单的方法一刀切，杜绝所有幻想。如果你们持有了这些股票，什么时候卖出止盈止损，这个根据个股来具体分析了。\n\n不要购买NeoCloud板块的股票了，包括甲骨文，AI产业链现在什么都缺，但是neocloud企业不缺，请注意我说的是企业不缺，没说芯片不缺。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-10T03:00:09.823000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1491996182359048352","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n...........\n\nTMDX CRCL\n- TMDX 我买了以后涨上去一点现在跌回来，很正常，不跌破前低93我不会卖出。\n- CRCL 83筹码峰的位置，是进入博取盈亏比的好位置。上方135和下方83的筹码峰是我上一个阶段的交易逻辑：我在突破135失败之后减仓。如果接下来几天有机会去试探83，我会再次买回CRCL。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-10T03:00:36.730000+00:00","edited_timestamp":"2026-04-10T03:01:18.196000+00:00","flags":4,"components":[],"id":"1491996295215317174","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n..........\n\nEOSE是否是抄底机会？ @everyone \n\nEOSE 2026年第一季度业绩和运营更新\n这不是 EOSE 第一次在正式财报前公布初步数据。2024和2025年初，伴随新一代 Z3 电池的量产，EOSE 曾多次利用初步财报向市场传达“供应链瓶颈已解决”的信号，或者提前确认年度营收达标，并给出极具爆发力的新一年业绩指引，例如曾提前预告年营收的 10 倍增长。\n- Q1 初步营收区间： 5,600 万美元 - 5,700 万美元\n- 季度发货量增长： 17% (创纪录)\n- 季度电池产量增长： 10.4% (创纪录)\n- 原材料流转距离缩短： 约 86% (在端到端运营中)\n- 电池产线长度缩短： 约 40% (得益于新产线的单件流设计)\n\nEOSE 2025年营收严重向第四季度倾斜，这本质上是公司产能从年中建设到年底释放以及商业化扩产阶段产能逐季爬坡并在年底达到巅峰的直接结果。\n\n储能公司的产能很重要\n公司第一条产线是针对 Z3 电池打造的首条全自动化生产线，位于宾夕法尼亚州，其预计年产能约为 1.25 GWh。该产线已在 2024 年顺利完成各项里程碑并投产：\n- 2024年2月：实现了所有运动系统的通电\n- 2024年5月：成功完成了工厂验收测试\n- 2024年6月28日：产线安装完毕，并正式开始商业化生产，首批电池下线并交付给客户。\n\n昨天EOSE宣布，最近在其第二条生产线的建设上，已成功完成第二条电池生产线的工厂验收测试。在完成现场验收测试后，目标将于第二季度末开始初步生产。\n\n2025 四季度财报前后的：“黑历史”\n- EOSE 在今年2月26日发布 2025 年第四季度财报后，股价遭遇了单日近 39% 的灾难性暴跌。这次崩盘的核心原因可以总结为四个字：预期破灭。管理层此前向市场描绘的“产能顺利爬坡”的叙事被残酷的财报数据彻底打脸，引发了严重的信任危机。\n- 2025 年全年营收为 1.142 亿美元。尽管同比增长很多，但远远低于管理层此前多次重申的 1.5 亿至 1.6 亿美元的年度指引。Q4 单季营收为 5800 万美元，也大幅低于华尔街预期的约 9280 万美元。\n- 管理层在财报中被迫承认了未能达成预期的真正原因：严重的生产效率低下、过度的电池产线停机时间、自动化产能爬坡失败，以及未能按时达成质量目标。\n- EOSE 给出的 2026 年全年营收指引仅为 3 亿至 4 亿美元，低于华尔街预期，华尔街立刻意识到，其产线问题短期内无法彻底解决。\n- 由于此前管理层一直在释放乐观信号，财报的巨大反差立刻招致了反噬。暴跌发生后，包括 Bleichmar Fonti & Auld LLP 在内的多家律所立即对 EOSE 及其高管发起了证券欺诈集体诉讼，指控他们“在短期收入增长以及制造计划的可行性方面误导了投资者”。\n\n昨天EOSE 提前发布 Q1 初步数据，可以很清晰地看到，昨天发布的“自动化良率提升 22%”、“缩短产线长度”，就是为了回应和补救 Q4 财报中暴露出的“产线停机”和“爬坡失败”问题。\n\n从技术面和基本面结合角度，我的投机操作\n- 储能行业我感兴趣，目前方向也对，但是EOSE尚未盈利，股价有争议，波动大，暂且定义为追高进入的投机操作。\n- 夜盘6.20买入4000股\n- 第一目标，四季度财报跳空缺口上沿7.32\n- 止损位置：昨天暴涨的开盘价 4.95 （20%跌幅）\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-10T03:03:08.078000+00:00","edited_timestamp":"2026-04-10T03:03:24.498000+00:00","flags":4,"components":[],"id":"1491996930014842924","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月11日-2026-04-11T05-39-55-07-00- 战争带来了很多投资机会，你买入了哪些股票# 核心要点\n\n1. **频道及会员服务调整**  \n   - “钱投生命美股频道”拥有7.56万订阅者，发布240个视频，专注美股投资讨论。  \n   - 频道将关闭YouTube会员服务，会员管理迁移至Patreon平台，4月15日前需完成迁移以保持原价，4月15日后新会员价格小幅上调。  \n   - 视频内容仍将在YouTube发布，会员服务变更仅影响订阅与交流平台。\n\n2. **美伊战争对美股市场的影响**  \n   - 战争持续时间为1个月11天（2月28日至4月11日）。  \n   - 标普500指数四月收盘价接近三月开战时水平，整体未见明显下跌。  \n   - 纳斯达克100指数（QQQ）较战前上涨4.42%。  \n   - 罗素2000指数（IWM）上涨0.26%，显示中小盘股风险偏好未因战争显著下降。  \n   - 市场确定性随战争持续提升，科技板块表现强劲，半导体ETF上涨0.55%。\n\n3. **持仓结构与投资策略**  \n   - 现现金仓位为-22%（融资状态），期权仓位-12%（主要卖出看跌期权），股票仓位134%。  \n   - 太空板块占比高达76%，重点持仓包括RKLB（52%）、SATS（21%）、IRDM（3%）。  \n   - AI应用板块占比34%，主要持有TSLA（28%）和PLTR（6%）。  \n   - 特别组合占比3%，包括NVDA、ASML、MU、INTC。  \n   - 四月每股收益为正，2026年年初至今收益持平，本周增加融资仓位基于市场确定性判断。  \n   - 风控策略明确持仓个股优先卖出顺序，设置止损止盈条件，防止大盘不稳或账户收益大幅下滑。\n\n4. **重点个股分析与操作建议**  \n   - **RKLB（火箭实验室）**  \n     - 长期投资视角下，65-70美元区间持续建仓。  \n     - 公司完成4.3亿美元增发，现金储备8-9亿美元，准备收购或扩产。  \n     - 预期2026年为太空投资大年，等待中子火箭发射催化剂。  \n     - 持仓占比52%，被认为除SpaceX外最具投资价值。  \n     - 建议投资者耐心等待，长线持有。  \n   \n   - **SATS（Sierra Space）**  \n     - 本周以波段操作为主，130/125美元减仓，122美元加仓，当前仓位21%，平均成本约100美元。  \n     - 估值匹配SpaceX，技术面104美元为重要支撑位，近期创132.43美元新高。  \n     - 催化剂包括等待FCC批准与SpaceX的频谱交易及SpaceX上市预期。  \n     - 计划120美元以下继续买入。\n\n   - **新云板块（CRWV）**  \n     - 技术面突破90美元筹码峰，前高阻力位114美元。  \n     - 不建议追高，去年已实现6-7倍收益。  \n     - 行业观点认为AI基础设施领域GPU租赁能力过剩，上游设备如ASML光刻机更具竞争壁垒。  \n     - 优先配置太空及核心AI基础设施板块。\n\n   - **Transmatic (TMdX)**  \n     - 器官移植领域投资逻辑，周线低点持续抬高（37美元涨至60美元）。  \n     - 盈亏比优异，104美元买入，目标价150美元（上涨44%），止损位84美元（下跌20%）。  \n     - 当前价格114美元，已有安全边际，建仓比例约2%。  \n     - 跌破94美元考虑部分止损。\n\n   - **EOSE**  \n     - 技术面关键支撑4.95美元，Q1营收5600-5700万美元，创发货量和产量记录。  \n     - 第二条产线已完成测试，预计Q2末投产。  \n     - 风险提示：2025年第四季度财报曾暴雷，实际营收低于指引，当前持仓状态被套，严格止损。  \n     - 行业方向正确，受益于美国储能发展需求。\n\n   - **CRCL (Circle)**  \n     - 当前价格88美元，盈亏比优异（上看135美元，下看83美元）。  \n     - Clarity Act负面影响已部分计入价格，霍尔木兹海峡收费传闻可能采用稳定币。  \n     - 曾错过85美元买入机会，仓位优先分配给太空板块。\n\n5. **期权策略**  \n   - 持有30张卖出看跌期权，主要集中在太空和AI股。  \n   - RKLB期权行权价50美元和60美元，利用波动率获利。\n\n6. **会员服务及运营**  \n   - 会员服务包括交易计划分享、持仓披露、市场观察、Discord问答及专属视频和投票权。  \n   - 需警惕假冒账号。  \n   - 新会员价格4月15日起上调，现有会员费率锁定。\n\n# 关键结论\n\n1. **美伊战争对股市影响有限，市场情绪稳定**  \n   尽管战争持续，标普500、纳斯达克100及罗素2000指数均维持或超过战前水平，市场风险偏好未明显下滑，尤其科技板块表现坚挺，投资者对未来确定性提升。\n\n2. **太空板块是当前及未来投资的重点领域**  \n   RKLB和SATS为核心持仓，RKLB具备强劲现金流和行业领先地位，预计2026年将迎来爆发，SATS则在等待关键监管及市场催化剂，均被视为长期优质资产。\n\n3. **AI及半导体基础设施同样具备较强投资价值**  \n   特别是具备护城河的上游设备制造商如ASML，和AI应用公司如TSLA、PLTR等，构成重要布局。AI基础设施GPU租赁市场存在供过于求风险，需谨慎追高。\n\n4. **持仓结构积极但风险控制明确**  \n   维持高股票仓位和适度期权卖出，体现出对市场的积极态度，但设有严格止损止盈机制，确保在大盘波动时及时调整。\n\n5. **投机性投资需严格止损，关注技术面支撑**  \n   如EOSE和TMdX虽具成长潜力，但历史财报风险较大，操作上需严格止损，保证整体组合健康。\n\n6. **会员迁移至Patreon有助于提升服务质量和稳定性**  \n   频道视频内容持续更新，通过Patreon执行会员管理，有助于构建更紧密的投资者社区和更专业的服务体系。\n\n# 重要细节\n\n1. **具体持仓比例与成本**  \n   - RKLB占比52%，平均成本区间65-70美元。  \n   - SATS占比21%，平均成本约100美元。  \n   - IRDM占比3%。  \n   - AI应用中TSLA占28%，PLTR占6%。  \n   - 特别组合含NVDA、ASML、MU、INTC，合计3%。  \n   - TMdX仓位约2%，买入价格104美元。  \n   - EOSE为投机仓位，关键支撑4.95美元。  \n   - CRCL当前价格88美元，筹码峰位83和135美元。\n\n2. **资金运用与融资情况**  \n   - 现金仓位为负22%，表明融资状态。  \n   - 期权仓位为负12%，主要通过卖出看跌期权获取收益。  \n   - 股票仓位高达134%，显示积极买入态度。\n\n3. **关键事件与催化剂**  \n   - RKLB完成4.3亿美元增发，现金储备充足，等待中子火箭发射。  \n   - SATS等待FCC批准与SpaceX频谱交易，以及SpaceX潜在上市。  \n   - EOSE第二条产线预计Q2末投产。  \n   - CRCL受Clarity Act影响已部分释放，霍尔木兹海峡收费消息动态。\n\n4. **技术面关键支撑与阻力位**  \n   - SATS关键支撑位为104美元，阻力位132美元。  \n   - CRWV技术突破90美元筹码峰，阻力位114美元。  \n   - TMdX周线低点抬高，止损位设在94-95美元，目标150美元。  \n   - EOSE止损设在4.95美元。\n\n5. **风险管理措施**  \n   - 设立个股优先卖出顺序，遇大盘不稳或账户收益大幅下滑触发止损。  \n   - 投机仓位如EOSE和TMdX严格执行止损策略。  \n   - 期权策略作为风险对冲手段，增强收益稳定性。\n\n6. **会员运营细节**  \n   - Discord社群提供问答交流，提醒防范假冒账号。  \n   - 会员享有专属视频和投票权，增强互动性。  \n   - 会员价格调整通知明确，现有会员费率锁定，鼓励及时迁移。\n\n7. **收益表现与操作回顾**  \n   - 四月每股收益保持正数，年初至今收益持平。  \n   - 期权卖出策略实现波动率获利，尤其是RKLB期权。  \n   - 曾错过CRCL低价买入机会，反映投资操作需灵活应变。  \n   - 太空板块优先分配仓位，体现投资重点。\n\n综上所述，该频道基于宏观与微观分析，重点布局太空及AI行业优质标的，结合技术面与基本面进行多层次操作，配合严格风险控制和会员服务优化，以实现长期稳健收益。","mentions":[],"mention_roles":[],"attachments":[{"id":"1492742780269629451","filename":"2026411-2026-04-11T05-39-55-07-00-_.mp4","size":53363696,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1492742780269629451/2026411-2026-04-11T05-39-55-07-00-_.mp4?ex=69fac30c&is=69f9718c&hm=8f5a31377b14504672c029043995c210527f01e0b1f1efde95d17019fd314ae1&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1492742780269629451/2026411-2026-04-11T05-39-55-07-00-_.mp4?ex=69fac30c&is=69f9718c&hm=8f5a31377b14504672c029043995c210527f01
