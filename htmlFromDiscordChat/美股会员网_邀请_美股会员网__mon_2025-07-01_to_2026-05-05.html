p":null,"flags":4,"components":[],"id":"1478583900631732317","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\n昨天的操作\n昨天我在盘前买入了看好的PLTR，我认为PLTR是美伊战争情况下的受益股，在四季度财报非常非常好、然后随着软件板块杀估值暴跌一波之后，我认为PLTR到了我的心理价位，所以先后一共买入了总共400股，均价137。\n\n昨天是我的义工会议日，所以我十点多才回家，晚上十一点大盘已经跌得不像话了，三倍做多黄金跌了30%，我临时决定做一个GDXU的投机操作，在330的位置买入了100股。因为时间很晚了，也因为是投机操作，我没有第一时间分享给大家，请理解。这部分GDXU我会根据情况随时止盈，现在的底线很低，就是不亏钱就行，有赚最好。","mentions":[],"mention_roles":[],"attachments":[{"id":"1478583992138862592","filename":"IMG_0067.jpg","size":60803,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1478583992138862592/IMG_0067.jpg?ex=69faab26&is=69f959a6&hm=e27a2b5cef87c476c72ca5d396790b21cc84a814afead3da0842c75fda7d6462&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1478583992138862592/IMG_0067.jpg?ex=69faab26&is=69f959a6&hm=e27a2b5cef87c476c72ca5d396790b21cc84a814afead3da0842c75fda7d6462&","width":1179,"height":492,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"/fcBA4ABsIx2mDd2ZYBwBgg=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-04T02:44:54.524000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478583992289722523","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\n打仗了，为什么我仓位这么满？\n目前我的正股仓位到了100%，也就是满仓了。昨天我分享了以下，“满仓了，佛系等待，实在不行再入金。其实我主要是把之前减仓的火箭实验室和特斯拉的钱，买了一些七七八八的，并不是说最近在大幅度加仓，而是本身仓位就比较重。大家还是注意控制风险，我自己风险承受度比较高一点”，“市场陷入恐慌，我个人保持乐观。昨天韩国熔断因为涨太多，大A不争气表现不好也正常，川普不会意气用事，能打会尽快打完，打不下来会找到折中办法。”\n\n首先，相较于去年，目前的我对股市的波动相对是非常淡定的，毕竟现在其实也没有跌很多。今年YTD我的美股收益是-6%，这个收益距离我的心理防线底线还早，所以不管是周二的开盘大跌还是周一的开盘大跌，心态还是不错，还是可以理性做出判断。\n\n其次，也是这三点里面最重要的原因：我对自己持仓的重仓组成部分包括 太空46% 和 AI应用30% 非常有信心。而CRCL的仓位再次来到了9%，几乎到了我的成本价，过去一个月CRCL股价最低点到昨天最高点翻倍了，耐心资本得到了回报。我一直告诉大家CRCL不要卖，接下来回本了我也不会卖，继续持有，只有在它暴涨过多过于夸张的情况下才会阶段止盈。这些股票组成了我目前仓位的绝大部分，我对它们没有任何怀疑。\n\n最后，我坚定认为，战争会带来短期的恐慌下跌，但不会为美国带来股市的崩溃。这是历史数据支撑的，也是我个人的理解。所以战争的不确定性下，其实还是看投资者要不要选择短期择时做波段的问题，如果不要，就是逢低加仓的老问题老思路了。大家知道我一贯都是不空仓，而是选择逢低买入，这是我个人的投资习惯。具体看美伊战争，如果这次美国能解决伊朗问题，对美国经济乃至全世界都是利好。从具体板块看，美伊战争对AI + 太空 + 国防相关板块都有好处，而这些也是我关注和投资的重点。\n\n以上，是根据我个人情况做出的选择，跟大家做一个解释。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-04T02:45:12.106000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478584066034106614","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\n接下来，一些新的话题\n今天不聊个股了，我已经开始做EOSE FLNC的分析，希望尽快分享给大家新的内容。最近一个月因为春节回国，因为财报，我没有接触新的股票了，而是专注在现有的“能力圈”。接下来有时间我肯定会继续拓展“能力圈”，请大家理解。群里的朋友经常分享自己对不同股票和板块的想法，我觉得很好，请大家继续，也希望更多人积极分享！\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-04T02:45:30.935000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478584145008656538","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n聊几支个股：\n- TMDX：昨天盘中一度暴跌8%, 真的不错的机会，TMDX冲击前高是不难的。这支股票的不确定性随着机队的稳定而大大降低了。我想买，可是现在资金不允许了。外加一二月份的飞行数据很好，一季度财报的压力很小。\n- 东南亚Grab + SE, 我不懂为什么这两支股票在美国似乎都不错，很多人说，但是我个人真心不觉得这是很有吸引力的投资标的。这里不是提供投资建议也不是具体个股分析，只是我对外卖和电商业务不看好，我也不认为新加坡的本土公司有走出去全世界的可能性。慎重投资。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-04T03:10:29.704000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478590431301472327","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n\n之前群里有朋友问ZOOM，ZOOM确实持有Anthropic的股份，但是目前占市值10%左右。想哟通过购买ZOOM投资Anthropic，没一块钱只有一毛钱是在Anthropic上，9毛都在ZOOM本公司上。不太建议这种投资逻辑。\nZoom invested ~$50 million in Anthropic in 2023.\nTheir \"Strategic Investments\" are now worth $1.6 - 2 billion.","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-04T03:26:11.681000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478594382239371396","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-03-05 加密货币反弹、美股逐渐脱敏美伊战争影响、ASTS vs. RKLB、SATS观点更新，以及最新持仓更新！ @everyone \n\n加密货币反弹还是反转\n\nBTC重回7W上方，整个二月到现在日K线走出明显的U型，从图形上看摆脱六月6W底部位置的意愿非常强烈。而加密货币先关股票也在过去一个月从低点大幅回弹：CRCL最低点上来100% 涨幅、MSTR 40% 涨幅、COIN 50% 涨幅、HOOD 20% 涨幅。其实我不知道是反弹还是反转，似然我认为反转的可能性不小。大家只需要对自己的操作有明确的计划：如果你是现在去投机，那么一定做好止损，跌破支撑位就果断卖出；如果你是长期投资，认为现在到右侧了，那么买入之后就只需要想一个问题：如果跌破前低，要不要加仓，如何加仓。\n\n我对加密货币的了解不如很多会员朋友，我的策略也非常简单，就是长期看好，不做波段，尽可能逢低买入。目前在早期持续逢低买入的CRCL已回本，而仍然在按月定投的MSTR也在回本的路上看到了希望，SOFI和HOOD的sell put仍处于小幅亏损，但是目前的价格我认为都是适合长期持有的价格，我自己也在HOOD低点进行了sell put加仓。其中，MSTR和CRCL的仓位我会长期持有，只有在大幅度盈利的情况下才会考虑控制仓位部分止盈。比如CRCL，现在我的仓位来到10%，如果再涨50%价格到150，我的仓位大概率到15%左右，那么我会考虑部分止盈控制仓位。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-05T02:21:38.352000+00:00","edited_timestamp":"2026-03-05T02:55:30.485000+00:00","flags":4,"components":[],"id":"1478940524185653271","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\n美伊战争，我看做美股利好\n\n战争很残酷，我看了一些真实的战争片段，感觉难受。但是我个人对美伊战争的对美股的影响，一直都是中性偏乐观的，从来没有悲观或者恐慌过。过去几天听到了很多比较悲观或者担忧的声音，“特朗普忽视了这次战争的难度”、“不派出地面部队不可能赢下战争”、“XXX语言家语言美国将输掉战争”。我不是偏向某国，客观的说，老美的军事实力在AI+SpaceX星盾的加持下，有增无减，比我们很多人想象的强大许多。而美国过去的国防部、现在叫战争部，整个爱国意识洗脑进入新的阶段、所以不管硬实力还是意识控制，美国现在相较于民主党执政时期都到了极致。这种情况下，还怎么输？我不太敢想象。\n\n而从股价的走势看，前三天我看到的信息：美股正在对美伊战争脱敏。周一大幅低开然后反弹，多头非常强有力；周二在周一深V后下跌，但幅度有限，完全不是恐慌；周三低开然后再次反弹，哪怕最后证实所谓的伊朗寻求谈判的消息是假的市场也没跌下去。\n\n昨天我做了类似的表述，这是我敢于持续逢低买入的原因之一。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-05T02:23:02.338000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478940876448202822","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\nASTS vs. RKLB\n\n这两家公司是太空板块的热门股票，两家公司有非常多二级市场支持者。先说重点：\n\nSpaceX上市前一定要找到机会买入并持有至少其中一家公司。\n\nASTS容易被操盘也受到资金青睐，从技术走势看股性很好，走势能够先反弹且反弹力度都很好；反观RKLB，技术面走势会比较迟钝，常常有突然的爆发然后伴随着长久的横盘，有点像TSLA。ASTS是投机者更好的选择，RKLB是投资者更好的选择。\n\n再聊基本面：\n\n虽然我长期不看好ASTS也并未打算长期投资，但是我认为公司基本面并不是纯粹PPT，原因很多，最主要的是三点：公司技术上有稀缺性/护城河；公司战略上被运营商需要，而这些运营商大多数惧怕或者反抗马斯克，这就形成了“敌人的敌人就是朋友”的局面；公司未来发展路径上相对简单：只需要发卫星、部署就行了，相较于RDW这种业务复杂、或者LUNR这种业务还不清晰、或者RKLB这种中子火箭风险极高的未来业务，ASTS的未来盈利路径相对简单，也就更容易被买单。\n\nRKLB不聊太多，只是简单说未来一段时间的看法：不能期望未来RKLB在股价上有过多亮点，因为外部的利好因素几乎没有，现在长期投资者要做的是等待，也不要轻易在重仓基础上还加仓；投机者要做的是SpaceX上市将股价带起飞然后止盈离场。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-05T02:34:18.781000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478943713656049778","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nSATS补充：\n如果大家看了我的财报视频，应该完全理解了公司的状况，以及理解了作为SpaceX的替代投资标的，我们持有的风险和机会是什么。\n - 机会：SpaceX 1.75万亿上市，上市后股价持续走高，SATS的价值被市场接受，涨起来的时候就可以止盈然后等机会买入SpaceX。\n - 风险：SATS本身的名声不好，创始人在业内名声也不好，特别是现在“耍赖”以不可抗力为原因拒绝支付铁塔公司的基础设施服务（具体细节可以看视频）。但问题是，这家公司是属于创始人的，他和他的家族持有公司50%以上的股份，意味着只要创始人看多SpaceX然后SpaceX按照我们期待的发展，SATS的内在价值不会太差。也就是投资SATS虽然有风险，但是也有托底。我会给自己更多时间，我的关注点还是在SpaceX本身，而不是SATS公司本身。\n\n如果大家觉得走势拉胯无聊，股价没波动，可以考虑减仓，通过减仓缓解压力。个人而言，我的仓位我觉得刚好，不会减仓。我更怕的是半年后我后悔，而不是现在为了回避风险而半途而废。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-05T02:46:03.753000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478946670522794008","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1478948154593247232","filename":"2026-03-05_10.50.41.png","size":299353,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1478948154593247232/2026-03-05_10.50.41.png?ex=69faaccd&is=69f95b4d&hm=629e29efeb1b76c76d1194eb76302d38e7b4802a8ee7841d5e325da16e24fab8&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1478948154593247232/2026-03-05_10.50.41.png?ex=69faaccd&is=69f95b4d&hm=629e29efeb1b76c76d1194eb76302d38e7b4802a8ee7841d5e325da16e24fab8&","width":1700,"height":1452,"content_type":"image/png","content_scan_version":4,"placeholder":"/QcCBoC7+YtjeJZWqIiLpYq4m4D1VBY=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-05T02:51:57.590000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478948154622742660","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n个人银行理财兵家必争之地了\n- X平台马斯克要推出了\n- HOOD在加码\n- SOFI也在做\n\n抢的是传统银行的市场。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-05T02:58:02.801000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478949686428831777","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n很多人现在在担心SATS，主要原因就是因为公司股价没怎么涨。除了视频里面提到的信息，以及今天早上我文字分享的信息，我想再次说明，频谱交易还需要FCC的批准，但是从目前的情况来看，最终被拒绝的可能性相当的小，因为现在星链已经在大肆宣传自己的starlink mobile业务了，如果没有频谱做不成。现在的疑问是同样的频谱频段在欧洲的使用权限，目前还没有任何结论。\n\n另外，我已经多次强调，频谱交易会在今年上半年完成，但是最终的所有权归属要在2027年才转移。也就意味着现在SATS还没有正式拿到SpaceX的股份。但是实际上他拥有了这2.7%股份的权利，拥有的价格也已经定好了。\n\n除了频谱以外，SATS和SpaceX会在多方面进行合作，其中最近的消息就是SATS会把自己旗下的宽带用户转到L到星链，并且获得一笔推荐费用。\n\n公司在电话会议上也明确说明，二季度财报没有特殊情况不会进行电话会议，只有到三季度，也就是SpaceX上市之后才会进行下一次电话会议。因为现在公司的情况没有太多需要更新的。\n\n不可否认的是，最近ASTS连续签约电信运营商，给SpaceX造成了很大的压力，而且从时间线上来看，ASTS卫星的部署要早于SpaceX。今天早上我同样分享了对于ASTS的看法。\n\n还有最近几天，越来越多的声音出现，关于SpaceX上市会带来RKLB以及ASTS股价的飙升。这当然也是我希望看到的，但是公司要有实力才能吃得下，这波福利对于RKL而言，需要确保一季度财报亮眼，且中子测试不再发生任何问题。对于ASTS而言，他们需要完成一次火箭发射多颗卫星的首次尝试，这是有风险的，一旦完成公司的未来会变的相对明确。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-05T12:11:19.979000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1479088925485039736","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n我在345卖出了GDXU，赚点蚊子肉也好。三倍压力大，不想亏钱，先走人。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-05T13:54:31.012000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1479114892559777803","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-03-06 市场紧绷、RKLB的快速响应能力，以及大家对SATS的担忧！ @everyone \n\n市场不算糟糕，但神经紧绷！\n\n昨天除了卖出GDXU之外，没有其它操作，现金仓位来到8%，但是实际股票仓位依然是满仓，因为现金仓位和期权仓位抵消了。现在美伊战争已经一周了，看样子是不能马上停下来。原油价格在涨，如果特朗普不能处理好原油价格问题，导致物价飙升，这是美国本土接受不了的，也是中期选举的风险。不知道特朗普下一步如何行动。在这种情况下，市场找不到方向，上蹿下跳。往好的方向想，至少现在没有持续向下的恐慌形势。今天晚上九点半有美国失业率数据公布，看看到底市场如何反应。","mentions":[],"mention_roles":[],"attachments":[{"id":"1479306307243737158","filename":"2026-03-06_10.17.42.png","size":194401,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1479306307243737158/2026-03-06_10.17.42.png?ex=69faa8db&is=69f9575b&hm=dfeeccf5517d0e0f11b68a8422599700f9fe030f275c4a1a6aaa4d9d5f0b41d2&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1479306307243737158/2026-03-06_10.17.42.png?ex=69faa8db&is=69f9575b&hm=dfeeccf5517d0e0f11b68a8422599700f9fe030f275c4a1a6aaa4d9d5f0b41d2&","width":2362,"height":1116,"content_type":"image/png","content_scan_version":4,"placeholder":"/gcCA4AENmc6NneHi2OfB8Y=","placehold ":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \nHIMS真实价格更新，以及加仓SATS\n\n今天早上我还以为9点夜盘开盘，其实今天8点开盘，今晚正式开盘时间为九点半，改夏时令了。\n\n关于HIMS: 目前IB我能看到价格一直在变，最新价格来到了24。IB也依然可以交易的，但肯定不是显示的18.88，而是需要实际交易价格才能成交。如果早上夜盘开盘22下单买入了的朋友，现在也涨了一些了。等待盘前吧，大概率盘前或者开盘左右的时间会有官方证实或者证伪的。\n\n关于SATS，我刚才夜盘在107+加仓了200股。目前总共1800股，均价112。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-09T02:11:41.587000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1480387572634091671","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nHIMS更新\n\n- 我的视频说了我不会做任何操作，如果你选择投机夜盘买入22左右，现在是有2块钱左右的收益。\n- 目前还没出新闻，但是大概率接下来两个半小时，也就是开盘前，会有官方新闻。猜测：大概率NVO HIMS是有合作，就看怎么合作。目前WSJ也转发了新闻，而且上面的解读也是彭博社自自己周五发新闻之后更新的，目前没有证伪的情况下，合作是大概率事件了。\n- 我会等事情尘埃落定再决定下一步，这次事件在不明确之前不会影响我的看法。\n- 如果我的HIMS未来有差不多回本的机会，也就是3.7左右，我会出掉HIMZ，重新买入HIMS，降杠杆。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-09T11:02:50.246000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1480521239478145136","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n\n读完HIMS官宣NVO合作新闻稿，我的理解：\n1. 重中之重：HIMS以“不主动广告宣传复方减重药”为代价，换取NVO“取消诉讼”，也可以理解为HIMS以牺牲“短期牺牲复方减重药销售以及背后的高毛利”，换取HIMS公司“长期健康发展”。\n2. 其次：HIMS平台开始销售NVO的注射+口服司美格鲁肽，明确强调了“全球销售”。这部分销售可以部分补偿第一点的销售损失，但是我个人判断是短期内不能完全补缺口，也就是说在药物转换过程中，要么销售会下降，要么毛利率会下降，或者同时下降。或者也会造成部分客户流失到其它竞争对手。\n\n我的操作：市场对HIMS 2026的期待本身就不高，现在与NVO和好共同对付LLY，我认为没有任何道理再反水了，GLP-1的事情终于以HIMS“断臂求生”的举动告一段落。因此，我继续看多HIMS长远发展，但是仓位太满，几分钟前22.4小小加仓500股正股。\n\n现在22-23的HIMS基本面更好还是去年4月同等价位的HIMS更好？我认为毫无疑问是现在！ @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-09T13:28:06.120000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1480557796503191562","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-03-10 美股继续脱敏美伊战争、全仓回血，以及HIMS闹剧收场！ @everyone \n\n战争过半，全仓回血\n\n昨天川普在尾盘发文说美伊战争或许比之前预计时间提前结束，美股尾盘暴力拉升。伴随着昨天HIMS 40%涨幅，我的账户昨天 +6.6%，今年账户距离回本很近了。战争开始后我选择提前抢跑持续小幅度加仓，目前来看：PLTR HIMS RKLB的加仓效果很好，而LUNR TEM这两个投机仓位效果不佳，SATS虽然持续无力，不过现在我已经累计了足够的股数，我继续耐心等待。如果接下来有持续走高的机会，我会选择减仓，减仓的思路就是控制个股仓位，比如某支个股我认为仓位因为股价上涨过高了我会减仓。目前我认为战争实际上对美股的影响已经过半，当然也还有很多不确定性。战争过后看什么，还是看经济数据，物价指数 和 就业人数。川普必须为中期选举发力，看看他会怎么做。\n\n昨天低点的机会\n\n昨天盘中TMDX最低123收盘134，特斯拉最低382收盘398，RKLB最低68收盘71.5，SATS最低105收盘110，NVDA最低176收盘182，除此之外还有进入标普500的LITE COHR VRT在夜盘都给了很好的机会。以上提到的股票，不管是投机还是投资，我认为位置都是很不错的，特别特别我想再次说NVDA，这两天🦞早国内很火，这体现了tokens的消耗只会更夸张地指数级增加，我还是一样的观点，NVDA这个价格很稳，适合长期投资买入。\n\nHIMS闹剧收场，我再次加仓：这部分昨天已经做了很多文字更新，等会出一个简短视频总结。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-10T02:10:38.075000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1480749694110929099","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网 ents/1457988703363399781/1481043345131442236/2026310-2026-03-10T07-18-09-07-00-__.pdf?ex=69fb0bd9&is=69f9ba59&hm=10fa3fc0c18043320785e26c3d68055d048e12401944bf33a0e0768397194294&","content_type":"application/pdf","original_content_type":"application/pdf","content_scan_version":4,"title":"2026年3月10日-2026-03-10T07-18-09-07-00- 投资_笔记"}],"embeds":[],"timestamp":"2026-03-10T21:37:30.006000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1481043345433428161","channel_id":"1457988703363399781","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n大家早上好，今天我跳过文字更新，只是更新下我的最新正股持仓。昨天我除了两期视频：一是对HIMS这次事件的解读，二是LUNR的个股分析，感兴趣的去看看。目前太空板块我已经覆盖了包括RKLB ASTS RDW MDA SATS PL BKSY LUNR FLY VOYG，对这个板块感兴趣抽点时间把视频看了相信会有帮助。\n\n接下来我学习一下太空太阳能，看看是否可以出文章或者视频分享给大家！","mentions":[],"mention_roles":[],"attachments":[{"id":"1481113640865370254","filename":"image.png","size":281557,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1481113640865370254/image.png?ex=69faa491&is=69f95311&hm=60300c40a105373128be844e66715058fc23fed90aa504a7318cf6a326a89a7b&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1481113640865370254/image.png?ex=69faa491&is=69f95311&hm=60300c40a105373128be844e66715058fc23fed90aa504a7318cf6a326a89a7b&","width":1712,"height":1366,"content_type":"image/png","content_scan_version":4,"placeholder":"+gcGBoC5Zop4d3h/iGiJV4mHqqD1UxY=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-11T02:16:49.704000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481113640701661285","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nSATS\n\nSATS还没涨，我们可以认为目前这支SpaceX影子股还没得到市场的认可 market ignore SATS，正如很多美国投资者认为Grab的趋势不错走向盈利但是股价就是持续走低，只是个类比，我个人不会投资Grab。\n\n当然还有另一个可能，就是我的计算和判断有错误。目前对我个人而言，当然我认为现在是市场暂时忽略了SATS的投资价值，还没得到认可。所以继续等待。如果股价持续低于110，我还会加仓正股。\n\n关于进入标普500：我视频说了，进入标普500非常意外，这肯定是一个利好的，以后SATS会有点像MSTR这样的公司：本身业务极其不重要了，重要的持有资产的价值变化，对于MSTR是BTC，对于SATS是SpaceX。MSTR做梦都想进入标普500，但是就不让进，SATS持续亏损轻而易举进入了，有点不理解，不过也不用去理解，接受就行。\n\n万一SATS在SpaceX上市那一天还没突破前高130怎么办？也很简单：我之前已经给了大家一个表格，给出了SATS和SpaceX的关系，但时候上市了如果SATS持续被低估，那么我不会卖出正股而是会持有，相反就会立即卖出买入SpaceX。如果出现前者的情况，我依然会拿出额外的资金在上市首日买入部分SpaceX股票。\n\n最后，进入标普后具体ETF买入时间不是现在，生效日期2026年3月23日（周一）开盘前，ETF被动买入最高峰 2026年3月20日（周五）收盘集合竞价阶段。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-11T03:45:29.531000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481135953673326692","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1481139914958442627","filename":"image.png","size":346473,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1481139914958442627/image.png?ex=69fabd09&is=69f96b89&hm=788f0e607c82f0f66398caa1988929f1a16c1be2b23b2af6652bab98fc5dbcca&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1481139914958442627/image.png?ex=69fabd09&is=69f96b89&hm=788f0e607c82f0f66398caa1988929f1a16c1be2b23b2af6652bab98fc5dbcca&","width":2432,"height":1410,"content_type":"image/png","content_scan_version":4,"placeholder":"BQgGBIAIdyRsk4t3lIcIf4vwtw==","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-11T04:01:14.045000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481139915252170763","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n星舰V3马上静态测试了，几周内测试发射，预计明年2027商飞。按现在的计划，半年就可以飞完D2C卫星的载荷，那么最快2028年可以大规模飞算力卫星。从载荷必定匹配运力角度看，这几乎是必然发生的事情。\n\n算力卫星这条链硬件上 = 大型火箭 + 卫星平台 +  激光通信 + 太空专用GPU + 光伏板 + 散热板。前四个基本不用操心，SpaceX有星舰有卫星平台也有星舰通讯能力，而NVDA或者xAI自己大概率可以结局太空专用GPU的技术问题。剩下的难点就是太空光伏和散热，目前马斯克已经开始了地面和太空光伏的考察，前者属于特斯拉负责，后者属于SpaceX负责。从投资的角度看，太空光伏值得研究一下，或许有一些企业可以受益于SpaceX算力卫星计划。\n\n地面 & 太空光伏技术\n\n晶硅电池从硅原子的排列方式分为单晶硅和多晶硅，从电学属性视角分为N型(掺磷) 和 P型(掺硼)。\n技术迭代演化：过去 PERC(P型掺硼)  >> 现在主流 TOPCon (N型掺磷)>> 新阶段技术 HJT(N型掺磷)，HJT中文为“具有本征薄膜的异质结”。\n目前中国地面光伏大多采用晶硅电池，具体来说是单晶硅电池，而且从P型转为N型。\n\n太空光伏老技术路线：IMM 多结砷化镓（RKLB有这个老技术能力，不过刚刚推出了晶硅电池）>> 效率高，耐辐射，但是很贵。\n太空光伏新技术路线：星链早期使用PERC，但是算力卫星需要技术升级。\n\n现在更可能将地面光伏技术搬上太空的是HJT技术，并且通过在 HJT 电池上涂覆一层 钙钛矿 薄膜提升效率，也就是使用“薄膜+晶硅”的叠层结构。这个路线可以做得很薄，且抗辐射。>> 据说这是SpaceX在考察的路线\n\n另一条路线是碲化镉(CdTe) 路线：HJT 本质上还是晶硅阵营的，离不开硅片。而碲化镉(CdTe) 则是完全不需要硅片，它直接在玻璃上通过气相沉积，像喷漆一样喷出一层几微米厚的碲化镉。FSLR公司是美国这一路线的代表公司，并且像现在正从单一碲化镉转向钙钛矿叠层碲化镉。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-11T07:25:18.083000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481191270469861507","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n特斯拉385支撑强烈，过去两天弹起来了；\nHIMS形成反转，最佳入场时机是周一夜盘22买入；\nLUNR极度收敛，很快会有一个方向；\nCRCL涨幅过快，稍微调整是很正常的；\nRKLB 120MA已经64.5了，64再买到几乎不太可能了；\nHOOD还没走出底部；\nSATS给大家留足了思考和加仓的时间。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-11T13:58:00.673000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481290099135217805","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-03-12 对公司的了解才是投资的“捷径\"，持仓个股分析，以及马斯克为“巨硬”项目指明方向！ @everyone \n\n今天的内容很多，我会和大家再次分享分析一家公司的重要性，然后部分是昨天白天在会员群分享的一些信息。同时，我会对所持仓个股的位置做一个自己的判断，为大家提供参考。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-12T02:15:05.959000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481475593429192827","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n......\n\nHIMS：投资的“捷径”在哪里？\n\n我在如何分析个股中说过很多次，“分析一家公司没有捷径”，就是要花时间一个数据一个数据去看，去找趋势，把这些数据和信息变成自己脑细胞记忆的一部分，这样才不会人云亦云。虽然HIMS的投资还在亏损中，不过最近公司股价两周内从14的极度恐慌低点暴力反弹85%，特别是过去三天涨幅分别是40%、6%、10%，整个市场对HIMS的情绪实现完全反转，这当然是值得庆祝和开心的！\n\nHIMS的个股分析是我个股分析视频中观看特别特别高的一支，当股价脚踝斩的时候，当然也是大家最痛恨的一支股票。HIMS在暴跌前就占我仓位10%，算是比较重仓位了。其实一路下跌中，我对公司的未来都没有到特别悲观，我公司的Investment Thesis也就是投资逻辑/投资判断并没有完全改变。当然，中途管理层做出的一个错误决策造成的我对CEO的疑问是唯一的可能稍微打破这个投资逻辑的时候。我想表达的是，一家公司股价暴涨或者暴跌的时候，能够依然拿住底仓，不能靠某个博主的一句话、不能靠富途评论区的留言、不能靠股价走势去决定，而最终是要靠自己对这家公司的持续分析和了解，这才是能够在暴涨时忍住不完全止盈、暴跌时忍住不止损割肉的根本。每个人都有自己的操作方法，有些人说跌了10%我肯定走人，对于仔细分析过基本面而做出了长期投资的公司，我不会这么做。\n\n我们继续一起分析公司，建立对公司长久正确的认知。","mentions":[],"mention_roles":[],"attachments":[{"id":"1481475784278282422","filename":"2026-03-12_9.45.09.png","size":337402,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1481475784278282422/2026-03-12_9.45.09.png?ex=69faa457&is=69f952d7&hm=caacf42dbf772d24995366539f72e43dcfdfe49129237c1259340f85f435847f&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1481475784278282422/2026-03-12_9.45.09.png?ex=69faa457&is=69f952d7&hm=caacf42dbf772d24995366539f72e43dcfdfe49129237c1259340f85f435847f&","width":3052,"height":1778,"content_type":"image/png","content_scan_version":4,"placeholder":"/gcCDIDQXmuLVZZrQYn4iP2N6Q==","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-12T02:15:51.441000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481475784194523228","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n......\n\n持仓个股位置分析\n\n下面的要点是我昨天分享的，我再根据最新位置加一些评论。\n\n特斯拉385支撑强烈，过去两天弹起来了 >> 要加仓的朋友还是耐心等下一个385-400的位置，记住这是马斯克加仓的价格，所以在这个价格加仓按道理不亏。之前已经出现多次机会了，相信特斯拉仓位不够的朋友已经行动了。\n\nHIMS形成反转，最佳入场时机是周一夜盘22买入。>> 如果你周一到周二都没有建仓或者加仓，现在心里痒痒就要稍微小心了，要买可以但是少量分批次了。过去两周最佳的加仓时机不是最低点的14而是周一盘前和NVO合作官宣宣布之后的价格22+。为什么？14的位置极度恐慌，能下手很难，而周一盘前NVO HIMS合作公布确定，确定性瞬间高了很多，外加40%做空比例，这个位置是很不错的去博取反转高收益的位置。我不知道上看多少，我们暂时以前期的底部40为一个小目标吧。\n\nLUNR极度收敛，很快会有一个方向；>> 每支股票从技术上看都不同，对于LUNR而言，很明确明显的是股价沿着60MA向上走，且上方被20MA压制，而最近几天似乎要向上走出20-60MA之间的收敛区间，这是我想看到的。虽然是投机仓位，不过没赚多少，NASA LTV合同也没宣布，我继续等待。\n\nCRCL涨幅过快，稍微调整是很正常的。>> 没太多补充，我继续持有。\n\nRKLB 120MA已经64.5了，64再买到几乎不太可能了。>> 接下来我们有很大几率看到20-60-120MA重新多头排列，要实现这个情况需要：股价不暴跌，稳定在当前即可，暴涨突然拉高短期20MA反而图形会揍得突兀不漂亮。在SpaceX传言已经提交了上市申请进入静默期的阶段，我们有很大概率看到RKLB以65-70为底部，慢慢回升，整理均线再次回到多头排列，然后才蓄力上攻。\n\nHOOD还没走出底部。>> 没太多补充，我继续持有sell put。\n\nSATS给大家留足了思考和加仓的时间。>> 没太多补充，我继续持有。昨天我也再次补充了SATS的价格看法，我复制在这里：","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-12T02:17:35.675000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481476221383606283","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n......\n\n马斯克“巨硬”项目非常值得期待\n\n几小时前，马斯克发文，说了下面的要点：\n\nSpaceX旗下xAI主导的Macrohard巨硬项目，特斯拉也有份，因为特斯拉投资了20亿美金。\n\n这个项目拥有巨大的算力中心，这个算力中心驱动的是两个软体：负责思维本能的数字Optimus + 负责思维思考的Grok。这两个思维本能和思考不是很好理解，接下来希望可以有更多信息我为大家解读。目前我的理解是：数字Optimus是一个agent系统，而Grok是系统中和用户对接以及对接背后的思考agent。\n\nComputer-use agent越来月火，SpaceX旗下xAI和特斯拉也会积极参与，这对公司的估值是利好，也是当前AI发展方向。我们要知道，这个方向不是现在才确立的，之前xAI员工已经爆出了细节，这是马斯克早就部署好的。\n\nSpaceX股东和特斯拉股东，不要怀疑马斯克，股价可能有波动，但是马斯克从来没让长期投资者失望。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-12T02:25:53.351000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481478308788175032","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1481478442787803268","filename":"9f38b32b3c0010051834cb81b414905b.jpg","size":404694,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1481478442787803268/9f38b32b3c0010051834cb81b414905b.jpg?ex=69faa6d1&is=69f95551&hm=ef68913083c3dbff1180c151805dafd44525d062f444c73c6a997978cc125a26&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1481478442787803268/9f38b32b3c0010051834cb81b414905b.jpg?ex=69faa6d1&is=69f95551&hm=ef68913083c3dbff1180c151805dafd44525d062f444c73c6a997978cc125a26&","width":1179,"height":1479,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"+fcFBgCTiXh3iPd5d4hoipiWoFUGWxU=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-12T02:26:25.367000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481478443072884787","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \nAce为大家总结了美国光伏补贴，这里涉及到光伏厂商、光伏电站、储能厂商、数据中心光储系统。\n\n2022年，美国当时在民主党执政时期，通过了《通胀削减法案》，在美国本土制造并销售给第三方的太阳能组件和部件可以获得 Section 45X 高级制造生产税收抵免。请注意，Section 45X 是给上游制造商的补贴，待会我们还会提到给下游电站开发商的补贴，也就是First Solar的客户。\n\n与传统的退税不同，Section 45X 是按件/按功率直接补贴。你产出的瓦数越高、重量越多，拿到的钱就越多。这些奖励是可以叠加的：如果你在同一家工厂既做电池片又做组件，你每瓦可以叠加获得 $4 + 7 = 11$ 美分的补贴。要拿到这笔钱，必须满足的条件里最最关键的就是：美国制造！\n\n时间来到2025年，共和党特朗普执政下通过了《One Big Beautiful Bill Act》也就是我们俗称的大而美法案，该法案针对光伏生厂商，对 section 45X 做了一些修正：\n除了保留美国制造这个条件，还增加了原材料溯源的条件：规定原材料不能来自特定受限国家，比如中国。这迫使厂家必须进一步清理供应链，确保原材料的溯源也符合美国本土的要求。因祸得福，相比于依赖中国晶硅的其它美国晶硅光伏厂商，First Solar 采用的是碲化镉 CdTe 薄膜技术，其供应链与传统的晶硅路径完全不同。这意味着在大而美法案下，其它大部分竞争对手的日子都更不好过，而First Solar 是唯一能稳拿到全额 Section 45X 补贴且无需大规模更换供应商的光伏厂商。\n\n但大而美法案对下游电站开发商的打击力度要大得多。\n\nSection 45Y, 针对风电和大型地面光伏：原有的 通胀削减法案 下，基于“发电量”补贴，持续十年，没有严苛的限制，但是新的 大而美法案下，强制要求发电厂需要再规定时间内并网，如果延误，原有补贴比例将以每年 25% 的速度阶梯式递减。为什么新法案下强制并网，因为特朗普政府认为这些补贴的目标不是让某家公司有电用，而是让美国的电网变绿。\n\nSection 48E, 针对分布式光伏项目比如数据中心项目：原有的通胀削减法案 下，基于公司“投资金额”一次性抵减总投资的 30%，但是新的 大而美法案下，项目必须在 2026 年7月4日之前满足 开工 条件，这是美国储能项目和数据中心微电网的获得政府补贴的最后上车机会，过了日期以后没有补贴了。这也是导致最近几个月美国储能设备价格暴涨的直接原因，因为光伏 和 储能 是需要同时使用的，为了拿光伏补贴，就要赶快买储能电池。顺便提一下，电池储能产品 是 大而美法案 中罕见的“豁免区”。电池储能的补贴并没有跟着光伏厂家和光伏用户一起被削减，它依然保留了原来 通胀削减法案 的至少到2033年的时限，只是但必须通过严苛的 受关注外国实体 原材料溯源审计。\n\n总结下来：影响光伏制造商例如First Solar的是Section 45X，影响First Solar客户也就是光伏使用者的是 Section 45Y和48E。在这三类不同补贴从 通胀削减法案 向 大而美法案 转化时，First Solar 公司呈现出“盈利极高 但 订单萎缩”的现状。一方面，因为上游制造业竞争对手被剔除，First Solar利润率提高；另一方面，因为下游客户补贴窗口关闭，或者获得补贴难度加大关，再加上客户担心大而美法案之后的政策真空期下单变得极其谨慎，这些导致First Solar 订单萎缩。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-12T06:21:12.025000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481537526799007874","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n\nHIMS CEO Andrew Dudum 最新采访（这个采访是昨天发布的，发出来是为了分享，不是为了鼓吹HIMS）\nhttps://youtu.be/IAYCA-whKUM?si=WmIXsEb4cNj0cJV0\n\n使命感的萌芽： 他的父亲通过早期互联网社区进行自诊，这一行为成为了 Hims & Hers 创立的基石——通过打破禁忌话题如脱发、勃起功能障碍等，让人们能更便捷地获取关乎健康的透明信息。\n\n礼貌的局限： “礼貌” Niceness 通常是冲突回避的代名词，为了不让对方难受而隐瞒真相，这实际上是自私的表现。善良的本质： “善良” Kindness 意味着尊重对方，愿意通过艰难但诚实的对话来帮助他人变得更好、更健康。\n\n拥抱不适感： 他认为 CEO 的“超级权力”是“在不适中寻找舒适”。无论是面对股价暴跌还是艰难的解雇决定，这种心态都能支撑领导者度过难关。\n\n雇佣比自己聪明的人： 杜杜姆认为，如果 CEO 必须是房间里最聪明的人，公司就永远无法规模化。\n\n他危机和股价波动中保持平衡的重要性：他坚信好日子和坏日子都是暂时的，不会永远持续；在遭遇公众舆论攻击时，最能让他看清谁才是真正的朋友——那些在他深陷困境时依然“现身”支持他的人。无论在什么阶段，领导者都需要保持一种“处变不惊”的状态 Equanimity ，既不在巅峰时迷失，也不在低谷时沉沦。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[{"type":"rich","url":"https://www.youtube.com/watch?v=IAYCA-whKUM","title":"Why Nice Leaders Fail with Andrew Dudum, CEO and Founder of Hims & ...","description":"Andrew Dudum built Hims & Hers from zero into a multi-billion-dollar consumer publicly-traded consumer health company by doing something most founders avoid: leaning directly into discomfort. He’s able to lead the hard conversations that most leaders avoid.\n\nIn this episode, Andrew and I talk candidly about what it actually takes to scale a co...","color":16711680,"author":{"name":"BoomPop","url":"https://www.youtube.com/channel/UCdKqgvWxJHUt6UmsE4k47tw"},"thumbnail":{"url":"https://i.ytimg.com/vi/IAYCA-whKUM/maxresdefault.jpg","proxy_url":"https://images-ext-1.discordapp.net/external/2AdQkgcSzxVlA5axM_5Ab-NwdTgZrETC_JoIsGTqbCE/https/i.ytimg.com/vi/IAYCA-whKUM/maxresdefault.jpg","width":1280,"height":720,"content_type":"image/jpeg","placeholder":"7fcJHIJ+8ZOJZ2qqd3iAewjpFA==","placeholder_version":1,"flags":0},"content_scan_version":4}],"timestamp":"2026-03-12T12:46:21.889000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1481634456594022562","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n我会在108加仓200SATS.","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-12T13:48:53.243000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481650190913110189","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-03-13 博主-会员，如何看待二者的关系？继续加仓SATS，以及美伊战争对我们仓位影响可能大不同！ @everyone \n\n有人说我脑子“瓦特”了，但我继续加仓SATS\n\n昨天大盘下跌，不管是科技股还是小盘股都下跌。我在睡觉前下单了108.1的订单购买200股SATS，盘中被执行。目前我有1800股SATS，均价112，因为这篇帖子我会公开，所以具体仓位不做说明。有意思的是，前天我发了一段SATS的解读，然后Patreon的免费讨论群（免费订阅Patreon之后可以进入的一个群）一个上海人吧，说我脑子“瓦特”了，大概意思是不理解我对SATS的执着。这里我不讨论SATS个例，我是简单阐述一个博主-会员（不管是免费还是付费）在面对投资盈利或者投资亏损时的关系：\n\n站在会员朋友的角度，大家都很明白：如果因为博主的买入而买入投资或者短期跟单投机某一只股票，赚钱了你不会分润给博主，亏损了博主也不会承担部分你的亏损。咱们有一说一，哪怕是银行的高净值客户亿万富豪他们如果因为银行投资顾问推荐的股票亏钱了，银行一分钱也不会赔给你，但是毕竟人家交了很多服务费也就是交易佣金，所以骂一骂客户经理，客户经理还是只有忍着的。何况，博主肯定不是银行投资顾问的角色因为银行顾问和客户经理都有投资拍照，而博主大部分都没有专业牌照，比如Ace本人就是非金融从业者，所谓的野生草根金融博主。\n\n刚好昨天在别的财经博主视频下方看到类似 “你有没有考虑到为你付费的会员朋友亏钱时候的感受？”的评论，我想，上面我说的事实大家都懂，大家在亏钱的时候不过是想发泄一些，好像是说：我亏钱不是因为我，而是因为这位博主。\n\n我实盘操作，实盘展示给付费会员，这不是为会员而操作，是为我自己操作。同理，会员朋友也是对自己的账户负责。\n\n博主对于付费会员不应推卸的责任：尽可能做到博主认知内的个股风险提示，尽可能客观。\n\n美伊战争开始后我的账户表现\n\n不管是Discord还是微信，对美伊战争的争论很多。我这里想要强调，每个人的仓位配置不同，受到美伊战争的影响是不同的。我之所以最近持续加仓比较淡定的一个重要原因是，02-28开始美伊战争以来，我三月份到现在的收益最高到12%，昨天回落到了7%，这让我全年的亏损在缩窄。但是可能一些会员朋友因为仓位和配置股票的不同，美伊战争以来收益相较于二月以来更差了，那么如果这个时候你已经满仓了没有子弹了，可能就会比较慌比较被动，那么就不能像我一样在过去两周持续把现金子弹打光，甚至有些朋友上融资。\n\n结合上面博主-会员的话题，要追踪一个博主，你觉得信任它，就要全面：了解他对一只股票长期持续的观点变化，而不是某一个时刻的一个评论；了解它对一只股票长期仓位的变化；了解具体的仓位配置和仓位大小，和你的有什么不同。总之，你如果信任一个人，就是要花时间了解他在说什么，正如我信任马斯克所以我回去看他说的大部分话。（拿马斯克说事纯粹只是个类比）\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-13T02:10:07.715000+00:00","edited_timestamp":"2026-03-13T02:13:31.985000+00:00","flags":4,"components":[],"id":"1481836730368655461","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n想更新一下我的SATS正股仓位，目前已经来到了18%，我现在的仓位已经没有现金了，假设在整体亏损迅速扩大的情况下，接下来我可能会上一部分融资继续在低点购买自己看好的股票。但是如果持仓整体亏损过大，做一些保护性止损，比如TEM比如LUNR。具体要卖出哪些股票还需要是情况而定。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-13T03:51:44.983000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481862304164216853","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n卖出LUNR，买入SATS\n\n我想放弃对LUNR的投机，个股分析之后觉得坚持下去意义不大。亏损很小忽略不计，卖出同时我再次加仓买入SATS。太空目前还是只保留RKLB SATS且重仓。\n\nRKLB下一个买单从64.1修改到了65.1, 略高于120MA。","mentions":[],"mention_roles":[],"attachments":[{"id":"1481963639052304444","filename":"c9f7ef9a888efc1cb0844ad7e9069f18.jpg","size":123720,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1481963639052304444/c9f7ef9a888efc1cb0844ad7e9069f18.jpg?ex=69fb1931&is=69f9c7b1&hm=748b3672fafde579f9e0cf4c31609880437ebec53b80073adec26919d3df00a4&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1481963639052304444/c9f7ef9a888efc1cb0844ad7e9069f18.jpg?ex=69fb1931&is=69f9c7b1&hm=748b3672fafde579f9e0cf4c31609880437ebec53b80073adec26919d3df00a4&","width":1179,"height":1454,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"/QcCBgAHuFp5maaWmGZ4hTZ5wFgInjU=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-13T10:34:25.160000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1481963639291510814","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n\n我看完了所有PLTR AIP Con-9的客户案例视频，这次让我印象最深刻的是两点：\n- 第一是战争部Maven系统的展示，从敌军识别到决策到执行的过程，同时和军事相关的案例还包括GE航天和美国海军潜艇制造系统。\n- 第二是SAP ERP系统落地 + 埃森哲 AI咨询 + PLTR的合作：PLTR帮助SAP的ERP系统加速在客户端落地，而埃森哲作为咨询公司在中间提供一些增值服务，这样的合作，不管是SAP还是埃森哲，都是直接或者间接为PLTR付费的客户。\n\nPLTR在经过了超级强劲的四季度财报之后，在美伊战争的大背景下，政府合同越滚越大，已经是不可替代的AI操作系统供应商了。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-15T06:44:26.085000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1482630537506984109","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nGTC 2026-03 @everyone \n\n我把GTC大会上一些重要的截图放在下面，然后也用文字总结下黄仁勋想要传达的信息：\n\n营收继续爆发：半年前的GTC大会，我为大家解读了当时宣布的2025-2026两年5000亿GPU营收，“Blackwell芯片5000亿=200万个，每个价格25000美金。五千亿，总共2000万GPU，已经交付600万，未来五个季度预计交付1400万片，英伟达预估2026年GPU相关收入2800亿+，这是假设平均未来五个月营收，实际应该是递增的，所以实际应该大于2800亿。”。这次GTC又给出了2025-2027 10000亿营收的数字，意味着新增的5000亿=2026年2800亿营收基础上的增量 + 2027年全年GPU营收预测。因为不知道具体如何分配这新增的5000亿，所以不能准确预估2026 2027最新的GPU营收指引。无论如何，仅仅增加一年的销售时间，总销售量增加5000亿这个数字，相当惊人。\n\nBlackwell 到 Rubin，每单位电量能够产生的tokens数量以及为数据中心贡献的营收平均提高5倍，也就意味着Vera Rubin能够为英伟达带来5倍GPU销售的增长空间。\n\n太空GPU：Space-1 太空GPU正在研发中。\n\nOpenClaw小龙虾引发tokens需求暴增：未来的世界是无数AI Agents为企业为个人工作的世界，需要消耗的推理算力无穷尽。","mentions":[],"mention_roles":[],"attachments":[{"id":"1483285085187870851","filename":"2026-03-17_9.18.13.png","size":5256808,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1483285085187870851/2026-03-17_9.18.13.png?ex=69faa1e2&is=69f95062&hm=a1514e796b9c0c2cde95a32a9b47fe0c6151369f8b5ee3a68d8ec9fafcc58896&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1483285085187870851/2026-03-17_9.18.13.png?ex=69faa1e2&is=69f95062&hm=a1514e796b9c0c2cde95a32a9b47fe0c6151369f8b5ee3a68d8ec9fafcc58896&","width":5120,"height":2880,"content_type":"image/png","content_scan_version":4,"placeholder":"BfgFFIIlCtdzh4qjSXpXeZCq9w==","placeholder_version":1},{"id":"1483285086479585400","filename":"2026-03-17_9.22.06.png","size":5701545,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1483285086479585400/2026-03-17_9.22.06.png?ex=69faa1e2&is=69f95062&hm=f92f283da0b678ba9ab4dec1a8287de05f261930ffc80d3bf70df334fb556cd1&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1483285086479585400/2026-03-17_9.22.06.png?ex=69faa1e2&is=69f95 "width":5120,"height":2880,"content_type":"image/png","content_scan_version":4,"placeholder":"xQcGDIAnCaSBeJqJWIdqX8EEow==","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-17T02:05:23.574000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1483285090057453693","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n持仓更新 & 个股看法 @everyone \n\n目前我正股仓位108%（少量杠杆）、整体YTD稍微盈利一点点。\n\nLUNR：这里记录下上周卖掉的LUNR，这个我可能忘记在Patreon做记录，只是聊天群通知了大家。当时我决定放弃LUNR的投机，转而直接再次买入SATS。\n\nSATS：我再次分享下SATS所有持仓，目前的价格下，我所有的期权和正股都没有卖出平仓的计划。本周末SATS会正式被标普500相关ETF执行买入，这个我在上周分享了具体细节。具体会发生什么，一起等待。SATS110以下的价格对我来说是很好的吸筹区间，所以我在过去一段时间一直一直在加仓，目前正股仓位已经接近20%。\n\nCRCL & MSTR：总体来看这两支加密货币个股我已经保本持平了，CRCL盈利，MSTR亏损。BTC过去几天走势很好，现在没有理由去止盈CRCL，我继续等待。\n\n其它个股没什么太多好说的，大家有问题可以在群里提出来！","mentions":[],"mention_roles":[],"attachments":[{"id":"1483289067784376482","filename":"28cb0010-7650-4098-a148-94153d2a5af9.png","size":196911,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1483289067784376482/28cb0010-7650-4098-a148-94153d2a5af9.png?ex=69faa597&is=69f95417&hm=cdbc40ba09bc45fcc44c60a7a96350f568d49965071477fcecb33031e1c9a72f&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1483289067784376482/28cb0010-7650-4098-a148-94153d2a5af9.png?ex=69faa597&is=69f95417&hm=cdbc40ba09bc45fcc44c60a7a96350f568d49965071477fcecb33031e1c9a72f&","width":2556,"height":442,"content_type":"image/png","content_scan_version":4,"placeholder":"NwgGCYRGSHmvm8lm/ED6O6I=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-17T02:21:12.033000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1483289068182700194","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-03-18 RKLB 10亿美金ATM增发背后的魔鬼细节！ @everyone \n\n新一轮增发 & 增发历史\n\n盘后RKLB发布8-K文件宣布了10亿美金增发，这是让我很意外的，为什么意外，因为公司目前很多现金。一张图就可以说清楚RKLB 2025年开始ATM增发的历史，一目了然。从这张图上的信息我们可以大概猜测：RKLB有大收购要来了，收购公司应该是至少10亿美金级别的公司，甚至理论上可以到30亿左右。\n\n增发背后的细节\n\n在这次 RKLB的 10 亿美元增发8-K文件中，明确说明如何使用金融衍生工具：领口式远期交易 Collared Forward Transaction。交易对手方仅限于高盛或摩根士丹利这两家头部投行。如何理解这个金融衍生工具？\n\n在交易开始的一段时间内，高盛或大摩会先从市场借入股票并卖出，确定一个对冲参考价格Hedge Reference Price。参考价格乘以合同约定的上下浮动百分比，就得出了底价和顶价。RKLB最终拿到的每股价格可能不是低价或者定价，而是基于未来的成交均价，但最高不会超过顶价 ，最低也不会低于低价。\n\n在这种设置下，RKLB可以要求金融机构提前支付一笔现金，立即支付，无需等待实际的股票增发。这笔钱基本上是基于底价扣除佣金后的金额。那么到期结算时，会出现两种情况：第一，股价低于或等于底价，RKLB已经通过预付款拿到了相当于底价的钱，直接交付股票结清；第二，股价高于底价，RKLB可以再次获得超出部分的差额 ，可以选择拿现金，或者拿回一部分之前抵押的股票 ，但是RKLB绝对拿不到股价超出顶价的部分。\n\n通过设定底价，RKLB确保了即便未来股价暴跌，它卖股票的价格也不会低于底价。作为保底的代价，如果股价涨上了天，RKLB能拿到的最高价也被锁死在了顶价。\n\n什么情况下公司会使用这种金融衍生工具进行增发融资呢？\n- 急需资金，很急\n- 看好公司未来股价继续上涨：有朋友问，也有可能是害怕公司股价继续下跌，这是对的。但是如果公司明确知道股价会跌的概率很大，他们完全可能不用这个策略，而是直接尽快增发就行了。所以我认为公司看好未来股价会继续上涨且需要钱等不及了这两者结合，是RKLB使用该衍生工具的原因。\n\n结论\n\n我不知道RKLB会不会收购，收购什么公司。以上增发和对应的金融衍生工具，在我看来是利好信号。\n\n我在写文章之前市场价格75.4买入了340股，小小布局一下。请注意，340股加仓对我总RKLB仓位影响不算大。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[{"id":"1483654839744462999","filename":"e35f29aa-9b44-4bbe-81f9-c19dc3d28f8b.png","size":262620,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1483654839744462999/e35f29aa-9b44-4bbe-81f9-c19dc3d28f8b.png?ex=69faa8be&is=69f9573e&hm=2214ef0b7f599ef4cf386c8decfdf9e41387bbccccfcd2ca45a6abf1817ab763&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1483654839744462999/e35f29aa-9b44-4bbe-81f9-c19dc3d28f8b.png?ex=69faa8be&is=69f9573e&hm=2214ef0b7f599ef4cf386c8decfdf9e41387bbccccfcd2ca45a6abf1817ab763&","width":1708,"height":1770,"content_type":"image/png","content_scan_version":4,"placeholder":"OQgKBwD0fHViu2dnqJh4x1mbfIAIB4gA","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-18T02:34:38.812000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1483654839924691015","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n星盾文字分享，以上是我过去几天总结的\n\nNRO 国家侦察局：核心任务是三个字母 I S R，也就是情报、监视与侦察    \nNRO 侦查局负责设计、建造并运行美国的间谍卫星，从而获取高分辨率的光学照片、雷达图像以及监听全球范围内的无线电信号。    \n星盾 Starshield 是 SpaceX 为NRO 侦查局量身定制的军事版“星链”。    \n\nSDA 空间发展局 ，隶属于美国太空军 USSF，核心任务是构建扩散型作战人员空间架构，简称 PWSA。    \nSDA 空间发展局不负责情报，而是负责让武器看到目标，而且实现即时地面通讯。    \nSDA的卫星星座分为传输层和追踪层，追踪层卫星负责追踪武器，然后把武器信息传递给传输层卫星，然后传输层卫星将信息接力到美军地面系统。    \n这个卫星星座分为三个批次：    \n    第一批次 传输层 + 追踪层卫星，大部分都发射服役了，少部分处于收尾阶段。美伊战争用到了这部分已经服役的卫星，但是很可惜除了小问题，待会我会告诉大家细节。\n    第二批次 传输层 + 追踪层准备发射，其中RKLB获得了传输层的部分卫星订单。这一批次会集中在2027年才发射。\n    第三批次合同前不久刚宣布，砍掉了传输层，只是继续追踪层卫星，其中RKLB获得了追踪层的部分卫星订单\n    除了RKLB，其余在不同批次获得合同的公司包括 洛克希德马丁、诺斯罗普、L3Harris、York Space\n\n星盾 Starshield 可以干什么？    \n第一，星盾有眼睛，可以看，也就是实现地球观测 & 移动目标追踪    \n第二，星盾有耳朵，可以听，也就是实现 无线电通讯的监测 & 干扰    \n第三，星盾有自己原本的重要技能：高带宽 低延迟 全球覆盖激光通讯。值得注意的是：星盾既可以独立于地面联系，同时也可以与SDA 空间发展局的 传输层卫星的互联。    \n第四，你想要什么载荷，SpaceX都可以帮你装    \n\nMILINET计划：美国太空军 USSF领导的 星盾 强化版本。    \n计划以星盾卫星组成骨干网络，将星盾的通讯能力进一步和SDA的通讯层融合，从而弥补确实的SDA第三批次追踪层的能力。    \n\n\"美伊战争中SDA 已经服役的第一批次卫星出了问题：美国政府问责署 GAO 在2026年1月的报告 GAO-26-107085 中批评 SDA 过高估计了追踪层卫星的成熟度。\n\n实战表现： 在实战初期，T1 追踪层卫星虽然能识别出导弹起飞（发现火光），但在生成能够直接引导拦截弹击中目标的**三维高精度路径（火控级数据）**时，延迟超过了预期\"    \n首先在通讯层：由于SDA 星座数量尚未让整个网络形成闭环，美军无人机与后方指挥部出现了“短暂失联”。后果是：迫使前线部队不得不临时切换回传统的、更易受干扰的地球同步轨道卫星。    \n其次在追踪层：卫星虽然能识别导弹起飞，但在生成能够直接引导拦截弹击中目标的三维高精度路径时，延迟超过了预期。后果是：被迫使用侦查局的星盾卫星提供的实时成像数据进行人工干预，才完成了导弹防御。    \n\nSDA    \n防御属性：导弹预警与追踪    \n进攻属性：超视距打击引导    \n\n星盾    \n防御属性：抗干扰通信与空间感知    \n进攻属性：地球监视与无人机系统通讯中继站，还可进行主动电磁波干扰！    \n进攻属性：还可进行主动电磁波干扰，也就是打电子战！    \n\nLUCAS 低成本无人机    \n- 高带宽低延迟通讯，无人机可在任何地点回传第一人称视角图像。    \n- 抗电磁干扰。    \n- 无人机之间共享数据，实现蜂群战术。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-18T06:48:35.469000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1483718747096350781","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年3月18日-2026-03-18T00-02-38-07-00- 为什么我在RKLB增发后加仓？","mentions":[],"mention_roles":[],"attachments":[{"id":"1483818007859036240","filename":"2026318-2026-03-18T00-02-38-07-00-_RKLB.mp4","size":42419015,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1483818007859036240/2026318-2026-03-18T00-02-38-07-00-_RKLB.mp4?ex=69fa97f5&is=69f94675&hm=cf11a5595b99f60a46c788db85d116e89a7b0712582d4eb6f7623834c0b81a84&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1483818007859036240/2026318-2026-03-18T00-02-38-07-00-_RKLB.mp4?ex=69fa97f5&is=69f94675&hm=cf11a5595b99f60a46c788db85d116e89a7b0712582d4eb6f7623834c0b81a84&","width":1920,"height":1080,"content_type":"video/mp4","original_content_type":"video/mp4","content_scan_version":4,"placeholder":"zgcKDIJWGFZQuZiZZ3q9L6j6cw==","placehold =69fb2de6&is=69f9dc66&hm=11f7557e79164063e47b4b010009fe5710171a95d14e54db2cdfbca41365698a&","content_type":"application/pdf","original_content_type":"application/pdf","content_scan_version":4,"title":"2026年3月22日-2026-03-21T23-53-27-07-00- 太空_笔记"}],"embeds":[],"timestamp":"2026-03-22T12:02:46.344000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1485247364858904606","channel_id":"1457988703363399781","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-03-24 特斯拉和SpaceX投资者要小心了！\n\n为什么要做Terafab？想法很合理！\n- 随着特斯拉 Optimus 机器人、Robotaxi 和 xAI 的发展，马斯克对计算能力的需求巨大，建立垂直一体化的供应链在战略上是合理的。\n- 到 2030 年，全球先进制程代工产能将持续紧张，且过度依赖台积电存在战略风险。\n- 地球上的能源有限，需要获取太空中能源，也就是太阳能。\n\n如何实现Terafab每年太瓦级别的太空算力部署？\n- 第一个版本的算力卫星 = 100千瓦，未来达到兆瓦级别\n- 一颗卫星 = 一吨\n- 每年 1000 万吨 payload 发射上天 = 1000 万颗卫星 x 100千瓦 = 1,000,000,000千瓦 = 1,000吉瓦 = 1 太瓦\n- 星舰V3一次发射200吨，需要5万次发射；假设总共五个发射台，每天每个发射台要发射27次，平均一小时不到的发射间隔。\n\n如何实现Terafab每年太瓦级别的芯片制造？\n\n马斯克认为传统芯片制造最大的瓶颈是空间和流程的割裂：设计 design 在一处、光刻掩模 Mask 的制造在另一处、晶圆代工 wafer fab在第三处、封装测试又在别处，每一层交接都会增加数周甚至数月的时间。\n\nTerafab目前想要做的是全流程整合： 在同一个建筑内，将上方提到的设计 + 光刻掩模 + 逻辑芯片制造 + 内存芯片制造 + 封装测试 所有环节 集成！这种整合允许芯片设计完成之后立刻制造掩模，立刻生产并测试，如果发现问题或优化点，立刻修改设计并以此往复循环达到最优结果。这种方法强调量大管饱，而良率成为次要，马斯克本人就说了，“数量就是质量的一种体现！”\n\n这样的转变，意味着现有的芯片技术不可能实现马斯克的愿景，而是需要尝试一些“突破现有物理极限”的方式。\n\n举个例子，刚才提到的光刻掩模这个芯片制造中的关键步骤，英文是 Photomask。如果把晶圆比作照片底片的“相纸”，光刻掩模则决定了这张照片底片里面的“内容”。不管是像GPU CPU这样的逻辑芯片，还是用于存储的存储芯片，都需要光刻掩模这个步骤。光刻掩模我们可以简化分为掩模的制造mask making 和 光刻 lithography，第二步光刻就是在台积电这种wafer fab晶圆厂完成的，而这个步骤必须的机器就是荷兰公司阿斯麦ASML制造的光刻机。如果是老一代芯片可以使用 DUV 深紫外线 光刻机，但如果是最先进的芯片比如5纳米制程以下的，必须使用阿斯麦的 EUV 光刻机。\n\n而且，晶圆厂有“四大金刚”工序，每天都在循环做这几件事：薄膜沉积 Deposition、光刻 lithography、刻蚀 Etching、离子注入 Ion Implantation，光刻还只是其中一个步骤。马斯克的 Terafab 之所以被称为 “Out of context problem” 超越认知的问题，就是因为他打算把原本各个环节分工合作的芯片制造流程，整合到一个屋檐下，这是闻所未闻的。也就意味着，没有突破性的技术，只是利用现有技术，是不可能实现的。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-23T03:47:57.598000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1485485229098532995","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\n宏大计划的背后\n- 财务瓶颈：参考三星和台积电在美建厂的经验，实际成本可能高达 350-400 亿美元。钱从哪里来？特斯拉2026年资本支出计划尚未包括晶圆厂的投入。\n- 制程技术瓶颈：2 纳米工艺从何而来？目前全球只有台积电、三星和英特尔拥有成熟的 2 纳米工艺技术，目前 马斯克没有宣布任何制程工艺上的合作伙伴。>> 找一个合作伙伴，是大概率事件，但是什么时候找，马斯克是否想要自己研究？不知道。\n- 设备瓶颈：2 纳米制造必须依赖 ASML 最先进的 High-NA EUV 光刻机，这种设备单价高达 4 亿美元且年产量极低，目前特斯拉并无公开的设备订购记录。>> 尽快购买光刻机是大概率事件，但是马斯克似乎想要发明全新的代替光刻机的技术？！\n- 建设周期： 从建厂到量产通常需要至少 4-5 年，而截至今天，马斯克除了一个听起来让人兴奋的想法之外，什么也还没有。所以就算是4-5年，恐怕都不够。\n- 对特斯拉的影响：短期-中期股价或许因为大量资本支出承压。\n- 对SpaceX的影响：算力卫星的发射不会等到Terafab投产，因为星舰明年就能实现商飞。SpaceX一定会早于Terafab开始执行算力星座部署，我的预计是在2028年。从这点看，短期-中期对SpaceX的影响是中性的，当然SpaceX也要出钱，有可能从IPO的资金中拿出部分投资Terafab。\n\n马斯克，不是别人，他是地球最强男人！\n- 过往多次成功推翻现有技术、流程，用第一性原理不断创造奇迹的辉煌历史。\n- “First they ignore you, then they ridicule you, then when you win they assign credit to someone else. And the cycle keeps repeating.\" “起初他们无视你，随后他们嘲笑你。等你赢了，他们就把功劳归于别人。循环往复，周而复始。”\n- 对于马斯克的长期投资者，Tefafab是必然的一步！相约十年，十年后回首，可能我们还是再次为马斯克竖起大拇指！\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-23T03:48:03.136000+00:00","edited_ti "attachments":[],"embeds":[],"timestamp":"2026-03-24T01:47:25.486000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1485817283287846912","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n跌太多了，我加一点CRCL。之前止盈了500股。","mentions":[],"mention_roles":[],"attachments":[{"id":"1486016702067114014","filename":"IMG_0308.jpg","size":29034,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1486016702067114014/IMG_0308.jpg?ex=69faaea6&is=69f95d26&hm=292a93c44f256e954aef8a6363d617ad68140d479765f55383464a918552ffaa&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1486016702067114014/IMG_0308.jpg?ex=69faaea6&is=69f95d26&hm=292a93c44f256e954aef8a6363d617ad68140d479765f55383464a918552ffaa&","width":1179,"height":508,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"yQcCA4CvRWQ0hqlWcO8lqA0=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-24T14:59:50.620000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1486016702033563752","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nASML NVDA INTC 5+5+10，完成了我上次说的帮父母投资的建仓。等会做详细说明。","mentions":[],"mention_roles":[],"attachments":[{"id":"1486159680379289710","filename":"IMG_0309.png","size":182198,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1486159680379289710/IMG_0309.png?ex=69fb33cf&is=69f9e24f&hm=f17d83d03c9559396626e8427a4272fd435e302cccb8b34cdf1bb96ae3bb08a1&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1486159680379289710/IMG_0309.png?ex=69fb33cf&is=69f9e24f&hm=f17d83d03c9559396626e8427a4272fd435e302cccb8b34cdf1bb96ae3bb08a1&","width":1179,"height":607,"content_type":"image/png","content_scan_version":4,"placeholder":"/fcFBIBQuquaiHiJmYgAvAfBiw==","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-25T00:27:59.359000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1486159680567906416","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-03-25 CRCL暴跌的真相，NASA月球计划大变更，以及为父母配置的半导体仓位 @everyone \n\nCRCL单日暴跌20%！天才法案 和 数字资产法案的 区别！\n\n昨日股价崩盘的直接导火索是美国参议院关于 Clarity Act 数字资产市场法案的最新修订草案被媒体曝光，该草案包含以下对 Circle 不利的内容。请注意，这并非公开通过草案，暂时只是媒体报道。\n\n禁止稳定币派息/奖励： 修订后的草案禁止平台向持有稳定币的用户提供任何形式的“收益”或“奖励”。监管机构担心稳定币奖励程序在功能上等同于银行存款，但缺乏相应的银行监管。如果该法案通过，像Coinbase向持有 USDC 的用户支付利息的行为将被视为非法或被归类为未注册证券。\n\nCoinbase 之前在向持有 USDC 的用户发放所谓的 “USDC Rewards”，针对普通用户约 3.5%利息，这杯定义为“忠诚度奖励”，而不是“利息”，以规避银行监管。如果 Coinbase 无法再给用户 3.5% 的被动收益，用户可能就没动力把钱换成 USDC 存在 Coinbase 里了，意味着 USDC 的规模可能会缩水，这样不管是 Coinbase 还是 Circle 都不利。 \n\nCircle 从未直接向自己平台的 USDC 用户发放任何利息。\n\n天才法案 GENIUS Ac 已于 2025 年 7 月正式签署成为法律，法案第 4 条明确规定：稳定币发行方不得向稳定币持有者支付任何形式的利息或收益，国会希望稳定币回归其原始功能：支付手段，而不是投资工具。但是，现实中有一个漏洞： 法案字面上只禁止了“发行方（Issuer，如 Circle）”发利息，但是对于 Circle 就把赚到的钱分给合作伙伴“分销商（Distributor，如 Coinbase）”，再由 Coinbase 以“奖励（Rewards）”的名义发给用户，这在天才法案通过之后仍在继续。而现在的 Clarity Act 数字资产市场法案要求扩大这一禁令的适用范围，涵盖发行方的关联公司和第三方平台。\n\n而稳定币霸主USDT呢，从两个角度看：如果以后它向走合规路线，代价更大了；如果不走合规路线，那可以继续趁着 Clarity Act 数字资产市场法案对上市公司 Circl 和 Coinbase 的约束，抢夺USDC市场份额，因为当 Clarity Act 剥夺了 Coinbase 用户 3.5% 的 USDC 奖励时，这些资金不会流回银行，而是会流向不受美国管辖的离岸交易所。\n\n如果我暂时把稳定币总量的预期从之前的2030年一万亿直接打骨折到5000亿，再降低原本估值中USDC市占率，从30%+直接调整到比现在还低的25%，下图是CRCL在这种极端情况下的估值：没有任何投资价值了。请注意，我认为这是很极端的情况，最差的情况。\n\n在130左右减仓500股之后，我在昨天104的位置加仓100股，现在持有 1000-500+100=600股，这600股持仓均价103，算入历史收益均价80。接下来如何发展，先继续观察，再和大家分享操作计划。暂时的想法是：不会因为这个消息完全清仓CRCL，但是如果之后法案真正通过落地，事情尘埃落定，我会更加慎重控制CRCL的仓位。","mentions":[],"mention_roles":[],"attachments":[{"id":"1486187350215102605","filename":"2026-03-25_10.14.10.png","size":750035,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1486187350215102605/2026-03-25_10.14.10.png?ex=69faa4d4&is=69f95354&hm=b1f424d19da25b0b79e54b9016402b50897d1a22f5ce3061515ded0c3036023e&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1486187350215102605/2026-03-25_10.14.10.png?ex=69faa4d4&is=69f95354&hm=b1f424d19da25b0b79e54b9016402b50897d1a22f5ce3061515ded0c3036023e&","width":3296,"height":1906,"content_type":"image/png","content_scan_version":4,"placeholder":"eecJJITVmXl3iIifdYjDZw+t9g==","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-25T02:17:56.379000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1486187350475145286","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nNASA Artemis计划大变更\n\n在昨天NASA的“Ignition”新闻发布会中，局长Jared Isaacman宣布了多项重大的月球计划调整。\n- 从月球轨道转为月球表面：NASA宣布将暂停原定的月球轨道空间站 Gateway 资源和硬件如动力推进元件PPE、居住模块HALO，这些资源和硬件在月球表面被重新利用，以加速建立 月球基地。\n- Artemis III 不再直接登月，而是改为地球轨道对接测试任务。NASA决定停止 SLS Block 1B 和 Block 2 的改进，转而维持现有的 SLS 配置，以提高发射频率。\n- 强化商业运载火箭：在 Artemis VI 之后，逐步将 SLS 和 Orion 替换为更具竞争力的商业运载火箭和航天器。\n- 加速核动力推进：计划在2028年前发射 Space Reactor-1 SR-1，这是一个核动力深空验证任务，旨在为未来的火星任务测试核热/核电推进技术。\n- 放弃原有的商业轨道目的地计划，改为NASA采购一个核心模块 Core Module ，以在 ISS 国际空间站退役后确保连续的近地轨道存在。\n\n这次调整对太空上市公司的影响：\n- Voyager, VOYG：不利，因为NASA放弃原有的商业轨道目的地计划，我在 \"商业空间站\" 视频中提到的所有公司都是重大利空。这些公司原本希望拥有空间站并收租，现在 NASA 决定自己当房东，公司只能作为建筑商去竞标，这也会让相关公司融资难度增加。\n- Boeing, BA：不利，因为NASA 暂停了 SLS Block 1B 的开发并取消了 EUS 探测上层级合同。\n- Northrop Grumman, NOC：不利，因为NASA取消了Gateway HALO 模块和 SLS 助推器。\n- Lockheed Martin, LMT：不利，因为NASA削弱了Orion 航天器的应用前景。\n- Intuitive Machiens, LUNR： 有利，首先NASA显著增加了CLPS 商业月球载荷服务的任务频率；其次因为未来月球基地的计划，未来对LTV月球地形车的需求可能是有增无减。但是必须强调，随着月球基地愿景的提出，对于月球地形车的要求也随之改变，整个项目都会有很大变化，会进行分阶段竞标，而不是之前我们期待的一次性重磅合同官宣。\n- BWX Technologies, BWXT：有利，BWXT 是空间核反应堆的核心供应商。","mentions":[],"mention_roles":[],"attachments":[{"id":"1486187897383161866","filename":"HENI10laIAAiuX0.jpeg","size":69121,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1486187897383161866/HENI10laIAAiuX0.jpeg?ex=69faa556&is=69f953d6&hm=c7ef60fc8446d8dc245cc36869475c1ef94d93a5ce624cbea417d5df24785f77&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1486187897383161866/HENI10laIAAiuX0.jpeg?ex=69faa556&is=69f953d6&hm=c7ef60fc8446d8dc245cc36869475c1ef94d93a5ce624cbea417d5df24785f77&","width":960,"height":1200,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"SPcJJgIHqXZod1jIVnSJemVYeH+D+Bc=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-25T02:20:06.781000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1486187897420775517","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n高护城河 AI 基础设施：一个实验性的投资组合\n\n在之前我写了下面这段话，写完之后我执行了ASML的买入，然后刚才执行了 NVDA+INTC 的买入。我对INTC的看法产生了改变，之前从公司相对优势角度看我完全不看好也没考虑投资，现在放长时间从未来3-5年看，INTC的2纳米制程以及美国芯片制造的大背景下，我认为是一个稳定的长期投资选项。\n\n“这几天有一个想法：如果我们父母有一笔钱，数目不算大，不是他们的全部现金，投资至少5年，我们要选择什么投资标的？刚好现在我个人在现实生活中有这个问题。这笔钱不算多，没有很大心理压力。然后我想要获得跑赢标普500的年化投资回报。一旦决定投资，中途不会做任何止盈止损。可以持续持有至少3-5年甚至更久的时间，放着一直不动。刚好我最近分享的ASML，我觉得非常符合我的投资标的要求：绝对的行业护城河；AI芯片生产的木桶中最短的一块木板，这个短板是以未来五年或者更久来看待，没办法得到解决；AI完全符合时代趋势；不求很高的回报，但求安心持有 + 高于指数收益结合起来的持股期望值。我从现在开始会关注ASML的走势，如果有好的机会，我会执行这个计划。同时，我已经开始研究ASML，也会做估值计算。 ASML NVDA TSM都符合我的要求，但是TSM的地缘政治风险，作为这笔特殊的钱所承担的风险，我无法接受。NVDA我自己就有投资了，所以剩下ASML。顺便说一下，马斯克的Terafab需要大量的EUV光刻机，除非他自己自己做，但是自己研发EUV光刻机的时间是用10年为单位来计算的。”","mentions":[],"mention_roles":[],"attachments":[{"id":"1486191248791441449","filename":"2026-03-25_10.27.52.png","size":118758,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1486191248791441449/2026-03-25_10.27.52.png?ex=69faa875&is=69f956f5&hm=e56cdc14ba3e27f83def376582b8361d6c3928ed9d9622b5ce32b71dd17c65cf&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1486191248791441449/2026-03-25_10.27.52.png?ex=69faa875&is=69f956f5&hm=e56cdc14ba3e27f83def376582b8361d6c3928ed9d9622b5ce32b71dd17c65cf&","width":1942,"height":488,"content_type":"image/png","content_scan_version":4,"placeholder":"OQgGCoCbiIh7ePeIbXDWAmU=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-25T02:33:25.870000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1486191249043230861","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_d -26 VCX十倍溢价，不要购买！ @everyone \n\n昨日操作\n\n昨天太空板块疯涨，我没有任何操作，也没有任何做日内的想法。我认为这个位置去选择作日内难度很大，因为不管是SATS还是RKLB其实位置相对都不算很高，就算有的朋友想要做日内，最好也是等待股价继续涨更多再考虑。保持RKLB SATS的仓位对我来说很重要，我不会轻易去冒险做T。\n\n今天早上我在盘后买入了少量MU，基本完成了我的“为父母做的一个投资实验”仓位。买入MU是看到最近出现了下跌，特别是市场因为担心谷歌发布的TurboQuant 的极限压缩算法会导致“内存硬件需求减少”。虽然这个算法确实可以让谷歌省一些内存，但是它主要影响“推理”，不影响“训练”，更多的还是类似DeepSeek一样的情绪恐慌。","mentions":[],"mention_roles":[],"attachments":[{"id":"1486560107956535486","filename":"2026-03-26_10.28.34.png","size":142927,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1486560107956535486/2026-03-26_10.28.34.png?ex=69faae7c&is=69f95cfc&hm=eebdfab3f5e44c0cd27e2b9bc237fa656801cc217db63637090e47526a1e0f23&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1486560107956535486/2026-03-26_10.28.34.png?ex=69faae7c&is=69f95cfc&hm=eebdfab3f5e44c0cd27e2b9bc237fa656801cc217db63637090e47526a1e0f23&","width":1948,"height":592,"content_type":"image/png","content_scan_version":4,"placeholder":"OAgGCoDvho2MaNeIfYDlAWM=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-26T02:59:08.748000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1486560108207931552","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nVCX 何方神圣！\n\n这支私募打包上市，从几天前的30块涨到了昨天收盘380。\n- 今年2月15号公司明确在文件上说持有公司的净值为542m，那么假设一个月过去了，涨了点，我给他700m也就是7亿美金。\n- 公司现在的市值接近为80-100亿美金，具体数字很多网站没显示，所以我给个大概。\n也就是说，现在公司市值是公司净资产价值的10倍数以上，或者说市场给了这家公司10倍数的溢价。\n- 作为参考，另一支大家熟知的同类型公司DXYZ，它的溢价倍数是1.5-2倍。\n\n这样的公司，千万不能追高，追高就要做好挨打的准备。我早上尝试卖空，但是因为刚上市，根本没有股票可以借出来卖空，流通股的数量也少，这也是为什么股价可以被炒作得如此高的一个原因。\n\n感谢大家！","mentions":[],"mention_ro image/png","content_scan_version":4,"placeholder":"BggCBwCYBzl1iHmDZ4l3Z3eItXQIAAAA","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-26T03:00:25.102000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1486560428460085270","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n关于战争对美股的影响，我分享一些数据和信息，这是部分我坚持三月保持乐观的一个基础。\n\n下面的图片展示了朝鲜战争和美股的走势对比图。除此之外，华尔街传奇投资人、前摩根士丹利首席全球策略师巴顿·比格斯的经典著作《二战股市风云录》通过大量复盘二战期间各国股市的走势，发现了一个规律：市场往往在消息最令人绝望时见底，在胜利看似唾手可得时见顶。具体来说：英国股市在 1940 年夏天、Battle of Britain 最黑暗阶段前后附近见底；美国市场在 1942 年春、太平洋战局真正改善前见底；德国市场则在 1941 年秋已隐约反映对苏攻势见顶\n\n市场最害怕的是“未知”。当战争等黑天鹅事件爆发初期，恐慌情绪会主导市场进行无差别抛售。但一旦战局逐渐明朗（即使战争仍在继续，比如仁川登陆 Inchon 后），市场不仅会收复失地，还会开启新一轮上涨。\n\n股市是向前看的。一旦战争常态化，地缘冲突对大盘的冲击力就会边际递减。市场的核心定价逻辑会迅速从“战争恐慌”回归到美国本土的宏观经济、企业盈利以及美联储的货币政策上。\n\n战争本质上伴随着巨大的政府财政支出。国防预算的激增、军工订单的爆发以及战时经济的动员，实际上对国内工业、航空航天和科技制造等板块起到了强烈的刺激作用。这种财政扩张往往会转化为相关上市公司的盈利增长，从而推高大盘指数。","mentions":[],"mention_roles":[],"attachments":[{"id":"1486565797097771030","filename":"4b88df2a72be632e6703dac22984dbf0.png","size":256608,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1486565797097771030/4b88df2a72be632e6703dac22984dbf0.png?ex=69fab3c9&is=69f96249&hm=28bd9b072957ed8dee488054c0cf204281cba310400bfbaa8975e938b15bf5a9&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1486565797097771030/4b88df2a72be632e6703dac22984dbf0.png?ex=69fab3c9&is=69f96249&hm=28bd9b072957ed8dee488054c0cf204281cba310400bfbaa8975e938b15bf5a9&","width":3200,"height":1800,"content_type":"image/png","content_scan_version":4,"placeholder":"/fcBBIC0bmPgjlK8Pk5nsn8m+w==","plac
