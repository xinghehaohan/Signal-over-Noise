l_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月13日-2026-04-13T06-45-12-07-00- 下一支翻倍的太空公司？# 核心观点\n\n1. **卫星通讯行业竞争格局及公司财务对比**  \n   - 主要竞争者包括Starlink、Viasat（VSAT）、Iridium（IRDM）、Globalstar（GSAT）和AST SpaceMobile（ASTS）。  \n   - 2025年预测营收方面，Starlink领先（104亿美元），其次是Viasat（46亿美元），Iridium（8.7亿美元），Globalstar（2.7亿美元），AST SpaceMobile最低（0.7亿美元）。  \n   - 盈利能力方面，唯有Iridium实现净利润（1.14亿美元），其他公司均处于亏损状态，尤其AST SpaceMobile亏损最严重（-4.6亿美元）。  \n   - 现金储备及市值差异明显，AST SpaceMobile市值最高（362亿美元）但营收最少，反映市场对其未来潜力的期待；Globalstar现金几乎耗尽但市值达94亿美元。  \n\n2. **股票价格表现与投资价值**  \n   - 过去一年股价涨幅最高的是Viasat（580.99%），其次为AST SpaceMobile（310.11%）和Globalstar（279.07%）；Iridium涨幅最低（41.61%）。  \n   - 尽管Iridium股价涨幅最小，但其稳健盈利和较低估值为投资者提供了潜在安全边际。  \n   - 股价波动与业务进展紧密相关，特别是Iridium因手机直连卫星项目失败导致2023年股价大幅下跌，随后进入调整期并开始回升。  \n\n3. **Iridium公司历史及转型路径**  \n   - 起源于1987年摩托罗拉工程师的构想，最初计划发射77颗卫星形成全球覆盖。  \n   - 1998年商业运营后，由于地面蜂窝网络快速发展和高昂终端费用，Iridium于2001年破产，随后被私有投资者以极低价收购，成为国防和军事的重要通信资产。  \n   - 2006年Matt Desch加入并任CEO，推动公司上市及业务转型，重点发展物联网（IoT）数据和宽带服务，用户规模从15万增长至250万。  \n   - 通过Iridium NEXT二代星座计划和与SpaceX合作，显著提升卫星性能和资本效率。  \n\n4. **频谱资源及轨道架构对公司未来影响**  \n   - L波段（1-2 GHz）频率穿透力强、适合手机直连卫星通讯，是Iridium和Globalstar的核心频谱资源。  \n   - Viasat拥有丰富低频段频谱（82 MHz），通过收购Inmarsat加强频谱储备，布局D2D（手机直连）和IoT市场。  \n   - Globalstar采用LEO弯管架构，推动频谱地面蜂窝化并实现商业化5G/Wi-Fi网络延伸。  \n   - Iridium独有星间交叉链路的轨道架构支持全球无死角覆盖，包括极地，形成政府和军事通信的护城河。  \n\n5. **业务细分及增长驱动**  \n   - Iridium业务主要分为商业收入（71%）和政府收入（29%）。商业收入中语音与数据服务占27%，IoT数据服务占21%，宽带服务占6%。  \n   - 虽然Starlink在宽带领域占据优势，但Iridium依靠L波段在恶劣海况下的可靠性和政府市场的特殊需求保持竞争力。  \n   - IoT数据业务增长最快，成为公司未来收入增长的主要驱动力。  \n\n6. **投资风险与市场前景**  \n   - 卫星通讯行业面临高资本开支周期，Iridium需持续投入巨额资金更新星座。  \n   - 频谱资源稀缺且政策监管严格，尤其政府合同和安全审查是进入壁垒。  \n   - 手机直连卫星（D2C）技术路线存在不确定性，Iridium该方向尝试失败后转向3GPP标准化，专注NB-IoT和救援功能。  \n   - 市场对卫星宽带的需求增长迅速，但竞争加剧，尤其来自Starlink和Viasat。  \n\n# 关键结论\n\n1. **Iridium是卫星通讯领域为数不多实现持续盈利的公司，依托其独特的频谱资源和轨道架构，拥有坚实的政府合同基础和商业客户群，具备较强护城河。**  \n2. **Starlink凭借规模优势和技术背书，未来营收潜力巨大，但尚未上市且未盈利，投资风险较高。**  \n3. **Viasat作为传统卫星宽带服务商，虽然面临亏损，但通过频谱收购和合作拓展新业务，有望实现反转增长。**  \n4. **Globalstar和AST SpaceMobile虽有一定市场潜力，但现金状况和盈利能力尚需观察，尤其AST SpaceMobile属于高风险的PPT概念公司。**  \n5. **频谱资源的类型和轨道架构的差异决定了各公司未来的市场定位和技术路线，低频L波段因其穿透力和稳定性，被视为未来物联网和紧急通讯的重要频段。**  \n6. **Iridium的转型策略从传统卫星电话转向物联网和宽带服务，尽管遭遇技术挫折，但通过标准化和资本投入，有望实现业务稳健增长。**  \n7. **投资者应关注公司财务健康状况、频谱资源稀缺性、政府合同比例及市场竞争态势，兼顾成长性和安全边际。**  \n\n# 重要细节\n\n1. **公司营收与财务状况**  \n   - Starlink 2025年营收预测104亿美元，未披露净利润。  \n   - Viasat 2025年营收46亿美元，净亏损3.39亿美元，现金13.46亿美元，市值76亿美元。  \n   - Iridium 2025年营收8.7亿美元，净利润1.14亿美元，现金0.97亿美元，市值36亿美元。  \n   - Globalstar 2025年营收2.7亿美元，净亏损0.09亿美元，现金几乎耗尽（0.007亿美元），市值94亿美元。  \n   - AST SpaceMobile 2025年营收0.7亿美元，净亏损4.6亿美元，现金23.4亿美元，市值362亿美元。  \n\n2. **股价表现与投资者观点**  \n   - 过去一年股价涨幅：Viasat最高580.99%，AST SpaceMobile 310.11%，Globalstar 279.07%，Iridium最低41.61%。  \n   - Iridium股价2023年高点超60美元，后因手机直连项目失败跌超70%，经历震荡调整，2024年下半年回升突破30美元。  \n   - 分析师持仓约3%，平均成本29美元，认为存在安全边际但不会过度加仓。  \n\n3. **Iridium业务结构及客户**  \n   - 政府合同收入占比由2021年的21%提升至2025年的29%，核心合同包括EMSS（1.105亿美元/年）、SDA、ECS3和SITH。  \n   - 商业客户涵盖航海、民航、采矿、应急救援等领域，IoT客户有卡特彼勒等重工企业。  \n   - 宽带业务受Starlink冲击较大，海上宽带由主连接转为备用连接。  \n\n4. **技术与轨道架构**  \n   - Iridium NEXT星座由80颗卫星组成（66主力+14备份），2017-2019年部署完毕，设计寿命12.5年延长至17.5年，未启用备份卫星。  \n   - 独有星间交叉链路实现全球无死角覆盖，包括极地，区别于Globalstar的弯管架构和Viasat的GEO卫星。  \n\n5. **频谱资源详细情况**  \n   - L波段：1-2 GHz，穿透性强，适合手机直连卫星通讯，Iridium拥有8.725 MHz，Globalstar约8 MHz，Viasat拥有68+14 MHz带宽。  \n   - S波段：Globalstar拥有16.5 MHz，纳入3GPP Band n53国际标准；Viasat持有30 MHz。  \n   - 高频段K波段（18-27 GHz）和Ka波段（27-40 GHz）带宽大但穿透性差，商业价值较低。  \n\n6. **市场与技术趋势**  \n   - Globalstar推动频谱地面蜂窝化，结合私有5G/Wi-Fi网络，拓展通信生态。  \n   - Iridium转型放弃高通非标准方案，推进3GPP标准化（Project Stardust），专注窄带IoT和救援功能。  \n   - Viasat与Space42合资成立EquityS公司，打造“太空铁塔”共享基础设施，利用Ka波段提升飞机和船舶的高速互联网连接能力。  \n\n7. **投资风险点**  \n   - 高资本开支周期，Iridium2021年资本支出4,210万美元，预计2025年增至1亿美元左右。  \n   - 政府合同依赖度高，政策变化可能带来风险。  \n   - 频谱资源稀缺，频谱价值高且受监管限制。  \n   - AST SpaceMobile作为概念股，风险极高且尚未盈利。  \n\n8. **行业对比与未来展望**  \n   - Starlink凭借SpaceX强大技术支持和规模优势，有望成为卫星宽带市场的主导者。  \n   - Viasat通过频谱并购和合资合作，积极布局物联网和手机直连市场。  \n   - Iridium专注于物联网和政府市场，业务稳健但成长速度有限。  \n   - Globalstar或因被苹果或亚马逊收购而获得新发展机遇。  \n   - 投资者需综合考虑各公司技术路径、财务健康、频谱资源和市场定位，权衡风险与回报。","mentions":[],"mention_roles":[],"attachments":[{"id":"1493367666759700550","filename":"2026413-2026-04-13T06-45-12-07-00-_.mp4","size":54071869,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1493367666759700550/2026413-2026-04-13T06-45-12-07-00-_.mp4?ex=69fb0ec5&is=69f9bd45&hm=f1e1aa1cdeae9f306868616356d2a4806b04651b08727e4bce37995eeff3ff15&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1493367666759700550/2026413-2026-04-13T06-45-12-07-00-_.mp4?ex=69fb0ec5&is=69f9bd45&hm=f1e1aa1cdeae9f306868616356d2a4806b04651b08727e4bce37995eeff3ff15&","width":1920,"height":1080,"content_type":"video/mp4","original_content_type":"video/mp4","content_scan_version":4,"placeholder":"G1UBHITQRVyIxFZZS6V39ktHvw==","placeholder_version":1,"title":"2026年4月13日-2026-04-13T06-45-12-07-00- 下一支翻倍的太空公司？"},{"id":"1493367670010019840","filename":"2026413-2026-04-13T06-45-12-07-00-__.pdf","size":1442574,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1493367670010019840/2026413-2026-04-13T06-45-12-07-00-__.pdf?ex=69fb0ec5&is=69f9bd45&hm=7b06c2ab562e8d3228823b9631ddee8624c1d2c0c252ab4e92b24a6c531fd35b&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1493367670010019840/2026413-2026-04-13T06-45-12-07-00-__.pdf?ex=69fb0ec5&is=69f9bd45&hm=7b06c2ab562e8d3228823b9631ddee8624c1d2c0c252ab4e92b24a6c531fd35b&","content_type":"application/pdf","original_content_type":"application/pdf","content_scan_version":4,"title":"2026年4月 id":"1493797420595679382","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nRKLB 霍尔卫星推进器 & Mynaric收购官宣\n\nRKLB新发布霍尔推进器Gauss\n喜欢RKLB公司的朋友，这是好消息，因为进一步证明，只要力所能及时间允许，公司都是内生增长，而不是野蛮收购。\n燃料：RKLB Gauss 主要使用氙气（Xenon），兼容氪气（Krypton）。氙气是霍尔推力器性能最完美的推进剂，但致命缺点是极其昂贵且稀缺；而SpaceX 从氪气（Krypton）全面转向相对非常便宜的氩气（Argon）换取供应链的- 极致成本压缩。\n- 量产规模：RKLB Gauss 目标是每年超过 200；SpaceX 霍尔推力器的产能是每年数千台，基本都是自用。\n- 产地：RKLB Gauss 在新西兰生产，可自由销售给海外的卫星制造商和国际星座项目；SpaceX 推进技术、卫星总线甚至加密通信链路，均与美国国防部有着极深的绑定，受到极度严格的 ITAR 管制，技术基本锁死在美国本土。\n\nMynaric收购细节披露\n- 总价 1.553 亿美元，由两部分组成：\n- 现金：一笔象征性的现金付款，金额暂时未知\n- 股份：228万股 Rocket Lab 的普通股","mentions":[],"mention_roles":[],"attachments":[{"id":"1493797559129604246","filename":"HF5Ct-aasAAIGWl.jpeg","size":1382760,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1493797559129604246/HF5Ct-aasAAIGWl.jpeg?ex=69faa4e3&is=69f95363&hm=08749cb7b246ff57fe7d90b45a7b704c586e9417e1efa71d43c0e25be593b3de&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1493797559129604246/HF5Ct-aasAAIGWl.jpeg?ex=69faa4e3&is=69f95363&hm=08749cb7b246ff57fe7d90b45a7b704c586e9417e1efa71d43c0e25be593b3de&","width":4096,"height":4096,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"CQgKFwZ+3HjPqnmXapVopneIR0B0BVQG","placeholder_version":1},{"id":"1493797560127590470","filename":"2026-04-15_9.39.00.png","size":3431474,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1493797560127590470/2026-04-15_9.39.00.png?ex=69faa4e3&is=69f95363&hm=b0a56c8b514670a58574d31dca3a7166197dc89a6622b9fcea58e71e915ca785&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1493797560127590470/2026-04-15_9.39.00.png?ex=69faa4e3&is=69f95363&hm=b0a56c8b514670a58574d31dca3a7166197dc89a6622b9fcea58e71e915ca785&","width":5120,"height":2880,"content_type":"image/png","content_scan_version":4,"placeholder":"CfcJHII/hHmreIdiq2WQVAs61A==","placeholder_version":1}],"embeds":[],"timestamp":"2026-04-15T02:18:11.939000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1493797560916250745","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n半导体上游的小盘股：ICHR & UTCC\n\n我昨天花了些时间研究 ICHR 和 UTCC两家公司，重点是 ICHR，因为它市值更小，更具备反转爆发的潜力。下面的额信息作为大家的参考，如果你想要投资，请控制风险，因为这两家公司过去2-3年都在亏本。现在要投资就是博一个反转，EPS从负数再次转为正且持续爆发的反转。两家公司股价都已经从底部上涨了不少。\n\n业务 & 客户：ICHR 和 UCTT 作为半导体设备流体子系统的专业供应商，为行业双寡头格局。主要客户都是泛林集团 Lam Research 和应用材料 Applied Materials，这两个公司占了ICHR 和 UCTT的绝大部分营收，第三是阿斯麦。\n\nOEM 在流体子系统业务上的历史：大约25年前，这些业务都是泛林集团和应用材料内部自己做，但为了降低固定成本、缩短开发时间并聚焦于自身的核心增值工艺，半导体设备OEM将业务外包。\n\n垂直整合收购：ICHR 和 UCTT 均通过不断并购实现了业务扩张，其中 UCTT 在近年拓展了零部件清洗等高纯度服务业务，而ICHR 进军精密加工领域既是为了实现核心流体系统的内部自供以降低供应链成本，也是为了向半导体下游工艺和航空、医疗等非半导体领域拓展外销。\n\n周期性危机：过去几年，受半导体行业资本支出周期性波动的影响，ICHR 在需求疲软期会面临产线利用率不足的风险，从而拖累利润和毛利率。为应对产能闲置与需求挑战，ICHR 在2025年启动了重组计划，通过关闭苏格兰和韩国的设施并将制造活动转移到扩建的高产量工厂来提升整体运营效率。\n\n现在客户需求强劲：泛林集团和应用材料现在面对客户对于半导体设备的需求激增，它们缺乏资源和意愿重新自建产能，因而会更倾向于依赖专业供应商灵活且快速的交付能力。\n\nICHR 轻资产而非重资产：ICHR 长期以极低的资本支出（通常仅占销售额的 1% 至 4%）维持了轻资产、低固定成本且高可扩展的财务与商业模式。这种轻资产模式之所以成立，是因为其核心业务是高端系统的无尘室集成与组装，面对激增订单时主要依靠调配供应链和增加熟练人工，而无需大规模购买重型机器。\n\nICHR 技术护城河：公司的生产流程极其灵活，工程师在产品设计初期就作为客户团队的延伸深度介入，使得产品的“订单到交付”周期通常不到四周。限制公司大规模产能爆发的真正硬性瓶颈，不是无尘室车间面积，而是上游外部精密零部件的交货速度以及熟练劳动力。因为公司的竞争护城河在很大程度上并未依靠专利，而是深深绑定在少数核心工程师的设计知识，以及一线熟练工人的复杂制造工艺中的经验。ICHR最终产品的生产，其实是多种上游部件的集合，而非从原始材料开始的生产。\n\nICHR 的产能布局：美国主要作为顶尖工程研发基地，以便于紧贴泛林和应用材料等头部客户的总部进行协同开发。墨西哥、马来西亚等地承载了零部件的大规模基础制造，而新加坡工厂则是进行系统总装测试并向亚洲乃至全球交付最高附加值产品的核心枢纽。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-15T02:18:42.019000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1493797687080779898","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n.........\n\n量子计算起来了？追IONQ？\n\n昨天英伟达正式发布了 Ising，这是全球首款专为加速量子计算而设计的开源 AI 模型系列。借助 Ising，AI 将成为量子机器的控制系统，把脆弱的量子比特转化为可扩展、高可靠性的量子-GPU系统。简单来说，量子计算机现在最大的物理瓶颈就是量子比特极其脆弱，极易受到环境噪声干扰而产生错误。英伟达发布的 Ising 模型，就是用当前最强的人工智能去“稳住”和“纠正”量子硬件的物理状态。\n\n黄仁勋的行动证明了，他以及英伟达看好未来量子计算，想要参与其中，这对量子计算是好事，某种程度说明了量子计算并非伪命题。如果你要追量子，是可以的，首选还是头号炒作选手IONQ。而且我之前分享过，IONQ具备太空量子计算的炒作潜力。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-15T02:19:24.093000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1493797863552192524","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n.........","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-15T02:20:15.309000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1493798078367662151","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nEOSE股东大会暗示了未来的股票增发\n\nEOSE发布了股东大会的几项提议，其中一项是请求股东批准修改公司章程，将公司授权发行的普通股数量上限从 6 亿股增加到 8 亿股（即新增 2 亿股的授权额度）。这明确意味着公司未来几乎肯定会增发股票。 \n\n公司目前的股票额度已经告急，在现有的 6 亿股额度中：\n- 已发行： 约 3.37 亿股。\n- 已预留： 约 2.21 亿股（用于之前的认股权证、期权、限制性股票和2025年5月的可转债）。\n- 剩余可用： 仅剩约 4196 万股（仅占总授权额度的 7%）。\n- 公司在 2025 年 11 月发行了一笔新的可转债。如果这笔债券全部转换为股票，最多需要约 4694 万股。因为公司目前只剩下 4196 万股的额度，已经不够支付这笔可转债了。如果这个提案不通过，公司将被迫使用大量现金来偿还这笔债务，这会严重消耗公司的现金储备和资产负债表。\n\n有这家公司股票的朋友，可能需要做好在股价涨起来之后，公司选择增发的准备。比如，一季度财报，如果数据好，股价张，不排除公司立即选择增发。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-15T02:20:26.906000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1493798127009009768","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-04-16 享受上涨不减仓；特斯拉爆冲后继续持有等待财报；HIMS催化剂落地！ @everyone \n\n为什么不减仓？\n经过这一轮指数暴力拉升，我的账户情况：\n- YTD +15%\n- 一些新仓位收益很不错，但是因为仓位不算很大，我觉得继续持有博取更高收益是目前更好的选择，其中 IRDM 38%；EOSE 17.5%；NVDA 15%；TMDX 13%；PLTR 6%。\n- 超级重仓的RKLB股价还行但是显然还没到减仓的时候，我选择继续等待。\n- TSLA虽然昨天反弹了，不过不到400的价格也没有达到我想减仓的位置。\n\n基于以上，现在我继续享受市场，没必要自己吓自己。如果有回调，幅度不大，我不动，幅度过大，我在来考虑减仓 IRDM ROSE TMDX PLTR这些股票。如果你们手里的股票，特别是投机的，收益达到了30-50%以上，适度减仓肯定ok，特别是仓位重的朋友。\n\n特斯拉爆冲\n\n昨天特斯拉大涨，除了昨天大盘科技股整体受到资金追捧以外，就是AI5芯片定版的确认！马斯克说AI5将用于机器人和算力，而且马斯克现在非常自信目前的AI4已经能够支持FSD的表现。这里的AI5将由三星和台积电代工，早前宣布的TeraFab还只是雏形。不过我们越来越确定的是，不管对SpaceX，还是对特斯拉，芯片的重要性只会有增无减，因为芯片的能力包括性能和产能，直接决定了特斯拉和SpaceX产品的品质，这些产品包括电车、人形机器人、地面和太空的算力部署。下周是特斯拉财报，我们特斯拉长期投资者要做的仅仅是等待，我不会做任何财报前的操作。\n\nHIMS爆发\n\n昨天，FDA正式宣布，将12类小分子多肽药物从管制名单移除，最快下半年开始可以正式生效，意味着像HIMS这样拥有复方药房的公司可以在生效后销售这些多肽产品。我在三月和大家科普过，我也说了这是HIMS的催化剂之一，现在催化剂落地，利好整个远程医疗行业，因为这是全新的增长点。最近我比较少说HIMS，但是继续持有且长期持有的观点不变，除非实现大幅度盈利，不然不会考虑在亏损状态再次减仓。","mentions":[],"mention_roles":[],"attachments":[{"id":"1494158058836856912","filename":"2026-04-16_9.03.29.png","size":1030494,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1494158058836856912/2026-04-16_9.03.29.png?ex=69faa321&is=69f951a1&hm=04b761f4412ce8626aac12305705bcd5ab78bdda0c1f3f894ecc9970cb71c755&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1494158058836856912/2026-04-16_9.03.29.png?ex=69faa321&is=69f951a1&hm=04b761f4412ce8626aac12305705bcd5ab78bdda0c1f3f894ecc9970cb71c755&","width":2202,"height":2366,"content_type":"image/png","content_scan_version":4,"placeholder":"BwgGBwAbBxaEiHiDaZh4yIeBBAAAAAAA","placeholder_version":1}],"embeds":[],"timestamp":"2026-04-16T02:10:41.442000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1494158059260477581","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n我决定132追高买入200股SATS以维持至少10%的仓位的目标。\n\n首先，最近卫星相关股票的持续强势给了我更多信心，再加上亚马逊确定收购GSAT，这让整个太空卫星板块特别是拥有频谱的公司有了更强大的投资基本面基础。\n\n其次，我之前的看涨期权已经获利了结，现在持有的sell put不管是125还是110的行权价，我都有相当的信心在七月到期的时候可以全部获得权利金。再加上之前正股止盈部分，成本安全边际较高。目前追高一点仓位毫无压力。\n\n最后就是接下来的催化剂，预计两周之内星舰新的一次发射会进行，现在一级和二级静态点火测试看起来都是顺利的。然后我对于FCC批准频谱交易预期，依然是六月以前。\n\nSATS 130的价格显然仍然远低于我的期望价格。我认为仍有向上空间，而向下的空间非常有限。这样的情况也特别适合做sell put。期权有风险，请大家自己把握。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-16T04:17:05.596000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1494189869507936272","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n这里有一个投资机会。\n\n马斯克的Terafab团队已经在接触包括泛林半导体以及应用材料在内的芯片设备制造商，询问机器的交期。这和我之前说的一样，我认为像阿斯麦的光刻机等关键器械一定是Terefab在某种程度上需要的，要么是通过晶圆厂商，比如说现在合作的英特尔间接去使用，要么是自己购买直接使用。所以这里存在着一半投机一半投资的机会。\n\n投资有风险，只是把可能的机会分享给大家。我自己本身对这块的了解还是有所欠缺的，之前和大家分享过ICHR这家公司，作为参考。","mentions":[],"mention_roles":[],"attachments":[{"id":"1494255000233447434","filename":"IMG_0578.jpg","size":101421,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1494255000233447434/IMG_0578.jpg?ex=69fafd69&is=69f9abe9&hm=54829f5ff36003002b22b53ab7ab8a0e3bc0f6ceec7a078b18ae1ee35ace54ac&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1494255000233447434/IMG_0578.jpg?ex=69fafd69&is=69f9abe9&hm=54829f5ff36003002b22b53ab7ab8a0e3bc0f6ceec7a078b18ae1ee35ace54ac&","width":1179,"height":1171,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"+vcFB4CCh6l4dXd6hqdWeHiQic0J1s8C","placeholder_version":1}],"embeds":[],"timestamp":"2026-04-16T08:35:54.018000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1494255000430575688","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-04-17 太空板块喷发，68%仓位太空带动 YTD 收益达到 22%！\n\n还是不减仓？\n昨天说了不减仓的原因，今天我还是不动，原因和昨天大差不差，补充一些我重仓的太空板块依然不减仓原因。我的太空 RKLB 53% SATS 10% IRDM 5%的仓位，总和68%，我认为太空还不到减仓的时候。具体来说这几个个股：\n- RKLB最近连续发布新产品，但是我在等的真正的好消息还没落地，我要等RKLB手握14亿现金到底用作什么。不知道要多久，但是在80出头的价格、在Mynaric收购确定、在Peter Beck昨天连续接受访谈释放积极信号、在10亿美金增发已经被市场消化的现在，我觉得这不是最佳的卖出时机。\n- SATS我在昨天132逆势加仓，持有SATS的朋友可能觉得憋屈，因为还是没大涨。持有SATS需要耐心，也不能期待过高收益，我把它当做现金，降低预期，但是依然等待惊喜。\n- IRDM我在个股分析视频发布前买入，个股分析视频之后不少朋友跟单了，它的走势目前看来在复刻VSAT，我的仓位不多，我的目标也很明确，等下周财报，等待可能的未来60以上的历史新高，再考虑卖出。\n\n当然，一切要看个人的仓位和想法，以上仅是我的持仓风格和目前的思路。\n\n哪些还能买？\n- SATS，上行空间比下行空间大，昨天我阐述了具体原因：“首先，最近卫星相关股票的持续强势给了我更多信心，再加上亚马逊确定收购GSAT，这让整个太空卫星板块特别是拥有频谱的公司有了更强大的投资基本面基础。其次，我之前的看涨期权已经获利了结，现在持有的sell put不管是125还是110的行权价，我都有相当的信心在七月到期的时候可以全部获得权利金。再加上之前正股止盈部分，成本安全边际较高。目前追高一点仓位毫无压力。最后就是接下来的催化剂，预计两周之内星舰新的一次发射会进行，现在一级和二级静态点火测试看起来都是顺利的。然后我对于FCC批准频谱交易预期，依然是六月以前。SATS 130的价格显然仍然远低于我的期望价格。我认为仍有向上空间，而向下的空间非常有限。这样的情况也特别适合做sell put。期权有风险，请大家自己把握。”\n- HOOD，长期持有可以买，但是短期真不好说，我也想买，但是仓位太满了，暂时就不动了。\n- CRCL，100左右或者低于100我觉得盈亏比还不错，上看135，下到83，有仓位可考虑。\n- TMDX，昨天股价大跌，100出头可考虑。\n- TeraFab概念：设备OEM龙头是LRCX AMAT ASML，然后就是我分享的ICHR。请注意，ICHR是小盘股，波动会比较大，如果要做止损设置，可能需要忍受至少20%的亏损或者回撤。我有空会继续挖掘这个板块，早期我强烈看好的INTC买入之后已经超过50%涨幅，我的特别仓位ASML+MU+INTC+NVDA目前收益是25%。\n\n感谢大家！特别是在前面几个月艰难时刻，很多会员朋友都坚持了下来，现在基本上盈利都得到了好转。虽然我仍然有10%多一点的融资，还是提醒大家，长期来看不上融资、逢低买入然后持有，还是最笨最简单的投资方法。 @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-17T02:27:56.455000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1494524788285378611","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月17日-2026-04-17T01-20-02-07-00- 和SpaceX完全不同的策略，听完你不会再质疑RKLB！# 核心要点\n\n1. **公司战略定位**  \n   火箭实验室（Rocket Lab，简称RKLB）定位为太空基础设施提供商，采用“卖铲子”的商业模式，即专注于提供基础设施和核心子系统，而非完整的终端服务。CEO Peter Beck明言：“我们卖的是每个人挖金矿用的铲子”，体现出其差异化竞争策略，避免与SpaceX直接竞争。\n\n2. **近期动态与资金状况**  \n   - 完成对德国激光通讯公司Mynaric的收购，获得星间链路激光通讯能力。  \n   - 发布自主研发的霍尔推进器，解决卫星平台推进系统关键技术短板。  \n   - 获得美国太空发展局（SDA）第三批10亿美元合同。  \n   - 完成总额10亿美元的融资计划，已到账4.74亿美元，剩余部分通过股票权益领策略（ATM增发+权益领配）锁定63.6-86.2美元价格区间。\n\n3. **核心技术系统构成**  \n   火箭实验室的卫星平台核心系统包括推进系统、姿态控制系统、电源系统、通信系统和分离系统。  \n   - 推进系统采用最新发布的霍尔推进器，推力为39牛顿，设计产能为200台/年，未来可扩展至2000台/年，支持量产。  \n   - 姿态控制系统通过2020年收购加拿大Sinclair公司获得反作用轮技术。  \n   - 电源系统通过2022年收购SolAero获得太阳能电池板技术。  \n   - 通信系统通过收购Mynaric获得激光通讯终端能力。  \n   - 分离系统为自主技术。  \n   - 有效载荷方面，通过收购GEOST和Optical Support获得光电和红外传感器系统。\n\n4. **与SpaceX的差异化**  \n   - 产品定位：SpaceX主要面向自用的重型卫星，推力170牛顿的霍尔推进器；火箭实验室则面向中小客户，提供标准化推力39牛顿的推进器。  \n   - 商业模式：SpaceX垂直整合全产业链；火箭实验室专注于基础设施提供，避免直接竞争。  \n   - 全球供应链布局：火箭实验室供应链分布在新西兰（电推）、德国（激光通讯）、加拿大（反作用轮）等多个国家，体现出全球化战略。\n\n5. **股价及市场表现**  \n   - 当前股价约82.93美元，单日涨幅13%。  \n   - 股票权益领策略封顶价为86.2美元，接近这一价格可能触发剩余融资的行权。  \n   - 历史筹码峰集中在47.8-53.2美元区间。  \n   - 市场已基本消化融资带来的压力，投行对股价的看法较为乐观。\n\n6. **资金用途及未来展望**  \n   - 预计筹集的10亿美元资金将用于新收购或产能扩张。  \n   - 公司采用灵活的ATM增发及权益领策略组合，增强资金调度能力。  \n   - 公司及投行对股价达到86.2美元以上充满信心。  \n   - CEO观点表明短期专注基础设施建设，长期或涉足应用领域。\n\n# 关键结论\n\n1. **差异化定位确保竞争优势**  \n   火箭实验室通过“卖铲子”的模式，专注于基础设施和子系统，避免与SpaceX的终端服务形成直接竞争，从而在太空行业找到独特且稳定的市场定位。\n\n2. **技术体系完整且具备量产能力**  \n   通过一系列战略收购和自主研发，火箭实验室已经构建了涵盖推进、姿态控制、电源、通信、分离及有效载荷的完整卫星平台技术体系。尤其是霍尔推进器和激光通信技术的突破，解决了行业长期的技术瓶颈，具备大规模量产潜力。\n\n3. **全球供应链布局强化竞争壁垒**  \n   多国供应链协同构成了火箭实验室的竞争优势，降低了单一地区风险，提升了技术整合与创新能力，也为客户提供了可靠的多样化服务。\n\n4. **融资计划推动未来发展**  \n   10亿美元的融资计划为公司后续的收购扩张和产能提升提供了坚实资金保障，市场对融资后的股价表现持积极态度，体现出投资者对公司未来成长性的认可。\n\n5. **市场和股价表现稳健，操作建议审慎观望**  \n   基本面改善明显，融资压力已被市场消化，股价接近融资封顶价，短期内投资者应保持持仓观望态度，待资金用途进一步明确后再考虑部分止盈。\n\n6. **未来发展潜力巨大**  \n   随着卫星商业化需求增长及技术进一步成熟，火箭实验室有望从基础设施供应商向应用领域拓展，形成更丰富的业务生态，提升长期价值。\n\n# 重要细节\n\n1. **技术收购时间线**  \n   - 2019年至2026年间，火箭实验室通过收购整合完成了大部分核心子系统布局。  \n   - 2020年收购Sinclair公司，获得反作用轮技术。  \n   - 2022年收购SolAero，获得太阳能电池板技术。  \n   - 近期收购德国激光通讯公司Mynaric，增强星间链路通讯能力。\n\n2. **霍尔推进器特性**  \n   - 设计推力为39牛顿，适合中小型卫星需求。  \n   - 产能设计为年产200台，具备快速扩展至2000台的能力，支持大规模标准化生产。  \n   - 与SpaceX的170牛顿推力推进器形成差异化市场定位。\n\n3. **激光通讯系统优势**  \n   - 通过收购Mynaric获得先进的星间链路激光通讯终端，解决卫星间高速数据传输瓶颈。  \n   - 技术提升有助于卫星网络的实时互联和数据传递效率。\n\n4. **股价技术面与融资策略**  \n   - 当前股价82.93美元，接近融资封顶价86.2美元。  \n   - 投资银行已完成对冲操作，融资影响已被市场充分消化。  \n   - 历史筹码峰位于47.8至53.2美元之间，表明当前价格较历史水平显著提升。\n\n5. **资金用途具体规划**  \n   - 预计新融资资金将用于未来可能的新收购或产能扩展。  \n   - 资金调度采用ATM增发与权益领策略的混合模式，增强灵活性和风险控制能力。\n\n6. **供应链全球分布**  \n   - 新西兰负责电推系统。  \n   - 德国负责激光通讯系统。  \n   - 加拿大负责反作用轮技术。  \n   - 这种多国分布的供应链布局有助于技术创新和风险分散。\n\n7. **市场竞争格局**  \n   - 火箭实验室服务的中小型客户市场与SpaceX的重型卫星市场形成互补。  \n   - 通过差异化的产品和业务模式，火箭实验室在全球太空基础设施领域占据独特地位。\n\n8. **管理层战略视角**  \n   - CEO强调短期内聚焦基础设施建设，确保核心技术和产品的标准化和量产。  \n   - 长期可能涉足应用层面，扩展业务范围，提升公司竞争力和市场份额。\n\n9. **合同与市场认可**  \n   - 获得SDA第三批10亿美元合同，体现政府及行业对火箭实验室技术和服务的认可。  \n   - 该合同有助于公司稳定收入和技术验证。\n\n10. **投资建议总结**  \n    - 基于基本面改善和融资完成，建议投资者保持持仓观望。  \n    - 股价如突破86美元，可考虑部分止盈锁定收益。  \n    - 关注资金具体用途公告及后续技术和市场进展。\n\n综上，火箭实验室通过差异化定位、技术突破和全球供应链布局，构建了独特的太空基础设施生态，融资成功为其未来扩张和创新提供保障，市场和技术面均体现出较强成长潜力。投资者应根据股价动态和资金用途公告，灵活调整持仓策略。","mentions":[],"mention_roles":[],"attachments":[{"id":"1494931167990906960","filename":"2026417-2026-04-17T01-20-02-07-00-_SpaceXRKLB.mp4","size":82185464,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1494931167990906960/2026417-2026-04-17T01-20-02-07-00-_SpaceXRKLB.mp4?ex=69fad024&is=69f97ea4&hm=e7c7dff001dc0c18e0c8b81db0fef0aa0c371d12d1efb31223937c343e58f785&","proxy_url":"https://media.disc CHR、UCTT）**：两者为行业双寡头，全球化布局降低成本，股价从底部显著反弹，风险较高，适合高风险偏好者。\n   8. **EOSE（EOS Energy）**：4月初业绩超预期，合作利好推动股价上涨，短期机会明显，但管理层风险需警惕。\n   9. **加密货币及策略股（MSTR、CRCL）**：MSTR作为比特币替代投资标的，采取定投策略，CRCL已清仓等待低位买入。\n\n3. **市场环境与风险提示**\n   1. 四月美股市场经历了类似去年反弹，尽管地缘政治（美伊战争）初期带来市场低迷。\n   2. 重点板块和个股均存在技术面短期回调风险，如IRDM单日回撤3.59%，火箭实验室价格区间风险收益比需谨慎。\n   3. 管理层信誉、财报不确定性及政策变化是医药和能源板块需重点关注的风险因素。\n   4. 融资杠杆使用需谨慎，当前现金为负，可能增加市场波动风险。\n\n# 关键结论\n\n1. **整体投资策略有效**\n   1. 坚持逢低买入和适度融资杠杆的策略在当前市场环境下取得显著回报，四月单月收益超过36%，年度收益率接近30%。\n   2. 结构调整优先于减仓，灵活应对市场波动，尤其是在太空和AI板块中调整持仓比例。\n\n2. **太空板块表现抢眼**\n   1. 以火箭实验室（RKLB）、铱辐射（IRDM）、回声星通信（SATS）为代表的太空板块持续上涨，带动主力仓位收益。\n   2. 太空板块具备较强的技术突破和市场催化剂支持，如火箭实验室的现现金用途公布和回声星的频谱交易审批。\n\n3. **AI及半导体板块潜力大**\n   1. 特斯拉和英伟达代表的AI应用及基础设施板块，虽然短期表现波动较大，但长期趋势向好。\n   2. 英特尔受益于Terafab合作项目和制程良率提升，具备长期增长潜力。\n\n4. **医疗健康板块迎政策利好**\n   1. HIMS受FDA多肽药物分类调整利好，商业模式契合医疗自由化趋势，具备中长期成长空间。\n   2. 需关注政策实施时间点及实际营收兑现情况。\n\n5. **加密货币及相关策略稳健推进**\n   1. MSTR作为比特币替代标的，采用持续定投策略，降低成本风险。\n   2. CRCL处于等待回调区间，理想买入区间90-100美元，体现风险收益平衡思路。\n\n6. **风险管理不可忽视**\n   1. 技术面短期回调风险明显，尤其是在连续上涨后的获利回吐压力。\n   2. 管理层风险、财报不确定性和地缘政治因素仍是投资需重点监控的变量。\n   3. 融资杠杆增加潜在风险，投资者应保持仓位控制和风险承受能力评估。\n\n# 重要细节\n\n1. **仓位细节与分布**\n   1. 股票仓位121%，现金负11%，期权负10%，显示融资杠杆使用。\n   2. 太空板块具体分布：火箭实验室53%、AST SpaceMobile 10%、铱辐射4%。\n   3. AI应用持仓：特斯拉23%、PLTR 5%；AI基础设施：英伟达4%、EOSE 2%（新买入）。\n   4. 医疗健康持仓：HIMS 10%、TMDX 2%，加密货币MSTR 6%。\n   5. 特别组合持仓（父母退休基金）：NVDA+ASML+MU+INTC约2.6%，三周收益达25%。\n\n2. **个股具体操作与动态**\n   1. 特斯拉近期财报前暂停操作，考虑在350-360美元区间加仓，财报后若跌破350美元或继续加仓。\n   2. 铱辐射技术面连续上涨，短期出现3.59%单日回撤，持仓建议为安全边际充足下继续持有。\n   3. 火箭实验室近期股价暴涨13%，建议在70美元以下加仓，当前85美元估值风险较大。\n   4. 回声星通信股价创历史新高，讲师已加仓10%，近期有试飞和频谱交易审批催化。\n   5. HIMS形成强势K线组合，FDA政策调整将于2026年下半年正式实施，短期政策预期推动股价上涨。\n   6. 英特尔从20美元起步，涨至最高70美元，Terafab项目带来长期利好，但当前估值偏高，需关注财报和买入时机。\n   7. 半导体流体系统公司（ICHR和UCTT）持续亏损但股价反弹明显，适合高风险投资，需控制仓位。\n   8. EOS Energy合作利好，4月10日追高建仓，需警惕管理层夸大宣传的历史风险。\n\n3. **投资策略细节**\n   1. MSTR采取每月定投7000美元的策略，平均成本200美元，计划在成本以下继续买入，回本后停止加仓。\n   2. CRCL已全部清仓，等待价格回落至90-100美元区间再度建仓，下方支撑83美元，上方压力135美元。\n\n4. **技术面与市场情绪**\n   1. 铱辐射周线图显示20周均线确立向上趋势，技术形态良好，历史走势类似VEL SAT。\n   2. 火箭实验室基于差异化竞争策略，不担心SpaceX上市带来的压力。\n   3. 医疗健康板块多肽药物领域为蓝海市场，缺乏大型临床数据，但市场潜力大。\n\n5. **政策与外部环境影响**\n   1. 美伊战争初期市场低迷，但四月出现反弹，类似去年行情。\n   2. FDA调整多肽药物分类，允许复方药房合法生产，预计2026年下半年实施。\n   3. 英特尔获政府支持，优先考虑美国本土供应商，符合产业链本土化趋势。\n\n6. **风险提示与跟踪**\n   1. 技术风险包括短期回调、连续上涨后的获利回吐。\n   2. 持续关注季度财报表现及后续分析更新，尤其是铱辐射和火箭实验室。\n   3. 管理层风险是投资医疗健康和能源板块需重点关注的因素。\n   4. 资金杠杆使用需谨慎，避免市场波动对仓位产生过大影响。\n\n7. **会员服务及投资者适用性**\n   1. 提供多层次会员服务，包括基础会员、高级会员和高净值客户定制化策略。\n   2. 适合新手投资者的实盘跟踪和个股深度分析，活跃交易者可获得个性化一对一咨询。\n   3. 会员交易持仓更新频繁，支持7天免费试用。\n\n综上，本文档详尽分析了当前美股主要投资板块与个股表现，结合技术面和基本面，提出了具体的投资策略和风险管理建议，适合各类投资者参考和应用。","mentions":[],"mention_roles":[],"attachments":[{"id":"1495154147136241674","filename":"2026418-2026-04-18T01-37-34-07-00-_.mp4","size":62279117,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1495154147136241674/2026418-2026-04-18T01-37-34-07-00-_.mp4?ex=69faf70f&is=69f9a58f&hm=a90541cba32ba985676f623f601ba3d08a90885087246c41916cfcb1d5547330&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1495154147136241674/2026418-2026-04-18T01-37-34-07-00-_.mp4?ex=69faf70f&is=69f9a58f&hm=a90541cba32ba985676f623f601ba3d08a90885087246c41916cfcb1d5547330&","width":1920,"height":1080,"content_type":"video/mp4","original_content_type":"video/mp4","content_scan_version":4,"placeholder":"0RYKLIZgZliCiXdleZtvyAdKYw==","placeholder_version":1,"title":"2026年4月18日-2026-04-18T01-37-34-07-00- 本周赚够，下周减仓！"},{"id":"1495154151020298392","filename":"2026418-2026-04-18T01-37-34-07-00-__.pdf","size":1590175,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1495154151020298392/2026418-2026-04-18T01-37-34-07-00-__.pdf?ex=69faf710&is=69f9a590&hm=7b81afcac78606599b7bda9ec748cd42b7eec89b90b7f6e4ba58e380f194ffbd&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1495154151020298392/2026418-2026-04-18T01-37-34-07-00-__.pdf?ex=69faf710&is=69f9a590&hm=7b81afcac78606599b7bda9ec748cd42b7eec89b90b7f6e4ba5 130买的，再加上本身低点持续加仓的RKLB，这次减仓虽然是被动地为了较少融资，但也挺满意了。现在融资已经低于5%了。\n\n在过去几个月我首次开始利用融资，放大杠杆，我知道这对一些会员或许有不好的影响，所以多次说明我的想法、我的计划，防止大家盲目上杠杆。感谢！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-21T02:26:33.977000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1495973993809711136","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-21T02:26:46.254000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1495974045303312644","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nRKLB达到86.2的关键价格\n\nRKLB，昨天晚上我说，“RKLB现在的股价达到了公司增发设置的期权行权价格上限86.2，理论上公司可以选择拿到剩下的增发资金了，按照86.2每股结算。所以理论上现在公司手握20亿现金！！  这些钱必须得用，只是我们还不知道怎么用。  结论：拿住手上的筹码！！”。\n\n我再具体解释会发生什么：RKLB 不管股价多高，只能以 86.2 美元的价格把剩下的 745 万股“交割”给高盛，然后拿到最高额度的 6.42 亿美元。 此时，高盛手里拿到了通过期权锁定成本在 86.2 美元的股票，而市场价是现在是90或者接下来更高，投行可以在二级市场上随时卖出套利。\n\n所以合理推测，增发这个事情对于RKLB已经结束，它们拿到了大于10亿美金的资金，达到了早期一些列期权设置的目的，很顺利。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-21T02:26:48.351000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1495974054098636820","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-21T02:26:54.669000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1495974080598380555","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n一些个股情况\n\nHIMS很轻松突破了前一个小高点27，现在股价31，下一个目标是测试40。如果顺利突破40，意味着大部分朋友包括我自己都解套且可以重新盈利。我对HIMS没有任何操作计划，等待即可。那值得现在抄底吗？我的观点很简单，基于公司过去发生的一些列事情和股价的变化，如果你还没有进入，现在不要进入，市场上有更好的选择。\n\nMSTR 170，如果下个月一号还是低于我的成本价，我还会继续定投，如果高于200了，我将暂停定投计划。\n\nSATS 135，虽然幅度很小，但是继续向上创出收盘价计价的新高。SATS连续六个交易日收盘价持续抬高，日K 20-60-120均线排列，非常好的形态，手上有筹码但是仓位不多的，别卖。有仓位想要加仓的，SP是非常好的选择，这个我说了很多次了，选择115-125的行权价，行权日期选择7月，我认为最终拿到权利金的概率都挺高的。\n\nCRCL，原计划是100重新买入，昨天下跌犹豫了，想要更低到90左右。继续等待，有机会我会立即买入。\n\nINTC 出现一定幅度回撤，如果财报后大跌，我会买入新的仓位。最佳位置是55，如果到不了，根据财报情况我再决定是否操作。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-21T02:26:57.409000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1495974092090769418","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"605 ":"IMG_0678.png","size":143799,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1496302532337733802/IMG_0678.png?ex=69fb3013&is=69f9de93&hm=81a926178f766e21c6f282c268e8fe9647fbb6c15b0716336fcf9ba3f037a66d&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1496302532337733802/IMG_0678.png?ex=69fb3013&is=69f9de93&hm=81a926178f766e21c6f282c268e8fe9647fbb6c15b0716336fcf9ba3f037a66d&","width":1179,"height":553,"content_type":"image/png","content_scan_version":4,"placeholder":"/fcBA4CQnLu3eXWr4NUDbT0=","placeholder_version":1}],"embeds":[],"timestamp":"2026-04-22T00:12:03.712000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1496302532530802718","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n98.3买回了之前103卖出的500股CRCL\n还是一样的位置：下面希望不要跌破83，上看135。跌破83要不要止损需要看当时大盘和我个人资金情况。\n\n目前融资还是在个位百分比，但是期权杠杆因为SATS的SP操作上来了一些。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-22T01:17:36.577000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1496319028162072676","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-04-22 SpaceX会是下一个“波斯拉”，你准备好了吗？ @everyone \n\n- 昨天开盘按计划，先后两次交易，完成了SATS 12月行权价125的SP，成本价格21.5，平衡价格103.5，总共-30张，拿到了6万多的权利金。如果最后买入这3000股需要37万，我并没有现金准备，所以不是cash secured sell put。这个操作结果的理想状态是持有到SpaceX上市股价高点提前平仓，大概率不会等到12月行权时间。目前我持有7月到期sell put 20张，行权价有两个 110和125，加上12月到期sell put 30张，行权价125；外加正股1300股。\n- 早上盘后加仓了300股正股，如果SATS大跌我会加仓。\n- 早上盘后98.3买回了之前103卖出的500股CRCL。还是一样的位置：往下希望不要跌破83，向上目标135。跌破83要不要止损需要看当时大盘和我个人资金情况。\n\n具体持仓，请看图。\n\n............\n\nSpaceX上市后股价波动将会超乎我们的想象\n\n目前SpaceX = 火箭 (猎鹰+星舰) + 星链 (宽带+D2C+太空AIDC) + xAI (X社交+Colossus算力+Grok+Cursor)，这个公式意味着SpaceX的未来极具想象力，但是也会极具争议，因为马斯克要做的事情太多，必然伴随很多质疑与否定的声音。目前投资市场对太空和AI的定价其实都存在较大不确定性，这代表SpaceX上市后股价的波动，以2万亿级别的体量来看，将会非常恐怖。如果你想持有这家公司，需要知道马斯克短期的重点是把SpaceX打造成一家AI公司。\n\nCursor目前的ARR=30亿美金，目前SpaceX有权利在年内以600亿估值收购，PS在那个时候会小于20。Cursor是一个编程平台，背后是各家的模型，同时它在利用海量用户数据开发自己的模型。只是编程平台，没有足够的护城河，且Cursor也没有足够的算力支撑。现在Cursor和xAI大概率的合并，会把Cursor现有的用户和编程数据与xAI的算力和和模型结合，目的是为了做出自己更好的模型+更好的编程应用。具体来说，Cursor 2025年已经发布了自己的模型Composer，想要摆脱对 OpenAI/Anthropic 的纯依赖，现在Cursor将直接获得xAI Colossus 超级计算机的顶级算力资源。不过Cursor这个模型已经被打脸是基于Kimi 2.5的蒸馏，马斯克当初也直接回复了Cursor，说“是的，这就是Kimi 2.5”。尽管如此，马斯克还是选择和Cursor合作，看重的应该还是Cursor的数据。目前的AI方向是模型即应用、代码即方案，所以提升编程能力是提升模型的重要方法，换句话说，现在模型和编程能力分不开了。还有从资本运作的角度，SpaceX上市目标1.75万亿，这个公司必须要有更多能力可以发展、更多故事可以说。\n\n我的SpaceX买入计划不变：\n- 上市首日买入4成仓位\n- 剩下6成仓位分两次买入，等低点的机会\n- 总仓位不应当低于20%，也就是说我上市首日会买入不低于8%总仓位\n\n更保险的做法还是等上市后，股价回撤再买入。这个就看你有多着急了。我比较着急，上市首日买贵了也没关系，这只股票持有5年以上，还是那个笨方法：尽早持有仓位定心，然后持续低点累计股数。所以未来SpaceX TSLA RKLB几乎会占我所有仓位。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[{"id":"1496345850882822214","filename":"2026-04-22_10.40.09.png","size":439875,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1496345850882822214/2026-04-22_10.40.09.png?ex=69faafab&is=69f95e2b&hm=bfcc595ba6089213644e998ada04cb7c88133b2fa5dfbb45bfcb7a73e0cb0e13&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1496345850882822214/2026-04-22_10.40.09.png?ex=69faafab&is=69f95e2b&hm=bfcc595ba6089213644e998ada04cb7c88133b2fa5dfbb45bfcb7a73e0cb0e13&","width":2268,"height":1774,"content_type":"image/png","content_scan_version":4,"placeholder":"+gcGBYBr17V+eIdliGiIn4pg/VZ2","placeholder_version":1}],"embeds":[],"timestamp":"2026-04-22T03:04:11.601000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1496345850836811898","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月22日-2026-04-22T01-27-22-07-00- 为什么现在仓位减不下去？# 核心观点\n\n1. **持仓结构与市场环境分析**  \n   当前账户持仓以太空板块为主导（RKLB占比51%，SATS占比12%，IRDM占比3%），其次是人工智能（AI）应用板块（TSLA占22%，PLTR占4%）和AI基础设施（NVDA占4%，EOSE占2%）。整体融资杠杆率较高，总仓位达到134%，现金比例为负。市场处于健康的板块轮动阶段，多数优质个股尚未创新高，建议保持耐心等待。\n\n2. **减仓策略执行及难点**  \n   尽管执行了“本周赚够，下周减仓”的计划，但实际减仓遇到困难。主要卖出了RKLB、IRDM和PLTR部分股票，但减仓后又买入了加密货币板块的CRCL，体现对市场机会的乐观态度。减仓难的原因包括多数持仓股离前高仍有较大上涨空间，以及心理上担心错过潜在上涨。\n\n3. **大盘及板块表现**  \n   美股指数自低点反弹明显，如QQQ反弹超10%，半导体ETF SOXL涨幅接近翻倍，标普500指数同样回升。板块轮动明显，半导体和太空板块表现突出。美伊战争初期影响较大，但自4月起影响逐渐减弱，市场转向关注即将到来的财报季，特别是美股“七姐妹”的资本支出。\n\n4. **半导体行业复苏及投资逻辑**  \n   半导体行业强势回暖，龙头公司如NVDA、MU、ASML表现稳健。推荐选择大市值龙头企业，因其盘子大、波动较小、适合长期持有且无需频繁操作。操作策略为逢低建仓或加仓，避免等待大幅回调。\n\n5. **个股具体走势及操作建议**  \n   - 火箭实验室（RKLB）完成增发，股价从58美元涨至90美元，预计受SpaceX上市推动，目标价位看好回到100美元以上。建议仓位健康者继续持有，轻仓者可少量加仓。  \n   - SATS近期暴跌但下行空间有限，约110美元为强支撑位，适合通过卖出看跌期权进行风险管理。  \n   - Circle（CRCL）因比特币走势回暖而反弹，从90美元回购，目标价位135美元，操作中注意盈亏比。  \n\n6. **仓位管理与风险提示**  \n   账户整体杠杆较高，建议重点关注融资比例，防止过度杠杆带来风险。财报季前可能保持全仓状态，但需警惕个股因突发利空带来的回调风险。市场分化明显，指数创新高但优质个股未必同步上涨，需精选个股，避免盲目止盈。\n\n7. **太空板块的轮动特征和投资机会**  \n   太空板块整体呈轮动格局，部分股票如BKSY、VELO、YSS表现强劲，回归2023年的板块轮动趋势。建议投资者关注基本面变化而非战争等外部因素，保持乐观态度。\n\n# 关键结论\n\n1. **市场整体处于健康的轮动阶段，优质个股具备继续上涨潜力，但投资者面临减仓压力和心理矛盾。**  \n   多数持仓个股尚未创新高，投资者难以割肉减仓，表现出“卖不下手”的典型心理，建议保持耐心，关注市场节奏和财报季动态。\n\n2. **美伊战争的影响已被市场充分消化，不应过度关注战争因素，投资焦点应转向基本面和财报季表现。**  \n   战争初期对市场造成剧烈波动，但自4月以来影响减弱，市场情绪转向乐观，重心应放在美股“七姐妹”的资本支出和业绩表现。\n\n3. **半导体板块强势反弹，推荐持有大市值龙头企业，具备较高的长期确定性和投资安全边际。**  \n   NVDA、MU、ASML等龙头公司表现稳定，适合长期持有，操作上不必追求短期暴涨，逢低加仓为主。\n\n4. **仓位管理尤为重要，过高的杠杆率带来潜在风险，需合理控制融资比例，避免个股突发利空导致的仓位剧烈波动。**  \n   财报季前维持较高仓位是一种策略，但风险提示不可忽视，尤其是市场分化加剧的情况下。\n\n5. **太空板块轮动健康，个股间存在较大波动及投资机会，需结合基本面变化进行动态调整。**  \n   太空板块不仅是当前持仓重点，也是未来重点关注方向，投资者应关注行业催化剂及政策支持。\n\n# 重要细节\n\n1. **持仓细节**  \n   - RKLB在70美元以下加仓较多，当前占仓51%。  \n   - SATS占仓12%，近期股价暴跌后考虑继续加仓。  \n   - IRDM占仓3%，利润率较高。  \n   - TSLA距离前高尚远，PLTR同样未达前高。  \n   - NVDA接近前高但尚未突破。  \n   - CRCL曾在130美元附近减持，90美元附近回购。\n\n2. **融资和杠杆情况**  \n   - 现金比例为负（-8%），期权仓位为负（-14%），股票仓位为122%，总仓位达到134%。  \n   - 建议关注融资比例，避免过度杠杆操作带来的风险。\n\n3. **个股操作细节**  \n   - RKLB股价由58美元涨至90美元，增发筹资11亿美元，未来受SpaceX上市预期推动。  \n   - SATS通过卖出12月看跌期权（60-80手）进行风险管理，防止股价大幅下跌。  \n   - CRCL操作历史为130美元上方减持，90美元附近回购，关注比特币走势对其影响。\n\n4. **市场情绪和策略调整**  \n   - 投资者普遍存在减仓困难的心理矛盾，担心错失上涨机会。  \n   - 指数创新高但个股分化加剧，需精选未创新高的优质个股，保持耐心持有。  \n   - 财报季和美联储政策是未来市场走势的关键变量。\n\n5. **半导体板块具体龙头表现**  \n   - NVDA稳定且具大市值优势。  \n   - MU从320美元反弹，尚未突破前高471美元。  \n   - ASML走势稳健，适合长期持有。  \n   - 推荐的其他标的包括INTC，聚焦先进制程。\n\n6. **太空板块轮动表现**  \n   - BKSY股价从低位涨至40美元。  \n   - VELO近期暴涨。  \n   - YSS创新高。  \n   - 板块股价受基本面影响大，市场回归2023年轮动格局。\n\n7. **加密货币板块表现**  \n   - CRCL受比特币走势影响明显。  \n   - 盈亏比从90美元至135美元优于110美元至135美元，回购动作显示对板块机会的认可。\n\n8. **交易策略重点**  \n   - “本周赚够，下周减仓”计划虽难执行，但体现了风险控制意识。  \n   - 减仓多集中在前期加仓的底部区域股票。  \n   - 减仓同时关注市场机会，适时回购。\n\n9. **风险提示**  \n   - 个股可能因突发利空导致短期回调。  \n   - 期权仓位需谨慎管理，避免无担保操作。  \n   - 板块轮动性强，投资者需灵活调整持仓。\n\n10. **财报季关注重点**  \n    - 重点关注美股“七姐妹”资本开支和财报表现。  \n    - 财报季将成为未来市场驱动力，决定短期资金流向和板块轮动。\n\n综上，当前市场处于基本面主导的轮动行情，投资者应合理配置仓位，重点关注半导体及太空板块的龙头企业，耐心等待财报季带来的机会与风险信号，切忌情绪化操作和盲目追涨杀跌。","mentions":[],"mention_roles":[],"attachments":[{"id":"1496496803724525648","filename":"2026422-2026-04-22T01-27-22-07-00-_.mp4","size":43443117,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1496496803724525648/2026422-2026-04-22T01-27-22-07-00-_.m se},{"type":0,"content":"@everyone \n121.5买入200股SATS。目前1500股。继续累计，重复上一次的 买入 > 卖出 的过程","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-22T14:03:30.748000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1496511773925441634","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n特斯拉一季度财报定调：今年请不要期望特斯拉 $TSLA 股价上涨！！😭\n\n这从财报投资者应该关注的核心信息：\n\n🫥 汽车 & 储能 & 服务：汽车销售还行，不算差；储能单季度下滑严重，CFO说2026全年依然会保持增长，这个我不满意，因为储能只是保持增长是不行的，必须大幅度增长；服务业务表现很好，但是不到四亿的QoQ绝对营收增幅对于整个个公司而言远远不够。\n\n🚕 无人出租车 & FSD：FSD 15最迟明年初发布，马斯克暗示这才是FSD实现全面无人驾驶的最终版本，这意味着Robotaxi的全面铺开 (十万百万辆级别) 大概率不是今年而是明年了！FSD订阅数量单季度增加30万，并不算特别惊艳，毕竟欧洲和中国还没开始贡献增量。\n\n💵 资本支出：一季度FCF已经少得可怜了，2026年资本支出从200亿上调到至少250亿，从二季度开始，公司的FCF将变为负数。2026年将是特斯拉史无前例的资本支出大年，这将给股价带来很大的压力！\n\n🤖 Optimus：为了防止被抄袭尽量推迟发布，发布时间将和开始量产时间接近，预计八月份也就是三季度甚至可能四季度了。\n\n🛑 发言语调：马斯克这次预期平稳不亢奋，明显地在管理预期。\n\n🚨 特斯拉未来的路很长，保持耐心，拿好底仓，但是需要非常慎重加仓！ @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-23T03:05:01.766000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1496708449109672067","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n大家好，早上按照惯例一字一句看特斯拉财报听特斯拉电话会议。今天的文字更新会放到下午了。\n\n我的特斯拉文字总结比较中性偏悲观，但是我肯定会保持特斯拉底仓的。特斯拉尚未到爆发的时间，需要耐心。如果现在仓位过高，之后又小回弹可以减仓，如果之后继续下跌，还是适量加仓。\n\n如果下午有空，我也会出一个特斯拉视频解读财报。\n\n感谢你们！ @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-23T03:29:33.263000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1496714621015560315","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-04-23 SATS更新、TSLA财报  @everyone \n\n今天的帖子耽误了，抱歉。\n\n昨天我唯一的操作是121.5加仓了200股SATS。SATS如果持续下跌，我还会就慢慢买入。SATS对我来说有两个投资目的：锁定部分未来SpaceX的资金免得资金打散了，利用我对它“下行风险有限”的判断做底买高卖的波段以及通过sell put获得权利金。所有SATS仓位都会最晚在SpaceX上市前一天清仓，因为SATS约等于SpaceX，我不太想承受过大仓位波动。如之前沟通，我会在SpaceX上市第一天进行建仓。\n\n等下盘前是IRDM财报，明天早上也就是盘后是INTC财报。我的简单计划：\n- IRDM下跌过多，根据我对财报的解读，再看要不要加仓。如果是涨，应该继续持有。\n- INTC也是一样的逻辑，但是INTC我更希望有下跌买入的机会，手上的筹码太少。\n\n而对于特斯拉，我在早上已经分享了财报总结。具体操作来看，就是下面的要点：\n- 首先，坚持你的坚持：我依然认为原本就有特斯拉的朋友应该坚持持有一些仓位，而不是完全卖掉；\n- 但是，控制你的加仓：特斯拉只能在极端下跌中加仓了，现在的跌幅不值得再继续加仓，再怎么到350以下才考虑吧。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-23T08:44:47.302000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1496793952244863027","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-04-24 IRDM无视财报影响、特别账户中INTC换MU ASML，以及ASML high NA 光刻机需求的理解\n\n昨天的操作\n大家好，今天早上INTC财报暴涨，我在夜盘80以上的价格卖出了手上成本价44的全部仓位，然后立即将这部分资金买入了MU + ASML（ASML因为发股息我只能在待会盘前买入）。INTC的投资结果非常非常满意，我现在更愿意把资金放在刚刚创出新高或者即将创出新高的MU+ASML上。这部分仓位还是我的特别投资组合，目前盈利33%。\n\nIRDM财报\nIridium昨天财报并不算好，EPS因为一个一次性调整原因不及预期，但是股价收盘还涨了，现在夜盘也不错。可以下一个结论：IRDM的股价走势和财报并没有完全挂钩了，而是整个太空产业以及卫星板块的强势拖着它向上走。从资金的角度看就是，持续有人接盘。而且股价K线图从十几块涨上来就很健康，最近两个月从未跌破20MA。我的仓位继续持有，耐心等到更高的回报。\n\nASML光刻机技术规格、代际差异\n台积电最近宣布最近一两年将不会采用ASML最先进的EUV光刻机，关于原因，我为大家做一个科普。刚好会员社群有在荷兰对ASML比较了解的朋友，下面是我和他对话的总结。\n- 老一代（NXE 系列，标准 EUV）： 数值孔径（NA）为 0.33，分辨率约为 13nm，主要负责 7nm 到 3nm 制程的芯片生产。\n- 新一代（EXE 系列，High-NA EUV）： 数值孔径提升至 0.55，分辨率达到 8nm，专攻 2nm 及以下（如 1.8nm/14A）的最先进制程。\n- 价格飙升： NXE 售价约 1.8 亿至 2 亿欧元，而最新的 EXE 价格直接翻倍，高达约 4 亿欧元。\n- 投资回报率博弈： 新机器虽然制程更先进，但对于台积电等晶圆代工厂来说，设备价格翻倍并没有带来同等比例的产能（晶圆产出量）飙升，且新设备初期的稳定性通常不如成熟的老设备。新机器虽然单次曝光的绝对产能并没有像价格那样翻倍，但它能通过减少多重曝光的步骤来简化流程。不过，综合高昂的设备折旧费来看，单片晶圆的制造成本依然十分高昂。因此，出于财务报表和投资回报的考量，部分大厂对全面采购新机器持谨慎态度。\n- 一些晶圆厂非常聪明，并不会为了造 2nm 芯片就全线采用最新的 EXE 光刻机。在芯片多达数十层的结构中，底层的非关键结构依然会使用老一代机器（甚至 DUV）进行曝光，只有在最容易产生套刻误差（Overlay）的核心关键层，才会动用昂贵的 EXE 机器。这导致市场对新一代光刻机的绝对需求量可能并没有外界想象的那么庞大。\n- 光刻机不是“开箱即用”的家电。从 ASML 出厂运到晶圆厂后，需要漫长的安装和调试周期。晶圆厂本土工程师会根据当地的微环境（如湿度、微震动、地壳运动等）进行极其精细的微调。这些微调日志是台积电、英特尔等公司的核心商业机密，绝对不会反向分享给 ASML，以防止竞争对手抄袭这些能大幅提升良率的“Know-How”。\n- 但是先进制程的良率爬坡非常快。两年前使用 NXE 生产先进制程时，晶圆良率可能只有 60%~70%，但经过一两年的持续迭代与调试，目前的成熟良率已经可以飙升至 95% 甚至 98% 以上，进步惊人。\n- 目前英特尔在引进和部署最新 EXE 机器方面态度最为积极，试图弯道超车。\n\n感谢大家！ @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-24T03:48:51.129000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1497081865323155517","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n各位，今天上午我有事情，文字更新晚了，抱歉！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-24T03:49:09.326000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1497081941646901321","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月24日-2026-04-24T04-00-21-07-00- 谨慎持有，但不要轻易放弃！                                                                                                                                                                                                                                                                       # 核心观点\n\n1. **持仓与操作策略**  \n   - 主讲人当前持有特斯拉正股仓位为23%，另有行权价350美元的卖出看跌期权。  \n   - 相较去年高点，仓位有所下降，原因是特斯拉股价滞涨，而其他持仓股表现较好。  \n   - 目前不打算加仓，保持观望态度，建议长期持有者保持部分底仓，避免情绪化操作。  \n   - 通过卖出看跌期权获取权利金作为补充策略。  \n\n2. **营收结构与表现**  \n   - 2026财年第一季度总收入223.87亿美元，同比增长16%，符合预期。  \n   - 汽车业务收入162.34亿美元，同比增长16%，无明显惊喜。  \n   - 储能业务收入24.08亿美元，同比下降12%，显著低于市场预期，是整体增长的拖累因素。  \n   - 服务业务收入37.45亿美元，同比增长42%，主要得益于FSD（完全自动驾驶）订阅服务的增长。  \n\n3. **产能与硬件进展**  \n   - 汽车产能方面：加州工厂Model 3/Y产能超过55万辆，上海工厂Model 3/Y产能超过95万辆，德州工厂的Cybercab已进入试生产阶段。  \n   - 储能产能现阶段超过66GWh，预计未来将提升至80-100GWh。  \n   - Optimus机器人项目第一条产线将于2026年Q2开始准备，预计Q3-Q4实现量产。  \n\n4. **服务和自动驾驶业务**  \n   - Robotaxi服务付费里程环比翻倍，计划逐步用Cybercab替代现有的Model Y车队。  \n   - 2026年4月起，在达拉斯和休斯顿开放无人监督运营。  \n   - FSD业务方面，4月荷兰获得欧盟首个批准，为欧洲其他国家审批铺路。中国审批仍在推进中。  \n   - FSD已转为纯订阅模式，Q1新增订阅18-20万。  \n\n5. **财务数据与风险提示**  \n   - 碳积分对净利润贡献高达79.66%，若剔除碳积分，净利润几乎为零，盈利结构单一，可持续性存疑。  \n   - 储能业务Q1部署仅8GWh，处于历史低点，毛利率异常高达40%，实际应为30-31%，其中含一次性调整。  \n   - 全年增长目标仅为“超过2025年”，增速预期被下调，缺乏强劲增长动力。  \n\n6. **资本开支与现金流压力**  \n   - 2026年资本支出预计达到250亿美元，较往年100亿美元大幅增加。  \n   - 自由现金流将自2026年Q2开始转为负值，为2024年Q1以来首次出现负自由现金流，需警惕财务压力。  \n   - 高投资期，需观察Robotaxi和Optimus项目带来的回报周期。  \n\n7. **技术更新与管理层态度**  \n   - FSD v15预计2026年底发布，可能是完全自动驾驶的最终版本。  \n   - Optimus机器人量产计划推迟至2026年Q3，发布和量产时间将尽量接近，以防止技术抄袭。  \n   - 马斯克管理层表现较为保守，明显在管理市场预期。  \n\n8. **特斯拉与SpaceX的战略协同**  \n   - 两家公司最终目标均为成为AI领域的领导者，战略趋同明显。  \n   - 投资者需将两家公司持仓合并计算，避免过度集中风险。  \n   - SpaceX上市稳定后可能与特斯拉合并，加深协同效应。  \n\n9. **市场与投资建议**  \n   - AI基础设施板块表现突出，特斯拉相对弱势。  \n   - 投资建议中性偏谨慎，避免情绪化加仓，等待更好买入时机。  \n   - 持仓建议为23%正股加卖出看跌期权的组合。  \n\n# 关键结论\n\n1. **特斯拉营收增长放缓，储能业务表现不佳拖累整体增长**  \n   储能业务收入同比下降12%，且部署量创历史低点，显著影响公司整体营收增长，成为当前业绩的主要隐忧。  \n\n2. **汽车业务保持稳定，但缺乏爆发性增长**  \n   虽然汽车业务收入同比增长16%，与预期一致，但无明显亮点，市场对其增长潜力保持谨慎。  \n\n3. **盈利质量依赖碳积分，风险较大**  \n   净利润中近80%依赖碳积分，这种盈利结构不可持续，若没有碳积分收入，特斯拉基本无净利润，财务风险较高。  \n\n4. **FSD订阅用户增长受限于市场审批，短期增速难以突破**  \n   北美市场已接近饱和，欧洲仅荷兰获批，中国审批尚未突破，FSD订阅用户增速短期受限。  \n\n5. **资本支出大幅增加，现金流转负，财务压力显现**  \n   资本开支激增至250亿美元，导致自由现金流转负，投资者需警惕资金链风险。  \n\n6. **技术与创新节奏放缓，机器人项目推迟量产**  \n   Optimus机器人量产时间推迟，反映公司对技术保密和商业化节奏的调整，短期内可能影响市场预期。  \n\n7. **Robotaxi业务逐步推进，但规模化仍待观察**  \n   Robotaxi计划使用Cybercab替代Model Y车队，已开始无人监督运营测试，规模化路径依赖Cybercab量产能力。  \n\n8. **特斯拉与SpaceX战略协同加强，未来可能合并**  \n   两家公司均致力于AI领域领导地位，合并预期存在，投资者应关注整体资产配置和风险管理。  \n\n9. **投资建议偏谨慎，短期股价承压，等待低位布局机会**  \n   由于多重不确定因素影响，建议投资者保持观望，避免情绪化加仓，利用卖出看跌期权策略降低风险。  \n\n# 重要细节\n\n1. **仓位构成与变化**  \n   - 特斯拉正股仓位23%，持有行权价350美元卖出看跌期权。  \n   - 相较去年高点仓位下降，主要因股价表现分化。  \n\n2. **营收数据细分**  \n   - 汽车业务收入16,234百万美元，同比增长16%。  \n   - 储能业务收入2,408百万美元，同比下降12%。  \n   - 服务业务收入3,745百万美元，同比增长42%。  \n   - 总营收22,387百万美元，同比增长16%。  \n\n3. **生产与产能数据**  \n   - 加州工厂Model 3/Y年产能超过55万辆。  \n   - 上海工厂Model 3/Y年产能超过95万辆。  \n   - 德州工厂Cybercab试生产启动。  \n   - 储能总产能超过66GWh，目标提升至80-100GWh。  \n   - Optimus机器人产线准备于2026年Q2开始，计划Q3-Q4量产。  \n\n4. **服务业务进展**  \n   - Robotaxi付费里程环比翻倍。  \n   - 4月起无监督运营在达拉斯和休斯顿启动。  \n   - FSD已在荷兰获批，推进欧洲市场，等待中国审批。  \n   - FSD订阅模式，2026年Q1新增订阅18-20万，累计约130万（含买断用户）。  \n\n5. **财务指标与风险**  \n   - 2026Q1碳积分贡献净利润79.66%。  \n   - 纯盈利能力剔除碳积分后几乎为零。  \n   - 储能毛利率40%，含一次性调整，正常水平约30-31%。  \n   - 储能部署量8GWh，季度分配不均为原因。  \n\n6. **资本支出与现金流**  \n   - 2026年资本开支预计250亿美元，较往年100亿美元翻倍。  \n   - 自由现金流预计2026Q2起转负。  \n\n7. **技术产品与管理**  \n   - FSD v15预计2026年底或2027年发布，或为完全自动驾驶最终版本。  \n   - Optimus机器人推迟至2026Q3量产，发布和量产时间尽量靠近。  \n   - 马斯克管理层保守，控制市场预期。  \n\n8. **市场竞争与投资环境**  \n   - AI基础设施板块整体表现优于特斯拉。  \n   - 当前特斯拉股价承压，建议等待更好买入机会。  \n\n9. **特斯拉与SpaceX关系**  \n   - 两家公司均聚焦AI，未来可能合并。  \n   - SpaceX收购了AI公司Cursor，增强AI布局。  \n   - 投资者需合并计算两家公司持仓，避免仓位过度集中。  \n\n10. **补充说明**  \n    - 主讲人建议关注其Twitter账号以获取更多实时更新信息。  \n\n综上，特斯拉2026年Q1财报显示公司营收增长放缓，储能业务表现不佳拖累业绩，盈利高度依赖碳积分，资本支出大幅增加导致现金流承压，技术产品节奏推迟，短期面临诸多不确定性。投资建议偏谨慎，建议保持观望，控制仓位，关注后续市场审批和新技术进展带来的潜在转机。","mentions":[],"mention_roles":[],"attachments":[{"id":"1497218462882205861","filename":"2026424-2026-04-24T04-00-21-07-00-_.mp4","size":36176144,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1497218462882205861/2026424-2026-04-24T04-00-21-07-00-_.mp4?ex=69fb395a&is=69f9e7da&hm=230ccdddc3e78fe7370b89f4b2a8eb8564e5a8218288017b6807634f9894e8cc&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1497218462882205861/2026424-2026-04-24T04-00-21-07-00-_.mp4?ex=69fb395a&is=69f9e7da&hm=230ccdddc3e78fe7370b89f4b2a8eb8564e5a8218288017b6807634f9894e8cc&","width":1920,"height":1080,"content_type":"video/mp4","original_content_type":"video/mp4","content_scan_version":4,"placeholder":"CBgGBIJLA5ZdqHd5iJlDqyCzCQ==","placeholder_version":1,"title":"2026年4月24日-2026-04-24T04-00-21-07-00- 谨慎持有，但不要轻易放弃！"},{"id":"1497218464799129621","filename":"2026424-2026-04-24T04-00-21-07-00-__.pdf","size":985670,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1497218464799129621/2026424-2026-04-24T04-00-21-07-00-__.pdf?ex=69fb395a&is=69f9e7da&hm=dbefb9823c65828003c456593f2abd5e6eea1a11ab0e173b61ac80c63cce02c7&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/14972 .116亿美元，季度资本支出3000万美元，2026年预计自由现金流3.18亿美元，十年预测15-18亿美元。  \n   - 频谱资源紧俏，管理层拒绝出售频谱资产，行业内坚持自主运营盈利模式，建议长期持有接受稳健增长。\n\n4. **Rocket Lab (RKLB) 股价及基本面分析**  \n   - 当前股价79.68美元，较前日下跌5.82%，成交量221.8万股，成交额1.58亿美元。  \n   - 技术指标显示20日均线73.41美元，60日均线68.06美元，流通市值42.67亿美元。  \n   - 近期获得10亿美元政府合同，完成对Mynaric（估值2.47亿美元）收购，火箭项目测试出现部件故障。  \n   - 技术面多头排列，短期阻力位85.7美元。  \n   - 投资建议：短期支撑位73.5美元，80美元以下可分批建仓，若跌破20日均线需警惕趋势反转。  \n   - 预计第二季度财报将确认收购贡献，管理层可能上调全年营收指引。\n\n5. **英伟达（NVDA）股价表现与投资逻辑**  \n   - 最新收盘价208.27美元，涨幅4.32%，创历史新高，突破200美元关键阻力位。  \n   - 20日均线多头排列，成交量214万股，流通市值2331亿美元。  \n   - PE估值为20倍，远低于AMD（40倍）和英特尔（100倍），存在明显低估。  \n   - 投资策略建议在170美元附近加仓，涵盖正股及卖出看跌期权。  \n   - 推荐聚焦大市值龙头及相关ETF，行业龙头包括NVDA、ASML和MU，均具备行业垄断性质和千亿美元市值。\n\n6. **Hims & Hers (HIMS) 股价及市场观点**  \n   - 当前股价30.56美元，单日涨幅8.56%。  \n   - 市场存在过热警告，近期多位大V推荐，但基本面无重大变化。  \n   - 建议冷静观望，30美元新建仓不具备良好盈亏比。  \n   - 历史持仓成本约40美元，目标价位为40美元，存在回调风险，今年难以回到70美元前高。  \n   - 半导体和AI基础设施行业存在短期过热风险，建议谨慎控制仓位。\n\n7. **Circle (CRCL) 股价分析与交易策略**  \n   - 建仓价位在98美元附近，止损设置为15%，止盈目标38%。  \n   - 价格走势与比特币市场呈联动关系，当前比特币显现底部回升态势。  \n   - 目标价135美元，止盈策略灵活，应观察突破动能，快速突破则持有，多次测试失败则波段操作。  \n   - 结合历史价格波动及比特币市场行情进行判断。\n\n8. **行业观察与整体投资建议**  \n   - 半导体及AI基础设施行业发展迅速，估值差异显著。  \n   - 投资应聚焦大市值龙头企业和相关ETF，降低个股风险。  \n   - 关注行业技术进展与政策导向，特别是AI芯片、光刻机和存储芯片领域。  \n   - 投资风险提示包括市场波动、行业过热及技术项目不确定性。\n\n# 关键结论\n\n1. **积极调整仓位与优化期权结构是提升组合收益的有效策略**  \n   - 通过增加英伟达仓位及调整期权结构，提升风险收益比。  \n   - 清仓英特尔并转向阿斯麦和美光，实现收益最大化。\n\n2. **Iridium展现稳定且健康的业绩增长，具备较强的现金流支持**  \n   - 频谱资源稀缺且管理层坚持自主运营，长期具备投资价值。  \n   - 技术面多头排列，趋势稳健，适合继续持有。\n\n3. **Rocket Lab的政府合同和收购助力业绩增长，但技术风险仍需关注**  \n   - 部件故障对项目进展构成一定压力，投资者需重点关注后续进展。  \n   - 短期内股价波动较大，但中长期前景看好。\n\n4. **英伟达股价创新高，估值仍具吸引力，是半导体及AI领域的核心投资标的**  \n   - 相较于AMD和英特尔，英伟达估值更具性价比。  \n   - 技术指标支持继续持有和加仓，风险相对可控。\n\n5. **Hims & Hers存在市场炒作过热风险，短期股价波动较大，建议谨慎操作**  \n   - 基本面未有明显改善，投资者应关注风险控制，避免高位追涨。\n\n6. **Circle的走势与比特币密切相关，适合结合宏观市场环境灵活操作**  \n   - 建仓时机和止盈止损策略明确，适合波段投资者关注。\n\n7. **行业投资应重点关注大市值行业龙头，利用ETF等工具分散风险**  \n   - 半导体和AI基础设施行业成长空间广阔，但波动性较大，需谨慎布局。\n\n# 重要细节\n\n1. **资金与仓位管理**  \n   - 英伟达当前仓位5%，新建180行权价2026年12月到期看跌期权。  \n   - 英特尔已全仓卖出，资金转投阿斯麦和美光。  \n   - 实验性组合占总仓位的3%，收益率达40-50%。  \n   - 融资比例与两周前持平，减仓存在难度。\n\n2. **Iridium财务与技术数据**  \n   - Q1营收2.19亿美元，同比增长1.94%。  \n   - 现金持有1.116亿美元，季度资本支出3000万美元。  \n   - 预计2026年自由现金流3.18亿美元，十年累计15-18亿美元。\n\n3. **频谱资源情况**  \n   - L波段频谱资源稀缺，管理层明确拒绝出售。  \n   - 行业内唯一坚持自主运营盈利模式的公司。\n\n4. **Rocket Lab合同与收购情况**  \n   - 10亿美元政府合同确认。  \n   - 完成对Mynaric收购，估值约2.47亿美元。  \n   - 火箭项目测试阶段出现部件故障，需关注后续进展。\n\n5. **英伟达市场交易数据与估值**  \n   - 成交量214万股，成交额4.44亿美元。  \n   - PE仅20倍，远低于AMD和英特尔。  \n   - 多头排列的均线系统支撑股价，技术面稳健。\n\n6. **Hims & Hers市场热度与持仓成本**  \n   - 近期涨幅8.56%，但基本面无重大变化。  \n   - 历史持仓成本约40美元，当前价格约30美元。  \n   - 建议谨慎观望，避免追高。\n\n7. **Circle交易策略与市场联动**  \n   - 建仓价98美元，止损15%，止盈38%。  \n   - 价格走势与比特币市场趋势联动明显。  \n   - 目标价135美元，策略灵活应对市场波动。\n\n8. **行业龙头推荐及风险提示**  \n   - 推荐标的包括英伟达（NVDA）、阿斯麦（ASML）、美光科技（MU）。  \n   - 行业市值千亿，具备垄断性质，适合长期持有。  \n   - 风险提示包含价格波动、技术项目不确定性及市场情绪波动。\n\n9. **附加资源**  \n   - 推荐观看SpaceX星舰4K纪录片，制作精良，适合大屏幕观赏，体验影院级视觉效果。\n\n以上内容详尽阐述了当前美股重点投资标的的财务状况、技术面表现及市场策略，结合行业宏观环境为投资者提供了全面且实用的决策参考。","mentions":[],"mention_roles":[],"attachments":[{"id":"1498529250599501855","filename":"2026427-2026-04-26T20-52-23-07-00-_RKLB.mp4","size":41702341,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1498529250599501855/2026427-2026-04-26T20-52-23-07-00-_RKLB.mp4?ex=69fab81e&is=69f9669e&hm=15d2856b02d91f097badb42c45649d3a6ccebae9b1c13bcf8802868f5a899690&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1498529250599501855/2026427-2026-04-26T20-52-23-07-00-_RKLB.mp4?ex=69fab81e&is=69f9669e&hm=15d2856b02d91f097badb42c45649d3a6ccebae9b1c13bcf8802868f5a899690&","width":1920,"height":1080,"content_type":"video/mp4","original_content_type":"video/mp4","content_scan_version":4,"placeholder":"ZPgZFIRgd4Z5iIeHd3gEVUcJZg==","placeholder_version":1,"title":"2026年4月27日-2026-04-26T20-52-23-07-00- RKLB是否有做波段的机会"},{"id":"1498529252641865748","filename":"2026427-2026-04-26T20-52-23-07-00-_RK_.pdf","size":1652153,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1498529252641865748/2026427-2026-04-26T20-52-23-07-00-_RK_.pdf?ex=69fab81f&is=69f9669f&hm=e57bb428a9e53862d31239ec3fb10eefc2131305cdf29b1de800a9752d12f39b&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1498529252641865748/2026427-2026-04-26T20-52-23-07-00-_RK_.pdf?ex=69fab81f&is=69f9669f&hm=e57bb428a9e53862d31239ec3fb10eefc2131305cdf29b1de800a9752d12f39b&","content_type":"application/pdf","original_content_type":"application/pdf","content_scan_version":4,"title":"2026年4月27日-2026-04-26T20-52-23-07-00- RK_笔记"}],"embeds":[],"timestamp":"2026-04-28T03:40:15.240000+00:00","edited_timestamp":"2026-04-28T19:53:34.724000+00:00","flags":0,"components":[],"id":"1498529252990124043","channel_id":"1457988703363399781","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nHOOD财报真的那么差吗？ @everyone \n\nHOOD 2026年一季度财报解析\n\n各产品交易量表现\n整体看是同比大涨、环比回落的格局，反映出2025年4几度那轮市场热度在Q1有所降温。\n- 股票（Equity）：名义交易额 $638B，同比 +54%，环比 -10%。同比的强劲增长主要来自人均交易额提升（+45% YoY），说明用户活跃度在提升而非靠新用户。\n- 期权（Options）：5.86 亿张合约，同比 +17%，环比 -11%。每个交易者的合约数同比 +20%，老用户在加深使用。\n-加密货币（Crypto）：总名义交易额 $65.7B，同比 +43%，环比 -20%。这里有个重要分化：Robinhood App 自营端 $23.8B，同比 -48%、环比 -30%，零售加密热度明显退潮；Bitstamp（去年 6 月收购）贡献 $41.9B，其中 94% 来自机构，已经成为加密板块的主力。\n- 新产品三件套创历史新高：Index Options 2940 万张、Futures 2010 万张（+20% QoQ）、Event Contracts（预测市场）88 亿张（+4% QoQ）。这是 Robinhood 营收多元化的关键看点。\n\n营收与盈利表现\n- 总营收 $1,067M，同比 +15%，但环比 -17%。2025年4几度是历史高点（$1,283M），Q1 回落主要拖累项是加密。\n- 交易类收入 $623M（+7% YoY，-20% QoQ）：股票 $82M（+46% YoY）、期权 $260M（+8%）、加密 $134M（-47% YoY，是最大拖累）、其他 $147M（+320% YoY，主要是预测市场和 Event Contracts，年化已达 $415M 左右）。\n- 净利息收入 $359M（+24% YoY，-13% QoQ）：保证金贷款利息同比 +75% 至 $193M，是结构性亮点。\n- 其他收入 $85M（+57% YoY），主要是 Gold 订阅。\n\n盈利\n- 调整后 EBITDA $534M，利润率 50%，同比 +14% 但环比 -30%。LTM 累计 $2.6B（56% 利润率），\"Rule of 40\" 数值 98%，仍然非常健康。\n- GAAP 净利润 $346M，EPS $0.38。注意环比看似大跌 $259M，但2025年4几度含 $424M的一次性税务/监管会计冲回收益，剔除该影响后实际是接近持平的。\n- 简单说：利息收入和新产品撑住了同比增长，但加密回调让环比承压。\n\n股票回购\n- Q1 回购 $250M，3.1M 股，均价约 $81/股——这是自启动回购计划以来单季度最大金额。累计：自 2024 Q3 启动以来，总共回购 25M 股、$1.2B，整体均价约 $46。\n- 新授权：2026 年 3 月董事会把回购额度刷新至 $15 亿，计划在大约 3 年内执行完，目前还剩 ~$1,497M（基本是全新额度）。如果市场条件允许会加速。\n\n投资总结\n- Q1 是个\"同比稳健增长、环比从高位回调\"的季度——加密退潮拖累短期数字，但利息收入、新交易品类（期权/期货/预测市场）、以及现在每季度 $250M 量级的回购，都说明业务韧性和资本回报意愿在变强。\n- 从技术面看，66会是下方比较坚固的支撑，现在如果有想买入的朋友，盈亏比还是不错，不过不能期待HOOD走出快速拉升的行情，这不现实。公司一季度回购价格81，说明公司认可自己81这个价值，目前夜盘是74，低于回购价格，相信公司会继续回购的。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-29T01:59:40.858000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1498866330823164045","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n昨日交易 & 我看到的机会\n\n昨天唯一的交易是在210再次加仓了100股NVDA，目前仓位来到了7%以上。除此之外，下面几只股票的价格我觉得可以根据大家不同的情况做考虑：\n- TMDX：下方94是很强的支撑，盈亏比很高\n- ICHR：昨天盘中插针到62，收盘66.5，这支股票连续三天长下影线然后收复部分跌幅，在最近今天半导体板块下挫形式上，ICHR图形走势算是比较稳定强势的。\n- LITE：看过去接近一年的走势，LITE从未跌破60MA，从趋势看，跌破20MA就是LITE长期投资者的买入机会。\n\n以上所有公司的财报，都是下周，财报会带来波动，如果感兴趣，大家可以自己做出财报前后的投资计划。\n\n一个提醒：ASTS\n\n最近我常常说ASTS的不好，不是为了流量，是我真的不看好。最近ASTS的图形完全走坏，结合基本面+技术面，我对ASTS接下来的走势是悲观的。\n\n这几天我看了公司CEO关于年底前卫星数量的推文，我为大家总结了关于这个承诺的口径演变时间线\n- 2025 年 5 月（Q1 财报电话会）：最初的口径是2025 和 2026 两年合计\"部署超过 60 颗卫星。\n- 2025 年 8 月（Q2 财报电话会）：口径首次下调，改为2025 和 2026 年合计发射 45 到 60 颗卫星，并预计 2026 年 Q1 末之前至少完成 5 次轨道发射。\n- 2026 年 4 月底（最新一次重大调整）：4 月 19 日 BlueBird 7 发射失败后，AST SpaceMobile 把\"45 到 60 颗\"的目标下调为\"年底大约 45 颗\" \n\n口径变化的轨迹非常清晰：\"超过 60 颗\"（2025 年 5 月）→ \"45 到 60 颗\"（2025 年 8 月起）→ \"大约 45 颗\"（2026 年 4 月发射失败后）。\n\n感谢大家！ @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-29T03:15:24.503000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1498885388251435120","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n我用IRDM换了1000股RKLX，两倍RKLB。\nIRDM清仓了。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-29T13:46:18.340000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1499044158751379557","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nIRDM操作下来总共盈利11000\nRKLX 1000股成本32.8","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-29T13:48:35.419000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1499044733702635623","channel_id":"1457988703363399781","author":{"id":"1426229538722 得除了公司本身财报有一些瑕疵之外，就是整个大环境目前对金融科技股不太友好。HOOD最近被诟病没能力支持国际市场的交易，比如最近热门的台日韩股票，我个人认为这是很难提前一两年去布局的判断，IBKR本身国际化做得好，所以现在享受了台日韩交易热度。目前我持有两家公司少量sell put，不会有任何操作。\n\nEOSE不跌破我的成本价6.2我不会考虑卖出，继续观察，仓位也不大，没什么压力。\n\nLite如果你昨天低点我提醒的时候买了，一定要那好，应该看到新高才考虑要不要止盈。\n\nICHR这几天表现一般，从风险管理上可以以跌破20MA止损。\n\n下周密集财报，我手上的公司会少动，然后等财报，然后再做出判断。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-30T02:06:26.376000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1499230419554402355","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n......","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-30T02:06:49.137000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1499230515020955673","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n科技大厂财报以及SOFI财报会稍后单独分享","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-30T02:06:51.007000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1499230522864435241","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n各位，第一次操作了META。\n\n我卖了一张27年3月行权价550的put,权利金5100，平衡价500不到。\n\n目前谷歌 微软 亚马逊 META，我认为META的股价最具吸引力。谷歌太高，微软亚马逊我都不太看好，META的广告业务是实打实的现金牛。\n\n我之前和一个META的朋友吃了饭，ta说META现在没有work life balance, 工作和今年前完全不同，非常累，ta想辞职。ta是做whatsapp B端销售的。META不排除会继续裁员选件成本提高利润率，它们以前做过，最近也在裁员，可能还会继续。META的大模型最近也有了一些转机。\n\n不熟悉广告业务的朋友，可以去看我APP相关视频。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-30T13:40:22.944000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1499405055978377388","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年4月30日-2026-04-30T05-27-08-07-00- 这家即将上市的芯片公司，挑战Nvdia的霸主地位！# 核心要点\n\n1. **公司概况与IPO进程**  \n   Cerebras Systems是一家专注于AI芯片的创新公司，计划于2026年5月中旬在美国上市，股票代码为CBRS。公司最新估值达350亿美元，较上轮230亿美元显著增长，体现出资本市场对其技术和市场前景的认可。\n\n2. **创始团队与技术路线**  \n   公司由五名联合创始人组成，团队合作超过十年，核心成员包括CEO Andrew Feldman（曾成功将公司出售给AMD）和CTO Sean Lie（主导核心硬件架构设计）。技术路线独特，采用晶圆级大芯片（WSE，Wafer-Scale Engine）设计，与传统GPU和TPU路线形成差异化竞争。\n\n3. **AI芯片技术与市场定位**  \n   Cerebras专注超大模型专用芯片，WSE-3提供44GB片上SRAM和21PB/s的内存带宽，远超NVIDIA H100的3.35TB/s带宽。其独特优势在于内存带宽极高且延迟极低，适合推理及思维链推理和Agent工作流，但容量有限，需多机串联支持超大模型。\n\n4. **晶圆级芯片创新与五大工程难题解决方案**  \n   Cerebras采用晶圆级芯片设计，将整个晶圆作为单颗芯片，面积达46,225mm²，是NVIDIA H100的56倍。成功解决了良率、热膨胀、供电、散热和时代红利五大难题，利用廉价冗余实现93%硅利用率，定制柔性连接器应对热胀冷缩，垂直供电和微通道液冷技术保障系统稳定运行。\n\n5. **下一代产品WSE-4规划**  \n   WSE-4将结合晶圆级SRAM和3D堆叠HBM技术，预计2027年后量产，内存容量将从44GB提升至TB级别，极大突破现有容量瓶颈，面对NVIDIA SoW-X新封装技术的竞争压力，保持技术领先和市场竞争力。\n\n6. **财务表现与客户结构**  \n   2025年预计营收5.1亿美元，同比增长76%。营收结构中硬件占70%，云服务占30%，毛利率仅39%，远低于竞争对手NVIDIA和AMD，原因包括高制造成本和战略性折扣。客户高度集中，阿联酋关联客户G42和MBZUAI合计贡献86%营收，存在较大地域和政策风险。\n\n7. **与OpenAI的战略合作**  \n   签订总价值200亿美元合同，约为公司2025年营收的40倍。合同包括750MW推理算力部署、10亿美元运营贷款及授予OpenAI 13-17%股权认购权。双方形成深度绑定，但合同含有严格里程碑条款，存在执行不确定性。\n\n8. **投资机会与风险分析**  \n   投资Cerebras的核心赌注在于AI推理赛道的爆发和公司2027年前成功推出WSE-4芯片。其技术优势在Reasoning推理领域形成物理护城河，且与OpenAI绑定形成强大市场推动力。风险主要包括客户集中度过高、NVIDIA技术追赶压力及OpenAI合同执行风险。建议投资者控制仓位，不超过5%，做好波动管理。\n\n# 关键结论\n\n1. **技术创新性与差异化优势显著**  \n   Cerebras通过晶圆级大芯片技术实现了极高的带宽和低延迟，解决了传统芯片在大模型推理中的瓶颈，形成了难以短期超越的技术壁垒。\n\n2. **市场定位明确但容量受限**  \n   WSE-3目前适合参数规模小于70亿的模型推理，超大模型需多机串联，限制了单机性能和成本优势。下代WSE-4通过引入HBM堆叠有望突破容量瓶颈，提升竞争力。\n\n3. **财务表现稳健但盈利压力依然存在**  \n   公司营收快速增长，但毛利率较低且研发开支高企，短期内难以实现盈利，需依赖持续融资和合作伙伴支持。\n\n4. **客户集中度高导致风险较大**  \n   超过85%的营收依赖少数中东客户，政策变化或客户资金问题将直接影响公司现金流和市场表现，是核心风险点。\n\n5. **与OpenAI的深度绑定是双刃剑**  \n   合同为公司带来巨额订单和资金支持，增强市场信心，但合同含有多项严格条款，若OpenAI撤出将对公司造成毁灭性打击。\n\n6. **竞争压力显著，时间窗口紧迫**  \n   NVIDIA积极推进SoW-X封装技术，对Cerebras构成强烈追赶压力。公司必须按期推出WSE-4，否则将面临生存危机。\n\n7. **投资属性为高风险高回报**  \n   该股票适合愿意承担技术和市场不确定性的主题投资者，非稳健型资产。投资者应严格控制仓位，并准备应对波动。\n\n# 重要细节\n\n1. **团队背景与核心人物**  \n   - CEO Andrew Feldman曾成功创办并出售芯片公司c micro，具备丰富行业经验。  \n   - CTO Sean Lie主导WSE-3与WSE-4设计，是公司技术路线的关键人物。\n\n2. **芯片规格详细对比**  \n   - WSE-3片上SRAM容量44GB，带宽21PB/s，是NVIDIA H100的7000倍带宽。  \n   - WSE-3拥有约90万个AI核心，功耗约23kW（整套系统），远高于传统GPU单卡700W。  \n   - NVIDIA H100无片上内存，依赖80GB HBM3外部内存，带宽3.35TB/s。\n\n3. **晶圆级芯片制造创新点**  \n   - 采用不切割晶圆，整片使用，通过84个die间互联实现。  \n   - 解决良率问题采用冗余设计，硅利用率达93%。  \n   - 供电采用晶圆背面垂直供电，散热通过微通道液冷冷却液流动实现。\n\n4. **WSE-3的两种工作模式**  \n   - Pure On-chip：模型权重≤44GB，全部在片上SRAM运行，极低延迟。  \n   - Weight Streaming：适用于超大模型，数据从外部Memory X逐层流入芯片，容量几乎无限，但受限于网络带宽。\n\n5. **推理性能与实际应用案例**  \n   - WSE-3推理速度达2100 tokens/s，是H100的14倍，优势随输出长度线性放大。  \n   - OpenAI GPT-5.3-Codex-Spark模型专为WSE-3设计，首次不依赖NVIDIA平台，编码任务速度远超传统方案。\n\n6. **封装技术与未来路线**  \n   - WSE-3采用SoW-P（晶圆级系统）封装，是全球唯一量产此技术的公司。  \n   - WSE-4计划结合晶圆级SRAM与3D堆叠HBM技术，提升容量至TB级，预计2027年后量产。  \n   - 与NVIDIA对比，Cerebras采用Chip-First工艺，NVIDIA采用Chip-Last工艺，竞争技术路线截然不同。\n\n7. **财务数据与增速**  \n   - 2022年至2025年营收增长20倍，2025年收入预计5.1亿美元。  \n   - 毛利率仅39%，远低于NVIDIA的75%，主要因制造成本高和战略性折扣。  \n   - 研发费用高达营收的47.7%，主要投入WSE-4开发。\n\n8. **客户与风险集中**  \n   - G42和MBZUAI两大阿联酋客户合计贡献近90%营收和应收账款。  \n   - 政策风险明显，2024年IPO因政策变动流产。  \n   - OpenAI合同包含33.4M股极低行权价认股权证，形成成败绑定。\n\n9. **投资建议与风险提示**  \n   - 建议仓位不超过5%，准备波段操作和被套风险。  \n   - 投资核心押注AI推理领域爆发及WSE-4按期量产。  \n   - 风险包括客户集中、技术追赶和合同执行不确定性。\n\n10. **市场竞争格局**  \n    - GPU市场由NVIDIA约80%份额主导，Cerebras专注超大模型推理细分领域。  \n    - Groq被NVIDIA收购，NVIDIA推动SoW-X技术作为下一代竞争方案。  \n    - Cerebras面临技术与市场双重挑战，需保持创新速度。\n\n综上，Cerebras Systems作为AI芯片领域的创新者，凭借晶圆级大芯片技术在推理领域建立显著优势，通过与OpenAI的深度战略合作获得了市场认可。然而，高度集中客户结构、较低毛利率及未来产品交付的不确定性构成核心风险。投资者应充分评估技术与市场双重因素，谨慎配置仓位，关注公司能否按计划推出WSE-4以维持竞争力。","mentions":[],"mention_roles":[],"attachments":[{"id":"1499415119220707511","filename":"2026430-2026-04-30T05-27-08-07-00-_Nvdia.mp4","size":107490624,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1499415119220707511/2026430-2026-04-30T05-27-08-07-00-_Nvdia.mp4?ex=69faa566&is=69f953e6&hm=44c9f6033180049481d958947d33a682b5385817bc61ee5b2a60eddaab0592d6&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1499415119220707511/2026430-2026-04-30T05-27-08-07-00-_Nvdia.mp4?ex=69faa566&is=69f953e6&hm=44c9f6033180049481d958947d33a682b5385817bc61ee5b2a60eddaab0592d6&","width":1920,"height":1080,"content_type":"video/mp4","original_content_type":"video/mp4","content_scan_version":4,"placeholder":"TggGFIQrGQXZekaVaDYpgPyUQg==","placeholder_version":1,"title":"2026年4月30日-2026-04-30T05-27-08-07-00- 这家即将上市的芯片公司，挑战Nvdia的霸主地位！"},{"id":"1499415125076213780","filename":"2026430-2026-04-30T05-27-08-07-00-__.pdf","size":2294446,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1499415125076213780/2026430-2026-04-30T05-27-08-07-00-__.pdf?ex=69faa567&is= 781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n最后，我利用美股七姐妹里面最新发布财报的信息，汇总了一个表格，给大家做参考。我是用AI制作，做了初步检查，但是暂时没时间亲自一个数据一个数据去看。如果你们发现错误请告诉我。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[{"id":"1499666480831266886","filename":"2026-05-01_2.57.26.png","size":612671,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1499666480831266886/2026-05-01_2.57.26.png?ex=69fae6bf&is=69f9953f&hm=bfcc58c24f01c4722db03355a370b07aa430b020eb54ccd470d16a0b8c8f942d&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1499666480831266886/2026-05-01_2.57.26.png?ex=69fae6bf&is=69f9953f&hm=bfcc58c24f01c4722db03355a370b07aa430b020eb54ccd470d16a0b8c8f942d&","width":4096,"height":2304,"content_type":"image/png","content_scan_version":4,"placeholder":"9/cJBIBUZXZwiIiXmYxEIAgxxQ==","placeholder_version":1}],"embeds":[],"timestamp":"2026-05-01T06:59:11.547000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1499666481086992384","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n今天我把这次七姐妹里面五家公司财报文档放在一起，稍微看了数据，加深了我年初和大家沟通的想法：苹果是这一轮AI竞赛中的消极赢家，或者说是尝试了大模型失败了果断放弃，反而因祸得福。它是七姐妹中唯一的硬件公司，现在硬件的重要性越来越重要，和以前反过来了。其它公司花了成百上千亿去搞大模型，苹果只需要选自己喜欢的用就行了，虽然也是要付费，不过自己有硬件入口，选择权还是自己，特别是大模型愈加商业化的当下，选择很多，讨价还价空间也大。而且苹果的硬件性能好，是AI应用落地的最佳硬件。在最新的财报上，苹果宣布考虑追加1000亿美金的股票回购，这是当其它公司现金流金库越来越缩水的情况下，它自己肥得流油而且全回馈股东。\n\n我认为做苹果未来1-2年的leap call，是一个好的投资选择。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-05-01T14:43:23.163000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1499783299231383613","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n特斯拉起来了，之前担心跌到300以下的不用着急了。\n今天谷歌财报透露了一些Waymo的数字，Waymo每周trips达到了50万次，不到一年翻倍，但是包括Waymo在内的Other bets还在大幅亏损，虽然具体不知道Waymo的营收和净利润情况，但是我是完全不看好Waymo的。FSD和Robotaxi的统治力只会越来越强：数据越来越多、芯片越来越多、模型越来越好，基本其它人追不上了。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-05-01T15:16:29.905000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1499791632231432262","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone2026年5月2日-2026-05-02T01-16-35-07-00- 下周RKLB财报预测、SATS如何靠卖期权赚钱，以及看多NVDA META MU # 核心观点\n\n1. **市场总体表现及趋势**  \n   - 2026年3月30日市场触底后开始V型反弹，四月份持续上涨，累计涨幅达20%。  \n   - AI基础设施板块表现尤为强势，光存储等子板块涨幅显著超过20%。  \n   - 纳斯达克100指数（QQQ）年初至今上涨近10%，标普500仅上涨5.3%。  \n   - 特斯拉等个别表现不佳的股票对整体收益构成拖累。\n\n2. **个人投资收益与持仓结构**  \n   - 2026年前四个月个人YTD收益约20.8%，四月最高点时曾达到30%以上。  \n   - 过去18个月累计收益达到161.2%，明显优于标普500同期121.8%的表现。  \n   - 持仓主要集中于太空科技（火箭实验室RKLB及其ETF RKLX占51%）、AI相关（特斯拉TSLA 23%，英伟达NVDA 7%，Palantir PLTR 4%）和加密货币（MicroStrategy MSTR 7%，Circle CRCL 4%）。  \n   - 现现金管理方面处于-15%融资状态，融资比例较此前10%有所增加。\n\n3. **投资操作策略**  \n   - 太空板块采用加杠杆策略，如使用两倍做多ETF（RKLX），并对SATS采取买入正股+卖出看跌期权的组合操作。  \n   - AI基建板块微调仓位，英伟达小幅加仓至7%，持有2027年6月到期的LEAP看涨期权。  \n   - 加密货币策略坚持定投原则，MicroStrategy在股价低于成本价时定投，控制持仓上限为7%。  \n   - 风险控制方面避免单一股票过重仓位（TSLA不超过23%），期权操作主要用于增强收益而非纯投机。\n\n4. **重点个股市场表现与策略**  \n   - 英伟达近期股价在200美元附近获得支撑，存在估值优势，维持长期看多观点。  \n   - Meta采用卖出2027年4月行权价550美元看跌期权策略，调整建仓成本。  \n   - 火箭实验室RKLB技术面多头排列，建仓价位和止损位明确，5月12日新建火箭试飞及财报为重要催化剂。  \n   - SATS股价波动温和，120美元以下为加仓区间，结合卖出看跌期权策略进行收益增强。  \n   - 加密货币相关公司如Circle（CRCL）受监管利好影响股价上涨，MicroStrategy（MSTR）持续执行低价定投策略。\n\n5. **其他关注标的**  \n   - 美光科技（MU）作为“父母仓”重点持有，收益已达40%，估值优势明显。  \n   - Lumentum（LITE）光通信行业前景良好，近期股价创出新高，800美元附近存在买入机会。  \n   - Cerebras Systems（CBRS）计划IPO，作为AI芯片制造商备受市场关注。\n\n6. **风险提示与未来研究方向**  \n   - 避免追高估值过热个股，尤其是英特尔等传统科技股。  \n   - 关注技术面变化，合理把握入场时机。  \n   - 持续跟踪AI基础设施及相关企业基本面，深入研究相关板块投资机会。\n\n# 关键结论\n\n1. **市场趋势已由亏损转向盈利，四月实现明显反转**  \n   2026年前三个月市场表现平平甚至亏损，四月迎来强劲V型反弹，个人投资收益快速提升，显著优于大盘。  \n\n2. **太空科技和AI基础设施成为核心投资方向**  \n   个人持仓以火箭实验室及相关ETF为核心，配合SATS等太空股，利用杠杆和期权策略提升收益。AI相关持仓以英伟达、特斯拉为主，注重估值和技术面分析。  \n\n3. **期权策略有效提升收益和风险管理水平**  \n   通过卖出看跌期权及买入LEAP Call等策略，增强收益同时控制风险，避免单一标的重仓导致的波动风险。  \n\n4. **加密货币板块策略稳健，定投和仓位控制为主**  \n   以MicroStrategy和Circle为代表，结合监管政策利好，维持低价定投和仓位上限，降低波动风险。  \n\n5. **个股选择兼顾基本面和技术面，动态调整仓位和策略**  \n   例如英伟达关注筹码峰和均线支撑，Meta通过期权降低成本，火箭实验室设定明确止损和目标价，SATS结合卖出看跌期权滚动操作。  \n\n6. **未来投资重点聚焦存储芯片、光通信及AI基础设施新兴领域**  \n   看好美光科技和Lumentum的成长潜力，密切关注Cerebras等AI芯片制造商的市场表现和IPO进程。  \n\n7. **风险控制为投资核心，避免单一标的重仓及高估值追涨**  \n   融资比例控制，重仓个股如特斯拉不超过23%，结合技术面信号灵活调整仓位，有效防范市场波动风险。  \n\n# 重要细节\n\n1. **市场走势细节**  \n   - 四月份几乎无单日下跌，累计涨幅20%。  \n   - 纳斯达克100指数上涨近10%，标普500指数上涨5.3%。  \n   - AI基础设施板块表现远超大盘。\n\n2. **持仓结构具体分布**  \n   - 太空科技占68%，其中火箭实验室（RKLB）48%，RKLX ETF 3%，AST SpaceMobile（SATS）17%。  \n   - AI相关持仓：特斯拉23%，英伟达7%，Palantir 4%。  \n   - 加密货币相关：MSTR 7%，Circle 4%。  \n   - 现金比例为-15%，表示融资状态，较之前10%融资有所提升。\n\n3. **操作策略细节**  \n   - 太空板块利用两倍ETF增加杠杆，对SATS采用买入正股+卖出看跌期权组合。  \n   - 英伟达小幅增仓并持有远期看涨期权。  \n   - MSTR定投策略为低于成本价即买入，控制仓位不超过7%。  \n   - 期权策略用于收益增强，非纯投机，特斯拉持仓不超过23%。\n\n4. **个股技术面与操作细节**  \n   - 英伟达股价在198-200美元区间获得20日均线支撑，已两次在200和210美元加仓。若跌破182美元筹码峰，计划转仓至两倍ETF。  \n   - Meta卖出2027年4月到期、行权价550美元的看跌期权，权利金收入50美元/手，建仓成本控制在500美元以下。  \n   - 火箭实验室单日涨7%后回调，20、60、120日均线多头排列，4月16日缺口已回补，设置30美元止损位，目标价38美元。  \n   - SATS股价近期在115-137美元区间波动，120美元以下为加仓区间，每周卖出115美元行权价看跌期权，权利金2000-2500美元/10手。\n\n5. **加密货币板块动态**  \n   - Circle受《Clarity Act》监管政策利好，股价单日上涨9.71%。  \n   - MSTR从400美元起开始定投，当前均价低于200美元，现价177美元，浮盈后暂停定投。  \n   - 结合比特币企稳趋势判断卖点，控制风险。\n\n6. **其他重点个股**  \n   - 美光科技作为退休仓位，现价接近550美元，持仓成本约400美元，收益率已达40%。  \n   - Lumentum股价创年内新高，短期回调至800美元附近存在买入机会。  \n   - Cerebras Systems计划IPO，预计融资40亿美元，市场关注度高。\n\n7. **未来事件和市场关注点**  \n   - 火箭实验室5月12日新建火箭试飞，财报预期利好。  \n   - SpaceX预计6-7月上市，市场评估对SATS影响中性偏正面。  \n   - 期权市场活跃，5月1日火箭实验室期权成交量达10.7万张，未平仓合约91.29万张。\n\n8. **社区与信息渠道**  \n   - 投资者可通过YouTube频道、Twitter（@ACEfrom money life）和Patron会员互动，获取7天免费试用及实时更新。  \n\n9. **综合风险提示**  \n   - 特斯拉重仓风险较大，虽近期反弹缓解部分担忧，但仍需谨慎。  \n   - 投资需结合技术面和基本面，避免盲目追高，合理使用融资和期权策略。  \n\n综上，本次投资策略充分利用市场反弹机会，重点布局太空科技和AI基础设施板块，结合期权策略提升收益与控制风险，加密货币板块稳健定投，关注技术面与估值优势，持续追踪行业动态和关键事件，灵活调整仓位，力求实现长期稳健增长。","mentions":[],"mention_roles":[],"attachments":[{"id":"1500067667074355381","filename":"202652-2026-05-02T01-16-35-07-00-_RKLBSATSNVDA_META_MU_LITE.mp4","size":93134679,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1500067667074355381/202652-2026-05-02T01-16-35-07-00-_RKLBSATSNVDA_META_MU_LITE.mp4?ex=69fb0ae1&is=69f9b961&hm=ce2a45c7e3a025cd1590ccbd0fd9b725398c1d2ca727af3b0bc31116b894f89f&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1500067667074355381/202652-2026-05-02T01-16-35-07-00-_RKLBSATSNVDA_META_MU_LITE.mp4?ex=69fb0ae1&is=69f9b961&hm=ce2a45c7e3a025cd1590ccbd0fd9b725398c1d2ca727af3b0bc31116b894f89f&","width":1920,"he
