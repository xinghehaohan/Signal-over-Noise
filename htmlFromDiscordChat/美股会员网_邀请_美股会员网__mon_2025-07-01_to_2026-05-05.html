":544,"height":678,"content_type":"image/png","content_scan_version":4,"placeholder":"ZhcFTgTcmfd4d0d3iIh4fEenh3A8nPc=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-26T03:29:21.632000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1465186827924406415","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-27 SATS建仓基本完成，RKLB在预料中的回调后可以加仓了吗？以及ISRG 2025Q4财报更新 @everyone \n\n这篇帖子内容包括：\n- 再次加仓SATS，基础仓位完成！\n- RKLB从100回调到80，20%回调，可以加仓了吗？\n- ISRG 2025Q4 财报基本信息解读\n\nSATS难得大跌，加仓！\n\n昨天刚好半夜醒了，距离收盘还有半个小时，打开手机发现太空板块下跌幅度相较于开盘进一步拉大。我选择再次加仓SATS，操作包括：\n- 119 买入100股正股\n- 15.5的价格买入2026-07 3张看涨期权（本意是要买现在已经有的9月的，但是买错时间了）\n\n目前我的SATS仓位\n- 看涨期权 call，1.5%\n- 卖出看跌期权 sell put，1.9%\n- 正股，3.1%，均价119\n总计仓位6.5%，这是我SATS的基础仓位，之后除非出现较大幅度下跌，我不会轻易再加仓。\n\nRKLB大跌近10%，能加仓吗？\n\n我在80-100的位置持续提醒大家不能加仓，因为估值太高我认为不合理。现在股价如预期下跌，算是我猜中了。那现在80的位置相较于100已经下跌20%，能加仓吗？\n\n答案还是不行，除非，你没有任何RKLB仓位，那么在现在20MA部分建仓我认为是可以的。\n- 昨日收盘价明确跌破20MA，且20%的跌幅按照历史来看不算什么，完全有可能继续下探。\n- 从趋势来看，15分钟和一小时的短期趋势已经走坏，但是日线图趋势还没出现趋势变化，可是一旦接下来几个交易日继续下跌，趋势也会变坏。请注意，这里的趋势是根据不同技术指标得出的结论，没有绝对。我是看之前为大家分享过的trading view上的指标。\n- 总体来看，现在是机会小于风险，之前我认为绝对不能加仓，现在是需要非常谨慎加仓。\n\n现在的位置可以作为尚未建仓的朋友部分建仓的起点，但对于大部分已经持有RKLB的朋友，下方第一个可以考虑加仓的位置是74左右。这里是上一个震荡区间的上沿（或许有支撑），也是12月底爆发之前在选择方向时徘徊的位置。但是，我依然不建议在这个位置大量买入正股，对于我而言，我只会考虑在这个位置进行sell put操作，选择行权价做55-60左右，明年到期的，长期卖出看跌期权。","mentions":[],"mention_roles":[],"attachments":[{"id":"1465535482799587480","filename":"2026-01-27_10.27.40.png","size":1221369,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1465535482799587480/2026-01-27_10.27.40.png?ex=69faa8c7&is=69f95747&hm=f4d7b336d41f48c17702387c58005b12f29f61380d8c9991af4f8476a9f48fd2&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1465535482799587480/2026-01-27_10.27.40.png?ex=69faa8c7&is=69f95747&hm=f4d7b336d41f48c17702387c58005b12f29f61380d8c9991af4f8476a9f48fd2&","width":4542,"height":2586,"content_type":"image/png","content_scan_version":4,"placeholder":"/PcBBIAxZXVnqZqFd38hrwmSag==","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-27T02:34:47.502000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1465535483093455103","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \nISRG 2025Q4财报\n\n我这里只是简单解读财报数据：\n- 营收超预期，图一可以看到四季度营收相较于上一季度大幅增长，不过公司四季度通常表现强势，同理可以参考上一年四季度。\n- 图二具体营收细分中，配件收入相较于上一季度大幅增长，不过这也是因为四季度的关系。\n- 图三，手术机器人当期净增加数量表现平稳，没有差，也没有很好。\n\n2026年，公司预测在手术数量上会增长13-15%，这个预测只能说是符合预期，完全不能够提振股价。我也要特别提醒，ISRG会受到美国医保财政支出收紧的影响，因为医院的预算会收紧，那么ISRG的使用会收到压力。关于这部分压力，ISRG已经计算在内，然后才给出了2026年13-15%这个预测。我暂时还是不会考虑投资ISRG，持有的朋友需要谨慎，控制仓位，见好就收。但是，我夜同意这是一支可以长期持有不动的股票。我要特别说明AI和机器人发展对ISRG的影响：\n\nISRG的业务不会被人形机器人取代。我认为马斯克说的三年内人形机器人可以进行绝大多数手术操作这个预测是过于过于乐观了。马斯克特斯拉公司的灵巧手和ISRG的手术机器人完全是不同的硬件技术，它们完全不是竞争关系，除非特斯拉单独开新的手术机器人业务。换句话说，ISRG依然是绝对的垄断者。\n\nISRG受益于AI，AI可以辅助ISRG手术机器人让它变得更加智能、方便，比如AI可以实现更多手术机器人的自动化，也就是不需要背后外科医生的控制操作。这有助于增加ISRG的使用率。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-27T02:47:34.799000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1465538701370327102","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","disc 63399781/1465538859378151424/2026-01-27_10.13.47.png?ex=69faabec&is=69f95a6c&hm=ce2bdb493e8feb85bbd8ca8cf7e6afa2c6a58f5ba3aadcb84314e069e4ebebec&","width":2316,"height":1434,"content_type":"image/png","content_scan_version":4,"placeholder":"/QcCBIDZueznd2UOtgWa278UAw==","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-27T02:48:12.511000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1465538859545919747","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-01-28 大盘在财报前极度乐观，RDW暴涨原因，以及我对通用人工智能的理解。 @everyone \n\n这篇帖子包括：\n- 大盘走势非常乐观！\n- RDW获得了新合同？\n- AI，你如何看待？","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-28T02:01:59.194000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1465889615276933173","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\n科技大厂财报季前，大盘乐观\n\n最近两天纳斯达克和标普的走势非常健康，也非常强势，这意味着对于即将到来的科技大厂的财报结果，市场非常乐观。标普无限接近7000点关口，纳斯达克也果断突破前期阻力627左右，准备冲击历史新高。\n\n目前市场对于FOMC一月降息的概率，一致认定不会降息，而且在等待新任美联储主席的宣布。另外，大家有一些害怕的政府再次停摆，从目前的消息来看，似乎不会发生。整体市场宽度很好，一月份的美股很舒服。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-28T02:02:09.801000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1465889659765657621","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\nRedwire疯涨\n\nRedwire Selected for Missile Defense Agency’s $151 Billion Multi-Vendor SHIELD IDIQ to Support Homeland Defense\"\n\n以上是RDW官网的新闻标题，请注意措辞，是被 selected入选，不是被授予合同awarded。另一个关键词，multi-vendor，意思是导弹防御局MDA的SHIELD项目有成百上千个承包商入选，总合同金额1510亿美金。很简单就看出来，我们暂时不知道RDW能拿到多少确定的合同金额。\n\nSHIELD 全称是“可扩展国土创新企业分层防御”。它是美国导弹防御局  MDA 为了落实金穹计划而设立的具体采购框架。其实现在你的太空股票关注列表里面，有一大半都已经入选了SHIELD，包括ASTS, SIDU, MDA Space，还包括英特尔这样的芯片制造厂。\n\n有朋友问，RDW是否是比SATS更好的投资标的？这是一个典型的不同投资者会给出不同答案的问题，没有标准答案。我的答案：对我来说肯定不是，我的仓位不确定性非常高了，我希望有更多仓位追求相对确定性，SATS就给了我这种确定性，而且还可以部分对冲SpaceX可能对RKLB造成的负面冲击，因为有的投资者忌惮SpaceX上市压缩RKLB的估值空间。但对于有的朋友，RDW上行潜力很大，能带来比SATS更高的回报，同时就要承担更大的风险。回到本质，RDW是否是一家可以长期持有的好公司，或者说是否是太空板块里面最吸引我的公司？目前我的答案很明确：不是。相信它们会持续进步，我们继续观察。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-28T02:02:23.556000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1465889717458309343","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\nAI 带来的焦虑\n\n最近看了很多达沃斯论坛对于AI的讨论，也跟着会员朋友们一起了解vibe coding，一些讨论AI对我们产生的影响。我总结下目前我的想法，大家有什么观点，欢迎评论！\n\n首先，在某些领域，所谓的“通用人工智能”已经到来。主要是以数学计算和逻辑为基础的领域，特别具有代表性和划时代意义的就是编程。为什么这样说？倒回去十年，甚至五年，你能想到今天的vibe coding吗？软件工程师，不是全部，但是大部分，都在AI辅助编程成熟之后，变得可以被完全替代。这曾经是包括我在内羡慕的一份职业，但是现在不那么羡慕了，反而觉得惋惜。\n\n但是，除了以数学计算和逻辑为基础的领域，其它很多更具有未知成分的领域（计算不能解决所有问题），比如我为大家介绍的谷歌Alphafold蛋白质和药物小分子的结合反应，又比如对于硬件要求很高的领域，人形机器人，距离所谓的“通用人工智能”还很远。我早上刚看了Figure AI最新的人形机器人视频，虽然可能业内领先了，不过这样的灵巧度和速率，我是绝对不可能去购买的。我自己常常做家务，这样的水平其实对于做家务的人来说，没什么太大帮助。但是！我们千万不能把人形机器人局限在工厂或者家务，它能够被运用到很多特定场景，我依然对人形机器人的前景感到无比乐观。\nhttps://www.youtube.com/watch?v=lQsvTrRTBRs\n\n我认为随着AI应用更加广泛，失业率上升几乎是必然的。在这里我不知道未来的答案，我不想过于乐观相信马斯克的全球富足/消除贫困，也不想过于悲观认为世界将完全被AI取代。我们现在生活在一个过渡年代，更多使用AI，然后尽早理解AI可能如何对我们每一个个体造成的影响，提前做好准备，心理上，财务上。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[{"type":"rich","url":"https://www.youtube.com/watch?v=lQsvTrRTBRs","title":"Introducing Helix 02","description":"Last year, Helix showed that a single neural network could control a humanoid’s upper body from pixels. Today, Helix 02 extends that control to the entire robot - walking, manipulating, and balancing as one continuous system.","color":16711680,"author":{"name":"Figure","url":"https://www.youtube.com/channel/UCYlq-KmwPjc1DtsGmthFqSQ"},"thumbnail":{"url":"https://i.ytimg.com/vi/lQsvTrRTBRs/maxresdefault.jpg","proxy_url":"https://images-ext-1.discordapp.net/external/ODcr2RgBnkOrCy9CTokKVWOmfly9W5nQptN6bvieyVg/https/i.ytimg.com/vi/lQsvTrRTBRs/maxresdefault.jpg","width":1280,"height":720,"content_type":"image/jpeg","placeholder":"0fcJBIBWWGmaaJY2hoC2YFULVw==","placeholder_version":1,"flags":0},"content_scan_version":4}],"timestamp":"2026-01-28T02:19:18.086000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1465893972705677376","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n大家早上好，今天会跳过文字更新，两个小时候会发布特斯拉的财报视频。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-29T01:39:28.953000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466246339821174879","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n大家好，下午的时候我发布了特斯拉的视频，今天微软和脸书的财报我只是简单看了一下结果，明天如果有什么想分享的结论，再通过明天的文字分享给大家。\n\n我认为Mata现在又到了700以上，如果你之前500 600都没有买入，现在不应该再去买。而对于微软，我个人一直都是不喜欢这家公司的，当然这不代表他不是好公司，各有喜好。七巨头里面，我并不认为微软是最具有吸引力的科技公司。\n\n另外，RobinHood和Palantir两家公司，他们的股价都是在一个比较重要的筹码峰附近。现在如果你买入，相当于是左侧去赌未来它可以在这个筹码峰附近站稳，然后反弹。我对两家公司都是挺有好感，而且长期都是觉得看好的，但是暂时还是选择中性，继续观望，我目前只是持有一些上周建仓的HOOD SP. @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-29T10:30:16.870000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466379919666974784","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n我在板块讨论区分享了HOOD PLTR的筹码峰和均线分布，需要特别小心点的是，这两个图形，都必须在未来一两周实现反转，避免出现均线向下交叉太久，否则，图形会延续现在的趋势，完全走坏，20MA向下跌破60 120MA, 这在过去很久都没有出现过的。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-29T12:33:00.483000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466410804898304002","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n上次这两支股票，20MA跌破60和120MA，要追溯要2023年去了。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-29T12:34:35.938000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466411205265592342","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1466411293635383427","filename":"1c55f8560f36ea41e00ae01b424b9a85.png","size":150728,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1466411293635383427/1c55f8560f36ea41e00ae01b424b9a85.png?ex=69fb3571&is=69f9e3f1&hm=0a13b6f2c47b489136e6917906e715e21e1a7e3839563402a705c6ed71b2c5df&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1466411293635383427/1c55f8560f36ea41e00ae01b424b9a85.png?ex=69fb3571&is=69f9e3f1&hm=0a13b6f2c47b489136e6917906e715e21e1a7e3839563402a705c6ed71b2c5df&","width":2284,"height":1334,"content_type":"image/png","content_scan_version":4,"placeholder": ll,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1466575971858780483","filename":"IMG_9068.png","size":74894,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1466575971858780483/IMG_9068.png?ex=69fb260f&is=69f9d48f&hm=84789f237721abf8d12116d40a89f7f6a7076e5507e2286fc879b7576b9d9e1e&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1466575971858780483/IMG_9068.png?ex=69fb260f&is=69f9d48f&hm=84789f237721abf8d12116d40a89f7f6a7076e5507e2286fc879b7576b9d9e1e&","width":1178,"height":245,"content_type":"image/png","content_scan_version":4,"placeholder":"/fcFAYBQmqqIZvaLQJoPpPo=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-29T23:29:19.346000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466575971820900499","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n这次进行合并的消息来自彭博社，所以应该是具有一定的可信度，我还没有来得及完全去消化其他的信息，嗯，不过还是决定先加仓，晚点再和大家分享具体的想法。合并从估值上来讲肯定是好事，但是同时也会造成大量的股权稀释，所以一正一反，按照我之前视频的解读，我是希望单独上市。","mentions":[],"mention_roles":[],"attachments":[{"id":"1466583559023366235","filename":"IMG_9069.jpg","size":129021,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1466583559023366235/IMG_9069.jpg?ex=69fb2d20&is=69f9dba0&hm=688011169e4898b9d1865a8146dddebb703cc3dd52352a57cf76dffecdb8ed93&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1466583559023366235/IMG_9069.jpg?ex=69fb2d20&is=69f9dba0&hm=688011169e4898b9d1865a8146dddebb703cc3dd52352a57cf76dffecdb8ed93&","width":1179,"height":1616,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"8vcNDQCFmJ93N3aYeIiHh6qfivqY","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-29T23:59:28.370000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466583559417495717","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-01-30 今天重要的交易记录：SATS / RKLB / HOOD / APP\n\n这篇帖子主要记录昨天盘中以及今天盘后的操作，还覆盖了我对SpaceX xAI TSLA合并的解读！ @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-30T03:00:59.721000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466629241054564412","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n大盘出问题了吗？\n\n前天我文字帖子里面的副标题之一是 “科技大厂财报季前，大盘乐观”，刚过了两天，大盘就无缘无故大跌，开盘两个小时内跌幅非常吓人，VIX飙升20%。可是我们想想，这几天大科技财报：Meta、微软、苹果，业绩都很好，只是市场对它们业绩解读不同导致股价有涨有跌罢了。我目前的看法还是，大盘只是在修复，特别是标普7000点是一个重要的心理关口，上上下下很正常。2024年4几度财报目前看起来非常优秀。这是标普持续上涨的基本面支撑。\n\n昨天一些列操作\n\n昨天开盘和今天盘后，我进行了较多的看多操作，我把它们列在下方，然后也把我的最新持仓放在图片里面，供大家参考。\n\n卖出1000股RKLB：我在盘后分别以86 和 85 的价格卖出了总共1000股RKLB。卖出的原因：主要是为了补足现金，以供下方的加仓。哪怕卖出了1000股，目前我的RKLB仓位依然很高。\n\n加仓SATS 正股 + 期权\n- 昨天开盘股价下跌：加仓了4张7月到期、行权价135的call，目前总共7张；原本我还有7张9月到期的call，所以目前call合约总共14张。显然我期权加仓加早了，但是没办法熬夜看盘。\n- 今早上睡觉醒来发现SATS大跌超过10%，盘后还在跳水，于是我在110的价格大幅度加仓了300股SATS正股，我的正股数量翻倍来到600股。\n- 目前我的SATS 正股+期权仓位接近10%。\n\n加仓HOOD Sell Put：追加3张12月到期、行权价90的sell put，目前总共-8张合约。\n\n投机性质、带止损建仓APP：568买入100股正股，设置自动止损490。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-30T03:01:06.309000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466629268686770390","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\nSpaceX + xAI + TSLA，SATS\n\nSATS昨天盘中已经大跌超过10%（可能有人知道提前知道了消息），盘后因为彭博社新闻说SpaceX要和特斯拉，或者和xAI合并上市，SATS盘后一度继续暴跌。上次第一次传出特斯拉的消息的时候，我认为不可能。为什么这次我认为合并上市是很有可能发生的。\n\n首先，这是彭博社消息，还是有一定可靠度。其次，昨天财报特斯拉突然宣布TSLA已经投资了xAI20亿美金，这对于我来说是有点意外的，因为股东大会明确没有通过这个决议。更重要的是，三家公司的整合，确实有背后的合理逻辑：一个内循环的逻辑。但请特别注意，这种整合，可以是完全合并上市，当然，也可以是相互投资，但是分开上市。特斯拉已经投资xAI，特斯拉完全可能再投资SpaceX。请注意，投资也可以是互换股权，不一定非要真金白银。下面是三个公司内训坏的逻辑，我们简称 “马斯克内循环”：\n\n- xAI有算力（特别是“巨硬”项目）  有 Grok，可以卖给TSLA（比如昨天财报说的2026资本支出200亿美金有一部分是需要分配给Optimus的模型计算）。由此，xAI录得更多营收；\n- TSLA 现在计划整合之后的 AI7 / Dojo3 芯片，而且TSLA最近频繁释放要自己修建芯片晶圆厂的消息，这些芯片可以卖给SpaceX，因为SpaceX有卫星 有火箭，太空算力卫星可以使用TSLA的芯片。由此，SpaceX录得更多营收；\n- 而TSLA已经投资了xAI, 如果特斯拉再次通过某种形式拥有SpaceX的股份，那么因为xAI和SpaceX营收不断增加，也会让TSLA的估值受益。\n\n “马斯克内循环”在本质上和之前的Open AI没有区别。但仔细想想，OpenAI自己现在造血有限，但却是循环经济的核心；而 “马斯克内循环”，显然xAI并非核心，核心还必须是已经能够造血的SpaceX和TSLA。\n\n这个消息对于SATS的影响，我暂时的评估是中性！\n- 负面：增大了SATS估值的不确定性，特别是对于股权稀释的担忧。我之前给出的股权稀释假设是20%，但是如果真的合并上市，肯定不止20%；\n- 正面：我非常相信马斯克能够带领投资者赚钱，不管什么形式，所以我心理上并不抗拒这种 “马斯克内循环”。合并上市必然推高上市估值，这里一负一正，未来如何，只能等待。\n- 基于中性的判断，既然出现了股价低点，那么原计划加仓是我的决定。\n\n同时，我选在卖出1000股RKLB，相当于是我把太空板块里面RKLB的部分资金，完全转移去了SATS。还是投资在同一个板块，但是从Peter Beck部分转移去马斯克，和马斯克的绑定更深了。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-30T03:01:32.517000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466629378610823304","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\n为什么投机APP\n\n这个时间点选择投机APP，我有以下几个考量：\n- Meta财报很好，广告业务公司依然目前AI受益的大赢家，我也看好谷歌接下来的广告业务数据。\n- APP从K线图看，有在510这个位置两次尝试跌破但是都形成反弹，所以尝试在现在这个位置，在二月十一号财报前后买一个上涨预期。\n\n请特别注意，APP存在很多争议，所以一定设置好止损，我的止损位置是510下方一点的490，这是11-21阶段低点的盘中最低价格。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-30T03:07:44.731000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466630939789496391","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\n最新仓位更新","mentions":[],"mention_roles":[],"attachments":[{"id":"1466633063441104907","filename":"2026-01-30_11.14.25.png","size":323514,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1466633063441104907/2026-01-30_11.14.25.png?ex=69fab27b&is=69f960fb&hm=9e96b25e377cbf7bd188ffe02bc34cbd1acf41f73ca2d62da8e9029d547564a0&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1466633063441104907/2026-01-30_11.14.25.png?ex=69fab27b&is=69f960fb&hm=9e96b25e377cbf7bd188ffe02bc34cbd1acf41f73ca2d62da8e9029d547564a0&","width":1280,"height":1746,"content_type":"image/png","content_scan_version":4,"placeholder":"+OcFDQZhu99qRWSYiYx3WGd0D/RN","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-30T03:16:11.102000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466633063663534363","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n大家早上好！\n\n昨晚很多板块都大跌。我的APP刚建仓一天就被打止损，出局[尴尬]。谷歌发布的游戏让整个游戏板块崩溃，我开盘只是看着下跌，早上起床止损单触发。其实APP有点被误伤，因为它主要业务是手游，但是尊重市场。\n\n还有一个重大更新，我再次盘后卖出了1000股RKLB。为什么之前90-100不卖？我在等，一方面看股价到底是否可以像ASTS可以冲破100，另一方面我也在等中子阿基米德引擎QC。很遗憾两个都没等到，我决定通过减仓进行风险控制。这一轮股价80到100的波动，我自己是比较平静的，我也没有期望就必须卖在最高点，特别考虑到现在整个账户情况马马虎虎，所以坦然接受卖在85以下。昨天我总计减仓2000股，目前还有4000股。我接下来的计划：下周希望有回弹机会，我会做RKLB的三月底的Covered Call 获得权利金。剩下的交给时间，如果继续下跌，我再考虑加仓或者做SP。\n\n我的其它股票一月表现糟糕，导致一月整体收益只有2.66%，其实我也觉得ok，一月没有贵金属和存储板块股票不亏钱算很好了。保持乐观。\n\n目前我现金仓位来到25%，让我对接下来的二月更有安全感。刚刚提到我持仓中其它的股票表现糟糕，但是这些公司我做好了继续持有的心理准备，不到万不得已不会止损。\n\n有任何问题，请在聊天室提出。我会在健身的时候回复大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-31T01:08:11.158000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466963239509164104","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1466963661036851342","filename":"IMG_9082.jpg","size":26372,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1466963661036851342/IMG_9082.jpg?ex=69fb3d9f&is=69f9ec1f&hm=48185154a3d994c54f5dd8b4fd13313fef66b81edd5ec68393a51025cd573b74&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1466963661036851342/IMG_9082.jpg?ex=69fb3d9f&is=69f9ec1f&hm=48185154a3d994c54f5dd8b4fd13313fef66b81edd5ec68393a51025cd573b74&","width":1179,"height":521,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"PPgBA4Ag7t3Rl0Vrr4k26Pw=","placeholder_version":1}],"embeds":[],"timestamp":"2026-01-31T01:09:51.724000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1466963661313540217","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n大家好，我在下午的视频说明了我这个月做日内交易。这里对会员做一个特别说明，避免一些不必要的误会，或者误导。\n\n结论：一月份我在RKLB上多次全仓做日内，怎么做？如果觉得股价涨得过高，先卖出再低点买入，反之，如果觉得股价跌得过多，先买入再低点卖出。我一开始的目标是把所有6000股成本降低为0，事实是也成功做到了。做到零，就是收手的时候。\n\n说明：RKLB是我非常熟悉的公司，所以做日内比较有信心，而且日内波动巨大，做差价空间很大。除了RKLB之外，我做过两三次ASTS的先卖后买的价差，没别的原因，就觉得有时候涨得太夸张，都是先卖再买。还做过一次USAR，也是同样先卖后买。以上，大部分都是成功的，也有偶尔失败不得不承受损失。\n\n做日内没办法分享，因为这个需要盯盘，需要争分夺秒，而且需要持续修改下单价格。所以我没有分享每次作日内交易的信息。请理解。除此之外，所有操作都是尽量第一时间分享。\n\n以后，不会再继续做日内操作，因为我知道总有一天会失手造成巨大的机会成本损失。而且精力消耗太大，身体遭不住。\n\n感谢。 @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-01-31T11:41:48.690000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1467122696595833040","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n\nhttps://youtu.be/qY9N9s9TnX8","mentions":[],"mention_roles":[],"attachments":[],"embeds":[{"type":"rich","url":"https://www.youtube.com/watch?v=qY9N9s9TnX8","title":"黑色星期一到来之前，看看我的操作计划！","description":"Ace邀请您通过下方链接订阅我的【Patreon会员】\n👉🏻 https://www.patreon.com/13295018/join\n\nPatreon频道介绍与资源：https://www.patreon.com/collection/1545186?view=expanded\nPatreon会员专享视频链接：https://www.patreon.com/collection/1545137?view=expanded\n\n如果您选择加入Discord会员级别，请按步骤...","color":16711680,"author":{"name":"Money or Life 美股频道","url":"https://www.youtube.com/channel/UC9cfcOuTT9rYkyUimMjLxuw"},"thumbnail":{"url":"https://i.ytimg.com/vi/qY9N9s9TnX8/maxresdefault.jpg","proxy_url":"https://images-ext-1.discordapp.net/external/P_qc3q-YnPh95Z4J52OqA1NuNzXK2iVJI3zbRxWXV8o/https/i.ytimg.com/vi/qY9N9s9TnX8/maxresdefault.jpg","width":1280,"height":720,"content_type":"image/jpeg","placeholder":"qhkGPIR2yJ1/ZrmXeKeZkF0EZw==","placeholder_version":1,"flags":0},"content_scan_version":4}],"timestamp":"2026-02-01T08:08:18.782000+00:00","edited_timestamp":null,"flags":1024,"components":[],"id":"1467431355813068892","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n这个视频说了我的计划，请看看。如果明天大跌，我会：\n- 执行MSTR 2月定投\n- 加仓SATS 正股，开盘下跌过多，也会考虑加仓call\n- 考虑减仓TSLA（时机未定）","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-01T08:08:20.419000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1467431362679148588","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-02-01 会员必看：50%+仓位 SATS + RKLB的阐述！\n\n为什么投资SATS？因为SpaceX！\n\nSATS去年九月通过频谱交易获得了SpaceX约2.78%的股份。这些股份的原始价值是基于SpaceX 4000亿估值，但是九月之后很快估值来到了8000亿，再后来就是传言15000亿上市，再到现在传言与xAI合并上市。\n\n因为SpaceX估值的攀升，SATS变成了潜在的“价值洼地”：假设现在到上市SpaceX股权稀释20%，又假设确实是按照15000亿上市，那么SATS按照市净率=1估值，每股合理价格 = 175。无论最终是否与xAI合并上市，决定175这个数字变化的，就是以上两个变量：IPO之前的股权稀释，以及最终上市定价。\n\nSpaceX 2025年营收150-160亿美金，息税折旧摊销前利润80亿美金，EBITDA% = 50%。这是非官方报道，具体数据需要等IPO S1文件披露。我想传达的信息：\n\n因为SpaceX本身企业的巨大优势，加上马斯克的执行力与愿景，SpaceX对我而言能在上市前参与投资，极具价值。\n\nSpaceX如果能顺利在今年按照15000亿上市，这将注定2026年，如果整个美股环境表现良好的前提是，是一个太空投资大年。会带动整个行业的估值：更加吸引投资者特别是机构投资者的目光，吸引更多的资金，整个板块将会上一个台阶。水涨船高，太空板块的优质公司 + 稀缺公司将迎来新一轮的爆发。优质公司，比如RKLB；稀缺公司，比如ASTS。\n\n我怎么投资？\n\n首先，上仓位，至少15%，甚至更多。SATS更具估值不能实现翻倍，所以要增加绝对收益，就需要上仓位。上仓位除了买正股，通过call利用“杠杆”看多，就是一个高效利用资金的方法。\n\n其次，SpaceX IPO前部分退出，IPO当天再根据二级市场定价，决定是否立即退出剩余所有的仓位。没人知道SpaceX IPO那一天会发生什么，是延续估值的疯狂，还是破发。考虑到SpaceX上市后就可以完全确定二级市场的定价，那么SATS的投机属性或者说是不确定性将大大减弱，因为它按照市净率=1算出来的估值是一个确定的数字，那么还存在投机获利的空间就很小了，因为总有钱会去套利。而且SpaceX上市后，我们就可以选择购买SpaceX股票，而不是只能投资SATS。\n\nIPO当天，买入一些SpaceX的股票，长期持有。\n\n风险是有的！\n- SATS管理层特别创始人历史上不靠谱，公司长年业绩下滑。\n- SATS和SpaceX的频谱协议最后出差错。（具体频谱交易的落地执行，其实还未完全完成的，SATS管理层之前透露，可能2027年才能完成。从这个角度看，或许是好事，因为这部分股份，SATS无法在拿到之前变现，锁死了。）\n- SATS出现现有债务的纠纷。（公司现在有很多现金，但是也有很多债务要清偿。）\n- SATS使用现金进行其它投资，但是如果市场不认可这些投资，那么市净率可能连1都没有，估值就要往下走。（已经明确成立了投资子公司，SpaceX就是目前唯一的投资，接下来公司可能有其它投资，类似与一个投资基金。）\n\n激进配置太空仓位！\n\n我持仓的太空部分仓位总和，会随着SATS仓位的增大而增大，目前加上期权，我的RKLB+SATS仓位已经来到了40%左右。大家知道我上周减仓了RKLB，其实这部分仓位已经部分去到了SATS。我会确保自己太空仓位总和至少50%。2026太空投资大年，这是我目前大胆押注的计划。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-01T14:36:37.876000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1467529079296364630","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n今天的视频，我说了下面这句话，“SATS会是我2026年投资的一个重点”。我知道依然有很多会员朋友不理解，这里我通过文字再次陈述我的逻辑和投资计划。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-01T14:39:30.529000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1467529803455533321","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n虽然SATS没下跌，但是我还是直接执行计划。\nTSLA的减仓增加了现金仓位，留给SATS更多未来加仓空间。\n\n- 执行MSTR 2月定投 >> 确实跌了不少，定投买入\n- 加仓SATS 正股，开盘下跌过多，也会考虑加仓call >> 每下跌，少量加仓。\n- 考虑减仓TSLA（时机未定） >> 决定了那就不犹豫，现金仓位加大，加强账户安全。","mentions":[],"mention_roles":[],"attachments":[{"id":"1467696991160111239","filename":"68fc92a4675234d6eb047a1d48841503.jpg","size":85140,"url": ":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n昨天夜盘开始交易较多，我整理一下 @everyone \n\n买入：\n周一夜盘执行定投MSTR：51股；139。\n周一夜盘+开盘 + 周二夜盘 SATS 操作：\n - 400股；112.5。\n - 3 x 2026-07 Call; 14.35。\n周二夜盘：2400股HIMS，换成17300股HIMZ，两倍看多ETF。\n\n卖出：\nTSLA：150股；422.5。\n\n今晚周二期权交易\n- SATS 买入 3 x 2026-09 Call（成交后总共20张，7月和9月各10张）\n- 平仓HIMS的Sell Call，目前盈利 3500 usd（现在我做多HIMS，不打算持有备兑看涨期权，持有Sell Call和我HIMS换HIMZ的行动矛盾。）","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-03T11:40:11.842000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468209453982683249","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n两个交易执行完毕","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-03T14:49:30.948000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468257097526546636","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n接下来，SATS和HIMS，我要做的就是等待而已。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-03T14:52:16.983000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468257793927811270","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-02-04 仓位调整详细说明，以及对目前市场不同板块的看法！ @everyone \n\n今天的帖子包括了以下内容：\n- 2026开年，仓位调整后的最新持仓详细更新！\n- 很多板块在下跌，我对不同板块的投资观点。\n\n仓位调整完毕\n\n一月底二月初进行了一系列仓位调整，我把最新的仓位完整分享出来。一些主要的变化：\n\n实现了SATS的完整建仓，正股+期权 总体仓位15%+。对于SATS，特别说明：\n- 一月开始强推SATS，自己也知行合一上大仓位，我肯定还是很有压力的，但是我很愿意承担这样的风险，这也很符合我自己的投资思路和投资习惯：研究好了就自信买入。\n- 如果SATS几个月后没涨，要么我的计算出了问题，要么我计算背后的假设出了问题，我大概率可以知道为什么。但是相比之下，DXYZ这种ETF，我从去年就说不会去投资也不建议投资，DXYZ你只能投机，因为它的股价和SpaceX的相关性是不直接的，它和情绪的相关性以及资金流向更相关。如果我投资DXYZ最后亏钱了，我根本不知道为什么亏钱，这样的操作我就不会去做。\n- SATS建仓完成，剩下的就是耐心等待。\n\n减仓了RKLB & TSLA，两大重仓股仓位总和从原来的70%下降到50%：\n- 什么时候加仓RKLB？我的建议是等半个月之后的财报，某些朋友可以在财报前后分两次加仓，当然需要根据你的仓位决定幅度。对于价格，我自己70以上是完全不会考虑加仓的。\n- 我的RKLB Sell Call操作计划：和之前沟通的计划一样，如果RKLB股价有回弹的机会，比如趋近85-90的价格，那么我会进行全仓Sell Call操作，赚取权利金，部分对冲下行损失。这个操作需要在财报发布前进行，否则没有太大意义。Sell Call的时间会选择一季度也就是3月底；Sell Call的行权价会选择115；Sell Call的数量是对应我的股数，40张合约。这背后的思路：\n    - 一季度不太可能实现on pad，且大概率会在财报宣布延迟；\n    - 110左右是我计算出来RKLB的估值上限，上了这个价格，我可以接受在中子尚未发射前卖飞。\n\nHIMS部分股票赚两倍ETF HIMZ，并且平仓了Sell Call，这都是看多的操作，HIMS哪怕继续下跌我也不会止损。有不少会员朋友为背后的逻辑，我的逻辑很简单，在价格相对低点，加大风险%，从而加大回报%，这就是一个数字游戏的策略，和我对HIMS看法是否有转变完全无关，我的HIMS看法还是看多。","mentions":[],"mention_roles":[],"attachments":[{"id":"1468429787675754626","filename":"2026-02-04_9.54.06.png","size":329204,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1468429787675754626/2026-02-04_9.54.06.png?ex=69faa44f&is=69f952cf&hm=a1a21ba900d6397f7fd4a2d9f82869b4c83d81b620d363031c1d628ff24a4983&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1468429787675754626/2026-02-04_9.54.06.png?ex=69faa44f&is=69f952cf&hm=a1a21ba900d6397f7fd4a2d9f82869b4c83d81b620d363031c1d628ff24a4983&","width":1278,"height":1694,"content_type":"image/png","content_scan_version":4,"placeholder":"OPgFBQRQuu9qZWSJiJt4aG9wMuYM","placeholder_version":1}],"embeds":[],"timestamp":"2026-02-04T02:15:43.545000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468429787914703024","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n市场很多板块都在下跌\n\n加密、医疗、软件、AI基础设施，这些板块都在下跌，软件板块更是残暴。我看到会员群有朋友说：“看不懂现在这个时候去买XXX、YYY公司股票的逻辑”。我回复了以下：\n\n很多时候一家公司基本面和未来前景没那么差，只是下跌中坏消息满天飞，负面情绪压抑，就和一个人负面情绪太重的时候，周围是没有让他开心的任何事情的。更重要的是，投资者需要判断，哪一些公司你仅仅是因为它股价上涨而觉得好（如果是，你可以参与，不过短期投机就行）；哪一些公司是不管价格多少你都觉得好，那对于这些公司，价格相对较低的时候，对于你就是投资的机会。\n\n请注意，我说的是“你”，不是我，也不是某一个其它财经博主。你要有自己的判断，有可能和我的不同而已。下面是我的想法：\n\n我不会投资的公司：\n- 到现在都未实现完全AI转型的软件公司，比如Adobe；\n- 受到政策影响极大且并无绝对垄断的大型制药公司，比如NVO；\n- 我不感兴趣所以不愿意去研究学习的板块，比如贵金属；\n- 我错过了且认为现在追高是不理智的板块，比如存储。\n\n我会继续看好的公司，不管股价跌了多少：\n- 整个太空板块，这个不用多解释了，何况现在太空直接和AI强联系了；\n- AI完全驱动且已经受益的公司，比如PLTR, APP;\n- 加密 & 年轻一代的数字银行和交易券商，比如CRCL, MSTR, SOFI, HOOD;\n- 为年轻人提供便捷医疗保健服务的公司，比如HIMS，和AI生物科技公司，这个我在之前视频阐述过。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-04T02:31:43.742000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468433815272816958","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n如果今晚或者本周任何时候，RKLB有机会冲上85，我会考虑执行sell call.","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-04T03:26:50.712000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468447685710319678","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-02-04 硬件为王：特斯拉 & SpaceX被低估的地方！\n\n硬件为王\n\n这篇帖子，我想简单阐述，外界普遍低估，或者叫 under appreciate 特斯拉以及SpaceX的一些业务。首先我要提一个观点：在AI技术飞速发展使得AI技术平权、让普罗大众都受益的今天，硬件的设计和大批量制造能力显得越来越稀有，而这个能力有时候被我们理所当然忽视了。\n\n现在美股七巨头：英伟达、谷歌、苹果、微软、亚马逊、脸书、奈飞、特斯拉，硬件业务为主要营收的公司有英伟达、苹果和特斯拉，其它都是软件或者平台服务。而面向终端消费者的硬件只有苹果和特斯拉两家。苹果在硬件方面已经吃老本很多年了，不仅搞不出大模型，硬件也搞不出电动车。而特斯拉，是硬件方面，特别是硬件量产方面，是绝对的王者。\n\n特斯拉被低估的业务和技术\n\nCyberCab：开箱式工艺，目标可做到5秒一台车下线。其实它的影响在我看来会比Robotaxi这项业务大很多：它会取代我们未来的出行，不管是你自己买一辆专享，还是使用Robotaxi的共享服务。\n\n4680电池：美国本地锂精炼厂完工 + 干法电极技术成熟，意味着特斯拉进入电池自主的时代。这些电池将让CyberCab、CyberTruck和Semi卡车的电池品质更好，利润率更高。\n\n储能 & 太阳能板：如果储能业务单独上市，那么它能够得到的估值倍数理应比目前任何储能业务上市公司的估值倍数高。储能是特斯拉现有 EV 增长曲线过渡到 Robotaxi + Optimus 增长曲线的重要业务。几周前官宣新的太阳能板，也是为了配合家用储能市场的发展。\n\nSpaceX被低估的业务和技术\n\n现有的SpaceX火箭发射和星链业务被大家低估，这个我在之前的文章已经解释过：\n- 很多人不知道为政府服务的星盾业务，这是高毛利高稳定性的业务\n- SpaceX火箭发射的轮转速度，竞争对手尾巴都看不到\n- 星链卫星通讯服务，这是让电信运营商瑟瑟发抖的业务，目前用户数量飞速发展\n\nxAI虽然估值 PS 倍数高达60+，但是我依然认为xAI对于SpaceX的赋能是非常明显的：\n- xAI的 Colossus 第二集群数据中心正在修建，这个数据中心背后承载了马斯克Microhard巨硬这个项目的愿景：建造世界上最强大的单体数据中心，这将加速未来Grok的训练。马斯克在修建数据中心方面的能力，可以说现在无人能敌。\n- 上面是地表，使用的是NVDA的GB200 300芯片。而太空呢，有可能使用以后特斯拉的AI7 / Dojo3 芯片，建立分布式太空算力集群。\n - 我们不得不承认，AI基础设施在未来是刚需（不管现在neocloud的利润率如何），SpaceX就会是未来数据中心的领先者：同时在地表和太空运行超大规模数据中心。\n\n目前我的仓位有接近70%在特斯拉+太空领域，我也决定尽量尝试 SpaceX IPO打新，以及在上市当天购买SpaceX股票，未来再和大家分享具体计划。\n\n感谢大家！ @everyone","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-04T06:53:39.246000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468499730874237004","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n这是我RKLB的目标SELL CALL","mentions":[],"mention_roles":[],"attachments":[{"id":"1468500669026533550","filename":"image.png","size":312367,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1468500669026533550/image.png?ex=69fae652&is=69f994d2&hm=ec44a79964a8484cd25bdd716b4a65e04a65778f9d7dbbe23dfeea7139e5db80&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1468500669026533550/image.png?ex=69fae652&is=69f994d2&hm=ec44a79964a8484cd25bdd716b4a65e04a65778f9d7dbbe23dfeea7139e5db80&","width":1424,"height":1480,"content_type":"image/png","content_scan_version":4,"placeholder":"/fcBBwBgh5mIZ2Zjmbl32Gdoehfz7QQJ","placeholder_version":1}],"embeds":[],"timestamp":"2026-02-04T06:57:22.973000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468500669253161204","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n这是我RKLB的目标SELL CALL\n权利金3+，40张，总权利金12000+","mentions":[],"mention_roles":[],"attachments":[{"id":"1468501194216444020","filename":"f536782ae95612765d02d04deba97324.png","size":171586,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1468501194216444020/f536782ae95612765d02d04deba97324.png?ex=69fae6d0&is=69f99550&hm=e445eb7ef63dad338b617d9c03e4ab40b5874a1467cd0ee990cd51ea7190f58d&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1468501194216444020/f536782ae95612765d02d04deba97324.png?ex=69fae6d0&is=69f99550&hm=e445eb7ef63dad338b617d9c03e4ab40b5874a1467cd0ee990cd51ea7190f58d&","width":884,"height":1410,"content_type":"image/png","content_scan_version":4,"placeholder":"/PcFBACAmFlVuZqJdoVEMd8K0A==","placeholder_version":1}],"embeds":[],"timestamp":"2026-02-04T06:59:28.114000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468501194132688967","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \nAPP盘前大跌，其实就是一位一个资深业内人士推出了竞品。","mentions":[],"mention_roles":[],"attachments":[{"id":"1468615114755412041","filename":"image.png","size":261387,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1468615114755412041/image.png?ex=69faa828&is=69f956a8&hm=3cdb05928576d7bdba57abfb8c8ef043e4ef8ef80df560e0cd83ba36ce52455b&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1468615114755412041/image.png?ex=69faa828&is=69f956a8&hm=3cdb05928576d7bdba57abfb8c8ef043e4ef8ef80df560e0cd83ba36ce52455b&","width":2486,"height":1178,"content_type":"image/png","content_scan_version":4,"placeholder":"+vcFA4Cit5mCeflqYSA5B6E=","placeholder_version":1}],"embeds":[],"timestamp":"2026-02-04T14:32:08.951000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468615114939699332","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-02-05 NVO LLY减重药之战胜负已定，市场雪崩后我的加仓计划 @everyone \n\n今天的帖子包括：\n- NVO 和 LLY的减重药之战，为何胜负已定！\n- 市场大跌，我的加仓计划！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-05T03:04:53.568000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468804549073703147","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n诺和诺德、礼来，冰火两重天！\n\n礼来昨天大涨，市值再次超过了万亿，风光继续。而对应的是诺和诺德财报后股价继续大跌。我为大家整理了两家公司在减重药物方面过去两年的具体销售数据：\n\n礼来GLP-1药物销售占比从两年前2024-Q1的26.5%猛增至现在2025-Q4的60.5%，这背后是GLP-1销售数据井喷，从单季度87亿到现在的单季度192亿。\n\n相比之下，诺和诺德的Ozempic呈下降趋势，而王牌药物Wegovy这两年增速明显放缓，很大原因就是持续被礼来的Zepbound压制。\n\n另外，2025年诺和诺德在减重药物营销上的费用是礼来的两倍，然而依然无济于事。\n\n其实结论已定：未来的减重药属于礼来，而不是诺和诺德。当然，任何制药公司，未来都充满着药物管线研发的不确定性。我说的胜负已定，是基于现有FDA批准药物销售数据的结论。其实这个结论不是现在才论定的，2025年初，很多业内人士就已经看到了明确的趋势：诺和诺德走下坡路，而礼来持续坚挺，这也是我在礼来的个股分析中表述的观点。至于未来诺和诺德能否研发出更好的减重药物，我保持中性偏悲观的态度。为什么？观点和我个股分析中一样：礼来减重药物的效果已经达到了我们人需求的水平，这个天花板很难再有大突破了。\n\n除此之外，我也附上诺和诺德未来几年药物专利过期日。可以明确看到，减重药物在中国的专利马上就到期了，具体时间应该是3月。而根据之前我对HIMS的分析，了解到在其它一些人口大国（不见得是目前销售大国）也将过期，比如加拿大已经到期，巴西也将在今年3月到期。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-05T03:05:04.969000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1468804596892831817","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"","mentions":[],"mention_roles":[],"attachments":[{"id":"1468804885532246088","filename":"2026-02-05_10.43.13.png","size":449025,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1468804885532246088/2026-02-05_10.43.13.png?ex=69fab025&is=69f95ea5&hm=576453db14c536386dacde9da3e752faf7b4e9aa66e97afd14cce314c1c78d66&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1468804885532246088/2026-02-05_10.43.13.png?ex=69fab025&is=69f95ea5&hm=576453db14c536386dacde9da3e752faf7b4e9aa66e97afd14cce314c1c78d66&","width":3648,"height":1278,"content_type":"image/png","content_scan_version":4,"placeholder":"OBgGEoR7R2ZzdveGyH92/Eg=","placeholder_version":1},{"id":"1468804885901475952","filename":"2026-02-05_10.46.38.png","size":364674,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1468804885901475952/2026-02-05_10.46.38.png?ex=69fab025&is=69f95ea5&hm=d56766770df4e38279d5b1d15a5134dfe79429348a7e21186dc16da0edff85c1&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/146880488590147 ,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"/fcBBYABsHyFqHeIiJiJY3eAhgdo","placeholder_version":1}],"embeds":[],"timestamp":"2026-02-07T01:38:08.361000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1469507492584230937","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n本周我的账户表现不佳，主要原因之一是被HIMS HIMZ拖累。HIMS 部分转HIMZ显然是一个高风险然后我现在需要承担高损失结果的选择。\n\n我已经在昨天的视频和文字强调，现在没持有公司股票的朋友不能够买入HIMS。\n\n目前公司股价在盘后暴跌，原因是美国药品监督局FDA正式要求美国司法部DOJ开始调查包括HIMS在内的所有远程医疗公司对于复方GLP-1药物的使用。\n\n我认为公司这么做显然是有计划的，虽然这种计划可能是一种豁出去的高风险计划。即将在周日投放的超级碗广告，我看了之后就觉得有点不对劲，因为这是一种挑衅的营销：高呼有钱人可以活得更久！这既是当今世界的事实，也是公司呼吁医疗平权的抗争。结合昨天高调发布口服复方司美格鲁肽，这是一系列组合拳。这样做是主动请缨战死沙场，代表远程医疗公司要求发起最后的判决：如果美国司法部裁决所有远程医疗公司都不能使用复方司美格鲁肽，那就是一损俱损，整个远程医疗行业都同时受到打击。如果最后判决并没有明令禁止，这就意味着以后这些公司可以更加合理销售。大家明白一个观点，美国的药品监督局FDA和咱们东方大国的完全不同，所有企业都可以和FDA直接博弈，或者叫干架。\n\n最后说一下诺和诺德，在这次的抗争中，其实最大的得利者还是礼来。我和犀牛哥的观点非常一致，不管诺和诺德股价多便宜都现在不会推荐大家去投资这家公司。这个结论不仅是我本身不喜欢这家公司，之前我为大家呈现了销售数据，我觉得这太明显不过了，数据相较于LLY明显弱势。","mentions":[],"mention_roles":[],"attachments":[{"id":"1469507616207142982","filename":"IMG_9266.jpg","size":44804,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1469507616207142982/IMG_9266.jpg?ex=69fa9b9d&is=69f94a1d&hm=14a0f0bf8f8b9d90df4e35fe71f1cd667ff5ab034442c1c10a38fb6ba9684ac0&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1469507616207142982/IMG_9266.jpg?ex=69fa9b9d&is=69f94a1d&hm=14a0f0bf8f8b9d90df4e35fe71f1cd667ff5ab034442c1c10a38fb6ba9684ac0&","width":1179,"height":1072,"content_type":"image/jpeg","content_scan_version":4,"placeholder":"PQgCBoBR6s4FlLs2pauMRpecev7AtQ4=","placeholder_version":1}],"embeds":[],"timestamp":"2026-02-07T01:38:37.792000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1469507616026660867","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n感谢大家，周末愉快！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-07T01:39:16.424000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1469507778061275268","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-02-08 攒一笔钱，投资SpaceX！\n\n这篇帖子是我对今年SpaceX投资的计划，这个计划我会不定时更新，直到公司上市。\n\nSpaceX上市在即\n\n我最近已经跟大家分享过，我认为SpaceX今年上市的几率对我来说几乎板上钉钉。\n\nhttps://youtu.be/BYXbuik3dgA?si=b8-7OuUbBoVv_jDC\n\n在以上链接的马斯克最新3小时播客节目中，18:45秒开始的几分钟，主持人尝试试探提问SpaceX为什么要上市，什么时候能上市。马斯克说到：“对于一家可能要上市的公司，我说话要非常小心！”，随后他强调，“速度很重要，speed is important！”。马斯克的意思是，什么样的方式能够尽快拿到钱，让我尽快发展SpaceX，我就愿意去做。现在很明显，SpaceX IPO上市是马斯克认为最佳融资方式，让后用这些钱迅速发展SpaceX。马斯克说不能谈太多，谈太多可能影响SpaceX本身的上市进度。\n\n我有什么打算？\n\n对SpaceX的投资，对我来说宜早不宜迟。既然和大部分朋友一样没有办法在一级市场投资，我从今年第一天开始就通过慢慢买入SATS间接投资SpaceX。这部分仓位目前15%+，最终都会被卖出，完全转化为SpaceX的股票。除此之外，我也在存一笔钱，大约十万美金左右，会在IPO前夕作为今年的账户持续投入资金。总的下来，我想要SpaceX的仓位有20%+。\n\n但是呢，这20%+的仓位我不会一次性在IPO当天买入，还是会留一些资金，以防出现上市后的大幅度回落，甚至是跌破发行价情况的出现。凡是留一个后手。\n\n为什么投资SpaceX？只是为梦想买单吗？\n\nSpaceX上市IPO估值目前看来至少是15000亿，意味着上市当天就会成为美股市值前十名的公司。具体来说，我认为有较大概率，上市当天成为美股市值第六的公司，仅次于英伟达、苹果、谷歌、微软、亚马逊。这么大体量的公司，市销率超过50，值得投资吗，还能翻倍吗？我想很多人都会因此望而却步，不愿意为市梦率买单。\n\n我一度也有恐高的心态，觉得要不要等上市之后回落了再开始买入。最近随着对SATS的投资和SpaceX IPO的临近，想法有一些改变，肯定也伴随一些FOMO情绪。目前我的想法如下：\n\nSpaceX上市开创了一个全新的太空经济时代，护城河极深。太空经济早就有，我说开创一个全新时代，因为以前的太空经济实际商业化市场总额真的不值一提。而现在让这个板块的规模充满无限增长空间的，正是SpaceX。公司结合火箭发射、卫星通讯、太空算力这几个实打实正在赚钱或者以后很有机会赚钱的业务，在政府和商业两个营收板块都没有任何实质的竞争压力。目前，SpaceX在太空领域的护城河对我来说堪比AI基础设施中的英伟达。\n\n投资SpaceX，等于投资马斯克，需要认可能够和马斯克一起赚钱，但也需要长期投资。我们现在可以问自己一个问题，如果回到过去，回到特斯拉上市那一刻，你会投资特斯拉吗？我们现在面临的问题，其实是同样的。对我来说，投资SpaceX第一年不见得有多少回报，但是长期来看，这是我想要长期持有的公司。和特斯拉一样，你需要忍受剧烈的股票波动。原因没别的，因为这是马斯克的公司，马斯克=高波动。现在SpaceX已经神速收购了xAI，上市之后特斯拉和SpaceX的某种形式的合并其实也是可能的。所以完全认可马斯克，才可以投资SpaceX，因为SpaceX很有可能是马斯克未来财富最重要的上市载体，我认为很有可能比特斯拉还重要。\n\nSpaceX对于我个人的投资组合：降beta！上面提到SpaceX虽然会有相对高波动，但是它毕竟是超大市值股票，不见得公司的beta会比我现在持有的成长型公司高。很有可能还会让我的持仓整体beta下降。这是我愿意看到的。到那个时候，可能SpaceX就是所谓压仓底的仓位了。\n\n感谢大家！ @everyone","mentions":[],"mention_roles":[],"attachments":[{"id":"1469982425051430952","filename":"ef4d89fa38788d5dd20ad51714ecd945.png","size":4890866,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1469982425051430952/ef4d89fa38788d5dd20ad51714ecd945.png?ex=69fb0451&is=69f9b2d1&hm=aa23b3acc5659b1b5d17cf39f0f740b5619fd90dfd6ffe3279724cdbe33b5106&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1469982425051430952/ef4d89fa38788d5dd20ad51714ecd945.png?ex=69fb0451&is=69f9b2d1&hm=aa23b3acc5659b1b5d17cf39f0f740b5619fd90dfd6ffe3279724cdbe33b5106&","width":4014,"height":2236,"content_type":"image/png","content_scan_version":4,"placeholder":"CBgGBIAkb4GFnlSZdZU60wC2Jg==","placeholder_version":1},{"id":"1469982425596694719","filename":"c4d81d71abc767da8d526a061dce031a.png","size":186889,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1469982425596694719/c4d81d71abc767da8d526a061dce031a.png?ex=69fb0451&is=69f9b2d1&hm=a7c0b6d1b8bb8b7f7d1e36bd512b81fdbce1875a30165bf7735db8fe41dd26a7&","proxy_ lor":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-02-11 Robinhood 2025Q4 财报 @everyone \n\nHOOD四季度营收数字\n- Robinhood 2025年四季度财报总结：2025全年飞速增长，但11-12月连续两个月营收疲软。下面是一些具体的四季度数据：\n- 用户数量 2700万，相较于三季度增加20万\n- 全平台总资产3240亿，相较于三季度略有下降\n- 营收12.83亿，和上季度12.74亿基本持平，不及市场预期13.4亿\n- Adjusted EBITDA 7.61亿，margin为59%\n- 净利润6.05亿，相较于上季度5.56有所提高\n\n2026年公司重点\n- 预测市场\n- 代币化市场\n- 家庭投资市场\n\n问题在哪里：看11-12月交易量\n\n不管是股票交易（左上），还是期权交易（右上），还是加密货币交易（左下），全年最高点都出现在十月，十月之后的十一月大幅度下降，到了十二月除了期权交易稍微回暖，股票交易和加密货币交易仍在环比下滑。特别是加密货币出现了较大的跌幅。\n\n我在个股分析说过，从绝对收入看，对HOOD最重要的收入是期权，因为费率比股票高很多。从费率看，加密货币费率最高，目前营收贡献在期权交易后，在股票交易前。\n\n简单观点\n- 加密货币市场很糟糕，严重影响了HOOD费率最高的加密货币交易业务。\n- 客户人数增速放缓，接近停滞，公司需要新的增长点，也就是上面的2026年的重点发展方向。\n- 股价最高点下来腰斩，估值方面我需要更多时间去和COIN IBKR FUTU。我继续持有手上的sell put，不会因为财报做任何操作。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[{"id":"1470977321438543892","filename":"2026-02-11_10.40.13.png","size":1319298,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1470977321438543892/2026-02-11_10.40.13.png?ex=69faae62&is=69f95ce2&hm=9c89df58cda782b2ef633ad7589e6ed4eca4092cc517ada434004d710b57fd33&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1470977321438543892/2026-02-11_10.40.13.png?ex=69faae62&is=69f95ce2&hm=9c89df58cda782b2ef633ad7589e6ed4eca4092cc517ada434004d710b57fd33&","width":5120,"height":2880,"content_type":"image/png","content_scan_version":4,"placeholder":"R/gFDICjQGx4iYhzmXbSCMpyPw==","placeholder_version":1},{"id":"1470977322067955713","filename":"2026-02-11_10.50.53.png","size":606851,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1470977322067955713/2026-02-11_10.50.53.png?ex=69faae63&is=69f95ce3&hm=67c968a761acced935cfd512b31049370b1840e420f3ed0eca43c98dabb99c17&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1470977322067955713/2026-02-11_10.50.53.png?ex=69faae63&is=69f95ce3&hm=67c968a761acced935cfd512b31049370b1840e42 hm=90342dd4e60847b1c424a40619cf068f8edd1dcae1da11f5b8c7dd6cc3b3b7b7&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1471357421115936860/2026210-2026-02-10T01-22-11-08-00-_gC_jrw9C8Ks.doc?ex=69fabee1&is=69f96d61&hm=90342dd4e60847b1c424a40619cf068f8edd1dcae1da11f5b8c7dd6cc3b3b7b7&","content_type":"application/msword","original_content_type":"application/msword","content_scan_version":4,"title":"2026年2月10日-2026-02-10T01-22-11-08-00- gC_jrw9C8Ks"}],"embeds":[],"timestamp":"2026-02-12T04:09:02.985000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1471357409757888624","channel_id":"1457988703363399781","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-02-12 RKLB持续负面消息，ASTS叒增发！ @everyone \n\n昨天我到达了重庆，今天在重庆随便走走，并没有太多时间去追踪股市。\n\n这里想简单用文字为大家更新一下RKLB的情况。其实我在前几天就已经看到新闻说公司的引擎测试场地发生过火灾，为什么火灾被人知道就是因为所有的消防局接到的通知都有记录的，所以这是确定发生的。然后呢，就在今天早上看到新闻说CEO出来确认了这次两个引擎测试位其中一个发生事故，但是他态度强烈的批评了对这次引擎测试出事故的负面报道，声称公司只是将测试做到了极致，也并未影响引擎的进展。\n\n无论如何去解读这次引擎测试火灾，结合几天前我发布的视频，标题是“我看空了RKLB吗？”，我认为确实公司最近在中子火箭方面的透明度做得很差，用一位比较了解公司的朋友对我说的话就是“此地无银三百两”。现在公司股价再次来到了70下方，还是持续坚持我的观点，财报前后可能有更低的买入机会，大家不要着急。我的正股买入位置依然是之前为大家分享过的60.1 54.1 48.1。\n\n另外，我也想简单更新一下ASTS这家公司，因为公司今天又宣布了10亿美金的增发，引起了股价的下跌。这家公司的支持者长期宣称公司的创始人兼CEO从未大量的卖出过公司任何股份，但是呢，这家公司因为目前仍然没有营收，而持续的烧钱，所以也在持续的增发。每一次增发基本上都是在股价的相对高点，不知道大家是怎么看待这样的行为，我个人是比较反感的。我多次告诉大家ASTS完全不是我想要去长期投资的公司。\n\n我为大家分享过两个完全不同的角度去看待这家公司。从战略竞争的角度ASTS会长期的受到现有电信运营商的支持，因为这些电信运营商如果不支持目前市场上存在稀缺性的ASTS，他们未来面对SpaxeX的竞争会毫无抵抗，从这个角度去看ASTS具备投资价值，而且要倒闭的几率是较小的。第二个角度就是从未来实际运营和盈利能力来看，我是非常的悲观，因为公司的火箭发射成本以及卫星运营成本真的是太高了，从纯计算来说，我看不到任何的和星链竞争的能力。哪怕是现在的星链，他与T-mobile提供的手机卫星通讯服务依然没有能够增加用户数量，因为现阶段的手机卫星通讯质量确实是比较鸡肋的。虽然现在ASTS发射的最新一颗卫星已经成功实现了展开，但未来的商业盈利能力是一个非常大的问号。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-12T08:16:39.117000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1471419720891633695","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-02-13 NBIS 2025Q4 财报 @everyone \n\n今天刚到家，刚才我看了一下NBIS四季度财报的关键数字，这里分享给大家，也会告诉大家我的感受。\n\n营收 & ARR数据\n- 年底ARR 12.5亿，超过预期（December 2025 ARR is 900-1100m, unchanged）\n- 全年营收5.30亿，预期之内（500-550m revenue for the full year 2025, reduced）\n- 2026 ARR不变，70-90亿美金（December 2026 ARR is 70-90b, much more than previously announced \"mid single digit billion in a few years\" ）\n以上括号部分内容是三季度的预期。\n\n一些补充信息\n- 微软和Meta作为NBIS的超级大客户，均已经在四季度开始按计划开始服务，并未出现延迟交付。\n- NBIS公司目前营收分为AI基础设施服务、TripleTen、Avride三部分，其中Avride全年收入忽略不计，TripleTen全年占比6%，主要业务来源是AI基础设施服务。除此之外，公司持股ClickHouse和Toloka。\n- 公司PPT说自己四季度的Adjusted EBITDA% 24%，要注意这是AI基础设施服务，整个公司四季度的Adjusted EBITDA% 是7%，而全年整个公司为-12%。作为对比，CRWV2023年首次公司年度Adjusted EBITDA转正，2023 2024的数字分别为45%和64%。\n- 公司目前优39亿现金，ClickHouse最新估值高达150亿，我仍然按照之前28%占比计算，现金+ClickHouse股权部分价值为79亿美金。除此之外，Toloka目前的估值并没有明确信息。\n\n我的感受\n- 大家知道我现在对neocloud并不是很乐观，在分享之前先重申这个观点，作为你们的参考。\n- 公司全年预期达标，但是年内其实下调过目标，所以我认为从全年营收成绩来看，只能算及格，并不是全年狂飙的状态。\n- 从公司四季度营收、折旧摊销和运营费用来看，NBIS仍处于大量支出但营收有限的状态：四季度营收227.7，但是折旧摊销181比例高达79%，运营费用462比例高达203%。\n- 我认为这些数据不足以让我觉得NBIS比CRWV优秀很多。但是我继续认为NBIS的软实力依然存在：懂得市场需求的CEO（最近开始搞physical AI）、俄罗斯工程师凝聚力强落地速度快。\n- 目前暂时不会再次投资NBIS和CRWV\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[{"id":"1471787070568661095","filename":"2026-02-13_4.06.02.png","size":214326,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1471787070568661095/2026-02-13_4.06.02.png?ex=69fafd86&is=69f9ac06&hm=47b134fb38993f84245afb80b226651c2673c20daeaf3d582fd4ec638a26b23b&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1471787070568661095/2026-02-13_4.06.02.png?ex=69fafd86&is=69f9ac06&hm=47b134fb38993f84245afb80b226651c2673c20daeaf3d582fd4ec638a26b23b&","width":1508,"height":1184,"content_type":"image/png","content_scan_version":4,"placeholder":"OfgFFYDAy4htlYhgiOlmcYyvGSgE","placeholder_version":1},{"id":"1471787071256531046","filename":"2026-02-13_4.16.14.png","size":551957,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1471787071256531046/2026-02-13_4.16.14.png?ex=69fafd86&is=69f9ac06&hm=3554e2b2b572315bd36ef86ffe82512545bcb92a3f3b4f6c745e7f892b895b58&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1471787071256531046/2026-02-13_4.16.14.png?ex=69fafd86&is=69f9ac06&hm=3554e2b2b572315bd36ef86ffe82512545bcb92a3f3b4f6c745e7f892b895b58&","width":2380,"height":1456,"content_type":"image/png","content_scan_version":4,"placeholder":"e/gFDIL7toWVeWmFh4kgLmtveQ==","placeholder_version":1},{"id":"1471787071856185396","filename":"2026-02-13_4.24.59.png","size":251671,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1471787071856185396/2026-02-13_4.24.59.png?ex=69fafd86&is=69f9ac06&hm=86b798810e0c4fae19486b5b2b111e0101bf65748f842b7df0d716608d7832a3&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1471787071856185396/2026-02-13_4.24.59.png?ex=69fafd86&is=69f9ac06&hm=86b798810e0c4fae19486b5b2b111e0101bf65748f842b7df0d716608d7832a3&","width":2028,"height":636,"content_type":"image/png","content_scan_version":4,"placeholder":"NfgJMoLJqXaPVmiHwLnn+mY=","placeholder_version":1}],"embeds":[],"timesta 6-02-16T23-48-39-08-00-__.pdf?ex=69fb276c&is=69f9d5ec&hm=3d16d28928092a040e7df48f073c22e2d39a1d57df195cb3608c00f476ea1685&","content_type":"application/pdf","original_content_type":"application/pdf","content_scan_version":4,"title":"2026年2月17日-2026-02-16T23-48-39-08-00- 投资_笔记"}],"embeds":[],"timestamp":"2026-02-17T23:35:08.688000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1473462806513848452","channel_id":"1457988703363399781","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n2026-02-18 为什么PLTR不会被AI取代，以及TSLA RKLB 买入位置 @everyone \n\nPLTR危机四伏？\n\n周一视频里面我提到，PLTR是AI受益股，不赞同大空头Michael Burry看空PLTR的观点。评论区当然也出现了质疑，比如说“每个公司都有两面性，就看AI 受益是否能对冲来自外部其他产品算法的AI 受损。PLTR 挺难说的。”、“不知道PLTR财务报表是否可靠”。\n\nPLTR靠政府合同起价，但是靠商业合同爆发。商业客户名单里面，超大型企业作为客户贡献了大部分收入。我之前说过，AI目前能够很好解决纯计算可以解决的问题，比如说编程。但是暂时看不到AI仅仅作为一个大模型公司的独立产品，能够从零开始帮助大型企业整合庞大的来自不同系统的数据、且从中创造出巨大价值的潜力。退一步说，这要是真做到了，那比PLTR更早灭亡的，可以是所有的在大型企业员工电脑里跑着的SaaS软件。PLTR相较于SaaS软件公司的核心区别之一是定制化，针对每个客户不同的数据流、不同的安全要求等等，做出定制化的解决方案。AI在PLTR的解决方案中是必不可少的，因为大语言模型可以让客户通过普通文字输出操控系统。换句话说，和编程一样，我们可以告诉系统我们要做什么，而不必完全理解系统的所有设置和细节。PLTR在企业操作系统扮演的角色，其实和AI编程工具在编写软件中的角色没有差别，只是后者已经被AI大模型公司占领，而前者被PLTR占领，没有人能改变这样的趋势。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-18T02:30:47.411000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1473507009122009220","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\nTSLA RKLB买入位置\n\n特斯拉：最近一两周并未有效跌破400这个整数关口，自去年9月以来形成的最下方的支撑是385左右。385-400左右可以是看好特斯拉的朋友的加仓位置，这也是马斯克加仓的位置。我个人暂时保持耐心，现在不会选择买回之前卖出的仓位。\n\nRKLB：似乎64跌不下去了，这条红色虚线是我之前画出来的支撑线。现在120MA的位置是61.5，急于加仓的朋友可以考虑提高一下加仓位置，把61.5-64这个区间作为第一加仓位置。我个人暂时保持耐心，原有的买入位置保持不变。距离财报还有两周时间，到时候120MA肯定已经上移到64左右，形成共振的一个强支撑位置。如果是这样，我会考虑在财报前在64左右加仓，然后财报如果出现下跌的情况再加大加仓力度。","mentions":[],"mention_roles":[],"attachments":[{"id":"1473507118807257120","filename":"2026-02-18_9.52.45.png","size":183680,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1473507118807257120/2026-02-18_9.52.45.png?ex=69faa7f1&is=69f95671&hm=cc0494758e1eb68be114c0ac8379d6317d4e8719eca563c398f7dfdeddfe271d&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1473507118807257120/2026-02-18_9.52.45.png?ex=69faa7f1&is=69f95671&hm=cc0494758e1eb68be114c0ac8379d6317d4e8719eca563c398f7dfdeddfe271d&","width":1345,"height":953,"content_type":"image/png","content_scan_version":4,"placeholder":"PAgGBYKVd4iIh3hsePdXdHtToFgG","placeholder_version":1},{"id":"1473507119222227035","filename":"2026-02-18_9.55.11.png","size":230654,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1473507119222227035/2026-02-18_9.55.11.png?ex=69faa7f1&is=69f95671&hm=a8c5a5b63b72bc423d70bc101c28d56d0ab891877dcf169ad365c28124c603a3&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1473507119222227035/2026-02-18_9.55.11.png?ex=69faa7f1&is=69f95671&hm=a8c5a5b63b72bc423d70bc101c28d56d0ab891877dcf169ad365c28124c603a3&","width":1519,"height":945,"content_type":"image/png","content_scan_version":4,"placeholder":"/AcCBIJgyHe5Z3h9iF2Dd995Bw==","placeholder_version":1}],"embeds":[] ame_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n2026-02-20 建仓TEM，RKLB SATS LMND TEM更新 @everyone \n\nRKLB现在股价来到75+，在财报前走出了底部65的位置。那么财报后就两个可能：跌回64这个支撑位附近，或者继续保持现在的日线级别和周线级别的上涨趋势。我对财报保持中性偏悲观的判断。目前因为部分仓位还在，而且之前RKLB的减仓部分原因是让步SATS，所以现在我保持原有的计划。还是提醒长期看好RKLB的朋友，不要轻易空仓等机会，保持一定仓位对于长期投资在心态上是更稳定更省力的方法。\n\nSATS日线级别五连涨，接近20MA，我觉得走势还是比较稳定的。非常期待三月的SpaceX星舰三代首飞，我个人认为首飞的成功会对SATS股价有促进作用。SATS的财报应该也是下周，重点关注是公司的负债情况以及管理层对于任何SpaceX持股的评论，到时候我会为大家仔细阅读财报细节。另外，我个人认为SpaceX上市前几日就有机会是达到市值两万亿以上。[呲牙]\n\nTEM我再昨天盘前建仓，属于右侧入场，小小追高。前两天股价涨幅都是6%+，接下来的财报将是股价最大的不确定性因素。我这次的建仓逻辑昨天已经简单说明，部分原因是想要在相对合理的价格埋伏即将到来的财报。接下来我会出一期简短的视频，解析昨天LMND财报以及我对TEM的看法，里面我会更详细阐述我为什么建仓TEM。LMND昨天财报消息出来后大涨，结果却大幅收跌。这支所谓的AI保险股票受到很多二级投资者的追捧，不过目前我依然不看好类似的保险公司。我个人不会投资LMND。所以对于LMND和TEM两家公司，我对TEM的看法发生了一些变化，但是我对LMND的看法依然保持不变。\n\n感谢大家！","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-02-20T03:28:05.745000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1474246206271127634","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n做一个投机操作：LUNR @everyone \n- 月球地形车LTV项目很快会宣布：中标就会暴涨，落选就是暴跌。没有中标我会立即止损。中标了我会持有一段时间。\n- 马斯克支持NASA将SpaceX重心从火星转移到月球，我对月球经济态度转变：从中性转为乐观。LUNR在月球经济的热度一致很高，具备较好的投机属性，尽管前两次月球着陆器都出现了问题。\n\n风险较大，小仓位，做好止损！","mentions":[],"mention_roles":[],"attachments":[{"id":"1474271211159683154","filename":"2d9801bf5d0324d697099b9fb5784d32.jpg","size":200453,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1474271211159683154/2d9801bf5d0324d697099b9fb5784d32.jpg?ex=69facc8f 明的中子首发延迟的主要原因。另外，阿基米德引擎并未宣布QC。虽然推迟是意料之中，我还是表示失望。\n- 除此之外，中子的主要更新：一级底座安装引擎部分QC完毕；中间连接级正在QC，QC完成后会和一级上部河马嘴整合；二级测试架安装完毕，等待二级达到发射场测试；\n\n公司完成了两个小规模的收购，都是今年一季度完成的，具体收购细节等待更多披露。Mynaric的收购仍然在等待德国政府批准，从财报看起来仍然是很有可能，而非谣传的岌岌可危。\n\n财报表达了非常非常明确的发展方向：继续集中火力准备未来卫星星座的所有核心能力基础，包括技术和产能准备。这方面的信息包括：\n- 新收购两家公司\n- 发布了新的太空太阳能板阵列产品\n- 强调了SDA第三批次追踪层卫星中标，和入选MDA导弹防御局SHIELD项目。\n\n我认为今晚股价下探去64.1的几率还是较大的，等待我的订单买入，不做任何修改。我还是要强调：\n1. 不要空仓，因为RKLB除了中子火箭仍然有其它催化剂，比如火星合同。\n2. 不要轻易加仓，中子火箭这个催化剂短期失效了，股价肯定会有一定压力。","mentions":[],"mention_roles":[],"attachments":[{"id":"1476809176394105026","filename":"2026-02-27_12.33.34.png","size":140049,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1476809176394105026/2026-02-27_12.33.34.png?ex=69facdb9&is=69f97c39&hm=b576895bbd6504b9da83525b4d1a38f7f88de251530f44249b3e1330cccf811a&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1476809176394105026/2026-02-27_12.33.34.png?ex=69facdb9&is=69f97c39&hm=b576895bbd6504b9da83525b4d1a38f7f88de251530f44249b3e1330cccf811a&","width":1968,"height":1220,"content_type":"image/png","content_scan_version":4,"placeholder":"izgOFIiCh3igeHiKhniAggIoKA==","placeholder_version":1},{"id":"1476809176759013522","filename":"2026-02-27_12.37.54.png","size":369538,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1476809176759013522/2026-02-27_12.37.54.png?ex=69facdb9&is=69f97c39&hm=aef83ab23fcc3c265db6e4a9ea8e1d236491c9052934af96681d54de825cd865&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1476809176759013522/2026-02-27_12.37.54.png?ex=69facdb9&is=69f97c39&hm=aef83ab23fcc3c265db6e4a9ea8e1d236491c9052934af96681d54de825cd865&","width":1932,"height":1540,"content_type":"image/png","content_scan_version":4,"placeholder":"cwgODoL0jYVlmImNZGl3mHeJO4jwc1g=","placeholder_version":1}],"embeds":[],"timestamp":"2026-02-27T05:12:25.503000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1476809176658477118","channel_id":"1457988703363399781","author ype":0,"content":"@everyone \n2026-03-03 SpaceX动作频繁，SATS财报前继续加仓，以及持续MSTR定投 @everyone \n\n2026-03-03 SpaceX动作频繁，SATS财报前继续加仓，以及持续MSTR定投\n\nSpaceX让我兴奋\n\n昨天半夜，我看到马斯克对下面的推文回复了“是的”：“为人类未来提供资金…SpaceX IPO传闻: 估值1.75万亿美元，3月提交上市申请。资金将用于星舰、月球和火星殖民计划以及地球戴森球项目。这不仅仅是一家公司上市-而是文明向外扩张。” 有朋友说怎么IPO前静默期可以说话，我的猜测是此时此刻还尚未提交IPO申请，然后这个回复很简短很模糊，所以不会被SEC追责。\n\n昨天白天我加更了一期Starlink Direc-to-Cell正式更名为Starlink Mobile的事情，如果我们翻译成中文可以是“星链移动”或者“星链联通”。这次更名伴随的是SpaceX全面更新Starlink手机直连卫星通讯官网信息，以及在正在进行的世界移动通信大会MWC2026上，Starlink高管释放了很多利好也未来的计划，我认为其中最值得关注的信息是：\n\n星舰一次将发射50颗V2手机通讯卫星，计划星舰商飞后，2027年中开始，半年时间发射总共1200颗卫星组网。>> 总共发射24次，每个月发射4次，每周发射一次星舰！按照这个计划，距离手机卫星通讯的全球覆盖（2028年初开始），仅仅只有两年，按照现在星舰的进度，我觉得完全有可能。\n\nStarlink Mobile宣布与德国电信Deutsche Telekom合作，从2028年开始提供手机卫星通讯服务。这里重要的不是合作这个表象，而是频谱的布局变得清晰。SpaceX 从 EchoStar 收购的主要是2兆赫兹频段也就是S-band，而EchoStar 此前通过其子公司已经完成了在欧洲及全球范围内的频谱“优先级占位”。2026 年1月21日欧盟正式发布了《数字网络法案》，以前卫星公司需要在欧盟 27 个国家逐一申请频率许可，现在该法案推动“欧盟级别”的统一卫星频谱授权。现在德国电信确认将利用Starlink V2卫星及其持有的S-band频谱，在德国及欧洲其他 10 个国家提供 5G 级别的卫星直连服务。\n\n还有一则消息是，xAI提前清偿30 亿美元的高收益债券。这是典型的IPO 前的“财务大扫除”：通过切割“垃圾债”进而优化财务报表，从而保护SpaceX估值。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-03-03T02:34:40.152000+00:00","edited_timestamp":null,"flags":4,"components":[],"id":"1478219027561189415","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"@everyone \n............\n\n昨天的交易 & 持仓全公开\n\n昨天盘前、盘后主要进行了两个交易：\n\n夜盘SATS小幅度小跌，我选择在114加仓200股\n\n盘后也就是今天早上我执行三月MSTR定投，还是一样，7000usd总定投金额\n\n本来想要加仓的NVDA和SOFI sell put，昨天开盘后故事回弹，我选择放弃操作。另一个原因是自己仓位很满了，所以降低不足够低就不买更多了。关于NVDA SOFI我觉得价格都很好，有仓位的朋友可以考虑正股或者sell put。SOFI CEO Noto直接财报后买入价值一百万美金的股票，对公司非常有信心。我自己认为SOFI是不错的，但是目前加密直接间接相关的配置太多了，包括MSTR HOOD CRCL，所以SOFI我不能盲目买入了。\n\n目前我的最新持仓所有细节：","mentions":[],"mention_roles":[],"attachments":[{"id":"1478219080480850053","filename":"2026-03-03_10.30.49.png","size":579557,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1478219080480850053/2026-03-03_10.30.49.png?ex=69faa8cc&is=69f9574c&hm=49e2a76084a6a03e3dcb88a615106ec1430ffc27a4aaab509d531d0e540cd7e2&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1478219080480850053/2026-03-03_10.30.49.png?ex=69faa8cc&is=69f9574c&hm=49e2a76084a6a03e3dcb88a615106ec1430ffc27a4aaab509d531d0e540cd7e2&","width":1944,"height":2212,"content_type":"image/png","content_scan_version":4,"placeholder":"+PcFBgSCqfi7aZdVh4aJjWh4U9sQ8w4=","placeholder_version":1}],"embeds":[],"timestamp":"2026-03-03T02:34:52.822000+00:00","edited_timestamp":"2026-03-03T02:35:11.276000+00:00","flags":4,"components":[],"id":"1478219080703152218","channel_id":"1457988703363399781","author":{"id":"1426229538722938880","username":"美股会员网机器人","avatar":"ab64ae6edd192784854ce8aee331375d","discriminator":"6056","public_flags":0,"flags":0,"bot":true,"banner":null,"accent_color":null,"global_name":null,"avatar_decoration_data":null,"collectibles":null,"display_name_styles":null,"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"<@&1439996350774251632>2026年3月3日-2026-03-02T20-17-27-08-00- MWC 2026 星链团队演讲视频","mentions":[],"mention_roles":["1439996350774251632"],"attachments":[{"id":"1478256067107618927","filename":"202633-2026-03-02T20-17-27-08-00-_MWC_2026_.mp4","size":280817948,"url":"https://cdn.discordapp.com/attachments/1457988703363399781/1478256067107618927/202633-2026-03-02T20-17-27-08-00-_MWC_2026_.mp4?ex=69facb3f&is=69f979bf&hm=6b547381bb8cac722c58d623d735d39ea801d6d253fbc5e106e370e915bdd7e7&","proxy_url":"https://media.discordapp.net/attachments/1457988703363399781/1478256067107618927/202633-2026-03-02
