<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>:root {
        color-scheme: light;
        --bg-canvas: #ffffff;
        --bg-surface: #f7f8fa;
        --bg-surface-2: #f2f3f5;
        --text-primary: #111827;
        --text-secondary: #6b7280;
        --text-muted: #9ca3af;
        --border-soft: #e5e7eb;
        --border-strong: #d1d5db;
        --accent: #5865f2;
        --accent-soft: rgba(88, 101, 242, 0.12);
        --hover-bg: rgba(17, 24, 39, 0.03);
        --code-bg: #111827;
        --code-text: #e5e7eb;
        --shadow-soft: 0 8px 24px rgba(17, 24, 39, 0.06);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg-canvas: #313338;
          --bg-surface: #2b2d31;
          --bg-surface-2: #1f2125;
          --text-primary: #e5e7eb;
          --text-secondary: #b5bac1;
          --text-muted: #8a9099;
          --border-soft: #3a3d43;
          --border-strong: #4b5563;
          --accent: #7c87ff;
          --accent-soft: rgba(124, 135, 255, 0.2);
          --hover-bg: rgba(255, 255, 255, 0.04);
          --code-bg: #111827;
          --code-text: #e5e7eb;
          --shadow-soft: 0 12px 30px rgba(0, 0, 0, 0.35);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Inter', 'Geist', system-ui, -apple-system, sans-serif;
        font-size: 15px;
        line-height: 1.45;
        background: var(--bg-canvas);
        color: var(--text-primary);
      }

      .container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: none;
        height: 100vh;
        margin: 0;
        padding: 0;
      }

      .top-bar {
        position: relative;
        flex-shrink: 0;
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        padding: 16px;
        margin: 10px;
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        background: color-mix(in srgb, var(--bg-surface) 88%, transparent);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow-soft);
      }

      .server-info {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 280px;
      }

      .chatlog-manifest {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .chatlog-manifest h4 {
        margin: 0;
        font-size: clamp(16px, 2.2vw, 20px);
        letter-spacing: 0.01em;
      }

      #message_count,
      #date_range {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--text-secondary);
        border: 1px solid var(--border-soft);
        background: var(--bg-surface-2);
      }

      .top-bar-right {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }

      .search-input {
        width: clamp(170px, 22vw, 260px);
        height: 34px;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 0 10px;
        outline: none;
        font-size: 13px;
        color: var(--text-primary);
        background: var(--bg-canvas);
      }

      .search-input:focus {
        border-color: color-mix(in srgb, var(--accent) 65%, var(--border-soft));
      }

      .sort-options {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--text-secondary);
      }

      .sort-radio {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        user-select: none;
      }

      .copy-json-btn {
        height: 34px;
        border: 1px solid color-mix(in srgb, var(--accent) 45%, var(--border-soft));
        border-radius: 10px;
        padding: 0 12px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: white;
        background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 80%, #111827));
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }

      .copy-json-btn:hover {
        opacity: 0.95;
        transform: translateY(-1px);
      }

      .messages-list-container {
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        background: var(--bg-surface);
        overflow: hidden;
      }

      .chat-main {
        display: flex;
        align-items: stretch;
        flex: 1;
        gap: 0;
        overflow: hidden;
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        margin: 0 10px 10px;
        background: var(--bg-canvas);
      }

      .chat-main .messages-list-container {
        flex: 1;
        height: 100%;
        overflow-y: auto;
        border: 0;
        border-radius: 0;
      }

      .search-sidebar {
        display: flex;
        flex-direction: column;
        width: 0;
        height: 100%;
        opacity: 0;
        overflow: hidden;
        background: #f9fafb;
        border-right: 0 solid #e3e5e8;
        transition: width 0.2s ease, opacity 0.2s ease, border-width 0.2s ease;
      }

      .search-sidebar.open {
        width: 320px;
        opacity: 1;
        border-right-width: 1px;
      }

      .search-sidebar-head {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        padding: 10px;
        border-bottom: 1px solid var(--border-soft);
        background: #f9fafb;
      }

      .search-head-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .search-sidebar-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .search-results-count {
        font-size: 11px;
        color: var(--text-muted);
      }

      .search-input-wrap {
        position: relative;
      }

      .search-input {
        width: 100%;
        height: 34px;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 0 28px 0 10px;
        outline: none;
        font-size: 13px;
        color: var(--text-primary);
        background: var(--bg-canvas);
      }

      .search-clear-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        border: 0;
        background: transparent;
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
      }

      .search-open-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 34px;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 0 10px;
        background: var(--bg-canvas);
        color: var(--text-secondary);
        font-size: 12px;
        cursor: pointer;
      }

      .search-close-btn {
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        background: var(--bg-canvas);
        color: var(--text-secondary);
        font-size: 11px;
        padding: 3px 8px;
        cursor: pointer;
      }

      .search-results {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .search-result-item {
        display: grid;
        grid-template-columns: 22px 1fr auto;
        gap: 8px;
        align-items: start;
        width: 100%;
        padding: 9px;
        border: 1px solid transparent;
        border-radius: 10px;
        text-align: left;
        background: rgba(255, 255, 255, 0.45);
        cursor: pointer;
      }

      .search-result-item:hover {
        border-color: var(--border-soft);
        background: var(--bg-canvas);
      }

      .search-result-avatar {
        width: 18px;
        height: 18px;
        border-radius: 50%;
      }

      .search-result-name {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .search-result-snippet {
        margin-top: 2px;
        font-size: 12px;
        color: var(--text-secondary);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .search-result-snippet mark {
        background: color-mix(in srgb, var(--accent) 25%, transparent);
        color: var(--text-primary);
        border-radius: 3px;
        padding: 0 2px;
      }

      .jump-flash {
        animation: jumpFlash 2s ease;
      }

      @keyframes jumpFlash {
        0% {
          background: color-mix(in srgb, var(--accent) 25%, transparent);
          box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent) 70%, transparent);
        }
        100% {
          background: transparent;
          box-shadow: inset 0 0 0 0 transparent;
        }
      }

      .search-result-time {
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 1px;
      }

      .search-sidebar::-webkit-scrollbar,
      .search-results::-webkit-scrollbar,
      .messages-list-container::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      .search-sidebar::-webkit-scrollbar-thumb,
      .search-results::-webkit-scrollbar-thumb,
      .messages-list-container::-webkit-scrollbar-thumb {
        background: color-mix(in srgb, var(--text-muted) 45%, transparent);
        border-radius: 999px;
      }

      .search-sidebar::-webkit-scrollbar-track,
      .search-results::-webkit-scrollbar-track,
      .messages-list-container::-webkit-scrollbar-track {
        background: transparent;
      }

      .search-empty {
        padding: 16px 10px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .search-overlay {
        display: none;
      }

      .messages-list-container.reverse {
        flex-direction: column-reverse;
      }

      .message-box {
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 10px;
        padding: 10px 14px;
        border-top: 1px solid color-mix(in srgb, var(--border-soft) 70%, transparent);
        transition: background-color 0.15s ease;
      }

      .message-box:first-child {
        border-top: 0;
      }

      .message-box:hover {
        background: var(--hover-bg);
      }

      .message-box.compact {
        grid-template-columns: 56px 1fr;
        padding-top: 4px;
      }

      .avatar-slot {
        display: flex;
        justify-content: center;
      }

      .message-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-soft);
        object-fit: cover;
      }

      .message-box.compact .message-avatar {
        visibility: hidden;
      }

      .message-body {
        min-width: 0;
      }

      .message-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 2px;
      }

      .message-box.compact .message-header {
        display: none;
      }

      .message-author {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .message-date {
        font-size: 11px;
        color: var(--text-muted);
      }

      .message-content {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        color: var(--text-primary);
      }

      .mention-inline {
        display: inline-block;
        border-radius: 5px;
        padding: 0 4px;
        margin: 0 1px;
        color: var(--accent);
        background: var(--accent-soft);
        font-weight: 600;
      }

      .message-reference {
        margin: 6px 0 8px;
        padding: 8px 10px;
        border-left: 3px solid color-mix(in srgb, var(--accent) 65%, var(--border-soft));
        border-radius: 8px;
        background: var(--bg-surface-2);
        color: var(--text-secondary);
        font-size: 12px;
      }

      .message-reference-author {
        font-weight: 700;
        color: var(--text-primary);
      }

      .message-reference-timestamp {
        margin-left: 8px;
        color: var(--text-muted);
      }

      .message-embeded {
        margin-top: 8px;
        border-left: 4px solid var(--accent);
        border-radius: 10px;
        background: var(--bg-surface-2);
        padding: 10px;
      }

      .embed-container {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .embed-text {
        font-weight: 700;
      }

      .embed-description {
        color: var(--text-secondary);
      }

      .attach-container,
      .embed-image-box {
        margin-top: 8px;
      }

      img,
      video {
        max-width: min(680px, 100%);
        max-height: 420px;
        border-radius: 10px;
      }

      audio {
        width: min(440px, 100%);
      }

      .zoomable {
        cursor: zoom-in;
        transition: transform 0.15s ease;
      }

      .zoomable:hover {
        transform: scale(1.01);
      }

      pre.code-wrap {
        position: relative;
        margin: 8px 0 0;
        padding: 12px;
        border-radius: 10px;
        overflow: auto;
        background: var(--code-bg);
        color: var(--code-text);
        border: 1px solid color-mix(in srgb, var(--code-bg) 75%, white);
      }

      pre.code-wrap code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      .code-copy-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 7px;
        padding: 3px 8px;
        font-size: 11px;
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.78);
        backdrop-filter: blur(3px);
      }

      .lightbox.open {
        display: flex;
      }

      .lightbox img {
        max-width: min(92vw, 1400px);
        max-height: 88vh;
        border-radius: 12px;
        box-shadow: 0 14px 50px rgba(0, 0, 0, 0.6);
      }

      @media (max-width: 768px) {
        html, body {
          overflow: auto;
          height: auto;
        }

        .container {
          height: auto;
          min-height: 100vh;
        }

        .chat-main {
          height: auto;
          min-height: 60vh;
          overflow: visible;
        }

        .chat-main .messages-list-container {
          overflow: visible;
          height: auto;
        }

        .top-bar {
          border-radius: 10px;
          position: static;
        }

        .server-info {
          min-width: 100%;
        }

        .message-box {
          grid-template-columns: 44px 1fr;
          padding: 8px 10px;
        }

        .message-avatar {
          width: 32px;
          height: 32px;
        }

        .search-open-btn {
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        .chat-main {
          position: relative;
          margin: 0;
          border-radius: 0;
          border-left: 0;
          border-right: 0;
          border-bottom: 0;
        }

        .search-sidebar {
          position: fixed;
          left: 0;
          top: 0;
          z-index: 40;
          width: min(320px, 90vw);
          max-width: 90vw;
          height: 100vh;
          opacity: 1;
          border-right: 1px solid #e3e5e8;
          transform: translateX(-100%);
          transition: transform 0.2s ease;
        }

        .search-sidebar.open {
          width: min(320px, 90vw);
          transform: translateX(0);
        }

        .search-overlay {
          position: fixed;
          inset: 0;
          z-index: 30;
          background: rgba(0, 0, 0, 0.35);
          display: none;
        }

        .search-overlay.open {
          display: block;
        }
      }</style></head><body><div class="container"><div><div id="chatlogs-title" class="top-bar"><div class="server-info"><div class="chatlog-manifest"><h4>美股会员网

tor":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false,"message_reference":{"type":0,"channel_id":"1484200645316710573","message_id":"1495783873320190132","guild_id":"1412445465907167394"},"referenced_message":{"type":0,"content":"@everyone \n美股交易：\n1、mu止盈，加仓dram至6%；\n2、tsem止盈，加仓gfs至4%；\n3、lmnd、goog、tsla止盈，买入poet1.8%，买入alab2%，mrvl加仓至2.5%\n@所有人","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-20T13:51:05.720000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1495783873320190132","channel_id":"1484200645316710573","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false}},{"type":0,"content":"今晚总体思路：全部清仓AI应用，集中向光和存，以及建仓CPU链的arm和alab\n而CPU链未来即将到来的极致供需失衡，除了利好众所周知的AMD和TNTC外，ARM ALAB是两个预期差比较大的标的，发酵程度较小，先建仓后研究","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-20T14:10:21.135000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1495788719482077347","channel_id":"1484200645316710573","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone\n美港股组合交易：\n自3月底抄底07709和07747以来，今天进行一次大减仓减仓一半以左右筹码，减仓后最终仓位：\n07709 10.9%\n07747 10.83%\n今天减仓后的仓位，一部分会回补到dram上面，理由是降beta。（意思就是：我依然非常看好存储板块，但是不愿意持有杠杆型etf这么大仓位了，加在dram上更舒服）\n@所有人","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-23T05:45:33.230000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1496748846397653082","channel_id":"1484200645316710573","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":true,"tts":false},{"type":0,"content":"重大调仓通知：\n\n一、现象观察\n\n自4月1日美伊战事缓和以来,行情迎来大级别反弹——标普500、纳指100连创历史新高,由AI引领的半导体板块更是走出了显著超额收益。A股这边同样如此,以光互连为代表的算力链一路新高。\n\n别人恐惧我贪婪。3月底4月初,大批投资者被美伊战争吓得魂不守舍之时,我坚定看好\"左存右光\",并在07709、07747股价杀到最凶险的时刻喊大家抄底,听劝的朋友如今都已赚得盆满钵满。再比如A股的东山精密,我们组合首次建仓是在2月9日,当时股价才70多块;如今东山精密已经走到光芯片拔估值的阶段,股价即将突破200大关。\n\n一句话总结:无论是美港股组合还是A股组合,凡是没有被这波美伊战争洗出去、坚决拿住筹码的朋友,乃至敢于在战争博弈最凶险的时刻底部加仓的会员朋友,这一波都赚得盆满钵满。在此恭喜大家。\n\n但是,风险也可能随时降临。自4月1日以来这波大反转走到现在,我认为短期已经出现了一点小泡沫的苗头。核心观察是:不论美股还是A股,走到当前位置,真正的核心龙头都已经涨不动了;与此同时,meme股近两周却出现鸡犬升天的局面。以美股光互连板块为例——整个板块近两周已经被投资者/投机者挖了个底朝天,从最下游的测试设备、模块厂、制造与封测代工厂,到最上游的激光器、原材料,一大批距离业绩兑现还很远的meme标的迎来暴涨,比如SOI、IQE、SIVE、LWLG、POET等等。这是典型的板块行情轮动进入尾声的信号。走到这一步,不论美股还是A股,起码都要小心一点。\n\n行情走到这个阶段,我的总体判断如下:\n\n1、中长期看,AI科技革命仍在继续渗透。从需求端看,以A社、OAI为代表的大模型公司——尤其是A社生产力级产品的刚性需求与算力紧缺之间的矛盾——充分说明AI距离泡沫还很远,当前绝对是供不应求。A社爆发性的ARR增长,以及其在整个行业内最快实现自由现金流转正(预计2027年)的节奏,让我觉得所谓\"害怕AI泡沫\"简直是无稽之谈。而对于美股三大云厂而言,市场对ROI的担忧也得到了显著缓解,其中谷歌的投入产出比最高。换句话说,从美股核心大科技公司的现有状态来看,我没有看到任何AI产业革命要破裂的迹象。因此,中长线,我继续坚定看好AI科技革命。\n\n2、但是,正如上文所说,中短期这波反转行情情绪已经过热。根据经验,大批meme股暴涨之后,接下来一段时间的行情往往较难操作。\n\n二、交易策略\n\n基于以上分析:长期继续看好AI科技革命,但短期要开始防守、降beta。翻译成人话就是——无论美港股还是A股,组合中的非AI核心票、meme票等,该止盈就止盈,见好就收;而对于核心龙头票,则继续持有。\n\nA股组合:东山精密、罗博特科、华懋科技、胜宏科技,在我看来均属核心龙头,各有各的优势,尤其展望今年Q2、Q3,都是业绩会加速的标的。因此,A股组合这四只票继续满仓持有,不做调整。\n\n美港股组合：左存方面,SNDK、DRAM、07709、07747是核心。不过既然要降beta,那么07709、07747这类杠杆型ETF,是时候减一部分仓位了——把减下来的仓位腾挪到DRAM上,就是一种降beta的具体做法。至于右光,除了核心持仓LITE和COHR之外,近期会逐步止盈一批观察仓——观察仓里不少meme票涨幅巨大,估值空间已经很难看清楚,该走就走,保持灵活性。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-23T05:45:39.787000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1496748873899839610","channel_id":"1484200645316710573","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone \n美股交易：dram从6%加仓至10%@所有人","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-23T13:47:31.295000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1496870137553485845","channel_id":"1484200645316710573","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_ ld":null},"pinned":false,"mention_everyone":true,"tts":false}},{"type":0,"content":"五一假期推荐阅读书籍：\n\n1、《行为投资学手册》 (The Little Book of Behavioral Investing) - 詹姆斯·蒙蒂尔\n\n这本书是极佳的入门读物，它直接点明投资者最大的敌人往往是自己。书中系统地介绍了过度自信、损失厌恶、从众心理等常见行为偏差如何导致投资错误，并提供了实用的纪律和框架来帮助投资者规避这些陷阱。\n\n2、《思考，快与慢》 (Thinking, Fast and Slow) - 丹尼尔·卡尼曼\n\n诺贝尔奖得主卡尼曼在书中提出了著名的“双系统”理论。系统1是快速、直觉且情绪化的；系统2则是缓慢、审慎且符合逻辑的。我们的许多判断和决策，包括投资决策，都深受这两个系统相互作用的影响，而系统1的直觉常常会导致认知偏差。\n\n3、《错误的行为》 (Misbehaving) - 理查德·塞勒\n\n作为行为经济学的奠基之作，这本书生动地记录了行为经济学如何挑战传统“理性人”假设的诞生过程。塞勒通过一系列有趣的实验和案例，展示了人类的非理性行为如何系统性地影响经济决策，为行为金融学奠定了坚实的理论和实证基础。","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-24T03:09:41.713000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1497072011158229164","channel_id":"1484200645316710573","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"1144058522808614923","expires_at":null},"collectibles":null,"display_name_styles":{"font_id":3,"effect_id":4,"colors":[11080677]},"banner_color":null,"clan":null,"primary_guild":null},"pinned":false,"mention_everyone":false,"tts":false},{"type":0,"content":"@everyone\n策略: 接着昨天下午发的长帖，再次提醒，美伊战争price in以来这接近一个月的大反转，最好赚钱的时候过去了，接下来a股进入退潮期，节前这几天小心，谨慎去打野，至于组合的中长线持仓，持股不动，少动多看。(守核心，慎打野)","mentions":[],"mention_roles":[],"attachments":[],"embeds":[],"timestamp":"2026-04-24T04:53:09.336000+00:00","edited_timestamp":null,"flags":0,"components":[],"id":"1497098047816073237","channel_id":"1484200645316710573","author":{"id":"1098937850168365176","username":"us_stock_vip","avatar":"6929839c3db522eb3fbc833af4659aaa","discriminator":"0","public_flags":0,"flags":0,"banner":null,"accent_color":null,"global_name":"美股会员网-群主","avatar_decoration_data":{"asset":"a_d3da36040163ee0f9176dfe7ced45cdc","sku_id":"11440585228086149       const state = {

      const els = {
        container: document.getElementById('chatlogs-message-list-container'),

      };

      

      function setSidebarOpen(open) {
        state.sidebarOpen = !!open;
        els.searchSidebar.classList.toggle('open', state.sidebarOpen);
        if (els.searchOverlay) {
          els.searchOverlay.classList.toggle('open', state.sidebarOpen);
        }
      }

      function formatDateTime(ts) {
        const d = new Date(ts);
        return `${d.toLocaleDateString()} ${d.toLocaleTimeString()}`;
      }

      function formatRelativeTime(ts) {
        const diff = Date.now() - new Date(ts).getTime();
        const min = Math.floor(diff / 60000);
        if (min < 1) return 'just now';
        if (min < 60) return `${min} min ago`;
        const hr = Math.floor(min / 60);
        if (hr < 24) return `${hr} h ago`;
        const day = Math.floor(hr / 24);
        return `${day} day${day > 1 ? 's' : ''} ago`;
      }

      function escapeHtml(text) {
        return String(text || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function createMentionMap(msg) {
        const map = new Map();
        (msg.mentions || []).forEach(m => {
          map.set(`@${m.username}`, `<span class="mention-inline">@${escapeHtml(m.username)}</span>`);
          map.set(`<@${m.id}>`, `<span class="mention-inline">@${escapeHtml(m.username)}</span>`);
        });
        return map;
      }

      function renderContentWithMentions(content, mentionMap) {
        let safe = escapeHtml(content);
        for (const [raw, html] of mentionMap.entries()) {
          const escapedRaw = raw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          safe = safe.replace(new RegExp(escapedRaw, 'g'), html);
        }
        return safe;
      }

      function appendCodeBlocks(container, content) {
        const codeFence = /```([\w-]*)\n([\s\S]*?)```/g;
        let matched = false;
        let m = null;
        while ((m = codeFence.exec(content)) !== null) {
          matched = true;
          const pre = document.createElement('pre');
          pre.className = 'code-wrap';
          const code = document.createElement('code');
          code.textContent = m[2].trim();
          pre.appendChild(code);
          const btn = document.createElement('button');
          btn.className = 'code-copy-btn';
          btn.textContent = 'Copy';
          btn.onclick = async () => {
            try {
              await navigator.clipboard.writeText(code.textContent);
              btn.textContent = 'Copied';
              setTimeout(() => (btn.textContent = 'Copy'), 900);
            } catch (e) {
              btn.textContent = 'Error';
              setTimeout(() => (btn.textContent = 'Copy'), 900);
            }
          };
          pre.appendChild(btn);
          container.appendChild(pre);
        }
        return matched;
      }

      function createEmbed(embed) {
        const wrap = document.createElement('div');
        wrap.className = 'message-embeded';
        const block = document.createElement('div');
        block.className = 'embed-container';
        wrap.appendChild(block);

        if (embed.title) {
          const t = document.createElement('div');
          t.className = 'embed-text';
          t.textContent = embed.title;
          block.appendChild(t);
        }
        if (embed.description) {
          const d = document.createElement('div');
          d.className = 'embed-description';
          d.textContent = embed.description;
          block.appendChild(d);
        }
        if (embed.thumbnail && embed.thumbnail.url) {
          const img = document.createElement('img');
          img.src = embed.thumbnail.url;
          img.className = 'zoomable';
          img.loading = 'lazy';
          block.appendChild(img);
        }
        if (embed.image && embed.image.url) {
          const img = document.createElement('img');
          img.src = embed.image.url;
          img.className = 'zoomable';
          img.loading = 'lazy';
          block.appendChild(img);
        }
        return wrap;
      }

      function createAttachment(att) {
        const wrap = document.createElement('div');
        wrap.className = 'attach-container';
        const t = att.content_type || '';
        if (t.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = att.url;
          img.className = 'zoomable';
          img.loading = 'lazy';
          wrap.appendChild(img);
        } else if (t.startsWith('video/')) {
          const v = document.createElement('video');
          v.controls = true;
          v.src = att.url;
          wrap.appendChild(v);
        } else if (t.startsWith('audio/')) {
          const a = document.createElement('audio');
          a.controls = true;
          a.src = att.url;
          wrap.appendChild(a);
        } else {
          const link = document.createElement('a');
          link.href = att.url;
          link.target = '_blank';
          link.rel = 'noreferrer';
          link.textContent = att.filename || att.url;
          link.style.color = 'var(--accent)';
          wrap.appendChild(link);
        }
        return wrap;
      }

      function withinCompactWindow(prev, curr) {
        if (!prev || !curr) return false;
        if (!prev.author || !curr.author) return false;
        if (prev.author.id !== curr.author.id) return false;
        const prevTs = new Date(prev.timestamp).getTime();
        const currTs = new Date(curr.timestamp).getTime();
        return currTs - prevTs <= 7 * 60 * 1000;
      }

      function renderMessages() {
        const list = state.sortOrder === 'asc' ? [...state.allMessages] : [...state.allMessages].reverse();
        state.renderedMessages = list;
        els.container.innerHTML = '';

        let prev = null;
        list.forEach((msg, idx) => {
          const messageId = String(msg.id || `msg-${idx}`);
          const box = document.createElement('div');
          box.className = 'message-box';
          box.dataset.messageId = messageId;
          if (withinCompactWindow(prev, msg)) box.classList.add('compact');

          const avatarSlot = document.createElement('div');
          avatarSlot.className = 'avatar-slot';
          const avatar = document.createElement('img');
          avatar.className = 'message-avatar';
          avatar.src = getAvatarUrl(msg.author.id, msg.author.avatar);
          avatar.width = 40;
          avatar.height = 40;
          avatarSlot.appendChild(avatar);
          box.appendChild(avatarSlot);

          const body = document.createElement('div');
          body.className = 'message-body';

          const header = document.createElement('div');
          header.className = 'message-header';
          const author = document.createElement('span');
          author.className = 'message-author';
          author.textContent = msg.author.username;
          const date = document.createElement('span');
          date.className = 'message-date';
          date.textContent = formatDateTime(msg.timestamp);
          header.appendChild(author);
          header.appendChild(date);
          body.appendChild(header);

          if (msg.referenced_message) {
            const ref = document.createElement('div');
            ref.className = 'message-reference';
            const ra = document.createElement('span');
            ra.className = 'message-reference-author';
            ra.textContent = `@${msg.referenced_message.author.username}`;
            const rt = document.createElement('span');
            rt.className = 'message-reference-timestamp';
            rt.textContent = formatDateTime(msg.referenced_message.timestamp);
            const rc = document.createElement('div');
            rc.textContent = msg.referenced_message.content || '';
            ref.appendChild(ra);
            ref.appendChild(rt);
            ref.appendChild(rc);
            body.appendChild(ref);
          }

          const messageContent = document.createElement('div');
          messageContent.className = 'message-content';
          const mentionMap = createMentionMap(msg);
          const rendered = renderContentWithMentions(msg.content || '', mentionMap);
          messageContent.innerHTML = rendered;
          body.appendChild(messageContent);

          appendCodeBlocks(body, msg.content || '');

          (msg.embeds || []).forEach(embed => body.appendChild(createEmbed(embed)));
          (msg.attachments || []).forEach(att => body.appendChild(createAttachment(att)));

          box.appendChild(body);
          els.container.appendChild(box);
          prev = msg;
        });

        bindLightbox();
        if (state.searchTerm) {
          updateSearchResults(state.searchTerm);
        }
      }

      function updateMeta(list) {
        const count = list.length;
        els.messageCount.textContent = `${count.toLocaleString()} messages`;
        if (!count) {
          els.dateRange.textContent = 'No message in current filter';
          return;
        }
        const start = new Date(list[0].timestamp);
        const end = new Date(list[list.length - 1].timestamp);
        els.dateRange.textContent = `${formatDateTime(start)} - ${formatDateTime(end)}`;
      }

      function closeSearchSidebar() {
        state.searchTerm = '';
        setSidebarOpen(false);
        if (els.searchResults) els.searchResults.innerHTML = '';
        if (els.searchResultsCount) els.searchResultsCount.textContent = '0 results';
      }

      function makeSnippet(content, q) {
        const full = String(content || '');
        if (!q) return escapeHtml(full.slice(0, 120));
        const lower = full.toLowerCase();
        const idx = lower.indexOf(q);
        if (idx < 0) return escapeHtml(full.slice(0, 120));
        const start = Math.max(0, idx - 24);
        const end = Math.min(full.length, idx + q.length + 36);
        const raw = full.slice(start, end);
        const escaped = escapeHtml(raw);
        const escapedQ = escapeHtml(full.slice(idx, idx + q.length));
        return escaped.replace(new RegExp(escapedQ.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i'), `<mark>${escapedQ}</mark>`);
      }

      function jumpToMessage(messageId) {
        const target = els.container.querySelector(`[data-message-id="${CSS.escape(messageId)}"]`);
        if (!target) return;
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.classList.remove('jump-flash');
        void target.offsetWidth;
        target.classList.add('jump-flash');
        setTimeout(() => target.classList.remove('jump-flash'), 2100);
      }

      function updateSearchResults(keyword) {
        const q = String(keyword || '')
          .trim()
          .toLowerCase();
        state.searchTerm = q;
        if (!q) {
          closeSearchSidebar();
          return;
        }

        const matches = state.renderedMessages.filter(m => {
          const base = `${m.content || ''} ${(m.author && m.author.username) || ''}`.toLowerCase();
          return base.includes(q);
        });

        setSidebarOpen(true);
        els.searchResults.innerHTML = '';
        els.searchResultsCount.textContent = `${matches.length} result${matches.length === 1 ? '' : 's'}`;

        if (!matches.length) {
          const empty = document.createElement('div');
          empty.className = 'search-empty';
          empty.textContent = 'No results found';
          els.searchResults.appendChild(empty);
          return;
        }

        matches.forEach(m => {
          const renderIdx = state.renderedMessages.indexOf(m);
          const messageId = String(m.id || `msg-${renderIdx >= 0 ? renderIdx : 0}`);
          const item = document.createElement('button');
          item.type = 'button';
          item.className = 'search-result-item';
          item.addEventListener('click', () => jumpToMessage(messageId));

          const av = document.createElement('img');
          av.className = 'search-result-avatar';
          av.src = getAvatarUrl(m.author.id, m.author.avatar);

          const textWrap = document.createElement('div');
          const name = document.createElement('div');
          name.className = 'search-result-name';
          name.textContent = `${m.author.username}:`;
          const snippet = document.createElement('div');
          snippet.className = 'search-result-snippet';
          snippet.innerHTML = `...${makeSnippet(m.content || '', q)}...`;
          textWrap.appendChild(name);
          textWrap.appendChild(snippet);
          item.appendChild(av);
          item.appendChild(textWrap);
          const rel = document.createElement('div');
          rel.className = 'search-result-time';
          rel.textContent = formatRelativeTime(m.timestamp);
          item.appendChild(rel);
          els.searchResults.appendChild(item);
        });
      }

      function ensureLightbox() {
        let lb = document.getElementById('img-lightbox');
        if (lb) return lb;
        lb = document.createElement('div');
        lb.id = 'img-lightbox';
        lb.className = 'lightbox';
        const img = document.createElement('img');
        lb.appendChild(img);
        lb.addEventListener('click', () => lb.classList.remove('open'));
        document.body.appendChild(lb);
        return lb;
      }

      function bindLightbox() {
        const lightbox = ensureLightbox();
        const target = lightbox.querySelector('img');
        document.querySelectorAll('.zoomable').forEach(node => {
          node.addEventListener('click', e => {
            e.preventDefault();
            target.src = node.src;
            lightbox.classList.add('open');
          });
        });
      }

      function copyJsonToClipboard() {
        navigator.clipboard
          .writeText(JSON.stringify(state.allMessages, null, 2))
          .then(() => {
            const btn = document.querySelector('.copy-json-btn');
            if (!btn) return;
            const old = btn.textContent;
            btn.textContent = 'Copied JSON';
            setTimeout(() => (btn.textContent = old), 900);
          })
          .catch(err => console.error('Failed to copy:', err));
      }

      function sortMessages(order) {
        state.sortOrder = order === 'desc' ? 'desc' : 'asc';
        renderMessages();
      }

      els.searchInput.addEventListener('input', e => updateSearchResults(e.target.value));
      els.searchClearBtn.addEventListener('click', () => {
        els.searchInput.value = '';
        closeSearchSidebar();
      });
      els.searchCloseBtn.addEventListener('click', () => closeSearchSidebar());
      els.searchOpenBtn.addEventListener('click', () => {
        const nextOpen = !state.sidebarOpen;
        setSidebarOpen(nextOpen);
        if (nextOpen) els.searchInput.focus();
      });
      if (els.searchOverlay) {
        els.searchOverlay.addEventListener('click', () => closeSearchSidebar());
      }

      updateMeta(state.allMessages);
      renderMessages();</script></body></html>
